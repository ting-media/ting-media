version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - DEBUG=True
      - SCHEDULER_INTERVAL_MINUTES=5
    volumes:
      - .:/app
      - app_database:/app/database
      - app_state:/app/state
    env_file:
      - .env
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: whatsapp_agent
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  app_database:
  app_state:
  postgres_data:
