            const secondary = firebase.initializeApp(firebase.app().options, secondaryName);
            try {
              const cred = await secondary.auth().createUserWithEmailAndPassword(form.email.trim(), password);
              const uid = cred.user.uid;
              await secondary.auth().signOut();
              await db.collection('users').doc(uid).set({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
              await secondary.delete();
              alert(`✅ נוצר משתמש חדש\nמייל: ${form.email}\nסיסמה: ${password}\nתפקיד: ${form.role}\n\nשלח לו את הפרטים — הוא יוכל להתחבר ב-${form.role === 'editor' ? '/editor.html' : '/admin.html'}`);
              setModal(false);
            } catch(e) {
              try { await secondary.delete(); } catch{}
              if (e.code === 'auth/email-already-in-use') {
                const uid = prompt(`המייל כבר קיים ב-Firebase Auth.\nהדבק את ה-UID של המשתמש מ-Firebase Console כדי להוסיף לו תפקיד:`);
                if (uid) {
                  await db.collection('users').doc(uid.trim()).set({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                  alert(`✅ הוקצה תפקיד "${form.role}" למשתמש קיים`);
                  setModal(false);
                }
              } else { throw e; }
            }
          }
        } catch(e){ alert('שגיאה: '+e.message); } finally { setSaving(false); }
      };

      const deleteUser = async id => {
        if (!window.confirm('להסיר את המשתמש מרשימת ההרשאות? (אינו מוחק את חשבון Firebase Auth)')) return;
        await db.collection('users').doc(id).delete();
      };

      const roleBadge = (r) => {
        const meta = ROLES.find(x=>x.id===r);
        if (!meta) return <span className="text-xs text-zinc-500">{r||'—'}</span>;
        const colorMap = {
          amber:'bg-amber-500/15 text-amber-300 border-amber-500/30',
          emerald:'bg-emerald-500/15 text-emerald-300 border-emerald-500/30',
          blue:'bg-blue-500/15 text-blue-300 border-blue-500/30',
          violet:'bg-violet-500/15 text-violet-300 border-violet-500/30',
          zinc:'bg-zinc-700/40 text-zinc-300 border-zinc-600/40',
        };
        return <span className={`text-xs px-2 py-0.5 rounded-full border ${colorMap[meta.color]}`}>{meta.label}</span>;
      };

      return (
        <div>
          <div className="flex justify-between items-start mb-6">
            <div>
              <h2 className="text-2xl font-black text-white">⚙️ הגדרות</h2>
              <p className="text-zinc-400 text-xs mt-1">ניהול מערכת, משתמשים והעדפות</p>
            </div>
          </div>

          {/* Tabs */}
          <div className="flex gap-1 mb-6 bg-zinc-900/60 p-1 rounded-lg border border-zinc-800 w-fit">
            {[
              {id:'profile',  label:'הפרופיל שלי', emoji:'👤'},
              {id:'calendar', label:'יומן Google',  emoji:'📅'},
              {id:'home',     label:'מסך הבית',    emoji:'🏠'},
              ...(isAdmin ? [
                {id:'team',   label:'שיוך לקוחות לצוות', emoji:'🤝'},
                {id:'users',  label:'משתמשים', emoji:'👥'},
                {id:'roles',  label:'תפקידים',  emoji:'🛡️'},
              ] : []),
            ].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors border-0 cursor-pointer ${
                  tab===t.id ? 'bg-amber-500 text-zinc-950' : 'bg-transparent text-zinc-400 hover:text-white'
                }`}>
                {t.emoji} {t.label}
              </button>
            ))}
          </div>

          {/* PROFILE */}
          {tab==='profile' && (
            <div className="space-y-4 max-w-xl">
              {/* User info card */}
              <div className={CL.card}>
                <h3 className="text-white font-bold mb-4">פרטי משתמש</h3>
                <div className="space-y-3 text-sm">
                  <div className="flex justify-between border-b border-zinc-800 pb-2">
                    <span className="text-zinc-400">אימייל</span>
                    <span className="text-white">{user.email}</span>
                  </div>
                  <div className="flex justify-between border-b border-zinc-800 pb-2">
                    <span className="text-zinc-400">תפקיד</span>
                    <span>{roleBadge(role)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-zinc-400">מזהה</span>
                    <span className="text-zinc-500 text-xs font-mono">{user.uid}</span>
                  </div>
                </div>
              </div>

              {/* Change password card */}
              <div className={CL.card}>
                <h3 className="text-white font-bold mb-1">🔑 שינוי סיסמה</h3>
                <p className="text-zinc-500 text-xs mb-4">אם הזנת את הסיסמה הנוכחית בטעות, לחץ "שלח קישור איפוס" ללא מילוי שדה זה</p>
                <div className="space-y-3">
                  <div>
                    <label className={CL.label}>סיסמה נוכחית</label>
                    <input type="password" className={CL.input} placeholder="הזן סיסמה נוכחית (להגנה)"
                      value={pwForm.current} onChange={e=>PF({current:e.target.value})} />
                  </div>
                  <div>
                    <label className={CL.label}>סיסמה חדשה *</label>
                    <input type="password" className={CL.input} placeholder="לפחות 6 תווים"
                      value={pwForm.next} onChange={e=>PF({next:e.target.value})} />
                  </div>
                  <div>
                    <label className={CL.label}>אישור סיסמה חדשה *</label>
                    <input type="password" className={CL.input} placeholder="חזור על הסיסמה"
                      value={pwForm.confirm} onChange={e=>PF({confirm:e.target.value})} />
                  </div>
                  {pwMsg && (
                    <div className={`text-sm px-3 py-2 rounded-lg ${pwMsg.type==='ok' ? 'bg-emerald-500/15 text-emerald-300 border border-emerald-500/30' : 'bg-red-500/15 text-red-300 border border-red-500/30'}`}>
                      {pwMsg.text}
                    </div>
                  )}
                  <div className="flex gap-2 pt-1">
                    <button onClick={changePassword} className={CL.btn} disabled={pwSaving}>
                      {pwSaving ? 'מעדכן...' : '🔑 עדכן סיסמה'}
                    </button>
                    <button
                      onClick={async()=>{ setPwSaving(true); try{ await firebase.auth().sendPasswordResetEmail(user.email); setPwMsg({type:'ok',text:'📧 נשלח אימייל לאיפוס סיסמה ל-'+user.email}); }catch(e){setPwMsg({type:'err',text:e.message});} finally{setPwSaving(false);} }}
                      className={CL.btn2} disabled={pwSaving}>
                      📧 שלח קישור איפוס
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* CALENDAR */}
          {tab==='calendar' && (
            <CalendarSettings />
          )}

          {/* HOME PAGE EDITOR */}
          {tab==='home' && (
            <div className="space-y-4 max-w-3xl">
              <div className={CL.card}>
                <h3 className="text-white font-bold mb-1">✏️ עריכת דף הבית</h3>
                <p className="text-zinc-500 text-xs mb-5">ערוך את התוכן, הטקסטים והווידאו של דף הבית</p>

                <div className="space-y-4">
                  {/* Hero Title */}
                  <div>
                    <label className={CL.label}>כותרת הגיבור (Hero Title)</label>
                    <input className={CL.input}
                      placeholder="ברוכים הבאים"
                      value={homeForm.heroTitle}
                      onChange={e=>HF({heroTitle:e.target.value})} />
                  </div>

                  {/* Hero Subtitle */}
                  <div>
                    <label className={CL.label}>תת-כותרת</label>
                    <input className={CL.input}
                      placeholder="תיאור קצר"
                      value={homeForm.heroSubtitle}
                      onChange={e=>HF({heroSubtitle:e.target.value})} />
                  </div>

                  {/* Hero Video URL */}
                  <div>
                    <label className={CL.label}>קישור וידאו (Hero Video URL)</label>
                    <input className={CL.input}
                      placeholder="https://example.com/video.mp4"
                      value={homeForm.heroVideoUrl}
                      onChange={e=>HF({heroVideoUrl:e.target.value})} />
                    <p className="text-xs text-zinc-500 mt-1">קובץ וידאו או קישור YouTube / Drive</p>
                  </div>

                  {/* About Text */}
                  <div>
                    <label className={CL.label}>טקסט אודות (About)</label>
                    <textarea className={CL.input+" min-h-20"}
                      placeholder="ספר קצת על העסק שלך..."
                      value={homeForm.aboutText}
                      onChange={e=>HF({aboutText:e.target.value})} />
                  </div>

                  {/* Services Title */}
                  <div>
                    <label className={CL.label}>כותרת השירותים</label>
                    <input className={CL.input}
                      placeholder="השירותים שלנו"
                      value={homeForm.servicesTitle}
                      onChange={e=>HF({servicesTitle:e.target.value})} />
                  </div>

                  {/* Testimonial Text */}
                  <div>
                    <label className={CL.label}>טקסט עדויות (Testimonials)</label>
                    <input className={CL.input}
                      placeholder="מה אומרים על אודותנו"
                      value={homeForm.testimonialText}
                      onChange={e=>HF({testimonialText:e.target.value})} />
                  </div>

                  {/* Save Button */}
                  <button onClick={saveHomeContent} disabled={homeLoading}
                    className={CL.btn+" w-full"}
                    style={{opacity: homeLoading ? 0.6 : 1}}>
                    {homeLoading ? '🔄 שומר...' : '✅ שמור את התוכן'}
                  </button>
                </div>
              </div>

              {/* Preview */}
              <div className={CL.card}>
                <h4 className="text-white font-bold mb-3">📸 תצוגה מקדימה</h4>
                <div className="bg-zinc-950 rounded-lg p-4 border border-zinc-800">
                  <div className="text-xl font-bold text-amber-400 mb-1">{homeForm.heroTitle}</div>
                  <div className="text-sm text-zinc-300 mb-3">{homeForm.heroSubtitle}</div>
                  {homeForm.heroVideoUrl && (
                    <div className="text-xs text-zinc-500 mb-3">🎬 וידאו: {homeForm.heroVideoUrl.slice(0,50)}...</div>
                  )}
                  <div className="text-xs text-zinc-400 border-t border-zinc-800 pt-3 mt-3">{homeForm.aboutText.slice(0,80)}...</div>
                </div>
              </div>
            </div>
          )}

          {/* TEAM ASSIGNMENT */}
          {tab==='team' && isAdmin && (
            <div>
              <div className="mb-4">
                <p className="text-zinc-400 text-sm">שייכי כל לקוח למנהל תיק. כל מנהל יראה רק את הלקוחות והמשימות המשויכים אליו.</p>
              </div>
              <div className={CL.tableWrap}>
                <table className="w-full text-right">
                  <THead cols={['לקוח','סטטוס','מנהל תיק','משימות פתוחות']} />
                  <tbody>
                    {teamClients.map(c=>{
                      const mgr = teamEmployees.find(e=>e.id===c.accountManagerId);
                      return (
                        <tr key={c.id} className={CL.tableRow}>
                          <td className="px-4 py-3 text-white text-sm font-medium">{c.name}</td>
                          <td className="px-4 py-3"><span className={`text-xs px-2 py-0.5 rounded-full border ${c.status==='פעיל'?'bg-emerald-500/15 text-emerald-300 border-emerald-500/30':'bg-zinc-800 text-zinc-400 border-zinc-700'}`}>{c.status||'—'}</span></td>
                          <td className="px-4 py-3">
                            <select className={CL.input+" max-w-[220px]"} value={c.accountManagerId||''} onChange={e=>updateClientManager(c.id, e.target.value)}>
                              <option value="">— ללא —</option>
                              {teamEmployees.map(emp=> <option key={emp.id} value={emp.id}>{emp.name||emp.fullName||'(ללא שם)'}</option>)}
                            </select>
                          </td>
                          <td className="px-4 py-3 text-zinc-400 text-xs">{mgr?(mgr.name||mgr.fullName):'—'}</td>
                        </tr>
                      );
                    })}
                    {teamClients.length===0 && <tr><td colSpan={4} className="px-4 py-8 text-center text-zinc-500 text-sm">אין לקוחות עדיין</td></tr>}
                  </tbody>
                </table>
              </div>
              <div className="mt-4 p-3 bg-blue-500/5 border border-blue-500/20 rounded-lg text-xs text-zinc-400">
                💡 כדי שמשתמש יראה רק את הלקוחות שלו, יש לקשר אותו לעובד דרך "משתמשים" → "עריכה" → "עובד מקושר".
              </div>
            </div>
          )}

          {/* USERS MANAGEMENT */}
          {tab==='users' && isAdmin && (
            <div>
              <div className="flex justify-between items-center mb-4">
                <p className="text-zinc-400 text-sm">{users.length} משתמשים רשומים</p>
                {isRealAdmin && <button onClick={openNew} className={CL.btn}>+ משתמש חדש</button>}
              </div>
              {loading
                ? <div className="text-center py-10 text-zinc-400 text-sm">טוען...</div>
                : users.length===0
                  ? <Empty msg="אין משתמשים נוספים — הוסף משתמש כדי לתת גישה" />
                  : (
                    <div className={CL.tableWrap}>
                      <table className="w-full text-right">
                        <THead cols={['שם','אימייל','תפקיד','סטטוס','הרשאות מיוחדות','פעולות']} />
                        <tbody>
                          {users.map(u=>(
                            <tr key={u.id} className={CL.tableRow}>
                              <td className="px-4 py-3 text-white text-sm font-medium">{u.displayName||'—'}</td>
                              <td className="px-4 py-3 text-zinc-300 text-sm">{u.email}</td>
                              <td className="px-4 py-3">{roleBadge(u.role)}</td>
                              <td className="px-4 py-3">
                                <span className={`text-xs px-2 py-0.5 rounded-full ${u.status==='פעיל'?'bg-emerald-900/40 text-emerald-300':'bg-zinc-800 text-zinc-400'}`}>
                                  {u.status||'פעיל'}
                                </span>
                              </td>
                              <td className="px-4 py-3 text-zinc-400 text-xs">{(u.permissions||[]).length} הרשאות</td>
                              <td className="px-4 py-3">
                                <div className="flex gap-2">
                                  <button onClick={()=>openEdit(u)} className="text-xs text-amber-400 hover:text-amber-300 bg-transparent border-0 cursor-pointer">עריכה</button>
                                  {isRealAdmin && <button onClick={()=>deleteUser(u.id)} className="text-xs text-red-400 hover:text-red-300 bg-transparent border-0 cursor-pointer">הסר</button>}
                                </div>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )
              }
              <div className="mt-4 p-3 bg-amber-500/5 border border-amber-500/20 rounded-lg text-xs text-zinc-400">
                💡 הוספת משתמש כאן רק מגדירה תפקיד והרשאות. על המשתמש להירשם דרך מסך ההתחברות עם אותו אימייל.
              </div>
            </div>
          )}

          {/* ROLES MATRIX */}
          {tab==='roles' && isAdmin && (
            <div className="space-y-3">
              {ROLES.map(r=>(
                <div key={r.id} className={CL.card}>
                  <div className="flex justify-between items-start">
                    <div>
                      <div className="flex items-center gap-2 mb-1">
                        <span className="text-white font-bold">{r.label}</span>
                        {roleBadge(r.id)}
                      </div>
                      <p className="text-zinc-400 text-xs">{r.desc}</p>
                    </div>
                    <span className="text-zinc-500 text-xs font-mono">{r.id}</span>
                  </div>
                </div>
              ))}
              <div className="p-3 bg-amber-500/5 border border-amber-500/20 rounded-lg text-xs text-zinc-400">
                💡 התפקידים מוגדרים בקוד. הרשאות מותאמות אישית ניתן להגדיר לכל משתמש בנפרד דרך עמוד "משתמשים".
              </div>
            </div>
          )}

          {/* USER MODAL */}
          {modal && (
            <Modal title={editing?'עריכת משתמש':'משתמש חדש'} onClose={()=>setModal(false)} wide>
              <div className="grid grid-cols-2 gap-x-4">
                <div>
                  <label className={CL.label}>שם תצוגה</label>
                  <input className={CL.input} placeholder="ישראל ישראלי" value={form.displayName} onChange={e=>F({displayName:e.target.value})} />
                </div>
                <div>
                  <label className={CL.label}>אימייל *</label>
                  <input type="email" className={CL.input} placeholder="user@tingil.co" value={form.email} onChange={e=>F({email:e.target.value})} disabled={!!editing} />
                </div>
                <div>
                  <label className={CL.label}>תפקיד</label>
                  <select className={CL.input} value={form.role} onChange={e=>F({role:e.target.value})}>
                    {ROLES.map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
                  </select>
                </div>
                {!editing && (
                  <div>
                    <label className={CL.label}>סיסמה ראשונית *</label>
                    <input className={CL.input} type="text" value={form.password} onChange={e=>F({password:e.target.value})} placeholder="לפחות 6 תווים" />
                    <div style={{ fontSize:11, color:'#71717a', marginTop:4 }}>תוצג למשתמש להתחברות ראשונית</div>
                  </div>
                )}
                <div>
                  <label className={CL.label}>סטטוס</label>
                  <select className={CL.input} value={form.status} onChange={e=>F({status:e.target.value})}>
                    <option>פעיל</option><option>מושעה</option>
                  </select>
                </div>
                <div className="col-span-2">
                  <label className={CL.label}>עובד מקושר (לראיית לקוחות אישית)</label>
                  <select className={CL.input} value={form.linkedEmployeeId} onChange={e=>F({linkedEmployeeId:e.target.value})}>
                    <option value="">— לא מקושר (רואה הכל) —</option>
                    {teamEmployees.map(emp=> <option key={emp.id} value={emp.id}>{emp.name||emp.fullName||'(ללא שם)'}</option>)}
                  </select>
                  <p className="text-xs text-zinc-500 mt-1">קישור משתמש לעובד גורם לו לראות רק לקוחות ומשימות המשויכים אליו</p>
                </div>
              </div>

              <label className={CL.label}>הרשאות מיוחדות (override לתפקיד)</label>
              <div className="grid grid-cols-2 gap-2 mt-2">
                {PERMISSIONS.map(p=>(
                  <label key={p.id} className="flex items-center gap-2 bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 cursor-pointer hover:border-amber-500/40">
                    <input type="checkbox" checked={form.permissions.includes(p.id)} onChange={()=>togglePerm(p.id)} className="accent-amber-500" />
                    <span className="text-white text-sm">{p.label}</span>
                  </label>
                ))}
              </div>

              <div className="flex gap-2 justify-end mt-5">
                <button onClick={()=>setModal(false)} className={CL.btn2}>ביטול</button>
                <button onClick={saveUser} className={CL.btn} disabled={saving}>{saving?'שומר...':'שמור'}</button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* ── MY WORK (home for office/admin) ──────────────────────────────────
       Personal landing inspired by Asana's "My Tasks":
       Drag tasks between buckets to reschedule. Quick-actions inline.
       Includes video reviews where the ball is in the user's court. */
    function MyWork({ user, role, tasks=[], clients=[], employees=[], suppliers=[], onNav }) {
      const toast = useToast();
      const [reviews, setReviews] = useState([]);
      const [savedFilter, setSavedFilter] = useState(() =>
        localStorage.getItem('tingmedia.myworkFilter') || 'mine'); // 'mine' | 'team'
      const [draggingId, setDraggingId] = useState(null);
      const [overBucket, setOverBucket] = useState(null);
      const [collapsed, setCollapsed] = useState(() => {
        try { return JSON.parse(localStorage.getItem('tingmedia.myworkCollapsed')||'{}'); } catch { return {}; }
      });
      const [quickTitle, setQuickTitle] = useState('');
      const [quickClient, setQuickClient] = useState('');
      const [quickAssignee, setQuickAssignee] = useState('');
      const [quickPriority, setQuickPriority] = useState('medium');
      const [quickDue, setQuickDue] = useState('today');
      const [quickAdding, setQuickAdding] = useState(false);

      useEffect(() => {
        if (!db) return;
        const unsub = db.collection('videoReviews').onSnapshot(s => {
          setReviews(s.docs.map(d => ({ id:d.id, ...d.data() })));
        }, e => console.warn('reviews:', e));
        return unsub;
      }, []);

      function toggleCollapsed(key) {
        const next = { ...collapsed, [key]: !collapsed[key] };
        setCollapsed(next);
        localStorage.setItem('tingmedia.myworkCollapsed', JSON.stringify(next));
      }

      // Date helpers
      const today = new Date(); today.setHours(0,0,0,0);
      const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
      const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate()+7);
      function asDate(s) { if (!s) return null; const d = new Date(s); d.setHours(0,0,0,0); return d; }
      function bucketOf(t) {
        if (t.stage === 9) return 'done';
        const d = asDate(t.dueDate || t.shootDate);
        if (!d) return 'later';
        if (d < today) return 'overdue';
        if (d.getTime() === today.getTime()) return 'today';
        if (d <= weekEnd) return 'week';
        return 'later';
      }

      // "Mine" filter — tasks where I'm AM/editor
      const myUid = user.uid;
      const myEmpId = useMemo(() => {
        const e = employees.find(x => x.userId === myUid);
        return e?.id || null;
      }, [employees, myUid]);

      const visibleTasks = useMemo(() => tasks.filter(t => {
        if (savedFilter === 'team') return true;
        const stageOwner = (t.stageOwners||{})[t.stage||1];
        const ownsCurrentStage = stageOwner === ('emp:'+myEmpId) || stageOwner === ('sup:'+myEmpId);
        return t.accountManagerId === myEmpId
            || t.editorId === myEmpId
            || t.assigneeUid === myUid
            || ownsCurrentStage;
      }), [tasks, savedFilter, myEmpId, myUid]);

      // "Ball in your court" — tasks where current stage owner = me
      const ballInMyCourt = useMemo(() => visibleTasks.filter(t => {
        if ((t.stage||1) >= 9) return false; // not done
        const owner = (t.stageOwners||{})[t.stage||1];
        if (!owner) return false;
        const [, oid] = owner.split(':');
        return oid === myEmpId;
      }), [visibleTasks, myEmpId]);

      // Group tasks
      const buckets = useMemo(() => {
        const b = { overdue:[], today:[], week:[], later:[], done:[] };
        for (const t of visibleTasks) b[bucketOf(t)].push(t);
        // Sort each by priority then due date
        const prioRank = { high:0, medium:1, low:2 };
        for (const k of Object.keys(b)) {
          b[k].sort((a,c) => (prioRank[a.priority]??9) - (prioRank[c.priority]??9)
            || ((asDate(a.dueDate)?.getTime()||9e15) - (asDate(c.dueDate)?.getTime()||9e15)));
        }
        return b;
      }, [visibleTasks]);

      // Video reviews where the ball is at me (or my team if filter='team')
      const myReviews = reviews.filter(r => {
        if (r.assignedTo !== 'am') return false;
        if (savedFilter === 'team') return true;
        return r.userId === myUid;
      });

      // Drag handlers — drop a task into a bucket changes its dueDate
      function localISO(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
      function bucketToDate(bucket) {
        if (bucket === 'today')   return localISO(today);
        if (bucket === 'week')    { const d = new Date(today); d.setDate(d.getDate()+3); return localISO(d); }
        if (bucket === 'later')   { const d = new Date(today); d.setDate(d.getDate()+14); return localISO(d); }
        if (bucket === 'overdue') { const d = new Date(today); d.setDate(d.getDate()-1); return localISO(d); }
        return null;
      }
      async function handleDrop(bucket) {
        if (!draggingId) return;
        const t = tasks.find(x => x.id === draggingId);
        setDraggingId(null); setOverBucket(null);
        if (!t) return;
        if (bucket === 'done') {
          await db.collection('tasks').doc(t.id).update({ stage: 9, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
          return;
        }
        const newDate = bucketToDate(bucket);
        await db.collection('tasks').doc(t.id).update({ dueDate: newDate, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      }

      async function quickComplete(t) {
        const prevStage = t.stage || 1;
        const isUndo = t.stage === 9;
        await db.collection('tasks').doc(t.id).update({
          stage: isUndo ? (prevStage === 9 ? 1 : prevStage) : 9,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        if (!isUndo) {
          toast.push({
            icon:'✓',
            msg:`"${(t.title||'משימה').slice(0,40)}" סומנה כבוצעה`,
            duration: 6000,
            action: { label:'בטל', onClick: async () => {
              await db.collection('tasks').doc(t.id).update({
                stage: prevStage,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
              });
            }}
          });
        }
      }
      async function snoozeTomorrow(t) {
        const d = new Date(today); d.setDate(d.getDate()+1);
        await db.collection('tasks').doc(t.id).update({ dueDate: localISO(d), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      }
      async function quickAdd() {
        if (!quickTitle.trim()) return;
        setQuickAdding(true);
        try {
          const due = quickDue === 'today' ? today
                      : quickDue === 'tomorrow' ? new Date(today.getTime()+86400000)
                      : quickDue === 'week' ? new Date(today.getTime()+7*86400000)
                      : null;
          // Parse assignee (format: "emp:id" or "sup:id")
          let accountManagerId = null, editorId = null;
          if (quickAssignee) {
            const [type, id] = quickAssignee.split(':');
            if (type === 'emp') accountManagerId = id;
            else if (type === 'sup') editorId = id;
          }
          const docRef = await db.collection('tasks').add({
            title: quickTitle.trim(),
            client: quickClient || '',
            stage: 1, priority: quickPriority || 'medium',
            dueDate: due ? localISO(due) : null,
            accountManagerId: accountManagerId || myEmpId || null,
            editorId: editorId || null,
            userId: myUid,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          toast.push({ icon:'✓', msg:`משימה "${quickTitle.trim().slice(0,30)}" נוספה בהצלחה`, duration:4000 });
          setQuickTitle(''); setQuickClient(''); setQuickAssignee(''); setQuickPriority('medium'); setQuickDue('today');
        } catch(e) {
          console.error('quickAdd error:', e);
          toast.push({ icon:'✗', msg:'שגיאה בהוספת משימה: ' + (e.message||'נסה שוב'), duration:4000 });
        } finally {
          setQuickAdding(false);
        }
      }

      const greeting = (() => {
        const h = new Date().getHours();
        if (h < 12) return 'בוקר טוב';
        if (h < 17) return 'צהריים טובים';
        if (h < 21) return 'ערב טוב';
        return 'לילה טוב';
      })();
      const totalAction = buckets.overdue.length + buckets.today.length + myReviews.length;

      const STAGE_LABELS = ['','בריף','כתיבה','אישור תסריט','קביעת צילום','צילום','עריכה','אישור סופרוויזר','אישור לקוח','סגירה'];
      const STAGE_EMOJI  = ['','📋','✍️','📝','📅','🎬','✂️','👁️','✅','🏁'];

      // Calmer palette — color reserved for "what needs attention"
      // Bucket BG stays neutral; only the left rail + count chip carry the color.
      const buckMeta = {
        overdue: { title:'באיחור', emoji:'🔥', color:'#ef4444', dot:'#ef4444' },
        today:   { title:'היום',   emoji:'📅', color:'#f59e0b', dot:'#f59e0b' },
        week:    { title:'השבוע',  emoji:'📆', color:'#60a5fa', dot:'#60a5fa' },
        later:   { title:'אחר כך', emoji:'⏰', color:'#71717a', dot:'#52525b' },
        done:    { title:'בוצע',   emoji:'✅', color:'#22c55e', dot:'#22c55e' },
      };

      return (
        <div className="min-h-full overflow-y-auto" style={{ background:'#09090b', padding:'18px 22px', maxHeight:'calc(100vh - 0px)' }}>
          {/* Greeting */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ display:'flex', alignItems:'baseline', gap:12, flexWrap:'wrap' }}>
              <h1 style={{ fontSize:20, fontWeight:700, color:'#fafafa', letterSpacing:'-0.01em' }}>{greeting}, {user.displayName?.split(' ')[0] || 'בוס'}</h1>
              <span style={{ fontSize:12, color:'#52525b' }}>
                {new Date().toLocaleDateString('he-IL',{weekday:'long', day:'numeric', month:'long'})}
              </span>
              {totalAction > 0 && (
                <span style={{ color:'#f87171', fontSize:12, fontWeight:500 }}>
                  · {totalAction} דורש פעולה
                </span>
              )}
              <span style={{ flex:1 }} />
              <div style={{ display:'flex', background:'#101012', border:'1px solid #1f1f23', borderRadius:6, overflow:'hidden' }}>
                {[['mine','שלי'],['team','צוות']].map(([v,l]) => (
                  <button key={v}
                    onClick={() => { setSavedFilter(v); localStorage.setItem('tingmedia.myworkFilter', v); }}
                    style={{ padding:'5px 12px', fontSize:11, fontWeight:500, background: savedFilter===v ? '#1f1f23':'transparent', color: savedFilter===v ? '#fafafa':'#71717a', border:'none', cursor:'pointer' }}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Quick add — comprehensive form with all fields */}
          <div className="mywork-quick-add" style={{ display:'flex', gap:6, alignItems:'center', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:10, padding:'8px 10px', marginBottom:24, transition:'border-color .2s, box-shadow .2s', flexWrap:'wrap' }}>
            <span style={{ fontSize:14, color:'var(--text-muted)', flexShrink:0 }}>➕</span>
            <input value={quickTitle} onChange={e=>setQuickTitle(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey) quickAdd();}}
              placeholder="הוסף משימה..."
              style={{ flex:'1 1 160px', background:'transparent', border:'none', color:'var(--text)', fontSize:13, outline:'none', minWidth:80 }} />

            {/* Client select */}
            <select value={quickClient} onChange={e=>setQuickClient(e.target.value)}
              style={{ background:'var(--surface)', border:'1px solid var(--border2)', color: quickClient ? 'var(--text)' : 'var(--text-muted)', fontSize:12, cursor:'pointer', padding:'3px 6px', borderRadius:5, flexShrink:1, minWidth:100 }}>
              <option value="" style={{background:'var(--surface)',color:'var(--text-muted)'}}>לקוח</option>
              {clients && clients.map(c => <option key={c.id} value={c.name} style={{background:'var(--surface)',color:'var(--text)'}}>{c.name}</option>)}
            </select>

            {/* Assignee select */}
            <select value={quickAssignee} onChange={e=>setQuickAssignee(e.target.value)}
              style={{ background:'var(--surface)', border:'1px solid var(--border2)', color: quickAssignee ? 'var(--text)' : 'var(--text-muted)', fontSize:12, cursor:'pointer', padding:'3px 6px', borderRadius:5, flexShrink:1, minWidth:90 }}>
              <option value="" style={{background:'var(--surface)',color:'var(--text-muted)'}}>מקצועי</option>
              {employees && employees.map(e => <option key={e.id} value={'emp:'+e.id} style={{background:'var(--surface)',color:'var(--text)'}}>{e.name||e.email}</option>)}
              {suppliers && suppliers.map(s => <option key={s.id} value={'sup:'+s.id} style={{background:'var(--surface)',color:'var(--text)'}}>{s.name||s.email} (עורך)</option>)}
            </select>

            {/* Priority select */}
            <select value={quickPriority} onChange={e=>setQuickPriority(e.target.value)}
              style={{ background:'var(--surface)', border:'1px solid var(--border2)', color:'var(--text)', fontSize:12, cursor:'pointer', padding:'3px 6px', borderRadius:5, flexShrink:1, minWidth:70 }}>
              <option value="low" style={{background:'var(--surface)',color:'var(--text)'}}>נמוך</option>
              <option value="medium" style={{background:'var(--surface)',color:'var(--text)'}}>בינוני</option>
              <option value="high" style={{background:'var(--surface)',color:'#ef4444'}}>גבוה</option>
            </select>

            {/* Due date select */}
            <select value={quickDue} onChange={e=>setQuickDue(e.target.value)}
              style={{ background:'var(--surface)', border:'1px solid var(--border2)', color:'var(--text-muted)', fontSize:12, cursor:'pointer', padding:'3px 6px', borderRadius:5, flexShrink:1, minWidth:70 }}>
              <option value="today" style={{background:'var(--surface)',color:'var(--text)'}}>היום</option>
              <option value="tomorrow" style={{background:'var(--surface)',color:'var(--text)'}}>מחר</option>
              <option value="week" style={{background:'var(--surface)',color:'var(--text)'}}>שבוע</option>
              <option value="none" style={{background:'var(--surface)',color:'var(--text)'}}>ללא</option>
            </select>

            {/* Submit button */}
            <button onClick={quickAdd} disabled={!quickTitle.trim() || quickAdding}
              style={{ padding:'5px 12px', background:'var(--accent)', color:'#000', fontSize:12, fontWeight:600, border:'none', borderRadius:6, cursor: quickTitle.trim() && !quickAdding ? 'pointer' : 'not-allowed', whiteSpace:'nowrap', flexShrink:0, opacity: quickTitle.trim() && !quickAdding ? 1:.5, transition:'opacity .15s' }}>
              {quickAdding ? 'שומר...' : 'הוסף'}
            </button>
            {/* Full form button — opens the Tasks section */}
            <button onClick={() => onNav && onNav('tasks')}
              title="פתח טופס יצירת משימה מלא"
              style={{ padding:'5px 10px', background:'transparent', color:'var(--text-muted)', fontSize:12, border:'1px solid var(--border2)', borderRadius:6, cursor:'pointer', whiteSpace:'nowrap', flexShrink:0, transition:'all .15s' }}
              onMouseEnter={e=>{e.currentTarget.style.color='var(--text)';e.currentTarget.style.borderColor='var(--text-muted)';}}
              onMouseLeave={e=>{e.currentTarget.style.color='var(--text-muted)';e.currentTarget.style.borderColor='var(--border2)';}}>
              📋 טופס מלא
            </button>
          </div>

          {/* Video reviews row — calm */}
          {myReviews.length > 0 && (
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, fontWeight:600, color:'#71717a', marginBottom:6, letterSpacing:'.02em', textTransform:'uppercase' }}>
                סקירות וידאו · {myReviews.length}
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(260px, 1fr))', gap:6 }}>
                {myReviews.map(r => (
                  <div key={r.id} onClick={() => onNav('videoreview')}
                    style={{ background:'#101012', border:'1px solid #1f1f23', borderRadius:8, padding:'9px 11px', cursor:'pointer', position:'relative', overflow:'hidden' }}>
                    <div style={{ position:'absolute', right:0, top:0, bottom:0, width:2, background:'#ef4444', opacity:0.7 }} />
                    <div style={{ display:'flex', alignItems:'center', gap:8, paddingRight:6 }}>
                      <span style={{ fontSize:14, opacity:0.9 }}>{REVIEW_STATUS[r.status]?.icon || '🎬'}</span>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontWeight:500, fontSize:13, color:'#e4e4e7', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.title}</div>
                        <div style={{ fontSize:11, color:'#71717a', marginTop:1 }}>{REVIEW_STATUS[r.status]?.label}</div>
                      </div>
                      {(r.versions?.length || 0) > 0 && <span style={{ color:'#71717a', fontSize:10 }}>v{r.currentVersion || r.versions.length}</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Workload — see who's slammed before promising a deadline */}
          {(() => {
            const people = [];
            for (const e of employees) people.push({ id:e.id, name:e.name || e.email || '—', kind:'AM', avatar:'👤' });
            for (const s of suppliers) people.push({ id:s.id, name:s.name || s.email || '—', kind:'עורך', avatar:'🎬' });
            // Compute load per person this week
            const weekStart = today;
            const weekEndDate = new Date(today.getTime() + 7*86400000);
            function loadFor(personId) {
              const arr = tasks.filter(t => (t.accountManagerId===personId || t.editorId===personId) && t.stage < 9);
              const thisWeek = arr.filter(t => {
                const d = asDate(t.dueDate || t.shootDate);
                return d && d >= weekStart && d <= weekEndDate;
              });
              const overdue = arr.filter(t => {
                const d = asDate(t.dueDate);
                return d && d < weekStart;
              });
              return { open: arr.length, week: thisWeek.length, overdue: overdue.length };
            }
            const withLoad = people.map(p => ({ ...p, load: loadFor(p.id) }))
              .filter(p => p.load.open > 0)
              .sort((a,b) => b.load.week - a.load.week);
            if (withLoad.length === 0) return null;
            const maxWeek = Math.max(...withLoad.map(p => p.load.week), 5);
            const weekRange = (() => {
              const end = new Date(today.getTime() + 6*86400000);
              return `${today.getDate()}.${today.getMonth()+1} – ${end.getDate()}.${end.getMonth()+1}`;
            })();
            return (
              <div className="mywork-panel">
                <div className="mywork-panel-head">
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span style={{ width:7, height:7, borderRadius:'50%', background:'#f59e0b' }} />
                    <span style={{ fontSize:13, fontWeight:600, color:'#f4f4f5' }}>עומס השבוע</span>
                  </div>
                  <span style={{ fontSize:12, color:'#52525b' }}>{weekRange}</span>
                </div>
                <div className="workload-grid">
                  {withLoad.map(p => {
                    const pct = Math.min(100, (p.load.week / maxWeek) * 100);
                    const heat = p.load.week >= 7 ? '#ef4444' : p.load.week >= 4 ? '#f59e0b' : '#22c55e';
                    const initials = (p.name || '').split(' ').map(w => w[0]).filter(Boolean).slice(0,2).join('');
                    const isAm = p.kind === 'AM';
                    return (
                      <div key={p.id} className="workload-card">
                        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
                          <div className={`workload-avatar ${isAm ? 'wa-am' : 'wa-editor'}`}>{initials}</div>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:13, fontWeight:600, color:'#f4f4f5', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{p.name}</div>
                            <span style={{ fontSize:11, color:'#52525b', background:'#2a2a2f', display:'inline-block', padding:'1px 7px', borderRadius:4, marginTop:2 }}>{p.kind}</span>
                          </div>
                        </div>
                        <div style={{ height:4, background:'#2a2a2f', borderRadius:2, overflow:'hidden', marginBottom:10 }}>
                          <div style={{ height:'100%', width:`${pct}%`, background:heat, borderRadius:2, transition:'width .4s', float:'right' }} />
                        </div>
                        <div style={{ display:'flex', gap:12 }}>
                          <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
                            <span style={{ fontSize:15, fontWeight:700, color:'#f4f4f5' }}>{p.load.week}</span>
                            <span style={{ fontSize:10, color:'#52525b' }}>השבוע</span>
                          </div>
                          <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
                            <span style={{ fontSize:15, fontWeight:700, color:'#f4f4f5' }}>{p.load.open}</span>
                            <span style={{ fontSize:10, color:'#52525b' }}>פתוחות</span>
                          </div>
                          <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
                            <span style={{ fontSize:15, fontWeight:700, color: p.load.overdue > 0 ? '#ef4444' : '#f4f4f5' }}>{p.load.overdue}</span>
                            <span style={{ fontSize:10, color:'#52525b' }}>באיחור</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* Ball in your court — stages assigned specifically to me */}
          {ballInMyCourt.length > 0 && (
            <div style={{ marginBottom: 16, background:'#1a0e0a', border:'1px solid #7c2d12', borderRadius:10, overflow:'hidden', position:'relative' }}>
              <div style={{ position:'absolute', right:0, top:0, bottom:0, width:3, background:'#f59e0b' }} />
              <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 18px 10px 14px', borderBottom:'1px solid #451a03' }}>
                <span style={{ fontSize:14 }}>🎯</span>
                <span style={{ fontWeight:600, fontSize:13, color:'#fbbf24', flex:1 }}>הכדור אצלך — שלבים שאתה אחראי עליהם</span>
                <span style={{ background:'rgba(245,158,11,0.18)', color:'#fbbf24', fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:99 }}>{ballInMyCourt.length}</span>
              </div>
              <div>
                {ballInMyCourt.map(t => {
                  const stageLbl = STAGE_LABELS[t.stage] || '';
                  const stageIcon = STAGE_EMOJI[t.stage] || '';
                  const due = asDate(t.dueDate);
                  const dueDisp = due ? due.toLocaleDateString('he-IL',{day:'numeric', month:'numeric'}) : '';
                  const isOverdue = due && due < today;
                  return (
                    <div key={t.id} onClick={() => onNav('tasks')}
                      className="mywork-row"
                      style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 18px 10px 14px', borderBottom:'1px solid #451a03', cursor:'pointer' }}>
                      <span style={{ fontSize:14, opacity:0.85 }}>{stageIcon}</span>
                      <span style={{ flex:1, minWidth:0, fontSize:13.5, color:'#f4f4f5', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{t.title}</span>
                      <span style={{ background:'rgba(245,158,11,0.15)', color:'#fbbf24', fontSize:11, padding:'2px 8px', borderRadius:4 }}>{stageLbl}</span>
                      {t.client && <span className="mywork-client-chip">{t.client}</span>}
                      {dueDisp && <span style={{ fontSize:11, color: isOverdue ? '#ef4444' : '#a1a1aa', fontWeight: isOverdue ? 600 : 400 }}>{dueDisp}</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Buckets — refined: rail on right, square checkbox, client chip, hover lift */}
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {['overdue','today','week','later','done'].map(key => {
              const meta = buckMeta[key];
              const arr = buckets[key];
              if (key === 'done' && arr.length === 0) return null;
              const isCollapsed = collapsed[key];
              const isOver = overBucket === key;
              return (
                <div key={key}
                  className={`mywork-bucket b-${key}`}
                  onDragOver={e => { e.preventDefault(); setOverBucket(key); }}
                  onDragLeave={() => setOverBucket(null)}
                  onDrop={() => handleDrop(key)}
                  style={isOver ? { borderColor: meta.color } : undefined}
                >
                  <div className="mywork-bucket-head" onClick={() => toggleCollapsed(key)}>
                    <span style={{ fontSize:14, lineHeight:1 }}>{meta.emoji}</span>
                    <span style={{ fontWeight:600, fontSize:13, color: key==='overdue' ? '#ef4444' : '#f4f4f5', flex:1 }}>{meta.title}</span>
                    <span className="mywork-count">{arr.length}</span>
                    <span style={{ fontSize:11, color:'#52525b', transform: isCollapsed ? 'rotate(-90deg)' : 'none', transition:'transform .2s' }}>▾</span>
                  </div>
                  {!isCollapsed && (
                    arr.length === 0 ? (
                      <div style={{ padding:'12px 18px', borderTop:'1px solid #1f1f23', color:'#3f3f46', fontSize:12 }}>
                        {key === 'today' ? 'פנוי 🌿' : key === 'overdue' ? 'הכל בזמן ✓' : 'גרור לכאן משימות'}
                      </div>
                    ) : (
                      <div className="mywork-task-list">
                        {arr.map(t => {
                          const due = asDate(t.dueDate);
                          const dueDisp = due ? due.toLocaleDateString('he-IL',{day:'numeric', month:'numeric'}) : '';
                          const am = employees.find(e => e.id === t.accountManagerId);
                          const ed = suppliers.find(s => s.id === t.editorId);
                          const stageLbl = STAGE_LABELS[t.stage] || '';
                          const stage = t.stage || 1;
                          // Stage pill color per phase
                          let stageClass = '#71717a', stageBg = 'rgba(113,113,122,0.12)';
                          if (stage >= 6 && stage <= 7) { stageClass = '#60a5fa'; stageBg = 'rgba(96,165,250,0.12)'; } // editing/review
                          else if (stage === 5) { stageClass = '#a78bfa'; stageBg = 'rgba(167,139,250,0.12)'; } // filming
                          else if (stage === 8) { stageClass = '#f59e0b'; stageBg = 'rgba(245,158,11,0.12)'; } // client review
                          else if (stage === 9) { stageClass = '#22c55e'; stageBg = 'rgba(34,197,94,0.12)'; } // done
                          return (
                            <div key={t.id}
                              draggable
                              onDragStart={() => setDraggingId(t.id)}
                              onDragEnd={() => { setDraggingId(null); setOverBucket(null); }}
                              onClick={() => onNav('tasks')}
                              className={`mywork-row${key==='done' ? ' done' : ''}`}
                              style={{
                                cursor: draggingId===t.id ? 'grabbing' : 'pointer',
                                opacity: draggingId===t.id ? .4 : 1,
                                display:'flex', alignItems:'center', gap:10,
                              }}>
                              {/* Square checkbox on right (start in RTL) — clicking marks done */}
                              <span
                                className={`mywork-check ${key==='done' ? 'checked' : ''}`}
                                title={key==='done' ? 'החזר לפעיל' : 'סמן כבוצע'}
                                onClick={e => { e.stopPropagation(); quickComplete(t); }}
                              >
                                {key==='done' ? '✓' : ''}
                              </span>
                              <span style={{ flex:1, minWidth:0, fontSize:13.5, color: key==='done' ? '#71717a' : '#f4f4f5', fontWeight:400, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', textDecoration: key==='done' ? 'line-through' : 'none' }}>
                                {t.title}
                              </span>
                              <div style={{ display:'flex', alignItems:'center', gap:6, flexShrink:0 }}>
                                {stageLbl && (
                                  <span className="mywork-stage-pill" style={{ background: stageBg, color: stageClass }}>{stageLbl}</span>
                                )}
                                {t.client && <span className="mywork-client-chip">{t.client}</span>}
                                {dueDisp && (
                                  <span className={`mywork-due ${key}`}>{dueDisp}</span>
                                )}
                                {/* Hover-only actions */}
                                <div className="mywork-actions" style={{ display:'flex', gap:4, alignItems:'center', opacity: 0, transition:'opacity .15s' }}>
                                  {key !== 'done' && key !== 'later' && (
                                    <button title="דחה למחר" onClick={e => { e.stopPropagation(); snoozeTomorrow(t); }}
                                      style={{ background:'transparent', border:'1px solid #2a2a2f', color:'#a1a1aa', borderRadius:5, padding:'2px 7px', fontSize:11, cursor:'pointer' }}>⏰</button>
                                  )}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )
                  )}
                </div>
              );
            })}
          </div>

          {/* Footer hint — subtle */}
          <div style={{ marginTop:18, fontSize:10, color:'#3f3f46', display:'flex', gap:12, flexWrap:'wrap', justifyContent:'center' }}>
            <span>גרור לשינוי תאריך</span>
            <span>·</span>
            <span>עיגול = בוצע</span>
            <span>·</span>
            <span>⏰ דחיה</span>
            <span>·</span>
            <span>⌘K חיפוש</span>
          </div>
        </div>
      );
    }

    /* ── PROCESSES — תהליכים וזרימת עבודה ──
       Displays: assignee distribution, priority matrix, stage pipeline, bottlenecks */
    function Processes({ user, role, tasks=[], employees=[], suppliers=[] }) {
      const STAGE_LABELS = ['','בריף','כתיבה','אישור תסריט','קביעת צילום','צילום','עריכה','אישור סופרוויזר','אישור לקוח','סגירה'];
      const STAGE_EMOJI = ['','📋','✍️','📝','📅','🎬','✂️','👁️','✅','🏁'];
      const PRI_COLORS = { high:'#ef4444', medium:'#f59e0b', low:'#22c55e' };

      // Summary KPIs
      const totalOpen = tasks.filter(t => (t.stage||1) < 9).length;
      const totalDone = tasks.filter(t => t.stage === 9).length;
      const byPriority = { high:0, medium:0, low:0 };
      const byAssignee = {};
      const byStage = {};

      tasks.forEach(t => {
        if ((t.stage||1) < 9) {
          const p = t.priority || 'medium';
          byPriority[p] = (byPriority[p] || 0) + 1;
        }
        const am = t.accountManagerId;
        if (am) {
          byAssignee[am] = (byAssignee[am] || 0) + 1;
        }
        const s = t.stage || 1;
        byStage[s] = (byStage[s] || 0) + 1;
      });

      return (
        <div>
          <div className="mb-8">
            <h2 className="text-3xl font-black text-white mb-1">⚙️ תהליכים וזרימת עבודה</h2>
            <p className="text-zinc-400 text-sm">ניהול תהליכים, חלוקת משימות, וניהול צוות</p>
          </div>

          {/* KPI Cards */}
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-8">
            <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
              <div className="text-zinc-400 text-xs mb-1 font-semibold">📋 כל המשימות</div>
              <div className="text-3xl font-black text-white">{totalOpen + totalDone}</div>
              <div className="text-xs text-zinc-500 mt-1">{totalOpen} פתוחות</div>
            </div>
            <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4 bg-gradient-to-l from-red-500/10">
              <div className="text-red-400 text-xs mb-1 font-semibold">🔴 גבוהה עדיפות</div>
              <div className="text-2xl font-black text-red-400">{byPriority.high}</div>
              <div className="text-xs text-zinc-500 mt-1">דחוף</div>
            </div>
            <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4 bg-gradient-to-l from-amber-500/10">
              <div className="text-amber-400 text-xs mb-1 font-semibold">🟡 בינוני</div>
              <div className="text-2xl font-black text-amber-400">{byPriority.medium}</div>
              <div className="text-xs text-zinc-500 mt-1">קצב רגיל</div>
            </div>
            <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4 bg-gradient-to-l from-emerald-500/10">
              <div className="text-emerald-400 text-xs mb-1 font-semibold">🟢 נמוך</div>
              <div className="text-2xl font-black text-emerald-400">{byPriority.low}</div>
              <div className="text-xs text-zinc-500 mt-1">לא דחוף</div>
            </div>
            <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4 bg-gradient-to-l from-green-500/10">
              <div className="text-green-400 text-xs mb-1 font-semibold">✅ בוצע</div>
              <div className="text-2xl font-black text-green-400">{totalDone}</div>
              <div className="text-xs text-zinc-500 mt-1">{totalDone > 0 ? Math.round((totalDone/(totalDone+totalOpen))*100):'0'}%</div>
            </div>
          </div>

          {/* Pipeline by stage */}
          <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-6 mb-8">
            <h3 className="text-lg font-bold text-white mb-4">📍 התפלגות לפי שלב</h3>
            <div className="grid grid-cols-3 md:grid-cols-9 gap-2">
              {STAGE_LABELS.map((lbl, idx) => {
                if (idx === 0) return null;
                const count = byStage[idx] || 0;
                const isDone = idx === 9;
                return (
                  <div key={idx} className={`text-center p-3 rounded-lg border ${count > 0 ? 'bg-zinc-800 border-zinc-700' : 'bg-zinc-950 border-zinc-800'}`}>
                    <div className="text-xl mb-1">{STAGE_EMOJI[idx]}</div>
                    <div className="text-xs text-zinc-400 mb-2">{lbl}</div>
                    <div className={`text-xl font-bold ${isDone ? 'text-green-400' : count > 2 ? 'text-red-400' : 'text-white'}`}>{count}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Assignees and workload */}
          <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-6">
            <h3 className="text-lg font-bold text-white mb-4">👥 חלוקת משימות בצוות</h3>
            {Object.keys(byAssignee).length === 0 ? (
              <div className="text-center py-8 text-zinc-500 text-sm">אין משימות שהוקצו לעובדים</div>
            ) : (
              <div className="space-y-3">
                {employees.map(emp => {
                  const count = byAssignee[emp.id] || 0;
                  if (count === 0) return null;
                  const pct = Math.min(100, (count / Math.max(...Object.values(byAssignee))) * 100);
                  return (
                    <div key={emp.id}>
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-white text-sm font-medium">{emp.name || emp.email || 'ללא שם'}</span>
                        <span className="text-xs text-zinc-400">{count} משימות</span>
                      </div>
                      <div className="w-full h-2 bg-zinc-800 rounded-full overflow-hidden">
                        <div style={{width:`${pct}%`,background:'#f59e0b',height:'100%',transition:'width 0.3s'}} />
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ── TEAM STATUS — who's responsible for what ──
       Matrix: rows = people, columns = stages, cells = task counts.
       CEO can scan the team in 5 seconds: who's slammed, who's free, where bottlenecks are. */
    function TeamStatus({ user, role, tasks=[], employees=[], suppliers=[], onNav }) {
      const STAGES_LIST = [
        { id:1, label:'בריף', emoji:'📋' },
        { id:2, label:'כתיבה', emoji:'✍️' },
        { id:3, label:'אישור תסריט', emoji:'📝' },
        { id:4, label:'קביעת צילום', emoji:'📅' },
        { id:5, label:'צילום', emoji:'🎬' },
        { id:6, label:'עריכה', emoji:'✂️' },
        { id:7, label:'אישור סופרוויזר', emoji:'👁️' },
        { id:8, label:'אישור לקוח', emoji:'✅' },
      ];
      const people = useMemo(() => {
        const list = [];
        for (const e of employees) list.push({ kind:'emp', id:e.id, key:'emp:'+e.id, name:e.name||e.email||'—', role:'AM' });
        for (const s of suppliers) list.push({ kind:'sup', id:s.id, key:'sup:'+s.id, name:s.name||s.email||'—', role:s.specialty||'עורך' });
        return list;
      }, [employees, suppliers]);

      // Build matrix: { personKey: { stageId: count } }
      const matrix = useMemo(() => {
        const m = {};
        const totals = { perPerson:{}, perStage:{} };
        for (const t of tasks) {
          if ((t.stage||1) >= 9) continue; // skip done
          // 1) current stage owner
          const owner = (t.stageOwners||{})[t.stage||1];
          if (owner) {
            const key = owner;
            const stage = t.stage || 1;
            m[key] = m[key] || {};
            m[key][stage] = (m[key][stage] || 0) + 1;
            totals.perPerson[key] = (totals.perPerson[key]||0) + 1;
            totals.perStage[stage] = (totals.perStage[stage]||0) + 1;
          }
          // 2) general role bucket — accountManager and editor get the AM-stages and editing-stage
          if (t.accountManagerId) {
            const key = 'emp:'+t.accountManagerId;
            const stage = t.stage || 1;
            // Only count if they aren't already the explicit stageOwner
            if (owner !== key) {
              m[key] = m[key] || {};
              m[key]['_general'] = (m[key]['_general'] || 0) + 1;
              totals.perPerson[key] = (totals.perPerson[key]||0) + 1;
            }
          }
          if (t.editorId) {
            const key = 'sup:'+t.editorId;
            if (owner !== key) {
              m[key] = m[key] || {};
              m[key]['_general'] = (m[key]['_general'] || 0) + 1;
              totals.perPerson[key] = (totals.perPerson[key]||0) + 1;
            }
          }
        }
        return { m, totals };
      }, [tasks]);

    /* ── ARCHIVE / TRASH ── */
    function Archive({ user, role, employees=[], suppliers=[] }) {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('tasks');
      useEffect(() => {
        if (!db || !user) return;
        const q = db.collection('tasks').where('userId','==',user.uid);
        const u = q.onSnapshot(s => {
          setItems(s.docs.map(d => ({ id:d.id, ...d.data() })).filter(t => t.archived));
          setLoading(false);
        }, () => setLoading(false));
        return u;
      }, [user]);

      async function restore(t) {
        await db.collection('tasks').doc(t.id).update({
          archived: firebase.firestore.FieldValue.delete(),
          archivedAt: firebase.firestore.FieldValue.delete(),
          archivedBy: firebase.firestore.FieldValue.delete(),
        });
      }
      async function purge(t) {
        if (!window.confirm(`למחוק לצמיתות את "${t.title || 'משימה'}"? פעולה זו אינה הפיכה!`)) return;
        await db.collection('tasks').doc(t.id).delete();
      }

      const STAGE_LABELS = ['','בריף','כתיבה','אישור תסריט','קביעת צילום','צילום','עריכה','אישור סופרוויזר','אישור לקוח','סגירה'];

      return (
        <div style={{ minHeight:'100%', padding:'18px 22px' }}>
          <div style={{ display:'flex', alignItems:'baseline', gap:12, marginBottom:16 }}>
            <h1 style={{ fontSize:20, fontWeight:700, color:'#fafafa' }}>🗑 ארכיון</h1>
            <span style={{ fontSize:12, color:'#71717a' }}>פריטים שעברו לארכיון. ניתן לשחזר בכל רגע.</span>
          </div>

          {loading ? (
            <div style={{ color:'#52525b', fontSize:13, textAlign:'center', padding:40 }}>טוען...</div>
          ) : items.length === 0 ? (
            <div style={{ color:'#52525b', fontSize:13, textAlign:'center', padding:40, background:'#101012', border:'1px dashed #1f1f23', borderRadius:10 }}>
              ✨ הארכיון ריק
            </div>
          ) : (
            <div style={{ background:'#101012', border:'1px solid #1f1f23', borderRadius:10, overflow:'hidden' }}>
              {items.map(t => {
                const archDate = t.archivedAt?.toDate ? t.archivedAt.toDate() : null;
                return (
                  <div key={t.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 14px', borderBottom:'1px solid #1a1a1d' }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, color:'#d4d4d8', fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                        {t.title || '(ללא שם)'}
                      </div>
                      <div style={{ display:'flex', gap:8, fontSize:11, color:'#52525b', marginTop:2 }}>
                        {t.client && <span>{t.client}</span>}
                        {t.client && <span>·</span>}
                        <span>{STAGE_LABELS[t.stage] || ''}</span>
                        {archDate && <><span>·</span><span>הועבר ב-{archDate.toLocaleDateString('he-IL', {day:'numeric', month:'numeric', year:'numeric'})}</span></>}

    /* ── CLIENT PROFITABILITY ── */
    function ClientProfitability({ role, clients=[], tasks=[], suppliers=[], expenses=[], projects=[] }) {
      const today = new Date();
      const [selMonth, setSelMonth] = useState(today.toISOString().slice(0,7));
      const EDIT_TYPES = ['סרטון','ריל','פודקאסט','וידאו'];

      // Month picker options (last 6 months + next month)
      const monthOptions = [];
      for (let i = -5; i <= 1; i++) {
        const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
        const key = d.toISOString().slice(0, 7);
        const label = d.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
        monthOptions.push({ key, label });
      }
      monthOptions.reverse();

      const editorRate = editorId => {
        if (!editorId) return 0;
        return Number(suppliers.find(s => s.id === editorId)?.videoRate) || 0;
      };

      const getStats = client => {
        const cName = client.name;
        const retainer = Number(client.retainerAmount) || 0;
        const scope = client.scopeOfWork || [];

        // Scope: estimated monthly editing cost
        const editScope = scope.filter(i => EDIT_TYPES.some(t => (i.contentType||'').includes(t)));
        const editScopeQty = editScope.reduce((s, i) => s + (Number(i.quantity) || 0), 0);
        const rate = editorRate(client.defaultEditorId);
        const estimatedEditCost = editScopeQty * rate;

        // Tasks in editing (stage ≥ 6) for this client
        const editingTasks = tasks.filter(t => t.client === cName && (t.stage||1) >= 6);
        const inEditingNow  = editingTasks.filter(t => (t.stage||1) < FINAL_STAGE).length;

        // Actual editing cost this month — tasks whose stage changed to ≥6 this month
        // Approximation: use task.updatedAt or createdAt
        const thisMonthEdit = editingTasks.filter(t => {
          const raw = t.updatedAt?.toDate?.() || t.createdAt?.toDate?.() || t.updatedAt || t.createdAt;
          if (!raw) return false;
          return (raw instanceof Date ? raw : new Date(raw)).toISOString().slice(0,7) === selMonth;
        });
        const actualEditCost = thisMonthEdit.reduce((s, t) => s + editorRate(t.editorId || client.defaultEditorId), 0);

        // Additional expenses linked to this client for selected month
        const linkedExpenses = expenses
          .filter(e => e.clientId === client.id && (e.date||'').slice(0,7) === selMonth)
          .reduce((s, e) => s + (Number(e.amount) || 0), 0);

        // Totals (use estimated edit cost if scope defined, else actual)
        const editCostForCalc = editScopeQty > 0 ? estimatedEditCost : actualEditCost;
        const totalCosts = editCostForCalc + linkedExpenses;
        const profit = retainer - totalCosts;
        const margin = retainer > 0 ? Math.round((profit / retainer) * 100) : null;

        return { retainer, scope, editScopeQty, rate, estimatedEditCost, actualEditCost,
                 editCostForCalc, linkedExpenses, totalCosts, profit, margin, inEditingNow,
                 thisMonthCount: thisMonthEdit.length };
      };

      const activeClients = clients.filter(c => c.status === 'פעיל');
      const allStats = activeClients.map(c => ({ c, s: getStats(c) }));
      const totRetainer = allStats.reduce((s, x) => s + x.s.retainer, 0);
      const totCosts    = allStats.reduce((s, x) => s + x.s.totalCosts, 0);
      const totProfit   = totRetainer - totCosts;
      const totMargin   = totRetainer > 0 ? Math.round((totProfit / totRetainer) * 100) : 0;

      const fmt = v => {
        const abs = Math.round(Math.abs(v));
        return (v < 0 ? '-' : '') + '₪' + abs.toLocaleString();
      };

      const Kpi = ({ icon, label, value, color = 'text-amber-400', sub }) => (
        <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:'16px 20px'}}>
          <div style={{fontSize:22,marginBottom:6}}>{icon}</div>
          <div className={`text-2xl font-bold ${color}`}>{value}</div>
          <div style={{fontSize:12,color:'var(--text-sub)',marginTop:4}}>{label}</div>
          {sub && <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2}}>{sub}</div>}
        </div>
      );

      return (
        <div>
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <h2 className="text-xl font-bold text-white">💰 רווחיות לקוחות</h2>
              <p className="text-sm text-zinc-400 mt-1">ריטיינר מול הוצאות עריכה — לפי כתב כמויות ועלות עורך</p>
            </div>
            <select className={CL.input} style={{width:'auto'}} value={selMonth} onChange={e=>setSelMonth(e.target.value)}>
              {monthOptions.map(m => <option key={m.key} value={m.key}>{m.label}</option>)}
            </select>
          </div>

          {/* KPIs */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:28}}>
            <Kpi icon="💵" label="סה״כ ריטיינרים" value={fmt(totRetainer)} color="text-emerald-400" />
            <Kpi icon="✂️" label="עלות עריכה מוערכת" value={fmt(totCosts)} color="text-orange-400" />
            <Kpi icon="📈" label="רווח מוערך" value={fmt(totProfit)} color={totProfit>=0?'text-emerald-400':'text-red-400'} />
            <Kpi icon="%" label="מרג׳ ממוצע" value={`${totMargin}%`}
              color={totMargin>=40?'text-emerald-400':totMargin>=20?'text-amber-400':'text-red-400'}
              sub={totMargin<20?'מתחת ליעד (20%)':undefined} />
          </div>

          {/* Per-client table */}
          {activeClients.length === 0
            ? <Empty msg="אין לקוחות פעילים" />
            : (
            <div className="bg-zinc-900/60 rounded-xl border border-zinc-800 overflow-hidden">
              <table className="w-full text-right">
                <THead cols={['לקוח','ריטיינר','כתב כמויות','עורך + תעריף','עלות עריכה','הוצאות נוספות','רווח','מרג\'']} />
                <tbody>
                  {allStats.map(({ c, s }) => (
                    <tr key={c.id} className="border-t border-zinc-800/60 hover:bg-zinc-900/40">
                      <td className="px-4 py-3">
                        <div className="text-white font-semibold text-sm">{c.name}</div>
                        {s.inEditingNow > 0 && <div className="text-xs text-orange-400 mt-0.5">✂️ {s.inEditingNow} בעריכה</div>}
                        {s.thisMonthCount > 0 && <div className="text-xs text-blue-400 mt-0.5">📅 {s.thisMonthCount} החודש</div>}
                      </td>
                      <td className="px-4 py-3 text-emerald-400 text-sm font-medium">
                        {s.retainer ? fmt(s.retainer) : <span className="text-zinc-600">—</span>}
                      </td>
                      <td className="px-4 py-3 text-xs text-zinc-300">
                        {s.scope.length > 0
                          ? <div className="space-y-0.5">{s.scope.map((i,idx)=>(
                              <div key={idx}>{i.quantity} {i.contentType}</div>
                            ))}</div>
                          : <span className="text-zinc-600">לא הוגדר</span>
                        }
                      </td>
                      <td className="px-4 py-3 text-zinc-400 text-sm">
                        {c.defaultEditorId
                          ? <><div>{suppliers.find(s2=>s2.id===c.defaultEditorId)?.name||'—'}</div>
                              {s.rate>0&&<div className="text-xs text-zinc-500">₪{s.rate}/סרטון</div>}</>
                          : <span className="text-zinc-600">—</span>}
                      </td>
                      <td className="px-4 py-3 text-amber-400 text-sm font-medium">
                        {s.editCostForCalc > 0
                          ? <><div>{fmt(s.editCostForCalc)}</div>
                              {s.editScopeQty>0&&<div className="text-xs text-zinc-500">{s.editScopeQty}×₪{s.rate} (מוערך)</div>}
                              {s.editScopeQty===0&&s.actualEditCost>0&&<div className="text-xs text-zinc-500">{s.thisMonthCount} סרטים (בפועל)</div>}</>
                          : <span className="text-zinc-600">—</span>}
                      </td>
                      <td className="px-4 py-3 text-zinc-300 text-sm">
                        {s.linkedExpenses > 0 ? fmt(s.linkedExpenses) : <span className="text-zinc-600">—</span>}
                      </td>
                      <td className={`px-4 py-3 text-sm font-bold ${s.profit>=0?'text-emerald-400':'text-red-400'}`}>
                        {s.retainer > 0 ? fmt(s.profit) : <span className="text-zinc-600">—</span>}
                      </td>
                      <td className="px-4 py-3">
                        {s.margin !== null
                          ? <span className={`text-sm font-bold ${s.margin>=40?'text-emerald-400':s.margin>=20?'text-amber-400':'text-red-400'}`}>{s.margin}%</span>
                          : <span className="text-zinc-600">—</span>}
                      </td>
                    </tr>
                  ))}
                  {/* Totals */}
                  <tr className="border-t-2 border-zinc-700 bg-zinc-800/30">
                    <td className="px-4 py-3 text-zinc-300 text-sm font-bold">סה״כ</td>
                    <td className="px-4 py-3 text-emerald-400 text-sm font-bold">{fmt(totRetainer)}</td>
                    <td className="px-4 py-3"/>
                    <td className="px-4 py-3"/>
                    <td className="px-4 py-3 text-amber-400 text-sm font-bold">{fmt(totCosts)}</td>
                    <td className="px-4 py-3"/>
                    <td className={`px-4 py-3 text-sm font-bold ${totProfit>=0?'text-emerald-400':'text-red-400'}`}>{fmt(totProfit)}</td>
                    <td className={`px-4 py-3 text-sm font-bold ${totMargin>=40?'text-emerald-400':totMargin>=20?'text-amber-400':'text-red-400'}`}>{totMargin}%</td>
                  </tr>
                </tbody>
              </table>
            </div>
          )}

          {/* Legend */}
          <div className="mt-4 p-3 rounded-lg bg-zinc-900/60 border border-zinc-800 text-xs text-zinc-500 space-y-1">
            <div>💡 <strong className="text-zinc-400">עלות עריכה מוערכת</strong> = כתב כמויות (סרטונים/ריילס לחודש) × תעריף עורך. אם לא הוגדר כתב כמויות — מחושב מהסרטים שנשלחו בחודש.</div>
            <div>💡 <strong className="text-zinc-400">הוצאות נוספות</strong> = הוצאות שקושרו ידנית ללקוח זה בלשונית ״הוצאות״.</div>
            <div>💡 <strong className="text-zinc-400">מרג׳</strong> = (ריטיינר − הוצאות) / ריטיינר × 100. יעד: 40%+.</div>
          </div>

    /* ── EDITOR TRACKING ── */
    function EditorTracking({ user, role, tasks=[], suppliers=[], clients=[] }) {
      const showFin = isFinance(role);
      const clientName = cid => clients.find(c=>c.id===cid)?.name || cid || '-';
      const editorName = eid => suppliers.find(s=>s.id===eid)?.name || '-';

      // Tasks that reached editing (stage 6+)
      const allEdited  = tasks.filter(t => (t.stage||1) >= 6);
      const inEditing  = tasks.filter(t => (t.stage||1) === 6 || (t.stage||1) === 7);
      const awaitApproval = tasks.filter(t => (t.stage||1) === 8);
      const highRounds = tasks.filter(t => (t.revisions?.videoRounds||0) >= 3);
      const totalVidRounds = tasks.reduce((s,t)=>s+(t.revisions?.videoRounds||0),0);
      const avgRounds = allEdited.length>0
        ? (allEdited.reduce((s,t)=>s+(t.revisions?.videoRounds||0),0)/allEdited.length).toFixed(1)
        : '0';

      // Per-editor stats
      const editors = suppliers.filter(s=>['עורך וידאו','עורך','מוציא'].includes(s.supplierRole));
      const editorStats = editors.map(ed=>{
        const mine = tasks.filter(t=>t.editorId===ed.id);
        const active = mine.filter(t=>(t.stage||1)>=6&&(t.stage||1)<9).length;
        const done   = mine.filter(t=>(t.stage||1)===9).length;
        const rounds = mine.reduce((s,t)=>s+(t.revisions?.videoRounds||0),0);
        const total  = mine.length;
        return { ...ed, active, done, total, rounds, avg: total>0?(rounds/total).toFixed(1):'0' };
      }).filter(e=>e.total>0);

      const Kpi = ({icon,label,value,color='text-amber-400'}) => (
        <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:'16px 20px',display:'flex',flexDirection:'column',gap:6}}>
          <span style={{fontSize:22}}>{icon}</span>
          <span className={`text-2xl font-bold ${color}`}>{value}</span>
          <span style={{fontSize:12,color:'var(--text-sub)'}}>{label}</span>
        </div>
      );
