                      <td className="px-4 py-3 text-zinc-300 text-sm">{(employees.find(e=>e.id===c.accountManagerId)?.name)||(employees.find(e=>e.id===c.accountManagerId)?.fullName)||'-'}</td>

                    className={`px-4 py-2 text-sm font-medium border-b-2 transition-colors ${modalTab===id?'border-amber-400 text-amber-400':'border-transparent text-zinc-400 hover:text-white'} bg-transparent cursor-pointer`}>
                    {label}

              {/* Tab: פרטים */}
              {modalTab==='details' && (

                  <div>

                  {showFin && (form.scopeOfWork||[]).length > 0 && (()=>{
                    const editTypes = ['סרטון','ריל','פודקאסט','וידאו'];
                    const editQty = (form.scopeOfWork||[]).filter(i=>editTypes.some(t=>i.contentType.includes(t))).reduce((s,i)=>s+(Number(i.quantity)||0),0);

      const openEdit = p   => { setSel(p); setForm({name:p.name||'',client:p.client||'',status:p.status||'פעיל',budget:p.budget||'',startDate:p.startDate||'',endDate:p.endDate||'',completedAt:p.completedAt||'',description:p.description||''}); setModal(true); };
      const del      = async id => { if(!window.confirm('למחוק?')) return; await db.collection('projects').doc(id).delete(); };

      const save = async () => {
        if (!form.name.trim()) return;
        setSaving(true);
        try {
          // Auto-set completedAt when status flips to הושלם and no date set
          let completedAt = form.completedAt;
          if (form.status==='הושלם' && !completedAt) {
            completedAt = (sel?.completedAt) || new Date().toISOString().slice(0,10);
          }
          if (form.status!=='הושלם') completedAt = ''; // clear if reopened

          const d = {...form, completedAt, budget:Number(form.budget)||0, userId:user.uid, updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
          if (sel) await db.collection('projects').doc(sel.id).update(d);
          else     await db.collection('projects').add({...d, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
          setModal(false);
        } catch(e){ alert('שגיאה: '+e.message); } finally { setSaving(false); }
      };

      // Per-project P&L: budget vs expenses linked to it
      const projCosts = id => expenses.filter(e=>e.projectId===id).reduce((s,e)=>s+(Number(e.amount)||0),0);

      const sColor = {'פעיל':'green','מושהה':'yellow','הושלם':'blue','בוטל':'red'};
      const showFin = isFinance(role);
      const thisMonth = new Date().toISOString().slice(0,7);

      // KPI summary
      const totalPipeline = items.filter(p=>p.status==='פעיל').reduce((s,p)=>s+(Number(p.budget)||0),0);
      const completedThisMonthList = items.filter(p=>p.status==='הושלם' && (p.completedAt||p.endDate||'').slice(0,7)===thisMonth);
      const revenueThisMonth = completedThisMonthList.reduce((s,p)=>s+(Number(p.budget)||0),0);
      const totalCosts = items.reduce((s,p)=>s+projCosts(p.id),0);

      return (
        <div>
          <SectionTitle title="פרויקטים" sub="ניהול פרויקטים, תקציבים ורווחיות" onAdd={openNew} addLabel="+ פרויקט חדש" />

          {showFin && items.length>0 && (
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              <div className={CL.card+" border-blue-500/30 bg-blue-500/5"}>
                <div className="text-blue-300 text-xs">📦 פעילים</div>
                <div className="text-2xl font-black text-blue-400">{items.filter(p=>p.status==='פעיל').length}</div>
              </div>
              <div className={CL.card+" border-cyan-500/30 bg-cyan-500/5"}>
                <div className="text-cyan-300 text-xs">💼 פייפליין</div>
                <div className="text-xl font-black text-cyan-400">₪{totalPipeline.toLocaleString()}</div>
              </div>
              <div className={CL.card+" border-emerald-500/30 bg-emerald-500/5"}>
                <div className="text-emerald-300 text-xs">✅ הושלמו החודש</div>
                <div className="text-xl font-black text-emerald-400">₪{revenueThisMonth.toLocaleString()}</div>
                <div className="text-emerald-300/60 text-[10px]">{completedThisMonthList.length} פרויקטים</div>
              </div>
              <div className={CL.card+" border-red-500/30 bg-red-500/5"}>
                <div className="text-red-300 text-xs">💸 עלויות מצטברות</div>
                <div className="text-xl font-black text-red-400">₪{Math.round(totalCosts).toLocaleString()}</div>
                <div className="text-red-300/60 text-[10px]">מהוצאות מקושרות</div>
              </div>
            </div>
          )}

          {loading && <div className="text-center py-10 text-zinc-400 text-sm">טוען...</div>}
          {!loading && items.length===0 && <Empty msg="אין פרויקטים עדיין — הוסף פרויקט כדי שתקציבו יופיע בתזרים" />}
          {!loading && items.length>0 && (
            <div className="bg-zinc-900/60 rounded-xl border border-zinc-800 overflow-hidden">
              <table className="w-full text-right">
                <THead cols={['שם פרויקט','לקוח','סטטוס',...(showFin?['תקציב','עלויות','רווח','מצב הכנסה']:[]),'תאריך סיום','פעולות']} />
                <tbody>
                  {items.map(p=>{
                    const cost = projCosts(p.id);
                    const budget = Number(p.budget)||0;
                    const profit = budget - cost;
                    const inThisMonth = (p.completedAt||p.endDate||'').slice(0,7)===thisMonth;
                    let revBadge = null;
                    if (showFin) {
                      if (p.status==='הושלם' && inThisMonth) revBadge = <Badge label="✓ נרשם החודש" color="green" />;
                      else if (p.status==='הושלם') revBadge = <Badge label="נרשם בעבר" color="blue" />;
                      else if (p.status==='פעיל') revBadge = <Badge label="בפייפליין" color="yellow" />;
                      else revBadge = <Badge label="—" color="red" />;
                    }
                    return (
                    <tr key={p.id} className="border-t border-zinc-800/60 hover:bg-zinc-900/40 cursor-pointer" onClick={()=>setDetailSel(p)}>
                      <td className="px-4 py-3 text-white font-semibold text-sm">
                        <div className="flex items-center gap-2">
                          <span className="hover:text-amber-300 transition-colors">{p.name}</span>
                          {budget>0 && cost>budget && <span title={`חריגה של ₪${Math.round(cost-budget).toLocaleString()}`} className="bg-red-500/20 text-red-300 border border-red-500/40 rounded px-1.5 py-0.5 text-[10px] font-bold">🚨 חריגה</span>}
                          {budget>0 && cost>budget*0.8 && cost<=budget && <span className="bg-amber-500/20 text-amber-300 border border-amber-500/40 rounded px-1.5 py-0.5 text-[10px] font-bold">⚠️ {Math.round((cost/budget)*100)}%</span>}
                        </div>
                      </td>
                      <td className="px-4 py-3 text-zinc-300 text-sm">{p.client||'-'}</td>
                      <td className="px-4 py-3"><Badge label={p.status} color={sColor[p.status]||'blue'} /></td>
                      {showFin && <td className="px-4 py-3 text-amber-400 text-sm font-medium">{budget?`₪${budget.toLocaleString()}`:'-'}</td>}
                      {showFin && <td className={`px-4 py-3 text-sm ${cost>budget&&budget>0?'text-red-400 font-bold':'text-red-400'}`}>{cost>0?`₪${Math.round(cost).toLocaleString()}`:'-'}</td>}
                      {showFin && <td className={`px-4 py-3 text-sm font-bold ${profit>=0?'text-emerald-400':'text-red-400'}`}>{budget?`₪${Math.round(profit).toLocaleString()}`:'-'}</td>}
                      {showFin && <td className="px-4 py-3">{revBadge}</td>}
                      <td className="px-4 py-3 text-zinc-300 text-sm">{p.endDate||'-'}</td>
                      <td className="px-4 py-3" onClick={e=>e.stopPropagation()}>
                        <div className="flex gap-2">
                          <button onClick={()=>openEdit(p)} className="text-xs text-amber-400 hover:text-amber-300 bg-transparent border-0 cursor-pointer">עריכה</button>
                          <button onClick={()=>del(p.id)}   className="text-xs text-red-400 hover:text-red-300 bg-transparent border-0 cursor-pointer">מחק</button>
                        </div>
                      </td>
                    </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* ── Project Detail Modal ── */}
          {detailSel && (() => {
            const dp   = items.find(x=>x.id===detailSel.id) || detailSel; // live data
            const dCost = projCosts(dp.id);
            const dBudget = Number(dp.budget)||0;
            const dProfit = dBudget - dCost;
            const projExpenses = expenses.filter(e=>e.projectId===dp.id);
            const fmtD = iso => { if(!iso) return '—'; try { return new Date(iso).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'}); } catch { return iso; } };
            const statusColors = {'פעיל':'#22c55e','מושהה':'#f59e0b','הושלם':'#3b82f6','בוטל':'#ef4444'};
            return (
              <Modal title={null} onClose={()=>setDetailSel(null)} wide>
                {/* Header */}
                <div style={{display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:16, gap:12}}>
                  <div>
                    <h2 style={{fontSize:20, fontWeight:800, color:'#fff', margin:0, lineHeight:1.2}}>{dp.name}</h2>
                    {dp.client && <div style={{fontSize:13, color:'#a1a1aa', marginTop:4}}>👤 {dp.client}</div>}
                  </div>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <span style={{fontSize:12, fontWeight:600, padding:'4px 12px', borderRadius:20, background: `${statusColors[dp.status]||'#6b7280'}22`, color: statusColors[dp.status]||'#6b7280', border:`1px solid ${statusColors[dp.status]||'#6b7280'}55`}}>{dp.status}</span>
                    <button onClick={()=>{setDetailSel(null);openEdit(dp);}} style={{fontSize:12,color:'#fbbf24',background:'rgba(251,191,36,0.1)',border:'1px solid rgba(251,191,36,0.3)',borderRadius:6,padding:'4px 10px',cursor:'pointer'}}>✏️ ערוך</button>
                  </div>
                </div>

                {/* P&L summary cards */}
                {showFin && (
                  <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:10, marginBottom:16}}>
                    <div style={{padding:12, background:'rgba(251,191,36,0.07)', border:'1px solid rgba(251,191,36,0.2)', borderRadius:10, textAlign:'center'}}>
                      <div style={{fontSize:10, color:'#fbbf24', marginBottom:4}}>💰 תקציב</div>
                      <div style={{fontSize:20, fontWeight:800, color:'#fcd34d'}}>{dBudget?`₪${dBudget.toLocaleString()}`:'-'}</div>
                    </div>
                    <div style={{padding:12, background:'rgba(239,68,68,0.07)', border:'1px solid rgba(239,68,68,0.2)', borderRadius:10, textAlign:'center'}}>
                      <div style={{fontSize:10, color:'#f87171', marginBottom:4}}>💸 עלויות</div>
                      <div style={{fontSize:20, fontWeight:800, color: dCost>dBudget&&dBudget>0?'#f87171':'#fca5a5'}}>{dCost>0?`₪${Math.round(dCost).toLocaleString()}`:'-'}</div>
                    </div>
                    <div style={{padding:12, background: dProfit>=0?'rgba(16,185,129,0.07)':'rgba(239,68,68,0.07)', border:`1px solid ${dProfit>=0?'rgba(16,185,129,0.2)':'rgba(239,68,68,0.2)'}`, borderRadius:10, textAlign:'center'}}>
                      <div style={{fontSize:10, color: dProfit>=0?'#34d399':'#f87171', marginBottom:4}}>📊 רווח</div>
                      <div style={{fontSize:20, fontWeight:800, color: dProfit>=0?'#34d399':'#f87171'}}>{dBudget?`₪${Math.round(dProfit).toLocaleString()}`:'-'}</div>
                      {dBudget>0 && <div style={{fontSize:10, color:'#71717a'}}>{Math.round((dProfit/dBudget)*100)}% מרג'</div>}
                    </div>
                  </div>
                )}

                {/* Project info */}
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:16}}>
                  <div style={{padding:10, background:'rgba(24,24,27,0.6)', borderRadius:8}}>
                    <div style={{fontSize:10, color:'#71717a', marginBottom:2}}>📅 התחלה</div>
                    <div style={{fontSize:13, color:'#e4e4e7'}}>{fmtD(dp.startDate)}</div>
                  </div>
                  <div style={{padding:10, background:'rgba(24,24,27,0.6)', borderRadius:8}}>
                    <div style={{fontSize:10, color:'#71717a', marginBottom:2}}>🏁 סיום</div>
                    <div style={{fontSize:13, color:'#e4e4e7'}}>{fmtD(dp.endDate)}</div>
                  </div>
                  <div style={{padding:10, background:'rgba(24,24,27,0.6)', borderRadius:8}}>
                    <div style={{fontSize:10, color:'#71717a', marginBottom:2}}>✅ הושלם</div>
                    <div style={{fontSize:13, color:'#e4e4e7'}}>{fmtD(dp.completedAt)}</div>
                  </div>
                </div>

                {dp.description && (
                  <div style={{marginBottom:16, padding:12, background:'rgba(24,24,27,0.6)', border:'1px solid #27272a', borderRadius:8}}>
                    <div style={{fontSize:10, color:'#71717a', marginBottom:4}}>📝 תיאור</div>
                    <div style={{fontSize:13, color:'#d4d4d8', lineHeight:1.6}}>{dp.description}</div>
                  </div>
                )}

                {/* Expenses breakdown */}
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:12, fontWeight:700, color:'#a1a1aa', marginBottom:8}}>💸 פירוט הוצאות ({projExpenses.length})</div>
                  {projExpenses.length===0
                    ? <div style={{fontSize:12, color:'#52525b', padding:'12px 0'}}>אין הוצאות מקושרות לפרויקט זה</div>
                    : (
                      <div style={{background:'rgba(9,9,11,0.5)', borderRadius:10, border:'1px solid #27272a', overflow:'hidden'}}>
                        <table style={{width:'100%', borderCollapse:'collapse'}}>
                          <thead>
                            <tr style={{background:'rgba(39,39,42,0.5)'}}>
                              <th style={{padding:'8px 12px', fontSize:11, color:'#71717a', fontWeight:600, textAlign:'right'}}>תיאור</th>
                              <th style={{padding:'8px 12px', fontSize:11, color:'#71717a', fontWeight:600, textAlign:'right'}}>קטגוריה</th>
                              <th style={{padding:'8px 12px', fontSize:11, color:'#71717a', fontWeight:600, textAlign:'right'}}>ספק</th>
                              <th style={{padding:'8px 12px', fontSize:11, color:'#71717a', fontWeight:600, textAlign:'right'}}>סכום</th>
                              <th style={{padding:'8px 12px', fontSize:11, color:'#71717a', fontWeight:600, textAlign:'right'}}>תאריך</th>
                            </tr>
                          </thead>
                          <tbody>
                            {projExpenses.map((ex,i)=>(
                              <tr key={ex.id||i} style={{borderTop:'1px solid #27272a'}}>
                                <td style={{padding:'8px 12px', fontSize:12, color:'#d4d4d8'}}>{ex.description||'—'}</td>
                                <td style={{padding:'8px 12px', fontSize:12, color:'#a1a1aa'}}>{ex.category||'—'}</td>
                                <td style={{padding:'8px 12px', fontSize:12, color:'#a1a1aa'}}>{ex.supplier||ex.supplierName||'—'}</td>
                                <td style={{padding:'8px 12px', fontSize:12, color:'#f87171', fontWeight:600}}>₪{(Number(ex.amount)||0).toLocaleString()}</td>
                                <td style={{padding:'8px 12px', fontSize:12, color:'#71717a'}}>{fmtD(ex.date)}</td>
                              </tr>
                            ))}
                          </tbody>
                          <tfoot>
                            <tr style={{borderTop:'2px solid #3f3f46', background:'rgba(39,39,42,0.4)'}}>
                              <td colSpan={3} style={{padding:'8px 12px', fontSize:12, color:'#a1a1aa', fontWeight:600}}>סה"כ</td>
                              <td style={{padding:'8px 12px', fontSize:13, color:'#fca5a5', fontWeight:800}}>₪{Math.round(dCost).toLocaleString()}</td>
                              <td></td>
                            </tr>
                          </tfoot>
                        </table>
                      </div>
                    )
                  }
                </div>
              </Modal>
            );
          })()}

          {modal && (
            <Modal title={sel?'עריכת פרויקט':'פרויקט חדש'} onClose={()=>setModal(false)} wide>
              <div className="grid grid-cols-2 gap-x-4">
                <div className="col-span-2">
                  <label className={CL.label}>שם הפרויקט *</label>
                  <input className={CL.input} value={form.name} onChange={e=>F({name:e.target.value})} />
                </div>
                <div>
                  <label className={CL.label}>לקוח</label>
                  <select className={CL.input} value={form.client} onChange={e=>F({client:e.target.value})}>
                    <option value="">בחר לקוח</option>
                    {clients.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                  </select>
                </div>
                <div>
                  <label className={CL.label}>סטטוס</label>
                  <select className={CL.input} value={form.status} onChange={e=>F({status:e.target.value})}>
                    <option>פעיל</option><option>מושהה</option><option>הושלם</option><option>בוטל</option>
                  </select>
                </div>
                {showFin && (
                  <div>
                    <label className={CL.label}>💰 תקציב (₪)</label>
                    <input type="number" className={CL.input} value={form.budget} onChange={e=>F({budget:e.target.value})} />
                    <p className="text-[10px] text-zinc-500 mt-1">בפייפליין כל עוד הסטטוס "פעיל" · נרשם כהכנסה כשעובר ל"הושלם"</p>
                  </div>
                )}
                <div>
                  <label className={CL.label}>תאריך התחלה</label>
                  <input type="date" className={CL.input} value={form.startDate} onChange={e=>F({startDate:e.target.value})} />
                </div>
                <div>
                  <label className={CL.label}>תאריך סיום</label>
                  <input type="date" className={CL.input} value={form.endDate} onChange={e=>F({endDate:e.target.value})} />
                </div>
                <div className="col-span-2">
                  <label className={CL.label}>תיאור</label>
                  <textarea className={CL.input} rows={2} value={form.description} onChange={e=>F({description:e.target.value})} />
                </div>
              </div>
              <div className="flex gap-2 justify-end mt-5">
                <button onClick={()=>setModal(false)} className={CL.btn2}>ביטול</button>
                <button onClick={save} className={CL.btn} disabled={saving}>{saving?'שומר...':'שמור'}</button>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* ── EMPLOYEES ── */
    function Employees({ user, role }) {
      const [items,   setItems]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [modal,   setModal]   = useState(false);
      const [sel,     setSel]     = useState(null);
      const blank = { name:'', empRole:'', salaryType:'שכיר', salary:'', status:'פעיל', email:'', phone:'' };
      const [form, setForm] = useState(blank);
      const [saving, setSaving] = useState(false);
      const F = f => setForm(p=>({...p,...f}));

      useEffect(()=>{
        if (!db||!user) return;
        return db.collection('employees').where('userId','==',user.uid).onSnapshot(snap=>{
          setItems(snap.docs.map(x=>({id:x.id,...x.data()})));
          setLoading(false);
        });
      },[user]);

      const openNew  = ()  => { setSel(null); setForm(blank); setModal(true); };
      const openEdit = e   => { setSel(e); setForm({name:e.name||'',empRole:e.empRole||'',salaryType:e.salaryType||'שכיר',salary:e.salary||'',status:e.status||'פעיל',email:e.email||'',phone:e.phone||''}); setModal(true); };
      const del      = async id => { if(!window.confirm('למחוק?')) return; await db.collection('employees').doc(id).delete(); };

      const save = async () => {
        if (!form.name.trim()) return;
        setSaving(true);
        try {
          const d = {...form, salary:Number(form.salary)||0, userId:user.uid, updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
          if (sel) await db.collection('employees').doc(sel.id).update(d);
          else     await db.collection('employees').add({...d, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
          setModal(false);
        } catch(e){ alert('שגיאה: '+e.message); } finally { setSaving(false); }
      };

      return (
        <div>
          <SectionTitle title="עובדים" sub="ניהול צוות ושכר" onAdd={openNew} addLabel="+ עובד חדש" />

          {loading && <div className="text-center py-10 text-zinc-400 text-sm">טוען...</div>}
          {!loading && items.length===0 && <Empty msg="אין עובדים עדיין" />}
          {!loading && items.length>0 && (() => {
            const totalCost = items.filter(e=>e.status==='פעיל').reduce((s,e)=>{
              const base = Number(e.salary)||0;
              return s + (e.salaryType==='שכיר' ? base*1.25 : base);
            },0);
            return <>
            <div className="mb-3 flex justify-between items-center">
              <p className="text-zinc-400 text-sm">{items.filter(e=>e.status==='פעיל').length} עובדים פעילים</p>
              {isFinance(role) && <p className="text-violet-400 text-sm font-bold">עלות חודשית: ₪{Math.round(totalCost).toLocaleString()}</p>}
            </div>
            <div className="bg-zinc-900/60 rounded-xl border border-zinc-800 overflow-hidden">
              <table className="w-full text-right">
                <THead cols={['שם','תפקיד','סוג שכר','שכר ברוטו', ...(isFinance(role)?['עלות מעסיק']:[]),'מצב','פעולות']} />
                <tbody>
                  {items.map(e=>{
                    const base = Number(e.salary)||0;
                    const totalEmp = e.salaryType==='שכיר' ? base*1.25 : base;
                    return (
                    <tr key={e.id} className="border-t border-zinc-800/60 hover:bg-zinc-900/40">
                      <td className="px-4 py-3 text-white font-semibold text-sm">{e.name}</td>
                      <td className="px-4 py-3 text-zinc-300 text-sm">{e.empRole}</td>
                      <td className="px-4 py-3 text-zinc-300 text-sm">{e.salaryType}</td>
                      <td className="px-4 py-3 text-amber-400 text-sm font-medium">₪{Number(e.salary).toLocaleString()}</td>
                      {isFinance(role) && <td className="px-4 py-3 text-violet-400 text-sm font-bold">₪{Math.round(totalEmp).toLocaleString()}</td>}
                      <td className="px-4 py-3"><Badge label={e.status} color={e.status==='פעיל'?'green':'red'} /></td>
                      <td className="px-4 py-3">
                        <div className="flex gap-2">
                          <button onClick={()=>openEdit(e)} className="text-xs text-amber-400 hover:text-amber-300 bg-transparent border-0 cursor-pointer">עריכה</button>
                          <button onClick={()=>del(e.id)}   className="text-xs text-red-400 hover:text-red-300 bg-transparent border-0 cursor-pointer">מחק</button>
                        </div>
                      </td>
                    </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            </>;
          })()}

          {modal && (
            <Modal title={sel?'עריכת עובד':'עובד חדש'} onClose={()=>setModal(false)}>
              <div className="grid grid-cols-2 gap-x-4">
                <div>
                  <label className={CL.label}>שם *</label>
                  <input className={CL.input} value={form.name} onChange={e=>F({name:e.target.value})} />
                </div>
                <div>
                  <label className={CL.label}>תפקיד</label>
                  <input className={CL.input} placeholder="מנהלת תיקים" value={form.empRole} onChange={e=>F({empRole:e.target.value})} />
                </div>
                <div>
                  <label className={CL.label}>סוג שכר</label>
                  <select className={CL.input} value={form.salaryType} onChange={e=>F({salaryType:e.target.value})}>

                  </select>
                </div>
                <div>
                  <label className={CL.label}>שכר ברוטו חודשי (₪)</label>
                  <input type="number" className={CL.input} placeholder="12000" value={form.salary} onChange={e=>F({salary:e.target.value})} />
                  {form.salaryType==='שכיר' && Number(form.salary)>0 && (
                    <p className="text-[11px] text-violet-400 mt-1">עלות מעסיק כוללת: ₪{Math.round(Number(form.salary)*1.25).toLocaleString()} (כולל 25% סוציאליות)</p>
                  )}
                </div>
                <div>
                  <label className={CL.label}>אימייל</label>
                  <input type="email" className={CL.input} value={form.email} onChange={e=>F({email:e.target.value})} />

                <div>
                  <label className={CL.label}>טלפון</label>
                  <input className={CL.input} value={form.phone} onChange={e=>F({phone:e.target.value})} />
                </div>
              </div>
              <div className="flex gap-2 justify-end mt-5">
                <button onClick={()=>setModal(false)} className={CL.btn2}>ביטול</button>
                <button onClick={save} className={CL.btn} disabled={saving}>{saving?'שומר...':'שמור'}</button>

            </Modal>
          )}

      );

    /* ── EXPENSES ── */
    function Expenses({ user, role, suppliers = [], tasks = [], employees = [], clients = [], projects = [] }) {
      const [items,   setItems]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [modal,   setModal]   = useState(false);
      const [editing, setEditing] = useState(null);
      const [tab,     setTab]     = useState('variable'); // variable | fixed | byEditor
      const [search,  setSearch]  = useState('');
      const [filterMonth, setFilterMonth] = useState('all'); // all | YYYY-MM
      const today = new Date().toISOString().split('T')[0];
      const blank = { description:'', category:'תוכנה', amount:'', date:today, kind:'variable', supplierId:'', projectId:'', clientId:'', recurrence:'monthly', notes:'' };
      const [form, setForm] = useState(blank);
      const [saving, setSaving] = useState(false);
      const F = f => setForm(p=>({...p,...f}));

      useEffect(()=>{
        if (!db||!user) return;
        return db.collection('expenses').where('userId','==',user.uid).onSnapshot(snap=>{
          const d = snap.docs.map(x=>({id:x.id,...x.data()}));
          d.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
          setItems(d); setLoading(false);
        });
      },[user]);

      const openNew = (kind='variable') => { setEditing(null); setForm({...blank, kind}); setModal(true); };
      const openEdit = e => {
        setEditing(e);
        setForm({
          description:e.description||'', category:e.category||'תוכנה', amount:e.amount||'',
          date:e.date||today, kind:e.kind||'variable', supplierId:e.supplierId||'', projectId:e.projectId||'',
          clientId:e.clientId||'', recurrence:e.recurrence||'monthly', notes:e.notes||''
        });
        setModal(true);
      };

      const save = async () => {
        if (!form.description.trim()||!form.amount) return;
        setSaving(true);
        try {
          const data = {
            ...form,
            amount:Number(form.amount),
            userId:user.uid,
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          };
          if (editing) await db.collection('expenses').doc(editing.id).update(data);
          else         await db.collection('expenses').add({...data, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
          setModal(false); setForm(blank); setEditing(null);
        } catch(e){ alert('שגיאה: '+e.message); } finally { setSaving(false); }
      };

      const del = async id => { if(!window.confirm('למחוק הוצאה זו?')) return; await db.collection('expenses').doc(id).delete(); };

      // ── Computed metrics ──
      const monthKey = d => (d||'').slice(0,7);
      const thisMonth = today.slice(0,7);
      const lastMonth = (()=>{ const dt=new Date(); dt.setMonth(dt.getMonth()-1); return dt.toISOString().slice(0,7); })();

      const months = useMemo(()=>{
        const set = new Set(items.map(i=>monthKey(i.date)).filter(Boolean));
        return Array.from(set).sort().reverse();
      }, [items]);

      // Apply filters
      const filtered = items.filter(e => {
        if (tab==='fixed' && e.kind!=='fixed') return false;
        if (tab==='variable' && e.kind==='fixed') return false;
        if (filterMonth!=='all' && monthKey(e.date)!==filterMonth) return false;
        if (search) {
          const q = search.toLowerCase();
          const sup = suppliers.find(s=>s.id===e.supplierId);
          const hay = `${e.description||''} ${e.category||''} ${e.notes||''} ${sup?.name||''}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      const totalThisMonth   = items.filter(e=>monthKey(e.date)===thisMonth).reduce((s,e)=>s+(Number(e.amount)||0),0);
      const totalLastMonth   = items.filter(e=>monthKey(e.date)===lastMonth).reduce((s,e)=>s+(Number(e.amount)||0),0);
      const totalFixedMonthly= items.filter(e=>e.kind==='fixed').reduce((s,e)=>s+(Number(e.amount)||0),0);
      const totalAll         = items.reduce((s,e)=>s+(Number(e.amount)||0),0);
      const monthDelta       = totalLastMonth ? Math.round(((totalThisMonth-totalLastMonth)/totalLastMonth)*100) : 0;

      // Full financial snapshot (includes payroll + revenue)
      const fin = useMemo(()=>calcFinance({clients, expenses:items, employees, monthKey:thisMonth}), [clients, items, employees, thisMonth]);
      const totalRealMonthly = fin.totalMonthlyCosts;

      // By supplier breakdown (variable expenses)
      const bySupplier = useMemo(()=>{
        const map = {};
        items.filter(e=>e.kind!=='fixed' && e.supplierId).forEach(e=>{
          const sup = suppliers.find(s=>s.id===e.supplierId);
          const name = sup?.name || 'ספק לא ידוע';
          const role = sup?.supplierRole || '';
          if (!map[e.supplierId]) map[e.supplierId] = { name, role, total:0, count:0, lastDate:'' };
          map[e.supplierId].total += Number(e.amount)||0;
          map[e.supplierId].count += 1;
          if ((e.date||'') > map[e.supplierId].lastDate) map[e.supplierId].lastDate = e.date||'';
        });
        return Object.values(map).sort((a,b)=>b.total-a.total);
      }, [items, suppliers]);

      // Editor cost tracking — only עורך וידאו suppliers
      const editorBreakdown = useMemo(()=>{
        const editors = suppliers.filter(s=>s.supplierRole==='עורך וידאו');
        return editors.map(ed=>{
          const exp = items.filter(e=>e.supplierId===ed.id);
          const total = exp.reduce((s,e)=>s+(Number(e.amount)||0),0);
          const monthTotal = exp.filter(e=>monthKey(e.date)===thisMonth).reduce((s,e)=>s+(Number(e.amount)||0),0);
          const taskCount = tasks.filter(t=>t.editorId===ed.id || t.editor===ed.name).length;
          return { ...ed, total, monthTotal, taskCount, expenseCount:exp.length };
        }).sort((a,b)=>b.monthTotal-a.monthTotal);
      }, [suppliers, items, tasks]);

      const showFin = isFinance(role);
      if (!showFin) {
        return <div className={CL.card+" text-center text-zinc-400"}>אין הרשאה לצפייה בהוצאות</div>;
      }

      return (
        <div>
          {/* Header */}
          <div className="flex justify-between items-start mb-6">
            <div>
              <h2 className="text-2xl font-black text-white">💸 הוצאות</h2>
              <p className="text-zinc-400 text-xs mt-1">מעקב הוצאות שוטפות, ספקים ועורכים</p>
            </div>
            <div className="flex gap-2">
              <button onClick={()=>openNew('fixed')} className={CL.btn2}>+ הוצאה קבועה</button>
              <button onClick={()=>openNew('variable')} className={CL.btn}>+ הוצאה חדשה</button>
            </div>
          </div>

          {/* KPI cards — total monthly cost picture */}
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
            <div className={CL.card+" md:col-span-1 bg-gradient-to-l from-red-500/10 to-zinc-900/60 border-red-500/30"}>
              <div className="text-red-300 text-xs mb-1 font-semibold">💸 סה״כ עלויות חודשיות</div>
              <div className="text-2xl font-black text-red-400">₪{Math.round(totalRealMonthly).toLocaleString()}</div>
              <div className="text-xs text-zinc-400 mt-1">סך הכל</div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">🧑‍💼 שכר עובדים</div>
              <div className="text-xl font-black text-violet-400">₪{Math.round(fin.monthlyPayroll).toLocaleString()}</div>
              <div className="text-xs text-zinc-500 mt-1">{fin.activeEmployeeCount} עובדים</div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">🎬 פרילאנסרים</div>
              <div className="text-xl font-black text-cyan-400">₪{Math.round(fin.monthFreelance).toLocaleString()}</div>
              <div className="text-xs text-zinc-500 mt-1">{bySupplier.length} ספקים</div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">🔁 קבועות</div>
              <div className="text-xl font-black text-amber-400">₪{Math.round(fin.monthlyFixed).toLocaleString()}</div>
              <div className="text-xs text-zinc-500 mt-1">{items.filter(e=>e.kind==='fixed').length} פריטים</div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">📋 שוטפות אחרות</div>
              <div className="text-xl font-black text-white">₪{Math.round(fin.monthOtherVariable).toLocaleString()}</div>
              {totalLastMonth>0 && (
                <div className={`text-xs mt-1 ${monthDelta>0?'text-red-400':'text-emerald-400'}`}>
                  {monthDelta>0?'▲':'▼'} {Math.abs(monthDelta)}% מהחודש שעבר
                </div>
              )}
            </div>
          </div>

          {/* Tabs */}
          <div className="flex gap-1 mb-4 bg-zinc-900/60 p-1 rounded-lg border border-zinc-800 w-fit">
            {[
              {id:'variable', label:'הוצאות שוטפות', emoji:'📋'},
              {id:'fixed',    label:'הוצאות קבועות', emoji:'🔁'},
              {id:'byEditor', label:'מעקב עורכים',   emoji:'✂️'},
            ].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors border-0 cursor-pointer ${
                  tab===t.id ? 'bg-amber-500 text-zinc-950' : 'bg-transparent text-zinc-400 hover:text-white'
                }`}>
                {t.emoji} {t.label}
              </button>
            ))}
          </div>

          {/* Toolbar */}
          {tab!=='byEditor' && (
            <div className="flex flex-wrap gap-2 mb-3">
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חפש תיאור / ספק..." className={CL.input+" max-w-xs"} />
              <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} className={CL.input+" max-w-[180px]"}>
                <option value="all">כל החודשים</option>
                {months.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
            </div>
          )}

          {loading && <div className="text-center py-10 text-zinc-400 text-sm">טוען...</div>}

          {/* TABLE — variable / fixed */}
          {!loading && tab!=='byEditor' && (
            filtered.length===0
              ? <Empty msg={tab==='fixed' ? "אין הוצאות קבועות" : "אין הוצאות תואמות"} />
              : (
                <div className={CL.tableWrap}>
                  <table className="w-full text-right">
                    <THead cols={['תיאור','קטגוריה','ספק','פרויקט', tab==='fixed'?'תדירות':'תאריך', 'סכום','פעולות']} />
                    <tbody>
                      {filtered.map(e=>{
                        const sup = suppliers.find(s=>s.id===e.supplierId);
                        const prj = projects.find(p=>p.id===e.projectId);
                        return (
                          <tr key={e.id} className={CL.tableRow}>
                            <td className="px-4 py-3 text-white text-sm font-medium">{e.description}</td>
                            <td className="px-4 py-3 text-zinc-300 text-sm">{e.category}</td>
                            <td className="px-4 py-3 text-zinc-400 text-sm">{sup?.name || '-'}</td>
                            <td className="px-4 py-3 text-blue-300 text-sm">{prj?.name || '-'}</td>
                            <td className="px-4 py-3 text-zinc-400 text-sm">
                              {tab==='fixed' ? (e.recurrence==='yearly'?'שנתי':e.recurrence==='weekly'?'שבועי':'חודשי') : e.date}
                            </td>
                            <td className="px-4 py-3 text-red-400 font-bold text-sm">₪{Number(e.amount).toLocaleString()}</td>
                            <td className="px-4 py-3">
                              <div className="flex gap-2">
                                <button onClick={()=>openEdit(e)} className="text-xs text-amber-400 hover:text-amber-300 bg-transparent border-0 cursor-pointer">עריכה</button>
                                <button onClick={()=>del(e.id)} className="text-xs text-red-400 hover:text-red-300 bg-transparent border-0 cursor-pointer">מחק</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )
          )}

          {/* By Editor view */}
          {!loading && tab==='byEditor' && (
            editorBreakdown.length===0
              ? <Empty msg="אין עורכים מוגדרים — הוסף עורך בעמוד ספקים" />
              : (
                <div className="grid md:grid-cols-2 gap-3">
                  {editorBreakdown.map(ed=>(
                    <div key={ed.id} className={CL.card}>
                      <div className="flex justify-between items-start mb-3">
                        <div>
                          <div className="text-white font-bold">✂️ {ed.name}</div>
                          <div className="text-zinc-500 text-xs">{ed.specialties || 'עורך וידאו'}</div>
                        </div>
                        <div className={`px-2 py-0.5 rounded text-xs ${ed.status==='פעיל'?'bg-emerald-900/40 text-emerald-300':'bg-zinc-800 text-zinc-400'}`}>{ed.status}</div>
                      </div>
                      <div className="grid grid-cols-3 gap-2 text-center">
                        <div className="bg-zinc-900/60 rounded-lg p-2">
                          <div className="text-zinc-500 text-xs">החודש</div>
                          <div className="text-amber-400 font-bold text-sm">₪{ed.monthTotal.toLocaleString()}</div>
                        </div>
                        <div className="bg-zinc-900/60 rounded-lg p-2">
                          <div className="text-zinc-500 text-xs">סה״כ</div>
                          <div className="text-white font-bold text-sm">₪{ed.total.toLocaleString()}</div>
                        </div>
                        <div className="bg-zinc-900/60 rounded-lg p-2">
                          <div className="text-zinc-500 text-xs">תשלומים</div>
                          <div className="text-white font-bold text-sm">{ed.expenseCount}</div>
                        </div>
                      </div>
                      {ed.videoRate>0 && (
                        <div className="text-xs text-zinc-500 mt-2 pt-2 border-t border-zinc-800">
                          תעריף לסרטון: <span className="text-amber-400 font-medium">₪{Number(ed.videoRate).toLocaleString()}</span>
                          {ed.taskCount>0 && <span className="mr-2">• {ed.taskCount} משימות משויכות</span>}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )
          )}

          {/* Supplier breakdown panel (only on variable tab) */}
          {!loading && tab==='variable' && bySupplier.length>0 && (
            <div className="mt-6">
              <h3 className="text-white font-bold text-sm mb-3">📊 פירוט לפי ספק</h3>
              <div className={CL.tableWrap}>
                <table className="w-full text-right">
                  <THead cols={['ספק','תפקיד','מספר תשלומים','תשלום אחרון','סה״כ']} />
                  <tbody>
                    {bySupplier.map((s,i)=>(
                      <tr key={i} className={CL.tableRow}>
                        <td className="px-4 py-3 text-white text-sm font-medium">{s.name}</td>
                        <td className="px-4 py-3 text-zinc-400 text-sm">{s.role||'-'}</td>
                        <td className="px-4 py-3 text-zinc-300 text-sm">{s.count}</td>
                        <td className="px-4 py-3 text-zinc-400 text-sm">{s.lastDate||'-'}</td>
                        <td className="px-4 py-3 text-amber-400 font-bold text-sm">₪{s.total.toLocaleString()}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {modal && (
            <Modal title={editing ? 'עריכת הוצאה' : (form.kind==='fixed'?'הוצאה קבועה חדשה':'הוצאה חדשה')} onClose={()=>setModal(false)}>
              <div>
                <label className={CL.label}>תיאור *</label>
                <input className={CL.input} placeholder="Adobe Creative Cloud" value={form.description} onChange={e=>F({description:e.target.value})} />

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className={CL.label}>קטגוריה</label>
                    <select className={CL.input} value={form.category} onChange={e=>F({category:e.target.value})}>
                      <option>תוכנה</option><option>ספקים</option><option>עורכים</option><option>צלמים</option>
                      <option>משרד</option><option>שיווק</option><option>ציוד</option><option>שכר</option><option>אחר</option>
                    </select>
                  </div>
                  <div>
                    <label className={CL.label}>סכום (₪) *</label>
                    <input type="number" className={CL.input} placeholder="500" value={form.amount} onChange={e=>F({amount:e.target.value})} />
                  </div>
                </div>

                <label className={CL.label}>סוג הוצאה</label>
                <div className="flex gap-2">
                  <button onClick={()=>F({kind:'variable'})} className={`flex-1 px-3 py-2 rounded-lg text-sm border cursor-pointer transition-colors ${form.kind==='variable'?'bg-amber-500 text-zinc-950 border-amber-500 font-bold':'bg-zinc-900 text-zinc-400 border-zinc-800 hover:text-white'}`}>📋 חד-פעמית</button>
                  <button onClick={()=>F({kind:'fixed'})} className={`flex-1 px-3 py-2 rounded-lg text-sm border cursor-pointer transition-colors ${form.kind==='fixed'?'bg-amber-500 text-zinc-950 border-amber-500 font-bold':'bg-zinc-900 text-zinc-400 border-zinc-800 hover:text-white'}`}>🔁 קבועה</button>
                </div>

                {form.kind==='fixed' && (
                  <React.Fragment>
                    <label className={CL.label}>תדירות</label>
                    <select className={CL.input} value={form.recurrence} onChange={e=>F({recurrence:e.target.value})}>
                      <option value="weekly">שבועי</option>
                      <option value="monthly">חודשי</option>
                      <option value="yearly">שנתי</option>
                    </select>
                  </React.Fragment>
                )}

                <label className={CL.label}>ספק (אופציונלי)</label>
                <select className={CL.input} value={form.supplierId} onChange={e=>F({supplierId:e.target.value})}>
                  <option value="">— ללא ספק —</option>
                  {suppliers.map(s=><option key={s.id} value={s.id}>{s.name} {s.supplierRole?`(${s.supplierRole})`:''}</option>)}
                </select>

                <label className={CL.label}>📦 שייך לפרויקט (אופציונלי - לרווחיות פר׳ פרויקט)</label>
                <select className={CL.input} value={form.projectId} onChange={e=>F({projectId:e.target.value})}>
                  <option value="">— ללא פרויקט —</option>
                  {projects.map(p=><option key={p.id} value={p.id}>{p.name} {p.client?`(${p.client})`:''}</option>)}
                </select>

                <label className={CL.label}>🤝 שייך ללקוח (אופציונלי - לדוח רווחיות לקוח)</label>
                <select className={CL.input} value={form.clientId} onChange={e=>F({clientId:e.target.value})}>

                <label className={CL.label}>תאריך</label>

                <label className={CL.label}>הערות</label>

                <div className="flex gap-2 justify-end mt-5">
                  <button onClick={()=>setModal(false)} className={CL.btn2}>ביטול</button>
                  <button onClick={save} className={CL.btn} disabled={saving}>{saving?'שומר...':'שמור'}</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* ── REPORTS ── */
    function Reports({ role, clients, expenses, tasks, employees=[], suppliers=[], projects=[] }) {
      const today = new Date();
      const [selMonth, setSelMonth] = useState(today.toISOString().slice(0,7));

      const fin = useMemo(()=>calcFinance({clients, expenses, employees, projects, monthKey:selMonth}), [clients, expenses, employees, projects, selMonth]);
      const prevMonth = (()=>{ const d=new Date(selMonth+'-01'); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); })();
      const finPrev = useMemo(()=>calcFinance({clients, expenses, employees, projects, monthKey:prevMonth}), [clients, expenses, employees, projects, prevMonth]);

      // 📈 Forecast — next 3 months of expected revenue
      // Each month = recurring + budgets of active projects with endDate in that month
      const forecast = useMemo(()=>{
        const months = [];
        for (let i=0; i<4; i++) {
          const d = new Date(today.getFullYear(), today.getMonth()+i, 1);
          const k = d.toISOString().slice(0,7);
          const planned = projects
            .filter(p=>(p.status==='פעיל'||p.status==='הושלם') && (p.completedAt||p.endDate||'').slice(0,7)===k)
            .reduce((s,p)=>s+(Number(p.budget)||0),0);
          const projectsInMonth = projects.filter(p=>(p.status==='פעיל'||p.status==='הושלם') && (p.completedAt||p.endDate||'').slice(0,7)===k);
          months.push({
            key: k,
            label: d.toLocaleDateString('he-IL',{month:'long', year:'2-digit'}),
            recurring: fin.recurringRevenue,
            planned,
            total: fin.recurringRevenue + planned,
            projects: projectsInMonth,
            isCurrent: i===0,
          });
        }
        return months;
      }, [projects, fin.recurringRevenue, today]);

      // Per-project P&L
      const projectPL = useMemo(()=>projects.map(p=>{
        const costs = expenses.filter(e=>e.projectId===p.id).reduce((s,e)=>s+(Number(e.amount)||0),0);
        const budget = Number(p.budget)||0;
        return { ...p, costs, budget, profit: budget - costs, margin: budget>0 ? ((budget-costs)/budget)*100 : 0 };
      }).sort((a,b)=>b.budget-a.budget), [projects, expenses]);

      const revenue  = fin.monthlyRevenue;
      const totalExp = fin.totalMonthlyCosts;
      const profit   = fin.grossProfit;
      const margin   = fin.margin.toFixed(1);

      const byCategory = fin.byCategory;
      const extraRevisions = tasks.filter(t=>(t.revisions?.videoRounds||0)>2);

      const months = useMemo(()=>{
        const set = new Set();
        for (let i=0;i<12;i++){ const d=new Date(today.getFullYear(),today.getMonth()-i,1); set.add(d.toISOString().slice(0,7)); }
        expenses.forEach(e=>{ if(e.date) set.add(e.date.slice(0,7)); });
        return Array.from(set).sort().reverse();
      }, [expenses]);

      const delta = (cur, prev) => {
        if (!prev) return null;
        const pct = Math.round(((cur-prev)/Math.abs(prev))*100);
        return { pct, up: pct>0 };
      };
      const dRev = delta(revenue, finPrev.monthlyRevenue);
      const dExp = delta(totalExp, finPrev.totalMonthlyCosts);
      const dProfit = delta(profit, finPrev.grossProfit);

      // Top supplier spend (this month)
      const topSuppliers = useMemo(()=>{
        const map = {};
        expenses.filter(e=>(e.date||'').slice(0,7)===selMonth && e.supplierId).forEach(e=>{
          const sup = suppliers.find(s=>s.id===e.supplierId);
          const name = sup?.name || 'ללא שיוך';
          map[name] = (map[name]||0) + (Number(e.amount)||0);
        });
        return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5);
      }, [expenses, suppliers, selMonth]);

      if (!isFinance(role)) {
        return <div className={CL.card+" text-center text-zinc-400"}>אין הרשאה לדוחות פיננסיים</div>;
      }

      const DeltaPill = ({d, invert}) => {
        if (!d) return null;
        const good = invert ? !d.up : d.up;
        const cls = good ? 'text-emerald-400' : 'text-red-400';
        return <span className={`text-[11px] ${cls}`}>{d.up?'▲':'▼'} {Math.abs(d.pct)}%</span>;
      };

      return (
        <div>
          <div className="flex justify-between items-start mb-6">
            <div>
              <h2 className="text-2xl font-black text-white">📊 דוחות פיננסיים</h2>
              <p className="text-zinc-400 text-xs mt-1">תזרים מזומנים, הכנסות, הוצאות ועלות צוות</p>
            </div>
            <select value={selMonth} onChange={e=>setSelMonth(e.target.value)} className={CL.input+" max-w-[180px]"}>
              {months.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>

          {/* Top KPI cards with deltas */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">💰 הכנסות</div>
              <div className="text-2xl font-black text-emerald-400">₪{Math.round(revenue).toLocaleString()}</div>
              <div className="flex items-center justify-between mt-1">
                <span className="text-zinc-500 text-[11px]">ריטיינרים ₪{Math.round(fin.recurringRevenue/1000)}K{fin.projectRevenueThisMonth>0?` + פר׳ ₪${Math.round(fin.projectRevenueThisMonth/1000)}K`:''}</span>
                <DeltaPill d={dRev}/>
              </div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">💸 הוצאות</div>
              <div className="text-2xl font-black text-red-400">₪{Math.round(totalExp).toLocaleString()}</div>
              <div className="flex items-center justify-between mt-1"><span className="text-zinc-500 text-[11px]">כולל שכר ושוטף</span><DeltaPill d={dExp} invert/></div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">📈 רווח נקי</div>
              <div className={`text-2xl font-black ${profit>=0?'text-amber-400':'text-red-400'}`}>₪{Math.round(profit).toLocaleString()}</div>
              <div className="flex items-center justify-between mt-1"><span className="text-zinc-500 text-[11px]">{margin}% שולי רווח</span><DeltaPill d={dProfit}/></div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">🧑‍💼 עלות שכר</div>
              <div className="text-2xl font-black text-violet-400">₪{Math.round(fin.monthlyPayroll).toLocaleString()}</div>
              <div className="text-zinc-500 text-[11px] mt-1">{fin.activeEmployeeCount} עובדים פעילים</div>
            </div>
          </div>

          {/* 📈 Forecast — next 90 days */}
          <div className={CL.card+" mb-5 border-cyan-500/30 bg-gradient-to-l from-cyan-500/5 to-zinc-900"}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-white font-bold">📈 תחזית הכנסות — 4 חודשים קדימה</h3>
              <span className="text-zinc-500 text-xs">ריטיינרים + פרויקטים מתוכננים</span>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {forecast.map((m,i)=>(
                <div key={m.key} className={`rounded-lg p-3 border ${m.isCurrent?'bg-amber-500/10 border-amber-500/40':'bg-zinc-900/60 border-zinc-800'}`}>
                  <div className={`text-xs font-semibold mb-2 ${m.isCurrent?'text-amber-300':'text-zinc-400'}`}>
                    {m.label} {m.isCurrent && <span className="text-[10px]">(נוכחי)</span>}
                  </div>
                  <div className={`text-xl font-black ${m.isCurrent?'text-amber-400':'text-cyan-400'}`}>₪{Math.round(m.total).toLocaleString()}</div>
                  <div className="text-[10px] text-zinc-500 mt-1">
                    <div>ריטיינרים ₪{Math.round(m.recurring/1000)}K</div>
                    {m.planned>0 && <div className="text-cyan-300">+ פר׳ ₪{Math.round(m.planned/1000)}K ({m.projects.length})</div>}
                    {m.planned===0 && !m.isCurrent && <div className="text-zinc-600">אין פרויקטים מתוכננים</div>}
                  </div>
                </div>
              ))}
            </div>
            <p className="text-[11px] text-zinc-500 mt-3">💡 כדי שפרויקט יופיע — הגדר תאריך סיום בעמוד הפרויקטים. בסיום סטטוס הופך אוטומטית להושלם.</p>
          </div>

          {/* Cash flow trend chart */}
          <div className={CL.card+" mb-5"}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-white font-bold">תזרים מזומנים — 6 חודשים אחרונים</h3>
              <div className="flex gap-3 text-xs">
                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span><span className="text-zinc-400">הכנסות</span></span>
                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-red-500"></span><span className="text-zinc-400">הוצאות</span></span>
                <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full bg-amber-500"></span><span className="text-zinc-400">רווח</span></span>
              </div>
            </div>
            <div className="flex items-end gap-3 h-48">
              {fin.trend.map((m,i)=>{
                const maxVal = Math.max(...fin.trend.map(x=>Math.max(x.revenue, x.costs, Math.abs(x.profit))), 1);
                const h = v => Math.max(2, (Math.abs(v)/maxVal)*100);
                return (
                  <div key={i} className="flex-1 flex flex-col items-center gap-2">
                    <div className="flex items-end gap-1 h-40 w-full justify-center">
                      <div style={{height:`${h(m.revenue)}%`, background:'#10b981'}} className="w-3 rounded-t" title={`הכנסות: ₪${Math.round(m.revenue).toLocaleString()}`}></div>
                      <div style={{height:`${h(m.costs)}%`,   background:'#ef4444'}} className="w-3 rounded-t" title={`הוצאות: ₪${Math.round(m.costs).toLocaleString()}`}></div>
                      <div style={{height:`${h(m.profit)}%`,  background: m.profit>=0?'#f59e0b':'#7f1d1d'}} className="w-3 rounded-t" title={`רווח: ₪${Math.round(m.profit).toLocaleString()}`}></div>
                    </div>
                    <div className="text-zinc-500 text-[11px]">{m.label}</div>
                    <div className={`text-[10px] font-bold ${m.profit>=0?'text-amber-400':'text-red-400'}`}>₪{Math.round(m.profit/1000)}K</div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-5">
            {/* Cost structure */}
            <div className={CL.card}>
              <h3 className="text-white font-bold text-sm mb-4">מבנה עלויות החודש</h3>
              {[
                { label:'🧑‍💼 שכר עובדים',   val:fin.monthlyPayroll,     color:'bg-violet-500' },
                { label:'🎬 פרילאנסרים',     val:fin.monthFreelance,     color:'bg-cyan-500' },
                { label:'🔁 הוצאות קבועות', val:fin.monthlyFixed,        color:'bg-amber-500' },
                { label:'📋 שוטפות אחרות',  val:fin.monthOtherVariable,  color:'bg-red-500' },
              ].map((row,i)=>{
                const pct = totalExp>0 ? (row.val/totalExp)*100 : 0;
                return (
                  <div key={i} className="mb-3 last:mb-0">
                    <div className="flex justify-between text-sm mb-1">
                      <span className="text-zinc-300">{row.label}</span>
                      <span className="text-white font-semibold">₪{Math.round(row.val).toLocaleString()} <span className="text-zinc-500 text-xs">({Math.round(pct)}%)</span></span>
                    </div>
                    <div className="h-2 bg-zinc-800 rounded-full overflow-hidden">
                      <div className={row.color+' h-full transition-all'} style={{width:`${pct}%`}}></div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* By category */}
            <div className={CL.card}>
              <h3 className="text-white font-bold text-sm mb-4">פילוח לפי קטגוריה</h3>
              {Object.keys(byCategory).length===0
                ? <p className="text-zinc-500 text-sm">אין נתונים בחודש זה</p>
                : Object.entries(byCategory).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
                    const pct = totalExp>0 ? (amt/totalExp)*100 : 0;
                    return (
                      <div key={cat} className="flex justify-between items-center py-1.5 border-b border-zinc-800/40 last:border-0">
                        <span className="text-zinc-300 text-sm">{cat}</span>
                        <div className="text-right">
                          <span className="text-red-400 font-semibold text-sm">₪{Math.round(amt).toLocaleString()}</span>
                          <span className="text-zinc-500 text-xs mr-2">{Math.round(pct)}%</span>
                        </div>
                      </div>
                    );
                  })
              }
            </div>
          </div>

          {/* Payroll detail */}
          {fin.payrollDetails.length>0 && (
            <div className={CL.card+" mb-5"}>
              <div className="flex justify-between items-center mb-3">
                <h3 className="text-white font-bold text-sm">🧑‍💼 פירוט שכר עובדים</h3>
                <span className="text-zinc-500 text-xs">סה״כ ₪{Math.round(fin.monthlyPayroll).toLocaleString()}/חודש</span>
              </div>
              <div className={CL.tableWrap}>
                <table className="w-full text-right">
                  <THead cols={['שם','תפקיד','סוג','שכר ברוטו','עלות מעסיק','עלות חודשית']} />
                  <tbody>
                    {fin.payrollDetails.map(p=>(
                      <tr key={p.id} className={CL.tableRow}>
                        <td className="px-4 py-3 text-white text-sm font-medium">{p.name}</td>
                        <td className="px-4 py-3 text-zinc-300 text-sm">{p.empRole||'-'}</td>
                        <td className="px-4 py-3 text-zinc-400 text-sm">{p.salaryType}</td>
                        <td className="px-4 py-3 text-zinc-300 text-sm">₪{Math.round(p.base).toLocaleString()}</td>
                        <td className="px-4 py-3 text-violet-300 text-sm">{p.load>0?`+₪${Math.round(p.load).toLocaleString()}`:'-'}</td>
                        <td className="px-4 py-3 text-violet-400 font-bold text-sm">₪{Math.round(p.total).toLocaleString()}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <p className="text-xs text-zinc-500 mt-2">* עלות מעסיק (סוציאליות, ביטוח לאומי) מחושבת ב-25% עבור עובדים שכירים</p>
            </div>
          )}

          {/* Top suppliers + revisions */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
            <div className={CL.card}>
              <h3 className="text-white font-bold text-sm mb-4">🏆 ספקים מובילים בחודש</h3>
              {topSuppliers.length===0
                ? <p className="text-zinc-500 text-sm">אין תשלומי ספקים בחודש זה</p>
                : topSuppliers.map(([name,amt],i)=>(
                    <div key={i} className="flex justify-between items-center py-2 border-b border-zinc-800/40 last:border-0">
                      <div className="flex items-center gap-2">
                        <span className="w-6 h-6 rounded-full bg-amber-500/20 text-amber-400 flex items-center justify-center text-xs font-bold">{i+1}</span>
                        <span className="text-white text-sm">{name}</span>
                      </div>
                      <span className="text-amber-400 font-bold text-sm">₪{Math.round(amt).toLocaleString()}</span>
                    </div>
                  ))
              }
            </div>

            <div className={CL.card}>
              <h3 className="text-white font-bold text-sm mb-4">📦 רווחיות פרויקטים</h3>
              {projectPL.length===0
                ? <p className="text-zinc-500 text-sm">אין פרויקטים</p>
                : (
                  <div className="space-y-2 max-h-[260px] overflow-y-auto">
                    {projectPL.slice(0,8).map(p=>(
                      <div key={p.id} className="bg-zinc-900/60 rounded-lg p-2.5 border border-zinc-800">
                        <div className="flex justify-between items-start mb-1">
                          <div className="min-w-0">
                            <div className="text-white text-sm font-semibold truncate">{p.name}</div>
                            <div className="text-zinc-500 text-[11px]">{p.client||'-'} · {p.status}</div>
                          </div>
                          <span className={`text-sm font-black ${p.profit>=0?'text-emerald-400':'text-red-400'}`}>₪{Math.round(p.profit).toLocaleString()}</span>
                        </div>
                        <div className="flex justify-between text-[11px] text-zinc-400">
                          <span>תקציב ₪{p.budget.toLocaleString()}</span>
                          <span>עלויות ₪{Math.round(p.costs).toLocaleString()}</span>
                          <span className={p.margin>=0?'text-emerald-300':'text-red-300'}>{Math.round(p.margin)}%</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )
              }
            </div>

            <div className={CL.card}>
              <h3 className="text-white font-bold text-sm mb-4">⚠️ לתשומת לב — סבבי תיקונים</h3>
              {extraRevisions.length===0
                ? <p className="text-emerald-400 text-sm">✅ אין סבבי תיקונים חריגים</p>
                : (
                    <React.Fragment>
                      <p className="text-amber-400 text-xs mb-3">משימות עם יותר מ-2 סבבי וידאו:</p>
                      {extraRevisions.map(t=>(
                        <div key={t.id} className="flex justify-between items-center bg-zinc-900/60 rounded-lg px-3 py-2 mb-2">
                          <div>
                            <div className="text-white text-sm font-semibold">{t.title}</div>
                            <div className="text-zinc-400 text-xs">{t.client}</div>
                          </div>
                          <Badge label={`${t.revisions.videoRounds} סבבים`} color="red" />
                        </div>
                      ))}
                    </React.Fragment>
                  )
              }
            </div>
          </div>
        </div>
      );
    }

    function CalendarSettings() {
      const [clientId, setClientId] = useState(calClientId.get());
      const [connected, setConnected] = useState(calConsented.get());
      const [busy, setBusy]   = useState(false);
      const [msg, setMsg]     = useState('');
      const [step, setStep]   = useState(calConsented.get() ? 'done' : calClientId.get() ? 'connect' : 'setup');

      const saveClientId = () => {
        if (!clientId.includes('.apps.googleusercontent.com')) {
          setMsg('❌ Client ID לא תקין — חייב להסתיים ב-.apps.googleusercontent.com'); return;
        }
        calClientId.set(clientId);
        _gsiTokenClient = null; // reset so next connect uses new ID
        setMsg('');
        setStep('connect');
      };

      const connect = async () => {
        if (!calClientId.get()) { setMsg('❌ הגדר Client ID קודם'); return; }
        setBusy(true); setMsg('');
        try {
          await calConnect();
          setConnected(true); setStep('done');
          setMsg('✅ היומן חובר בהצלחה! מעכשיו הסנכרון אוטומטי לגמרי ולא תישאל שוב.');
        }
        catch(e){ setMsg('❌ '+(e.message||e)); }
        finally { setBusy(false); }
      };

      const test = async () => {
        setBusy(true); setMsg('');
        try { const r = await calApi('/calendars/primary'); setMsg('✅ מחובר ל: "'+r.summary+'" · הכל תקין'); }
        catch(e){ setMsg('❌ '+e.message); }
        finally { setBusy(false); }
      };

      const disconnect = () => {
        calToken.clear(); calConsented.clear(); _gsiTokenClient = null;
        setConnected(false); setClientId(''); setStep('setup');
        setMsg('היומן נותק');
      };

      return (
        <div className="max-w-2xl space-y-4">
          <div className={CL.card}>
            <div className="flex items-center justify-between mb-4">
              <div>
                <h3 className="text-white font-bold">📅 חיבור ליומן Google</h3>
                <p className="text-zinc-500 text-xs mt-0.5">הגדר פעם אחת — מאותו רגע סנכרון אוטומטי לנצח</p>
              </div>
              <span className={`px-3 py-1 rounded-full text-xs border ${connected?'bg-emerald-500/15 text-emerald-300 border-emerald-500/30':'bg-zinc-800 text-zinc-400 border-zinc-700'}`}>
                {connected ? '● מחובר ופעיל' : '○ לא מחובר'}
              </span>
            </div>

            {/* Step 1 — Client ID setup */}
            {step!=='done' && (
              <div className="space-y-3">
                <div className={`p-3 rounded-lg border text-xs ${step==='setup'?'border-amber-500/40 bg-amber-500/5':'border-emerald-500/40 bg-emerald-500/5'}`}>
                  <div className="font-semibold text-white mb-1">שלב 1 — Web Client ID</div>
                  <p className="text-zinc-400 mb-3">
                    כנס ל: <a href="https://console.firebase.google.com/project/ting-media-finance/authentication/providers" target="_blank" className="text-amber-400 underline">Firebase Console → Authentication → Sign-in method → Google</a>
                    {' '}→ לחץ על Google → העתק את "Web client ID"
                  </p>
                  <div className="flex gap-2">
                    <input
                      className={CL.input+" flex-1 font-mono text-[11px]"}
                      placeholder="123456789-xxxx.apps.googleusercontent.com"
                      value={clientId}
                      onChange={e=>{ setClientId(e.target.value); setMsg(''); }}
                    />
                    <button onClick={saveClientId} disabled={!clientId} className={CL.btn}>שמור</button>
                  </div>
                </div>

                {step==='connect' && (
                  <div className="p-3 rounded-lg border border-blue-500/40 bg-blue-500/5 text-xs">
                    <div className="font-semibold text-white mb-1">שלב 2 — אשר גישה ליומן (פעם אחת בלבד)</div>
                    <p className="text-zinc-400 mb-3">ייפתח חלון Google — אשר גישה ל-"Google Calendar". לאחר מכן הסנכרון יפעל אוטומטית ללא שאלות נוספות.</p>
                    <button onClick={connect} disabled={busy} className={CL.btn}>{busy?'מתחבר...':'🔗 אשר גישה ליומן →'}</button>
                  </div>
                )}
              </div>
            )}

            {/* Step done */}
            {step==='done' && (
              <div className="space-y-3">
                <div className="p-3 rounded-lg border border-emerald-500/30 bg-emerald-500/5 text-xs text-emerald-300">
                  🎉 מחובר! הסנכרון עובד אוטומטית — כל משימה עם תאריך צילום נוצרת/מתעדכנת ביומן.
                </div>
                <div className="flex gap-2">
                  <button onClick={test} disabled={busy} className={CL.btn2}>{busy?'בודק...':'🔍 בדוק חיבור'}</button>
                  <button onClick={disconnect} className="px-3 py-1.5 rounded-lg text-xs text-red-400 hover:text-red-300 bg-transparent border border-red-800/30 cursor-pointer">נתק</button>
                </div>
              </div>
            )}

            {msg && <div className={`mt-3 text-xs px-3 py-2 rounded-lg border ${msg.startsWith('❌')?'bg-red-500/10 border-red-500/30 text-red-300':'bg-emerald-500/10 border-emerald-500/30 text-emerald-300'}`}>{msg}</div>}
          </div>

          <div className={CL.card}>
            <div className="text-white font-semibold text-sm mb-3">📋 מה קורה אוטומטית</div>
            <ul className="space-y-2 text-xs text-zinc-400">
              <li className="flex gap-2"><span>🎬</span><span><strong className="text-white">יצירת משימה</strong> עם תאריך צילום → אירוע נוצר ביומן הראשי שלך</span></li>
              <li className="flex gap-2"><span>✏️</span><span><strong className="text-white">עדכון שם/תאריך</strong> → האירוע ביומן מתעדכן אוטומטית</span></li>
              <li className="flex gap-2"><span>🗑️</span><span><strong className="text-white">מחיקת משימה</strong> → האירוע ביומן נמחק</span></li>
              <li className="flex gap-2"><span>🔄</span><span><strong className="text-white">חידוש טוקן</strong> — קורה בשקט ברקע, ללא הפרעות, ללא popups</span></li>
              <li className="flex gap-2"><span>🕐</span><span><strong className="text-white">שעה</strong> — נקבעת לפי שדה "שעת צילום" (ברירת מחדל: 09:00, משך 2 שעות)</span></li>
            </ul>
          </div>
        </div>
      );
    }

    /* ── SETTINGS ── */
    const ROLES = [
      { id:'admin',  label:'מנהל ראשי',         desc:'גישה מלאה לכל המערכת + ניהול משתמשים', color:'amber' },
      { id:'finance',label:'מנהל כספים',        desc:'גישה מלאה כולל הוצאות, ספקים ודוחות',  color:'emerald' },
      { id:'office', label:'מנהלת תיקי לקוחות', desc:'משימות, לקוחות וצפייה בלבד בכספים',     color:'blue' },
      { id:'editor', label:'עורך / צלם',         desc:'משימות שמשויכות לו בלבד',               color:'violet' },
      { id:'client', label:'לקוח',                desc:'צפייה ואישור תוצרים בלבד',              color:'zinc' },
    ];

    const PERMISSIONS = [
      { id:'tasks.view',     label:'צפייה במשימות' },
      { id:'tasks.edit',     label:'עריכת משימות' },
      { id:'clients.view',   label:'צפייה בלקוחות' },
      { id:'clients.edit',   label:'עריכת לקוחות' },
      { id:'suppliers.view', label:'צפייה בספקים' },
      { id:'suppliers.edit', label:'עריכת ספקים' },
      { id:'expenses.view',  label:'צפייה בהוצאות' },
      { id:'expenses.edit',  label:'עריכת הוצאות' },
      { id:'reports.view',   label:'צפייה בדוחות' },
      { id:'users.manage',   label:'ניהול משתמשים' },
      { id:'supervisor.approve', label:'אישור סופרוויזר' },
    ];

    function Settings({ user, role }) {
      const [tab, setTab] = useState('profile');
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [modal, setModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [teamClients, setTeamClients] = useState([]);
      const [teamEmployees, setTeamEmployees] = useState([]);
      const blank = { email:'', displayName:'', password:'', role:'office', permissions:[], status:'פעיל', linkedEmployeeId:'' };
      const [form, setForm] = useState(blank);
      const [saving, setSaving] = useState(false);
      const F = f => setForm(p=>({...p,...f}));

      // Change password state
      const [pwForm, setPwForm] = useState({ current:'', next:'', confirm:'' });
      const [pwSaving, setPwSaving] = useState(false);
      const [pwMsg, setPwMsg] = useState(null); // {type:'ok'|'err', text}
      const PF = f => setPwForm(p=>({...p,...f}));

      const changePassword = async () => {
        if (!pwForm.next.trim()) return setPwMsg({type:'err', text:'נא להזין סיסמה חדשה'});
        if (pwForm.next !== pwForm.confirm) return setPwMsg({type:'err', text:'הסיסמאות אינן תואמות'});
        if (pwForm.next.length < 6) return setPwMsg({type:'err', text:'הסיסמה חייבת להכיל לפחות 6 תווים'});
        setPwSaving(true); setPwMsg(null);
        try {
          if (pwForm.current.trim()) {
            const cred = firebase.auth.EmailAuthProvider.credential(user.email, pwForm.current.trim());
            await user.reauthenticateWithCredential(cred);
          }
          await user.updatePassword(pwForm.next);
          setPwMsg({type:'ok', text:'✅ הסיסמה עודכנה בהצלחה!'});
          setPwForm({current:'', next:'', confirm:''});
        } catch(e) {
          if (e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') {
            setPwMsg({type:'err', text:'הסיסמה הנוכחית שגויה'});
          } else if (e.code==='auth/requires-recent-login') {
            try {
              await firebase.auth().sendPasswordResetEmail(user.email);
              setPwMsg({type:'ok', text:'📧 נשלח אימייל לאיפוס סיסמה ל-'+user.email});
            } catch(e2) { setPwMsg({type:'err', text:'שגיאה: '+e2.message}); }
          } else {
            setPwMsg({type:'err', text:'שגיאה: '+e.message});
          }
        } finally { setPwSaving(false); }
      };

      // Home page content editor
      const [homeContent, setHomeContent] = useState(null);
      const [homeLoading, setHomeLoading] = useState(false);
      const [homeForm, setHomeForm] = useState({
        heroTitle: 'ברוכים הבאים לטינג מדיה',
        heroSubtitle: 'שירותי ייצור וידאו מקצועיים',
        heroVideoUrl: '',
        aboutText: 'אנחנו מייצרים תוכן וידאו באיכות קולנועית',
        servicesTitle: 'השירותים שלנו',
        testimonialText: 'לקוחותינו אוהבים אותנו',
      });

      const HF = f => setHomeForm(p=>({...p,...f}));

      const isAdmin = role==='admin' || role==='office'; // office has near-admin authority
      const isRealAdmin = role==='admin'; // true admin only — for user creation / system settings

      // Home screen prefs
      const [prefs, setPrefs] = useState(()=>{
        try { return JSON.parse(localStorage.getItem('tingmedia.homePrefs')||'{}'); }
        catch{ return {}; }
      });
      const savePrefs = p => { setPrefs(p); localStorage.setItem('tingmedia.homePrefs', JSON.stringify(p)); };

      useEffect(()=>{
        if (!db) return;
        return db.collection('users').onSnapshot(snap=>{
          setUsers(snap.docs.map(d=>({id:d.id,...d.data()})));
          setLoading(false);
        }, ()=>setLoading(false));
      },[]);

      useEffect(()=>{
        if (!db||!user) return;
        const u1 = db.collection('clients').where('userId','==',user.uid).onSnapshot(s=>setTeamClients(s.docs.map(d=>({id:d.id,...d.data()}))));
        const u2 = db.collection('employees').where('userId','==',user.uid).onSnapshot(s=>setTeamEmployees(s.docs.map(d=>({id:d.id,...d.data()}))));
        // Load home page content
        const u3 = db.collection('homePageContent').where('userId','==',user.uid).limit(1).onSnapshot(snap=>{
          if (snap.empty) {
            setHomeContent(null);
          } else {
            const doc = snap.docs[0];
            setHomeContent({id:doc.id,...doc.data()});
            setHomeForm({
              heroTitle: doc.data().heroTitle || 'ברוכים הבאים לטינג מדיה',
              heroSubtitle: doc.data().heroSubtitle || 'שירותי ייצור וידאו מקצועיים',
              heroVideoUrl: doc.data().heroVideoUrl || '',
              aboutText: doc.data().aboutText || 'אנחנו מייצרים תוכן וידאו באיכות קולנועית',
              servicesTitle: doc.data().servicesTitle || 'השירותים שלנו',
              testimonialText: doc.data().testimonialText || 'לקוחותינו אוהבים אותנו',
            });
          }
        });
        return ()=>{u1();u2();u3();};
      },[user]);

      const saveHomeContent = async () => {
        if (!user) return;
        setHomeLoading(true);
        try {
          if (homeContent?.id) {
            // Update existing
            await db.collection('homePageContent').doc(homeContent.id).update({
              ...homeForm,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          } else {
            // Create new
            await db.collection('homePageContent').add({
              ...homeForm,
              userId: user.uid,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          }
          alert('✅ תוכן דף הבית שמור בהצלחה!');
        } catch(e) {
          alert('❌ שגיאה בשמירה: ' + e.message);
        } finally {
          setHomeLoading(false);
        }
      };

      const updateClientManager = async (clientId, managerId) => {
        try { await db.collection('clients').doc(clientId).update({ accountManagerId:managerId, updatedAt:firebase.firestore.FieldValue.serverTimestamp() }); }
        catch(e){ alert('שגיאה: '+e.message); }
      };

      const openNew = () => { setEditing(null); setForm(blank); setModal(true); };
      const openEdit = u => {
        setEditing(u);
        setForm({
          email:u.email||'', displayName:u.displayName||'',
          role:u.role||'office', permissions:u.permissions||[],
          status:u.status||'פעיל', linkedEmployeeId:u.linkedEmployeeId||''
        });
        setModal(true);
      };

      const togglePerm = pid => {
        F({ permissions: form.permissions.includes(pid)
              ? form.permissions.filter(p=>p!==pid)
              : [...form.permissions, pid] });
      };

      const saveUser = async () => {
        if (!form.email.trim()) return;
        setSaving(true);
        try {
          const { password, ...rest } = form;
          const data = { ...rest, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
          if (editing) {
            await db.collection('users').doc(editing.id).update(data);
            setModal(false);
          } else {
            // Create Firebase Auth account on secondary app so the admin stays signed in
            if (!password || password.length < 8) { alert('סיסמה ראשונית חובה (8+ תווים)'); setSaving(false); return; }
            const secondaryName = 'create-user-' + Date.now();
