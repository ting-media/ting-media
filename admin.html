    /* ── TASKS (Timeliner-inspired) ── */

    // Toolbar button — unified style
    function TBBtn({ onClick, active, icon, children, primary }) {
      const base = "flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border-0 cursor-pointer transition-all";
      if (primary) return (
        <button onClick={onClick} className={`${base} bg-amber-500 hover:bg-amber-400 text-zinc-950 font-bold`}>
          {icon}<span>{children}</span>
        </button>
      );
      return (
        <button onClick={onClick} className={`${base} ${active ? 'bg-zinc-800 text-white' : 'text-zinc-400 hover:text-white hover:bg-zinc-900'}`}>
          {icon}<span>{children}</span>
        </button>
      );
    }

    // Status pill — uses React Portal so dropdown escapes overflow:hidden parents
    function StatusPill({ stage, onChange }) {
      const [open, setOpen] = useState(false);
      const [pos, setPos]   = useState({top:0, right:0});
      const btnRef = useRef(null);
      const s = stageById(stage);

      const toggle = e => {
        e.stopPropagation();
        if (!open && btnRef.current) {
          const r = btnRef.current.getBoundingClientRect();
          setPos({ top: r.bottom + 4, right: window.innerWidth - r.right });
        }
        setOpen(o => !o);
      };

      // Close on resize/scroll so menu doesn't float in wrong place
      useEffect(() => {
        if (!open) return;
        const close = () => setOpen(false);
        window.addEventListener('scroll', close, true);
        window.addEventListener('resize', close);
        return () => {
          window.removeEventListener('scroll', close, true);
          window.removeEventListener('resize', close);
        };
      }, [open]);

      const dropdown = open ? (
        <>
          <div
            onClick={e => { e.stopPropagation(); setOpen(false); }}
            style={{position:'fixed', inset:0, zIndex:9998}}
          />
          <div
            onClick={e => e.stopPropagation()}
            className="bg-zinc-900 border border-zinc-700 rounded-lg shadow-2xl py-1 min-w-[180px]"
            style={{position:'fixed', top:pos.top, right:pos.right, zIndex:9999}}
          >
            {STAGES.map(st => (
              <button
                key={st.id}
                onClick={e => { e.stopPropagation(); setOpen(false); onChange(st.id); }}
                className="w-full flex items-center gap-2 px-3 py-2 text-xs text-right text-zinc-200 hover:bg-zinc-800 cursor-pointer border-0 bg-transparent"
              >
                <span className="stage-dot" style={{background:st.dot}}></span>
                <span className="flex-1 text-right">{st.emoji} {st.name}</span>
                {st.id === stage && <span className="text-amber-400">✓</span>}
              </button>
            ))}
          </div>
        </>
      ) : null;

      return (
        <>
          <button
            ref={btnRef}
            onClick={toggle}
            className="flex items-center gap-1.5 px-2 py-0.5 rounded-md text-xs cursor-pointer hover:bg-zinc-800/60"
            style={{background:'transparent', color:'#d4d4d8', border:'1px solid #27272a'}}
          >
            <span className="stage-dot" style={{background:s.dot, opacity:0.8}}></span>
            <span>{s.name}</span>
            <span className="opacity-40 text-[10px]">▾</span>
          </button>
          {dropdown && ReactDOM.createPortal(dropdown, document.body)}
        </>
      );
    }

    // Priority chip
    const PRIO = {
      high:   { label:'דחוף', color:'#ef4444', tint:'rgba(239,68,68,0.12)' },
      medium: { label:'רגיל', color:'#f59e0b', tint:'rgba(245,158,11,0.12)' },
      low:    { label:'נמוך', color:'#3b82f6', tint:'rgba(59,130,246,0.12)' },
    };
    function PrioChip({ p }) {
      const v = PRIO[p] || PRIO.medium;
      return <span className="text-[10px] px-1.5 py-0.5 rounded font-medium" style={{background:v.tint, color:v.color}}>{v.label}</span>;
    }

    // Monday-style task row
    function TaskRow({ t, onOpen, onChangeStage, selected, employees=[], suppliers=[] }) {
      const u = urgencyOf(t);
      const prio = PRIO[t.priority||'medium'];
      const dateLabel = t.shootDate || t.dueDate;
      const isOverdue = dateLabel && (t.stage||1) < FINAL_STAGE && new Date(dateLabel) < new Date();
      const empInitials = id => { const e = employees.find(x=>x.id===id); const n=e?.name||e?.fullName||''; return n.split(' ').map(w=>w[0]).join('').slice(0,2); };
      const supInitials = id => { const e = suppliers.find(x=>x.id===id); const n=e?.name||''; return n.split(' ').map(w=>w[0]).join('').slice(0,2); };
      return (
        <div
          id={`task-${t.id}`}
          onClick={onOpen}
          className={`monday-row ${selected?'selected':''} ${u?'urg-'+u.level:''}`}
          style={{gridTemplateColumns:'4px 1fr 140px 130px 80px 110px 50px', gap:0}}
        >
          {/* Priority left bar */}
          <div className="prio-bar" style={{background:prio.color, height:'100%'}}></div>

          {/* Task name */}
          <div className="flex items-center gap-2 px-3 py-2.5 min-w-0">
            <div className="min-w-0 flex-1">
              <div className="text-white text-sm font-medium truncate flex items-center gap-1.5">
                <span className="truncate">{t.title || 'ללא שם'}</span>
                {t.calendarEventId && <span title="ביומן Google" className="text-[10px] text-blue-400">📅</span>}
                {(t.links||[]).length>0 && <span title={`${(t.links||[]).length} קישורים`} className="text-[10px] text-zinc-500">📎{(t.links||[]).length}</span>}
              </div>
              {u && <div className={`text-[10px] mt-0.5 ${u.level==='critical'?'text-red-400/80':'text-orange-400/80'}`}>{u.reason}</div>}
            </div>
          </div>

          {/* Client */}
          <div className="px-3 py-2.5 text-xs text-zinc-400 truncate border-r border-zinc-800/40">
            {t.client ? <span className="px-2 py-0.5 rounded-md bg-zinc-800 text-zinc-200">{t.client}</span> : <span className="text-zinc-700">—</span>}
          </div>

          {/* Stage pill — clickable */}
          <div className="px-2 py-2.5 border-r border-zinc-800/40" onClick={e=>e.stopPropagation()}>
            <StatusPill stage={t.stage||1} onChange={s=>onChangeStage(t,s)} />
          </div>

          {/* Assignees — neutral circles */}
          <div className="px-2 py-2.5 flex items-center gap-1 border-r border-zinc-800/40">
            {t.accountManagerId && (
              <div title={'מנהל: '+(employees.find(x=>x.id===t.accountManagerId)?.name||'?')} className="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-bold flex-shrink-0" style={{background:'#1f1f23', color:'#a1a1aa', border:'1px solid #27272a'}}>{empInitials(t.accountManagerId)||'?'}</div>
            )}
            {t.assigneeEmployeeId && t.assigneeEmployeeId !== t.accountManagerId && (
              <div title={'משוייך: '+(employees.find(x=>x.id===t.assigneeEmployeeId)?.name||employees.find(x=>x.id===t.assigneeEmployeeId)?.fullName||'?')} className="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-bold flex-shrink-0" style={{background:'rgba(99,102,241,0.15)', color:'#818cf8', border:'1px solid rgba(99,102,241,0.35)'}}>{empInitials(t.assigneeEmployeeId)||'?'}</div>
            )}
            {t.editorId && (
              <div title={'עורך: '+(suppliers.find(x=>x.id===t.editorId)?.name||'?')} className="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-bold flex-shrink-0" style={{background:'#1f1f23', color:'#fbbf24', border:'1px solid #3f2d04'}}>{supInitials(t.editorId)||'?'}</div>
            )}
            {!t.accountManagerId && !t.editorId && <span className="text-zinc-700 text-xs">—</span>}
          </div>

          {/* Date */}
          <div className="px-2 py-2.5 text-xs border-r border-zinc-800/40">
            {dateLabel ? (
              <span className={isOverdue?'text-red-400 font-semibold':u?'text-orange-300':'text-zinc-300'}>
                {t.shootDate?'🎬 ':''}{new Date(dateLabel).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'})}
              </span>
            ) : <span className="text-zinc-700">—</span>}
          </div>

          {/* Revisions */}
          <div className="px-2 py-2.5 flex items-center gap-1 justify-center text-[10px] text-zinc-600">
            {(t.revisions?.scriptRounds||0)>0 && <span title="תסריט">📝{t.revisions.scriptRounds}</span>}
            {(t.revisions?.videoRounds||0)>0 && <span title="וידאו">🎬{t.revisions.videoRounds}</span>}
            {(t.revisions?.videoRounds||0)>2 && <span className="text-red-400">⚠</span>}
          </div>
        </div>
      );
    }

    // Monday-style swimlane group
    function Swimlane({ stage, tasks, onOpen, onChangeStage, selId, employees, suppliers, onAddTask, isFirstShown }) {
      const s = stageById(stage);
      const isEmpty = tasks.length === 0;
      const [collapsed, setCollapsed] = useState(isEmpty);
      // keep open when tasks added or one is selected
      useEffect(()=>{ if (tasks.some(t=>t.id===selId)) setCollapsed(false); }, [selId]);
      return (
        <div className="mb-1">
          {/* Group header — calm: thin colored dot, neutral bg */}
          <div className="stage-group-hdr" style={{background:'#101012', borderTop:'1px solid #1f1f23'}} onClick={()=>setCollapsed(c=>!c)}>
            <span className="text-zinc-600 text-[10px] w-3">{collapsed?'▸':'▾'}</span>
            <span style={{width:6, height:6, borderRadius:'50%', background:s.bar, opacity:0.7, flexShrink:0}}></span>
            <span className="text-sm" style={{color:'#d4d4d8', fontWeight:500}}>{s.name}</span>
            <span className="text-xs" style={{color:'#71717a'}}>{tasks.length}</span>
            <span className="flex-1"></span>
            {!isEmpty && !collapsed && (
              <button onClick={e=>{e.stopPropagation(); onAddTask(stage);}} title="הוסף משימה בשלב זה"
                className="text-zinc-600 hover:text-zinc-300 text-xs bg-transparent border-0 cursor-pointer px-2 py-0.5">+</button>
            )}
          </div>

          {/* Column headers — only on first visible non-empty swimlane */}
          {!collapsed && tasks.length>0 && isFirstShown && (
            <div className="grid text-[10px] text-zinc-600 font-semibold uppercase tracking-wide border-b border-zinc-800/60 bg-zinc-950/60"
              style={{gridTemplateColumns:'4px 1fr 140px 130px 80px 110px 50px'}}>
              <div></div>
              <div className="px-3 py-1.5">משימה</div>
              <div className="px-3 py-1.5">לקוח</div>
              <div className="px-3 py-1.5">שלב</div>
              <div className="px-3 py-1.5">צוות</div>
              <div className="px-3 py-1.5">תאריך</div>
              <div className="px-3 py-1.5">סבב</div>
            </div>
          )}

          {!collapsed && (
            <>
              {tasks.length===0 ? (
                <div className="px-4 py-2.5 text-zinc-700 text-xs flex items-center gap-2">
                  <span>אין משימות בשלב זה</span>
                  <button onClick={e=>{e.stopPropagation(); onAddTask(stage);}} className="text-amber-500 hover:text-amber-400 text-xs bg-transparent border-0 cursor-pointer underline">+ הוסף</button>
                </div>
              ) : tasks.map(t=>(
                <TaskRow key={t.id} t={t} onOpen={()=>onOpen(t)} onChangeStage={onChangeStage} selected={t.id===selId} employees={employees} suppliers={suppliers} />
              ))}
            </>
          )}
        </div>
      );
    }

    // ─── Task Detail Panel (slide-in side panel) ────────────────────────────────
    /* ── Per-stage sub-panel field definitions ── */
    const STAGE_FIELDS = {
      1: { label:'בריף', fields:[ {key:'receivedAt',label:'תאריך קבלה',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      2: { label:'כתיבה', fields:[ {key:'writer',label:'כותב/ת',type:'text'}, {key:'deadline',label:'דדליין',type:'date'} ] },
      3: { label:'אישור תסריט', fields:[ {key:'sentTo',label:'נשלח ל',type:'text'}, {key:'sentAt',label:'תאריך שליחה',type:'date'}, {key:'responseDeadline',label:'תאריך מענה נדרש',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      4: { label:'קביעת צילום', fields:[ {key:'shootDate',label:'תאריך צילום',type:'date'}, {key:'shootTime',label:'שעת צילום',type:'time'}, {key:'location',label:'מיקום',type:'text'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      5: { label:'צילום', fields:[ {key:'photographer',label:'צלם/ת',type:'text'}, {key:'location',label:'מיקום',type:'text'}, {key:'deliveredAt',label:'תאריך מסירה',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      6: { label:'עריכה', fields:[ {key:'editor',label:'עורך/ת',type:'text'}, {key:'deadline',label:'דדליין',type:'date'}, {key:'deliveredAt',label:'תאריך מסירה',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      7: { label:'אישור סופרוויזר', fields:[ {key:'approvedBy',label:'אושר ע"י',type:'text'}, {key:'approvedAt',label:'תאריך אישור',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      8: { label:'אישור לקוח', fields:[ {key:'sentTo',label:'נשלח ל',type:'text'}, {key:'sentAt',label:'תאריך שליחה',type:'date'}, {key:'responseDeadline',label:'תאריך מענה נדרש',type:'date'}, {key:'approvedAt',label:'תאריך אישור',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      9: { label:'סגירה', fields:[ {key:'deliveredAt',label:'תאריך מסירה',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
    };

    function TaskPanel({ sel, form, F, user, clients=[], employees=[], suppliers=[], saving, savedDraft,
                         onSave, onClose, onDelete, onClearDraft, onAddAttachment, onRemoveAttachment, onAddRev }) {
      const isNew = !sel;
      const [editMode, setEditMode]         = useState(isNew);        // locked by default for existing tasks
      const [confirmDel, setConfirmDel]     = useState(false);        // 2-step delete
      const [openStage, setOpenStage]       = useState(null);         // which stage sub-panel is open

      // Auto-reset confirmDel when user clicks away
      const panelRef = React.useRef(null);
      React.useEffect(() => {
        if (!confirmDel) return;
        const handler = e => { if (panelRef.current && !panelRef.current.contains(e.target)) setConfirmDel(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [confirmDel]);

      // When a new task is opened, always start in edit mode; existing tasks start locked
      React.useEffect(() => { setEditMode(!sel); setConfirmDel(false); setOpenStage(null); }, [sel?.id]);

      const editors = (suppliers||[]).filter(s=>s.supplierRole==='עורך וידאו'||s.supplierRole==='עורך');
      const matchClient = clients.find(c=>c.name===form.client);
      const empName = id => { const e = employees.find(x=>x.id===id); return e?.name||e?.fullName||''; };
      const supName = id => suppliers.find(x=>x.id===id)?.name||'';
      const initials = name => (name||'').split(' ').map(w=>w[0]).join('').slice(0,2);
      const fmtDate = iso => { try { return new Date(iso).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}); } catch { return iso; } };
      const fmtShort = iso => { if(!iso) return '—'; try { return new Date(iso).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'}); } catch { return iso; } };
      const history = (sel?.stageHistory||[]).slice().reverse();
      const u = urgencyOf({stage:form.stage, shootDate:form.shootDate, dueDate:form.dueDate});

      const applyDefaults = () => {
        if (!matchClient) return;
        F({ accountManagerId: form.accountManagerId||matchClient.accountManagerId||'', editorId: form.editorId||matchClient.defaultEditorId||'' });
      };

      // Update stageData for a specific stage key
      const setSD = (stageId, key, val) => {
        F({ stageData: { ...(form.stageData||{}), [stageId]: { ...((form.stageData||{})[stageId]||{}), [key]: val } } });
      };
      const sd = stageId => (form.stageData||{})[stageId] || {};

      const prioMeta = { high:{label:'🔴 דחוף',bg:'rgba(239,68,68,0.13)',color:'#f87171',border:'rgba(239,68,68,0.3)'}, medium:{label:'🟡 רגיל',bg:'rgba(234,179,8,0.1)',color:'#fcd34d',border:'rgba(234,179,8,0.25)'}, low:{label:'🔵 נמוך',bg:'rgba(59,130,246,0.1)',color:'#60a5fa',border:'rgba(59,130,246,0.25)'} };
      const prio = prioMeta[form.priority] || prioMeta.medium;

      return (
        <div ref={panelRef} style={{display:'flex', flexDirection:'column', height:'100%', background:'#111113'}}>

          {/* ── Header ── */}
          <div style={{padding:'16px 16px 12px', borderBottom:'1px solid #27272a', flexShrink:0}}>
            <div style={{display:'flex', alignItems:'flex-start', gap:8}}>
              <div style={{flex:1, minWidth:0}}>
                {/* Title — always editable */}
                <input
                  className="w-full bg-transparent text-white font-bold border-0 focus:outline-none placeholder-zinc-600"
                  style={{fontSize:15, lineHeight:'1.4'}}
                  placeholder="שם המשימה *"
                  value={form.title}
                  onChange={e=>F({title:e.target.value})}
                  autoFocus={isNew}
                />
                {sel && (
                  <div style={{display:'flex', alignItems:'center', gap:6, marginTop:6, flexWrap:'wrap'}}>
                    <StatusPill stage={form.stage} onChange={editMode ? s=>F({stage:s}) : null} />
                    {form.client && <span style={{fontSize:11, padding:'2px 8px', borderRadius:6, background:'#27272a', color:'#d4d4d8'}}>{form.client}</span>}
                    {form.accountManagerId && (
                      <div title={'מנהל: '+empName(form.accountManagerId)} style={{width:20,height:20,borderRadius:'50%',background:'#2563eb',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#fff',fontWeight:'bold',flexShrink:0}}>
                        {initials(empName(form.accountManagerId))||'?'}
                      </div>
                    )}
                    {form.editorId && (
                      <div title={'עורך: '+supName(form.editorId)} style={{width:20,height:20,borderRadius:'50%',background:'#ea580c',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,color:'#fff',fontWeight:'bold',flexShrink:0}}>
                        {initials(supName(form.editorId))||'?'}
                      </div>
                    )}
                    {!editMode && <span style={{fontSize:10, padding:'2px 6px', borderRadius:4, background:'rgba(113,113,122,0.2)', color:'#71717a'}}>נעול לצפייה</span>}
                  </div>
                )}
              </div>

              {/* Header action buttons */}
              <div style={{display:'flex', alignItems:'center', gap:6, flexShrink:0}}>
                {/* Edit lock toggle — only for existing tasks */}
                {sel && (
                  <button
                    onClick={()=>setEditMode(m=>!m)}
                    title={editMode ? 'נעל עריכה' : 'ערוך'}
                    style={{
                      height:32, padding:'0 10px', display:'flex', alignItems:'center', gap:5,
                      background: editMode ? 'rgba(251,191,36,0.15)' : 'rgba(113,113,122,0.15)',
                      border: editMode ? '1px solid rgba(251,191,36,0.4)' : '1px solid rgba(113,113,122,0.3)',
                      borderRadius:6, cursor:'pointer',
                      color: editMode ? '#fbbf24' : '#71717a', fontSize:12, fontWeight:600
                    }}
                  >
                    {editMode ? '🔓 עריכה' : '✏️ עריכה'}
                  </button>
                )}

                {/* 2-step delete */}
                {sel && !confirmDel && (
                  <button
                    onClick={()=>setConfirmDel(true)}
                    title="מחק משימה"
                    style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(113,113,122,0.1)',border:'1px solid rgba(113,113,122,0.25)',cursor:'pointer',borderRadius:6,color:'#71717a',fontSize:16,transition:'all .15s'}}
                    onMouseEnter={e=>{e.currentTarget.style.color='#f87171';e.currentTarget.style.borderColor='rgba(248,113,113,0.4)';}}
                    onMouseLeave={e=>{e.currentTarget.style.color='#71717a';e.currentTarget.style.borderColor='rgba(113,113,122,0.25)';}}
                  >🗑</button>
                )}
                {sel && confirmDel && (
                  <button
                    onClick={onDelete}
                    title="לחץ שוב לאישור מחיקה"
                    style={{height:32,padding:'0 12px',display:'flex',alignItems:'center',gap:5,background:'rgba(239,68,68,0.2)',border:'1px solid rgba(239,68,68,0.5)',borderRadius:6,cursor:'pointer',color:'#f87171',fontSize:12,fontWeight:700,animation:'pulse 0.5s ease-in-out infinite alternate'}}
                  >🗑 בטוח?</button>
                )}

                <button onClick={onClose} title="סגור" style={{width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(113,113,122,0.1)',border:'1px solid rgba(113,113,122,0.25)',cursor:'pointer',borderRadius:6,color:'#a1a1aa',fontSize:16,fontWeight:'bold'}} onMouseEnter={e=>e.currentTarget.style.color='#fff'} onMouseLeave={e=>e.currentTarget.style.color='#a1a1aa'}>✕</button>
              </div>
            </div>
          </div>

          {/* ── Urgency bar ── */}
          {u && (
            <div style={{padding:'6px 16px', flexShrink:0, fontSize:11, fontWeight:600, display:'flex', alignItems:'center', gap:6, background: u.level==='critical'?'rgba(239,68,68,0.12)':'rgba(249,115,22,0.1)', color: u.level==='critical'?'#fca5a5':'#fdba74'}}>
              🔥 {u.reason}
            </div>
          )}

          {/* ── Draft notice ── */}
          {savedDraft && (
            <div style={{margin:'12px 16px 0', padding:'8px 12px', background:'rgba(245,158,11,0.1)', border:'1px solid rgba(245,158,11,0.3)', borderRadius:8, color:'#fcd34d', fontSize:11, display:'flex', alignItems:'center', gap:8, flexShrink:0}}>
              <span>💾</span>
              <span>טיוטה שוחזרה אוטומטית</span>
              <button onClick={onClearDraft} style={{marginRight:'auto',color:'#fbbf24',background:'transparent',border:0,cursor:'pointer',fontSize:11,textDecoration:'underline'}}>מחק טיוטה</button>
            </div>
          )}

          {/* ── Scrollable body ── */}
          <div style={{flex:1, overflowY:'auto', padding:'16px'}}>

            {/* ── Client + Priority (locked until editMode) ── */}
            {editMode ? (
              <div style={{padding:14, background:'rgba(251,191,36,0.04)', border:'1px solid rgba(251,191,36,0.18)', borderRadius:12, marginBottom:14}}>
                <div style={{fontSize:11, color:'#fbbf24', marginBottom:12, fontWeight:700, display:'flex', alignItems:'center', gap:6}}>✏️ <span>מצב עריכה</span></div>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:10}}>
                  <div>
                    <label className={CL.label}>לקוח</label>
                    <select className={CL.input} value={form.client} onChange={e=>F({client:e.target.value})}>
                      <option value="">— בחר לקוח —</option>
                      {clients.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className={CL.label}>עדיפות</label>
                    <select className={CL.input} value={form.priority} onChange={e=>F({priority:e.target.value})}>
                      <option value="high">🔴 דחוף</option>
                      <option value="medium">🟡 רגיל</option>
                      <option value="low">🔵 נמוך</option>
                    </select>
                  </div>
                </div>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, marginBottom:10}}>
                  <div>
                    <label className={CL.label}>🎬 צילום</label>
                    <input type="date" className={CL.input} value={form.shootDate} onChange={e=>F({shootDate:e.target.value})} />
                  </div>
                  <div>
                    <label className={CL.label}>🕐 שעה</label>
                    <input type="time" className={CL.input} value={form.shootTime} onChange={e=>F({shootTime:e.target.value})} />
                  </div>
                  <div>
                    <label className={CL.label}>📅 מסירה</label>
                    <input type="date" className={CL.input} value={form.dueDate} onChange={e=>F({dueDate:e.target.value})} />
                  </div>
                </div>
                {/* Team in edit mode */}
                <div style={{borderTop:'1px solid rgba(251,191,36,0.15)', paddingTop:10}}>
                  <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
                    <span style={{fontSize:11, color:'#a1a1aa', fontWeight:600}}>👥 שיוך צוות</span>
                    {matchClient && (matchClient.accountManagerId||matchClient.defaultEditorId) && (
                      <button onClick={applyDefaults} style={{fontSize:10,color:'#fbbf24',background:'transparent',border:0,cursor:'pointer',textDecoration:'underline'}}>החל ברירות מחדל</button>
                    )}
                  </div>
                  <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
                    <div>
                      <label className={CL.label}>מנהל תיק</label>
                      <select className={CL.input} value={form.accountManagerId} onChange={e=>F({accountManagerId:e.target.value})}>
                        <option value="">— ללא —</option>
                        {employees.map(e=><option key={e.id} value={e.id}>{e.name||e.fullName||'(ללא שם)'}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className={CL.label}>עורך וידאו{form.stage>=6&&<span style={{color:'#fbbf24'}}> *</span>}</label>
                      <select className={CL.input+(form.stage>=6&&!form.editorId?' ring-1 ring-amber-500/40':'')} value={form.editorId} onChange={e=>F({editorId:e.target.value})}>
                        <option value="">— ללא —</option>
                        {editors.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{marginTop:8}}>
                    <label className={CL.label}>👤 משוייך לעובד (חלוקת עבודה)</label>
                    <select className={CL.input} value={form.assigneeEmployeeId} onChange={e=>F({assigneeEmployeeId:e.target.value})}>
                      <option value="">— ללא שיוך ספציפי —</option>
                      {employees.map(e=><option key={e.id} value={e.id}>{e.name||e.fullName||'(ללא שם)'}</option>)}
                    </select>
                  </div>
                  {form.stage>=6&&!form.editorId&&<div style={{marginTop:6,fontSize:10,color:'#fcd34d'}}>⚠️ המשימה בשלב עריכה — נדרש לשייך עורך</div>}
                </div>
              </div>
            ) : (
              /* ── Read-only info card ── */
              <div style={{marginBottom:14}}>

                {/* Client + Priority row */}
                <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10}}>
                  <div style={{display:'flex', alignItems:'center', gap:10, minWidth:0}}>
                    <div style={{width:40, height:40, borderRadius:12, background:'rgba(37,99,235,0.15)', border:'1px solid rgba(37,99,235,0.25)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0}}>🏢</div>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:10, color:'#71717a', marginBottom:2}}>לקוח</div>
                      <div style={{fontSize:16, fontWeight:700, color: form.client ? '#fff' : '#52525b', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {form.client || '— לא הוגדר —'}
                      </div>
                    </div>
                  </div>
                  <div style={{padding:'6px 14px', borderRadius:20, fontSize:12, fontWeight:700, flexShrink:0, marginRight:8, background:prio.bg, color:prio.color, border:`1px solid ${prio.border}`}}>
                    {prio.label}
                  </div>
                </div>

                {/* Dates — two big blocks */}
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10}}>
                  <div style={{padding:'10px 14px', background:'rgba(16,185,129,0.06)', border:'1px solid rgba(16,185,129,0.15)', borderRadius:10}}>
                    <div style={{fontSize:10, color:'#6ee7b7', marginBottom:4, fontWeight:600}}>🎬 יום צילום</div>
                    <div style={{fontSize:15, fontWeight:700, color: form.shootDate ? '#fff' : '#52525b'}}>
                      {form.shootDate ? new Date(form.shootDate+'T12:00').toLocaleDateString('he-IL',{day:'numeric', month:'long'}) : '—'}
                    </div>
                    {form.shootTime && <div style={{fontSize:12, color:'#a1a1aa', marginTop:2}}>⏰ {form.shootTime}</div>}
                    {!form.shootDate && !form.shootTime && <div style={{fontSize:11, color:'#3f3f46'}}>לא נקבע</div>}
                  </div>
                  <div style={{padding:'10px 14px', background:'rgba(59,130,246,0.06)', border:'1px solid rgba(59,130,246,0.15)', borderRadius:10}}>
                    <div style={{fontSize:10, color:'#93c5fd', marginBottom:4, fontWeight:600}}>📅 תאריך מסירה</div>
                    <div style={{fontSize:15, fontWeight:700, color: form.dueDate ? '#fff' : '#52525b'}}>
                      {form.dueDate ? new Date(form.dueDate+'T12:00').toLocaleDateString('he-IL',{day:'numeric', month:'long'}) : '—'}
                    </div>
                    {!form.dueDate && <div style={{fontSize:11, color:'#3f3f46', marginTop:2}}>לא נקבע</div>}
                  </div>
                </div>

                {/* Team avatars */}
                <div style={{display:'flex', alignItems:'center', gap:8, padding:'10px 14px', background:'rgba(24,24,27,0.6)', border:'1px solid #27272a', borderRadius:10}}>
                  {/* Account manager */}
                  <div style={{display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0}}>
                    <div style={{width:34, height:34, borderRadius:'50%', background: form.accountManagerId ? '#1d4ed8' : '#27272a', display:'flex', alignItems:'center', justifyContent:'center', fontSize: form.accountManagerId ? 12 : 16, color:'#fff', fontWeight:700, flexShrink:0}}>
                      {form.accountManagerId ? (initials(empName(form.accountManagerId))||'?') : '👤'}
                    </div>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:9, color:'#71717a', marginBottom:1}}>מנהל/ת תיק</div>
                      <div style={{fontSize:12, color: form.accountManagerId ? '#e4e4e7' : '#52525b', fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {form.accountManagerId ? empName(form.accountManagerId) : 'לא שויך'}
                      </div>
                    </div>
                  </div>
                  <div style={{width:1, height:32, background:'#3f3f46', flexShrink:0}}></div>
                  {/* Editor */}
                  <div style={{display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0}}>
                    <div style={{width:34, height:34, borderRadius:'50%', background: form.editorId ? '#c2410c' : '#27272a', display:'flex', alignItems:'center', justifyContent:'center', fontSize: form.editorId ? 12 : 16, color:'#fff', fontWeight:700, flexShrink:0}}>
                      {form.editorId ? (initials(supName(form.editorId))||'?') : '🎬'}
                    </div>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:9, color:'#71717a', marginBottom:1}}>עורך/ת וידאו</div>
                      <div style={{fontSize:12, color: form.editorId ? '#e4e4e7' : '#52525b', fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {form.editorId ? supName(form.editorId) : 'לא שויך'}
                      </div>
                    </div>
                  </div>
                </div>
                {form.stage>=6&&!form.editorId&&<div style={{marginTop:6,fontSize:11,color:'#fcd34d',display:'flex',alignItems:'center',gap:5}}>⚠️ בשלב עריכה — נדרש לשייך עורך</div>}
              </div>
            )}

            {/* Calendar sync notice */}
            {form.shootDate && (
              <div style={{marginBottom:14, fontSize:11, display:'flex', alignItems:'center', gap:8}}>
                {calConsented.get()
                  ? <span style={{color:'#34d399'}}>📅 יסונכרן ביומן בעת שמירה</span>
                  : <span style={{color:'#71717a'}}>📅 <span style={{color:'#fbbf24'}}>הגדרות ← יומן Google</span> להפעלה</span>
                }
                {sel?.calendarHtmlLink && <a href={sel.calendarHtmlLink} target="_blank" rel="noreferrer" style={{color:'#60a5fa',textDecoration:'underline',marginRight:'auto'}}>פתח ביומן ↗</a>}
              </div>
            )}

            {/* ── Stage pipeline with sub-panels ── */}
            <div style={{marginBottom:14, padding:12, background:'rgba(24,24,27,0.5)', border:'1px solid #27272a', borderRadius:10}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
                <span style={{fontSize:11, color:'#a1a1aa', fontWeight:600}}>📍 שלב בפייפליין</span>
                <span style={{fontSize:10, color:'#71717a'}}>{form.stage}/9</span>
              </div>
              {/* Stage pills row — clickable to open sub-panel */}
              <div style={{display:'flex', gap:4, flexWrap:'wrap', marginBottom: openStage ? 10 : 0}}>
                {STAGES.map(s => {
                  const past = s.id < form.stage;
                  const isCur = s.id === form.stage;
                  const hasData = Object.keys(sd(s.id)).some(k => sd(s.id)[k]);
                  const isOpen = openStage === s.id;
                  return (
                    <button
                      key={s.id}
                      onClick={() => { setOpenStage(isOpen ? null : s.id); if(editMode && isCur===false) F({stage:s.id}); }}
                      title={s.name}
                      style={{
                        display:'flex', alignItems:'center', gap:3, padding:'4px 7px', borderRadius:6,
                        border: isOpen ? '1px solid #fbbf24' : isCur ? '1px solid rgba(251,191,36,0.5)' : '1px solid #27272a',
                        background: isOpen ? 'rgba(251,191,36,0.15)' : isCur ? 'rgba(251,191,36,0.08)' : past ? 'rgba(16,185,129,0.06)' : 'rgba(39,39,42,0.4)',
                        color: isOpen ? '#fbbf24' : isCur ? '#fcd34d' : past ? '#6ee7b7' : '#52525b',
                        cursor:'pointer', fontSize:11, fontWeight: isCur ? 700 : 500, position:'relative',
                        transition:'all .15s'
                      }}
                    >
                      <span>{past && !isCur ? '✓' : s.emoji}</span>
                      <span style={{display:'none'}}>{s.name}</span>
                      {hasData && <span style={{width:5,height:5,borderRadius:'50%',background:'#fbbf24',flexShrink:0}} title="יש נתונים"></span>}
                      {(() => {
                        const owner = (form.stageOwners||{})[s.id];
                        if (!owner) return null;
                        const [kind, oid] = owner.split(':');
                        const list = kind === 'sup' ? suppliers : employees;
                        const p = list.find(x => x.id === oid);
                        if (!p) return null;
                        const initials = (p.name||'').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('');
                        const bg = kind === 'sup' ? 'rgba(167,139,250,0.18)' : 'rgba(96,165,250,0.18)';
                        const fg = kind === 'sup' ? '#a78bfa' : '#60a5fa';
                        return <span title={`אחראי: ${p.name}`} style={{ marginRight:2, width:14, height:14, borderRadius:'50%', background:bg, color:fg, fontSize:8, fontWeight:700, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>{initials}</span>;
                      })()}
                    </button>
                  );
                })}
              </div>
              <div style={{fontSize:10, color:'#71717a', marginBottom: openStage ? 10 : 0}}>
                {STAGES.find(s=>s.id===form.stage)?.emoji} {STAGES.find(s=>s.id===form.stage)?.name} — לחץ על שלב לפרטים
              </div>

              {/* Stage sub-panel */}
              {openStage && STAGE_FIELDS[openStage] && (
                <div style={{padding:12, background:'rgba(9,9,11,0.6)', border:'1px solid rgba(251,191,36,0.2)', borderRadius:8, marginTop:4}}>
                  <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10, gap:8, flexWrap:'wrap'}}>
                    <div style={{fontSize:11, color:'#fbbf24', fontWeight:600}}>
                      {STAGES.find(s=>s.id===openStage)?.emoji} {STAGE_FIELDS[openStage].label} — פרטי שלב
                    </div>
                    {/* Stage owner picker — who in the team owns this stage */}
                    <div style={{display:'flex', alignItems:'center', gap:6}}>
                      <span style={{fontSize:10, color:'#71717a'}}>אחראי:</span>
                      <select
                        value={(form.stageOwners||{})[openStage] || ''}
                        onChange={e => F({ stageOwners: { ...(form.stageOwners||{}), [openStage]: e.target.value } })}
                        style={{ background:'#0c0c0e', border:'1px solid #27272a', borderRadius:6, color:'#fafafa', padding:'4px 8px', fontSize:11, cursor:'pointer', maxWidth:200 }}
                      >
                        <option value="">— ללא —</option>
                        <optgroup label="עובדים">
                          {employees.map(e => <option key={'e-'+e.id} value={'emp:'+e.id}>{e.name || e.email}</option>)}
                        </optgroup>
                        {suppliers.length > 0 && (
                          <optgroup label="ספקים / עורכים">
                            {suppliers.map(s => <option key={'s-'+s.id} value={'sup:'+s.id}>{s.name}</option>)}
                          </optgroup>
                        )}
                      </select>
                    </div>
                  </div>
                  <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8}}>
                    {STAGE_FIELDS[openStage].fields.map(f => {
                      const val = sd(openStage)[f.key] || '';
                      return (
                        <div key={f.key} style={f.type==='textarea' ? {gridColumn:'1/-1'} : {}}>
                          <label className={CL.label}>{f.label}</label>
                          {f.type==='textarea'
                            ? <textarea className={CL.input} rows={2} value={val} onChange={e=>setSD(openStage,f.key,e.target.value)} placeholder={f.label+'...'} />
                            : <input type={f.type} className={CL.input} value={val} onChange={e=>setSD(openStage,f.key,e.target.value)} placeholder={f.type==='text'?f.label+' ...':''} />
                          }
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>

            {/* Brief / Notes */}
            <div style={{marginBottom:14}}>
              <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:6}}>
                <label style={{fontSize:11, fontWeight:700, color:'#a1a1aa', letterSpacing:0.3}}>📋 בריף והנחיות לצוות</label>
                {form.notes && <span style={{fontSize:10, color:'#52525b'}}>{form.notes.length} תווים</span>}
              </div>
              <textarea
                className={CL.input}
                rows={8}
                style={{resize:'vertical', minHeight:180, lineHeight:1.75, fontSize:13}}
                placeholder={'מה הלקוח ביקש? הנחיות לצוות, רפרנסים, טון, קהל יעד...\n\nלדוגמה:\n• סרטון של 60 שניות לאינסטגרם\n• טון צעיר ודינמי\n• לכלול טקסטים בעברית'}
                value={form.notes}
                onChange={e=>F({notes:e.target.value})}
              />
            </div>

            {/* Attachments — existing tasks only */}
            {sel && (
              <div style={{marginBottom:14, padding:12, background:'rgba(24,24,27,0.5)', border:'1px solid #27272a', borderRadius:10}}>
                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
                  <span style={{fontSize:11, color:'#a1a1aa', fontWeight:600}}>📎 קישורים וקבצים</span>
                  <div className="relative group">
                    <button className="text-xs text-amber-400 hover:text-amber-300 bg-transparent border border-amber-500/30 rounded-lg px-2.5 py-1 cursor-pointer">+ הוסף</button>
                    <div className="absolute left-0 top-full mt-1 w-44 bg-zinc-950 border border-zinc-700 rounded-lg shadow-2xl z-10 hidden group-hover:block">
                      <button onClick={()=>onAddAttachment(sel,'drive')}  className="w-full text-right px-3 py-2 text-xs text-white hover:bg-zinc-800 bg-transparent border-0 cursor-pointer">📁 Google Drive</button>
                      <button onClick={()=>onAddAttachment(sel,'script')} className="w-full text-right px-3 py-2 text-xs text-white hover:bg-zinc-800 bg-transparent border-0 cursor-pointer">📝 תסריט / טקסט</button>
                      <button onClick={()=>onAddAttachment(sel,'video')}  className="w-full text-right px-3 py-2 text-xs text-white hover:bg-zinc-800 bg-transparent border-0 cursor-pointer">🎬 סרטון</button>
                      <button onClick={()=>onAddAttachment(sel,'folder')} className="w-full text-right px-3 py-2 text-xs text-white hover:bg-zinc-800 bg-transparent border-0 cursor-pointer">🗂️ תיקייה</button>
                      <button onClick={()=>onAddAttachment(sel,'link')}   className="w-full text-right px-3 py-2 text-xs text-white hover:bg-zinc-800 bg-transparent border-0 cursor-pointer">🔗 קישור אחר</button>
                    </div>
                  </div>
                </div>
                {(sel.links||[]).length===0
                  ? <div style={{fontSize:11, color:'#52525b'}}>אין קישורים עדיין</div>
                  : <div style={{display:'flex', flexDirection:'column', gap:6}}>
                      {(sel.links||[]).slice().sort((a,b)=>(b.addedAt||'').localeCompare(a.addedAt||'')).map(l=>{
                        const icons={drive:'📁',script:'📝',video:'🎬',folder:'🗂️',link:'🔗'};
                        return (
                          <div key={l.id||l.url} className="attach-item" style={{display:'flex',alignItems:'center',gap:8,fontSize:12,background:'rgba(9,9,11,0.5)',border:'1px solid #27272a',borderRadius:8,padding:'6px 10px'}}>
                            <span>{icons[l.type]||'🔗'}</span>
                            <a href={l.url} target="_blank" rel="noreferrer" style={{color:'#93c5fd',textDecoration:'underline',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.label||l.url}</a>
                            <button onClick={()=>onRemoveAttachment(sel,l)} className="attach-remove" style={{color:'#52525b',background:'transparent',border:0,cursor:'pointer'}} onMouseEnter={e=>e.currentTarget.style.color='#f87171'} onMouseLeave={e=>e.currentTarget.style.color='#52525b'}>✕</button>
                          </div>
                        );
                      })}
                    </div>
                }
              </div>
            )}

            {/* Revisions — existing tasks only */}
            {sel && (
              <div style={{marginBottom:14, padding:12, background:'rgba(24,24,27,0.5)', border:'1px solid #27272a', borderRadius:10}}>
                <div style={{fontSize:11, color:'#a1a1aa', fontWeight:600, marginBottom:8}}>🔄 סבבי תיקונים</div>
                <div style={{display:'flex', alignItems:'center', gap:16, flexWrap:'wrap'}}>
                  <div style={{display:'flex', alignItems:'center', gap:6, fontSize:12, color:'#d4d4d8'}}>
                    <span>📝 תסריט: {sel.revisions?.scriptRounds||0}</span>
                    <button onClick={()=>onAddRev(sel,'script')} style={{color:'#fbbf24',background:'transparent',border:0,cursor:'pointer',fontWeight:'bold',fontSize:16,lineHeight:1}}>+</button>
                  </div>
                  <div style={{display:'flex', alignItems:'center', gap:6, fontSize:12, color:'#d4d4d8'}}>
                    <span>🎬 וידאו: {sel.revisions?.videoRounds||0}</span>
                    <button onClick={()=>onAddRev(sel,'video')} style={{color:'#fbbf24',background:'transparent',border:0,cursor:'pointer',fontWeight:'bold',fontSize:16,lineHeight:1}}>+</button>
                  </div>
                  {(sel.revisions?.videoRounds||0)>2 && <Badge label={`⚠️ +${sel.revisions.videoRounds-2} מעבר ל-2`} color="red" />}
                </div>
              </div>
            )}

            {/* Stage history — existing tasks, collapsible */}
            {sel && history.length>0 && (
              <details style={{marginBottom:12}}>
                <summary style={{cursor:'pointer', fontSize:11, color:'#71717a', listStyle:'none', userSelect:'none'}}>
                  📜 היסטוריית שלבים ({history.length})
                </summary>
                <div style={{marginTop:8, padding:10, background:'#09090b', border:'1px solid #27272a', borderRadius:8, maxHeight:160, overflowY:'auto'}}>
                  {history.map((h,i)=>{
                    const stg = STAGES.find(s=>s.id===h.stage);
                    return (
                      <div key={i} style={{display:'flex', alignItems:'center', gap:6, fontSize:11, color:'#a1a1aa', marginBottom:4}}>
                        <span>{stg?.emoji||'•'}</span>
                        <span style={{fontWeight:500}}>{stg?.name||`שלב ${h.stage}`}</span>
                        <span style={{color:'#3f3f46'}}>·</span>
                        <span style={{color:'#52525b'}}>{fmtDate(h.at)}</span>
                        {h.by && <><span style={{color:'#3f3f46'}}>·</span><span style={{color:'#52525b',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.by}</span></>}
                      </div>
                    );
                  })}
                </div>
              </details>
            )}

            {/* Metadata */}
            {sel && (
              <div style={{fontSize:10, color:'#52525b', lineHeight:1.8}}>
                {sel.createdAt && <div>📅 נוצר: {fmtDate(sel.createdAt.toDate?.()||sel.createdAt)}</div>}
                {sel.updatedAt && <div>✏️ עדכון: {fmtDate(sel.updatedAt.toDate?.()||sel.updatedAt)}</div>}
              </div>
            )}
          </div>

          {/* ── Footer ── */}
          <div style={{padding:'12px 16px', borderTop:'1px solid #27272a', display:'flex', gap:8, flexShrink:0}}>
            <button onClick={onClose} className={CL.btn2} style={{flex:1}}>ביטול</button>
            <button onClick={onSave} className={CL.btn} style={{flex:1}} disabled={saving}>{saving?'שומר...':'💾 שמור'}</button>
          </div>
        </div>
      );
    }

    // Kanban card
    function KanbanCard({ t, onOpen, onDragStart, onDragEnd }) {
      const u = urgencyOf(t);
      const urgClass = u ? `urg-${u.level}` : '';
      const dateLabel = t.shootDate || t.dueDate;
      return (
        <div
          id={`task-${t.id}`}
          draggable
          onDragStart={e => { e.dataTransfer.setData('text/plain', t.id); e.currentTarget.classList.add('dragging'); onDragStart && onDragStart(t); }}
          onDragEnd={e => { e.currentTarget.classList.remove('dragging'); onDragEnd && onDragEnd(); }}
          onClick={onOpen}
          className={`kanban-card bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-700 rounded-lg p-2.5 mb-2 transition-all ${urgClass}`}
        >
          <div className="flex items-start gap-2 mb-1.5">
            <div className="w-7 h-7 rounded-md bg-zinc-800 flex-shrink-0 flex items-center justify-center text-sm">{stageById(t.stage||1).emoji}</div>
            <div className="min-w-0 flex-1">
              <div className="text-white text-sm font-semibold leading-tight truncate">{t.title || 'ללא שם'}</div>
              <div className="text-zinc-500 text-[11px] truncate">{t.client || '—'}</div>
            </div>
            {t.priority && t.priority!=='medium' && <PrioChip p={t.priority} />}
          </div>
          {u && (
            <div className={`text-[11px] mb-1.5 px-1.5 py-1 rounded font-semibold ${u.level==='critical'?'bg-red-500/15 text-red-300':'bg-orange-500/15 text-orange-300'}`}>
              🔥 {u.reason}
            </div>
          )}
          <div className="flex items-center justify-between text-[11px] text-zinc-500 mt-1.5 pt-1.5 border-t border-zinc-800/80">
            <div className="flex items-center gap-2">
              <span title="סבבי תסריט">📝{t.revisions?.scriptRounds||0}</span>
              <span title="סבבי וידאו">🎬{t.revisions?.videoRounds||0}</span>
            </div>
            {dateLabel && (
              <span className={u?.level==='critical' ? 'text-red-400 font-semibold' : u?.level==='warning' ? 'text-orange-400 font-semibold' : 'text-zinc-400'}>
                {t.shootDate ? '🎬 ' : ''}{new Date(dateLabel).toLocaleDateString('he-IL', {month:'short', day:'numeric'})}
              </span>
            )}
          </div>
        </div>
      );
    }

    // Kanban column
    function KanbanCol({ stage, tasks, onOpen, onDrop, onAdd }) {
      const s = stageById(stage);
      const [over, setOver] = useState(false);
      return (
        <div
          onDragOver={e => { e.preventDefault(); setOver(true); }}
          onDragLeave={() => setOver(false)}
          onDrop={e => { e.preventDefault(); setOver(false); const id = e.dataTransfer.getData('text/plain'); if (id) onDrop(id, stage); }}
          className={`kanban-col flex-shrink-0 w-64 flex flex-col rounded-lg p-2 ${over?'drag-over':''}`}
          style={{background:'rgba(24,24,27,0.5)', borderTop:`2px solid ${s.bar}`}}
        >
          <div className="flex items-center gap-2 mb-2 px-1">
            <span className="stage-dot" style={{background:s.dot}}></span>
            <span className="text-white text-xs font-bold flex-1">{s.name}</span>
            <span className="text-zinc-500 text-[11px]">{tasks.length}</span>
          </div>
          <button onClick={onAdd} className="text-zinc-500 hover:text-white text-xs py-1.5 mb-2 rounded-md border border-dashed border-zinc-800 hover:border-zinc-600 cursor-pointer bg-transparent transition-colors">+ הוסף משימה</button>
          <div className="flex-1 overflow-y-auto" style={{minHeight:100, maxHeight:'calc(100vh - 280px)'}}>
            {tasks.map(t => <KanbanCard key={t.id} t={t} onOpen={()=>onOpen(t)} />)}
          </div>
        </div>
      );
    }

    const BLANK_TASK = { title:'', client:'', stage:1, priority:'medium', dueDate:'', shootDate:'', shootTime:'', notes:'', accountManagerId:'', editorId:'', assigneeEmployeeId:'', stageData:{}, stageOwners:{} };
    const DRAFT_KEY  = id => `tingmedia.taskDraft.${id || 'new'}`;
    const isFormDirty = (form, sel) => {
      const base = sel ? { title:sel.title||'', client:sel.client||'', stage:sel.stage||1, priority:sel.priority||'medium', dueDate:sel.dueDate||'', shootDate:sel.shootDate||'', shootTime:sel.shootTime||'', notes:sel.notes||'', accountManagerId:sel.accountManagerId||'', editorId:sel.editorId||'', assigneeEmployeeId:sel.assigneeEmployeeId||'', stageData:sel.stageData||{}, stageOwners: sel.stageOwners||{} } : BLANK_TASK;
      return JSON.stringify(form) !== JSON.stringify(base);
    };

    function Tasks({ user, role, clients, employees=[], suppliers=[] }) {
      const [items,   setItems]   = useState([]);
      const [myEmployeeId, setMyEmployeeId] = useState('');
      const [lens, setLens] = useState('all'); // all | mine
      const [loading, setLoading] = useState(true);
      const [modal,   setModal]   = useState(false);
      const [sel,     setSel]     = useState(null);
      const [form,    setForm]    = useState(BLANK_TASK);
      const [saving,  setSaving]  = useState(false);
      const [savedDraft, setSavedDraft] = useState(false); // small "draft restored" toast

      // UI state
      const [view, setView]               = useState('list'); // list | kanban
      const [search, setSearch]           = useState('');
      const [clientFilter, setClientFilter]= useState('');
      const [prioFilter, setPrioFilter]   = useState('');
      const [sortBy, setSortBy]           = useState('updated'); // updated | due | title | priority

      useEffect(() => {
        if (!db||!user) return;
        return db.collection('tasks').where('userId','==',user.uid).onSnapshot(snap => {
          const d = snap.docs.map(x=>({id:x.id,...x.data()})).filter(t => !t.archived);
          setItems(d); setLoading(false);
        });
      }, [user]);

      // Load current user's linkedEmployeeId from /users (matched by email)
      useEffect(()=>{
        if (!db||!user?.email) return;
        return db.collection('users').where('email','==',user.email).onSnapshot(snap=>{
          const me = snap.docs[0]?.data();
          setMyEmployeeId(me?.linkedEmployeeId || '');
        });
      },[user]);

      // URL state for selected task
      useEffect(() => {
        const url = new URL(window.location.href);
        const id = url.searchParams.get('task');
        if (id && items.length && !modal) {
          const t = items.find(x=>x.id===id);
          if (t) openEdit(t);
        }
      }, [items]);

      // Auto-save draft to localStorage on every form change while modal is open
      useEffect(() => {
        if (!modal) return;
        if (!isFormDirty(form, sel)) return;
        try { localStorage.setItem(DRAFT_KEY(sel?.id), JSON.stringify(form)); } catch(e){}
      }, [form, modal, sel]);

      const F = f => setForm(p=>({...p,...f}));

      const setUrlTask = id => {
        const url = new URL(window.location.href);
        if (id) url.searchParams.set('task', id); else url.searchParams.delete('task');
        window.history.replaceState({}, '', url);
      };

      const openNew = (preStage) => {
        setSel(null);
        // Try to restore unsaved draft for "new"
        let initial = { ...BLANK_TASK, stage: preStage || 1 };
        try {
          const draft = localStorage.getItem(DRAFT_KEY(null));
          if (draft) { initial = JSON.parse(draft); setSavedDraft(true); setTimeout(()=>setSavedDraft(false), 4000); }
        } catch(e){}
        setForm(initial);
        setModal(true);
      };
      const openEdit = t => {
        setSel(t);
        setUrlTask(t.id);
        let initial = { title:t.title||'', client:t.client||'', stage:t.stage||1, priority:t.priority||'medium', dueDate:t.dueDate||'', shootDate:t.shootDate||'', shootTime:t.shootTime||'', notes:t.notes||'', accountManagerId:t.accountManagerId||'', editorId:t.editorId||'', assigneeEmployeeId:t.assigneeEmployeeId||'', stageData:t.stageData||{} };
        try {
          const draft = localStorage.getItem(DRAFT_KEY(t.id));
          if (draft) { initial = JSON.parse(draft); setSavedDraft(true); setTimeout(()=>setSavedDraft(false), 4000); }
        } catch(e){}
        setForm(initial);
        setModal(true);
      };

      // Safe close — confirms if dirty, else closes silently
      const closeModal = (forceDiscard) => {
        if (!forceDiscard && isFormDirty(form, sel)) {
          if (!window.confirm('יש שינויים שלא נשמרו. הטיוטה תישמר אוטומטית — האם לסגור?')) return;
        }
        // If user discards explicitly, clear draft. Otherwise keep it.
        if (forceDiscard) { try { localStorage.removeItem(DRAFT_KEY(sel?.id)); } catch(e){} }
        setModal(false);
        setUrlTask(null);
      };

      const save = async () => {
        if (!form.title.trim()) { alert('שם המשימה חובה'); return; }
        if (form.stage>=6 && !form.editorId) {
          if (!window.confirm('המשימה בשלב עריכה אך לא הוגדר עורך. האם להמשיך בכל זאת?')) return;
        }
        setSaving(true);
        try {
          let newId = null;
          let savedTaskRef = null;
          if (sel) {
            const updates = {...form, updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
            // Log history if stage changed via the form
            if (sel.stage !== form.stage) {
              updates.stageHistory = firebase.firestore.FieldValue.arrayUnion({
                stage: form.stage, at: new Date().toISOString(), by: user.email||'?'
              });
            }
            await db.collection('tasks').doc(sel.id).update(updates);
            savedTaskRef = db.collection('tasks').doc(sel.id);
          } else {
            // Auto-populate assignees from client defaults
            const matchingClient = clients.find(c=>c.name===form.client);
            const defaults = matchingClient ? {
              accountManagerId: matchingClient.accountManagerId||'',
              editorId: matchingClient.defaultEditorId||'',
            } : {};
            const ref = await db.collection('tasks').add({
              ...form, ...defaults, userId:user.uid,
              revisions:{scriptRounds:0,videoRounds:0},
              stageHistory: [{ stage: form.stage||1, at: new Date().toISOString(), by: user.email||'?' }],
              createdAt:firebase.firestore.FieldValue.serverTimestamp(),
              updatedAt:firebase.firestore.FieldValue.serverTimestamp()
            });
            newId = ref.id;
            savedTaskRef = ref;
          }
          // Saved successfully — drop the draft
          try { localStorage.removeItem(DRAFT_KEY(sel?.id)); } catch(e){}

          // 📅 Google Calendar sync — only if shootDate set and user has connected calendar
          if (form.shootDate && calToken.get() && savedTaskRef) {
            try {
              const taskForCal = { ...form, calendarEventId: sel?.calendarEventId };
              const ev = await calUpsert(taskForCal, form.client);
              if (ev?.id && ev.id !== sel?.calendarEventId) {
                await savedTaskRef.update({ calendarEventId: ev.id, calendarHtmlLink: ev.htmlLink||'' });
              }
            } catch(e){ console.warn('Calendar sync failed:', e); alert('שמור — אך סנכרון ליומן נכשל: '+e.message); }
          }

          // 📧 Email notification — send to assigned employee/editor when task created or assignee changed
          try {
            const prevAccountMgr = sel?.accountManagerId || '';
            const prevEditor     = sel?.editorId || '';
            const prevAssignee   = sel?.assigneeEmployeeId || '';
            const taskId = newId || sel?.id;
            const taskTitle = form.title || '(ללא שם)';
            const clientName = form.client || '';
            const assignerName = user.displayName || user.email || 'טינג מדיה';
            const allUsers = (await db.collection('users').get()).docs.map(d=>({id:d.id,...d.data()}));
            const allEmps  = employees;

            // Helper: find email for an employee ID
            const empEmail = (empId) => {
              if (!empId) return null;
              const emp = allEmps.find(e=>e.id===empId);
              if (!emp) return null;
              const u = allUsers.find(u=>u.linkedEmployeeId===empId || u.email===emp.email);
              return u?.email || emp.email || null;
            };
            const empName = (empId) => {
              const emp = allEmps.find(e=>e.id===empId);
              return emp?.name || emp?.fullName || '';
            };

            // Send to accountManager if newly assigned
            if (form.accountManagerId && form.accountManagerId !== prevAccountMgr) {
              const email = empEmail(form.accountManagerId);
              if (email) await sendTaskAssignedEmail({ toEmail:email, toName:empName(form.accountManagerId), taskTitle, clientName, assignerName, taskId });
            }
            // Send to general assignee if newly assigned
            if (form.assigneeEmployeeId && form.assigneeEmployeeId !== prevAssignee) {
              const email = empEmail(form.assigneeEmployeeId);
              if (email && email !== empEmail(form.accountManagerId)) {
                await sendTaskAssignedEmail({ toEmail:email, toName:empName(form.assigneeEmployeeId), taskTitle, clientName, assignerName, taskId });
              }
            }
          } catch(emailErr) { console.warn('Email notification error:', emailErr); }

          // For new tasks, navigate to detail page (keep modal open with the new task)
          if (newId) {
            setUrlTask(newId);
            // The items snapshot will fire shortly; openEdit will run via the URL effect
            setModal(false);
          } else {
            setModal(false); setUrlTask(null);
          }
        } catch(e){ alert('שגיאה: '+e.message); } finally { setSaving(false); }
      };

      const del  = async id => {
        if(!window.confirm('להעביר לארכיון? תוכל לשחזר מתפריט "ארכיון".')) return;
        const t = items.find(x=>x.id===id);
        // Soft delete — set archived flag, keep the record
        await db.collection('tasks').doc(id).update({
          archived: true,
          archivedAt: firebase.firestore.FieldValue.serverTimestamp(),
          archivedBy: user.uid,
        });
        try { localStorage.removeItem(DRAFT_KEY(id)); } catch(e){}
        setModal(false); setUrlTask(null);
      };

      const promptEditorForStage6 = (currentEditorId) => {
        const editors = (suppliers||[]).filter(s=>s.supplierRole==='עורך וידאו'||s.supplierRole==='עורך');
        if (editors.length === 0) return { editorId: currentEditorId || '', cancelled: false };
        const cur = editors.find(e=>e.id===currentEditorId);
        const list = editors.map((e,i)=>`${i+1}. ${e.name}`).join('\n');
        const msg = `🎬 מעבר לשלב עריכה — איזה עורך מטפל?\n\n${list}\n\nהקלד מספר (או השאר ריק לביטול)${cur?` · נוכחי: ${cur.name}`:''}`;
        const choice = window.prompt(msg, currentEditorId? String(editors.findIndex(e=>e.id===currentEditorId)+1):'1');
        if (!choice) return { cancelled: true };
        const idx = parseInt(choice,10)-1;
        if (isNaN(idx) || idx<0 || idx>=editors.length) return { cancelled: true };
        return { editorId: editors[idx].id, editorName: editors[idx].name, cancelled:false };
      };

      const setStage = async (t, stage) => {
        if (t.stage === stage) return;
        const updates = {
          stage,
          stageHistory: firebase.firestore.FieldValue.arrayUnion({stage, at:new Date().toISOString(), by:user.email||'?'}),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        };
        // Stage 6 = עריכה — require editor assignment
        if (stage===6 && !t.editorId) {
          const r = promptEditorForStage6(t.editorId);
          if (r.cancelled) return;
          if (r.editorId) { updates.editorId = r.editorId; if (r.editorName) updates.editorName = r.editorName; }
        }
        await db.collection('tasks').doc(t.id).update(updates);
      };
      const setStageById = async (id, stage) => {
        const t = items.find(x=>x.id===id);
        if (t) return setStage(t, stage);
        await db.collection('tasks').doc(id).update({
          stage,
          stageHistory: firebase.firestore.FieldValue.arrayUnion({stage, at:new Date().toISOString(), by:user.email||'?'}),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        });
      };

      const addRev = async (t, type) => {
        const field = type==='script' ? 'revisions.scriptRounds' : 'revisions.videoRounds';
        const cur   = type==='script' ? (t.revisions?.scriptRounds||0) : (t.revisions?.videoRounds||0);
        await db.collection('tasks').doc(t.id).update({[field]:cur+1, updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      };

      // 📎 Attachments — add a link/file ref to the task's links array
      const addAttachment = async (t, type) => {
        const labels = { drive:'קישור ל-Google Drive', script:'קישור לתסריט', link:'קישור', video:'קישור לסרטון', folder:'תיקייה' };
        const label = window.prompt('כותרת קצרה: (לדוגמה "תסריט גרסה 2")', labels[type]||'קישור');
        if (label===null) return;
        const url = window.prompt('הדבק כתובת URL:');
        if (!url) return;
        if (!/^https?:\/\//i.test(url)) { alert('הכתובת חייבת להתחיל ב-http:// או https://'); return; }
        const item = { id: 'l_'+Date.now().toString(36), type, label: label.trim()||(labels[type]||'קישור'), url, addedAt: new Date().toISOString(), addedBy: user.email||'?' };
        await db.collection('tasks').doc(t.id).update({
          links: firebase.firestore.FieldValue.arrayUnion(item),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      };
      const removeAttachment = async (t, item) => {
        if (!window.confirm('להסיר את הקישור?')) return;
        await db.collection('tasks').doc(t.id).update({
          links: firebase.firestore.FieldValue.arrayRemove(item),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      };

      // Build lookup of clients managed by current user
      const myClientNames = useMemo(()=>{
        if (!myEmployeeId) return null; // no link → see all
        return new Set(clients.filter(c=>c.accountManagerId===myEmployeeId).map(c=>c.name));
      },[clients, myEmployeeId]);

      // Filter + sort
      const filtered = items.filter(t => {
        if (search && !((t.title||'').toLowerCase().includes(search.toLowerCase()) || (t.client||'').toLowerCase().includes(search.toLowerCase()))) return false;
        if (clientFilter && t.client !== clientFilter) return false;
        if (prioFilter && t.priority !== prioFilter) return false;
        if (lens==='mine' && myClientNames && !myClientNames.has(t.client) && t.assigneeEmployeeId!==myEmployeeId && t.editorId!==myEmployeeId) return false;
        return true;
      });
      const sorted = [...filtered].sort((a,b) => {
        if (sortBy==='due')      return (a.dueDate||'9999')>(b.dueDate||'9999')?1:-1;
        if (sortBy==='title')    return (a.title||'').localeCompare(b.title||'');
        if (sortBy==='priority') return ({high:0,medium:1,low:2}[a.priority||'medium']) - ({high:0,medium:1,low:2}[b.priority||'medium']);
        return (b.updatedAt?.toMillis()||0)-(a.updatedAt?.toMillis()||0);
      });
      const byStage = stage => sorted.filter(t => (t.stage||1)===stage);

      // Stats for header
      const totalOpen = items.filter(t=>(t.stage||1)<8).length;
      const overdueCnt = items.filter(t => t.dueDate && (t.stage||1)<8 && new Date(t.dueDate) < new Date(new Date().toDateString())).length;

      // 🔥 Fires — tasks with active urgency, sorted by severity then days
      const fires = useMemo(() => {
        const arr = items.map(t => ({t, u: urgencyOf(t)})).filter(x => x.u);
        arr.sort((a,b) => {
          if (a.u.level !== b.u.level) return a.u.level==='critical' ? -1 : 1;
          return (a.u.days||0) - (b.u.days||0);
        });
        return arr;
      }, [items]);

      const scrollToTask = id => {
        const el = document.getElementById(`task-${id}`);
        if (el) {
          el.scrollIntoView({behavior:'smooth', block:'center'});
          el.style.outline = '2px solid #fbbf24';
          setTimeout(()=>{ el.style.outline = ''; }, 2000);
        }
      };

      return (
        <div className="-m-6 flex flex-col" style={{background:'#09090b', height:'100%'}}>

          {/* ── Top section: header + toolbar + fires ── */}
          <div className="px-6 pt-6 pb-3 flex-shrink-0">
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="text-xl font-black text-white">משימות</h2>
                <div className="flex items-center gap-3 mt-1 text-xs text-zinc-500">
                  <span>{items.length} משימות</span>
                  <span>·</span>
                  <span className="text-zinc-300">{totalOpen} פתוחות</span>
                  {overdueCnt > 0 && (<><span>·</span><span className="text-red-400">⚠️ {overdueCnt} באיחור</span></>)}
                </div>
              </div>
            </div>

            {/* Toolbar */}
            <div className="flex items-center gap-1 mb-4 bg-zinc-900/50 border border-zinc-800 rounded-xl p-1.5">
              <TBBtn primary onClick={()=>openNew()} icon={<span>＋</span>}>משימה חדשה</TBBtn>
              <div className="w-px h-5 bg-zinc-800 mx-1"></div>
              <div className="relative flex items-center">
                <span className="absolute right-2.5 text-zinc-500 text-xs pointer-events-none">🔍</span>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="חיפוש..." className="bg-transparent text-white text-xs px-3 py-1.5 pr-7 w-36 border-0 focus:outline-none" />
              </div>
              <select value={clientFilter} onChange={e=>setClientFilter(e.target.value)} className="bare bg-transparent text-zinc-300 text-xs px-2 py-1.5 cursor-pointer hover:text-white border-0 focus:outline-none">
                <option value="">כל הלקוחות</option>
                {clients.map(c=><option key={c.id} value={c.name} className="bg-zinc-900">{c.name}</option>)}
              </select>
              <select value={prioFilter} onChange={e=>setPrioFilter(e.target.value)} className="bare bg-transparent text-zinc-300 text-xs px-2 py-1.5 cursor-pointer hover:text-white border-0 focus:outline-none">
                <option value="">כל העדיפויות</option>
                <option value="high" className="bg-zinc-900">דחוף</option>
                <option value="medium" className="bg-zinc-900">רגיל</option>
                <option value="low" className="bg-zinc-900">נמוך</option>
              </select>
              <select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="bare bg-transparent text-zinc-300 text-xs px-2 py-1.5 cursor-pointer hover:text-white border-0 focus:outline-none">
                <option value="updated" className="bg-zinc-900">⇅ עדכון אחרון</option>
                <option value="due" className="bg-zinc-900">⇅ תאריך יעד</option>
                <option value="title" className="bg-zinc-900">⇅ שם</option>
                <option value="priority" className="bg-zinc-900">⇅ עדיפות</option>
              </select>
              <div className="flex-1"></div>
              {myEmployeeId && (
                <div className="flex items-center bg-zinc-950 rounded-lg border border-zinc-800 p-0.5 ml-2">
                  <TBBtn active={lens==='all'}  onClick={()=>setLens('all')}  icon={<span>🌐</span>}>כל המשרד</TBBtn>
                  <TBBtn active={lens==='mine'} onClick={()=>setLens('mine')} icon={<span>👤</span>}>שלי</TBBtn>
                </div>
              )}
              <div className="flex items-center bg-zinc-950 rounded-lg border border-zinc-800 p-0.5">
                <TBBtn active={view==='list'}   onClick={()=>setView('list')}   icon={<span>☰</span>}>רשימה</TBBtn>
                <TBBtn active={view==='kanban'} onClick={()=>setView('kanban')} icon={<span>⊞</span>}>קנבן</TBBtn>
              </div>
            </div>

            {/* Urgency strip — calm, single line, expandable */}
            {!loading && fires.length > 0 && (() => {
              const [showAll, setShowAll] = [false, ()=>{}]; // simple non-state for now
              const display = fires.slice(0, 4);
              const more = fires.length - display.length;
              return (
                <div className="mb-3 flex items-center gap-3 px-3 py-1.5 rounded-lg" style={{background:'#101012', border:'1px solid #1f1f23', borderRight:'2px solid #ef4444'}}>
                  <span style={{fontSize:11, color:'#71717a'}}>דורש תשומת לב</span>
                  <span style={{fontSize:11, color:'#52525b'}}>·</span>
                  <div className="flex flex-wrap gap-x-3 gap-y-1 flex-1 min-w-0">
                    {display.map(({t,u})=>(
                      <button key={t.id} onClick={()=>scrollToTask(t.id)}
                        style={{background:'transparent', border:0, padding:0, cursor:'pointer', display:'flex', alignItems:'center', gap:6, fontSize:12}}>
                        <span style={{width:5, height:5, borderRadius:'50%', background: u.level==='critical' ? '#ef4444' : '#f59e0b'}} />
                        <span style={{color:'#d4d4d8'}}>{t.title||'ללא שם'}</span>
                        <span style={{color:'#71717a', fontSize:11}}>{u.reason}</span>
                      </button>
                    ))}
                    {more > 0 && <span style={{fontSize:11, color:'#52525b'}}>+{more} נוספות</span>}
                  </div>
                </div>
              );
            })()}

            {/* Loading / Empty */}
            {loading && <div className="text-center py-10 text-zinc-500 text-sm">טוען...</div>}
            {!loading && items.length===0 && (
              <div className="text-center py-16 text-zinc-500 border border-dashed border-zinc-800 rounded-xl">
                <div className="text-5xl mb-3">📭</div>
                <p className="text-sm mb-3">אין משימות עדיין</p>
                <button onClick={()=>openNew()} className={CL.btn}>+ צור משימה ראשונה</button>
              </div>
            )}
          </div>{/* end top section */}

          {/* ── Board area: list / kanban + side panel ── */}
          {!loading && items.length>0 && (
            <div style={{display:'flex', flex:1, minHeight:0}} dir="ltr">

              {/* List / Kanban */}
              <div dir="rtl" style={{flex:1, overflowY:'auto', overflowX:'hidden'}}>
                {view==='list' && (
                  <div className="px-6 pb-8">
                    {(() => {
                      let firstNonEmptyShown = false;
                      return STAGES.map(s => {
                        const tasks = byStage(s.id);
                        const isFirst = !firstNonEmptyShown && tasks.length > 0;
                        if (isFirst) firstNonEmptyShown = true;
                        return (
                          <Swimlane
                            key={s.id}
                            stage={s.id}
                            tasks={tasks}
                            onOpen={openEdit}
                            onChangeStage={setStage}
                            selId={modal ? sel?.id : null}
                            employees={employees}
                            suppliers={suppliers}
                            onAddTask={openNew}
                            isFirstShown={isFirst}
                          />
                        );
                      });
                    })()}
                  </div>
                )}
                {view==='kanban' && (
                  <div style={{overflowX:'auto', padding:'0 24px 32px'}}>
                    <div className="flex gap-3" style={{minWidth:'max-content'}} dir="ltr">
                      {STAGES.map(s=>(
                        <div dir="rtl" key={s.id}>
                          <KanbanCol stage={s.id} tasks={byStage(s.id)} onOpen={openEdit}
                            onDrop={(id,stage)=>setStageById(id,stage)} onAdd={()=>openNew(s.id)} />
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* Task Panel — drawer on narrow, side panel on wide (CSS media query) */}
              {modal && (
                <>
                  <div className="task-panel-backdrop" onClick={()=>closeModal(false)} />
                  <div dir="rtl" className="task-panel-wrap">
                  <TaskPanel
                    sel={sel}
                    form={form}
                    F={F}
                    user={user}
                    clients={clients}
                    employees={employees}
                    suppliers={suppliers}
                    saving={saving}
                    savedDraft={savedDraft}
                    onSave={save}
                    onClose={()=>closeModal(false)}
                    onDelete={()=>del(sel.id)}
                    onClearDraft={()=>{
                      try{localStorage.removeItem(DRAFT_KEY(sel?.id));}catch(e){}
                      setForm(sel

                        : BLANK_TASK);
                      setSavedDraft(false);
                    }}
                    onAddAttachment={addAttachment}
                    onRemoveAttachment={removeAttachment}
                    onAddRev={addRev}

                  </div>
                </>
              )}
            </div>
          )}

        </div>
      );
    }

    /* ── CLIENTS ── */
    function Clients({ user, role, projects=[], expenses=[], tasks=[], employees=[], suppliers=[] }) {
      const [items,   setItems]   = useState([]);

      const [modal,   setModal]   = useState(false);

      const [form, setForm] = useState(blank);
      const [saving, setSaving] = useState(false);

      const F = f => setForm(p=>({...p,...f}));

      useEffect(()=>{
        if (!db||!user) return;

          setItems(snap.docs.map(x=>({id:x.id,...x.data()})));

        });

      const addScopeItem = () => F({ scopeOfWork: [...(form.scopeOfWork||[]), { id:Math.random().toString(36).slice(2), contentType:'סרטון YouTube', quantity:1, notes:'' }] });
      const removeScopeItem = id => F({ scopeOfWork: (form.scopeOfWork||[]).filter(i=>i.id!==id) });

      const del      = async id => { if(!window.confirm('למחוק לקוח זה?')) return; await db.collection('clients').doc(id).delete(); };

      const save = async () => {
        if (!form.name.trim()) return;
        setSaving(true);
        try {
          const d = {...form, retainerAmount:Number(form.retainerAmount)||0, userId:user.uid, updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
          if (sel) await db.collection('clients').doc(sel.id).update(d);

        const projectIds = new Set(cProjects.map(p=>p.id));
        const projectCosts = expenses.filter(e=>projectIds.has(e.projectId)).reduce((s,e)=>s+(Number(e.amount)||0),0);
        const openTasks = tasks.filter(t=>t.client===name && (t.stage||1)<FINAL_STAGE).length;
        return { projectCount:cProjects.length, projectRevenue, projectCosts, openTasks };

                  {items.map(c=>{
                    const st = clientStats(c.id);

                    <tr key={c.id} className="border-t border-zinc-800/60 hover:bg-zinc-900/40">

                      {showFin && <td className="px-4 py-3 text-emerald-400 text-sm font-medium">{c.retainerAmount?`₪${Number(c.retainerAmount).toLocaleString()}`:'-'}</td>}
