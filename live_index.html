<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TING MEDIA - מערכת ניהול</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script crossorigin="anonymous" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            zinc: {
              950: 'var(--bg)',
              900: 'var(--surface)',
              800: 'var(--border)',
              700: 'var(--border2)',
              600: 'var(--text-muted)',
              500: 'var(--text-muted)',
              400: 'var(--text-sub)',
              300: 'var(--text-sub)',
              200: 'var(--text)',
              100: 'var(--text)',
              50: 'var(--text)',
            },
            amber: {
              500: 'var(--accent)',
              400: 'var(--accent)',
              300: 'var(--accent)',
            },
          }
        }
      }
    }
  </script>
  <script crossorigin="anonymous" integrity="sha384-BkEIW/B4JV9w6pRfBRgZtAcYDk5goH1nUI49rLo8s5PSHgTfgxWBczRVJx+fv5kP" src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script crossorigin="anonymous" integrity="sha384-96KlrabK9X4T/tq4duY+/4JE60jZAiSs4QVJFwmY30ETT24x2+89B7qmq7O4IETX" src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script crossorigin="anonymous" integrity="sha384-LF74FIj8PQKxRVken52qSHntBSVEC6b05H04maSVJibifVGmWz9Ajc23WjrRVSCX" src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    :root {
      --bg: #0B0C14; --surface: #13141F; --surface2: #0E0F1A;
      --border: #1E2035; --border2: #2A2D48; --hover: #191B2E;
      --text: #EDF0FF; --text-sub: #9BA3C0; --text-muted: #3D4265;
      --accent: #8B5CF6; --accent-glow: rgba(139,92,246,0.22); --accent-dim: rgba(139,92,246,0.12);
      --red: #F43F5E; --red-dim: rgba(244,63,94,0.12);
      --card-shadow: 0 1px 3px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.2);
      --card-shadow-hover: 0 4px 16px rgba(0,0,0,0.45), 0 2px 4px rgba(0,0,0,0.3);
    }
    html[data-theme="light"] {
      --bg: #F2F4FA; --surface: #FFFFFF; --surface2: #EAEDf7;
      --border: #D8DCEE; --border2: #BFC6DC; --hover: #EEF0FB;
      --text: #10152B; --text-sub: #3E4663; --text-muted: #6E7795;
      --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --card-shadow-hover: 0 4px 16px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.06);
    }
    *, *::before, *::after { font-family: 'Heebo', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    /* ── READABILITY: bump tiny font utilities app-wide ── */
    .text-xs { font-size: 12.5px !important; line-height: 1.5 !important; }
    .text-sm { font-size: 14.5px !important; line-height: 1.55 !important; }
    .text-\[9px\], .text-\[9\.5px\], .text-\[10px\], .text-\[10\.5px\] { font-size: 11.5px !important; line-height: 1.4 !important; }
    .text-\[11px\], .text-\[11\.5px\] { font-size: 12.5px !important; line-height: 1.45 !important; }
    body { background: var(--bg); color: var(--text); color-scheme: dark; background-image: radial-gradient(ellipse at 90% 0%, rgba(139,92,246,0.05) 0%, transparent 55%); }
    body, body * { transition: background-color 0.25s ease, border-color 0.25s ease, color 0.18s ease; }
    select, option, input, textarea { transition: none; }
    select { color-scheme: dark; }
    option { background: var(--surface); color: var(--text); }
    /* ── LIGHT MODE overrides (applied via data-theme="light" on <html>) ── */
    html[data-theme="light"] body { color-scheme: light; background-image: none; }
    html[data-theme="light"] select, html[data-theme="light"] option { color-scheme: light; }
    /* Fix hardcoded-dark inline-style elements in light mode */
    html[data-theme="light"] .stage-group-hdr { background: var(--bg) !important; border-top-color: var(--border) !important; }
    html[data-theme="light"] .monday-row { border-bottom-color: var(--border) !important; }
    html[data-theme="light"] .task-panel { background: var(--surface) !important; }
    html[data-theme="light"] .sidebar { box-shadow: 2px 0 12px rgba(0,0,0,0.08); }
    /* Light mode: fix text-white inline classes in panel */
    html[data-theme="light"] .task-panel-wrap .text-white { color: var(--text) !important; }
    html[data-theme="light"] .task-panel-wrap .text-zinc-200 { color: var(--text) !important; }
    html[data-theme="light"] .task-panel-wrap .text-zinc-300 { color: var(--text-sub) !important; }
    html[data-theme="light"] .topbar { background: var(--bg) !important; }
    html[data-theme="light"] .content-area h2, html[data-theme="light"] h2.text-white { color: var(--text) !important; }
    /* ── LIGHT MODE: remap hardcoded dark Tailwind utilities app-wide ── */
    html[data-theme="light"] .text-white, html[data-theme="light"] .text-zinc-100, html[data-theme="light"] .text-zinc-200 { color: var(--text) !important; }
    html[data-theme="light"] .text-zinc-300, html[data-theme="light"] .text-zinc-400 { color: var(--text-sub) !important; }
    html[data-theme="light"] .text-zinc-500 { color: #49506E !important; }
    /* Light mode: give cards subtle elevation for hierarchy */
    html[data-theme="light"] .bg-zinc-900\/60.rounded-xl, html[data-theme="light"] .bg-zinc-900\/40.rounded-xl { box-shadow: var(--card-shadow); }
    html[data-theme="light"] .text-zinc-600, html[data-theme="light"] .text-zinc-700 { color: var(--text-muted) !important; }
    html[data-theme="light"] .hover\:text-white:hover, html[data-theme="light"] .hover\:text-zinc-300:hover { color: var(--text) !important; }
    html[data-theme="light"] .bg-zinc-900, html[data-theme="light"] .bg-zinc-900\/40, html[data-theme="light"] .bg-zinc-900\/50, html[data-theme="light"] .bg-zinc-900\/60, html[data-theme="light"] .bg-zinc-900\/80, html[data-theme="light"] .bg-zinc-950, html[data-theme="light"] .bg-zinc-950\/60 { background-color: var(--surface) !important; }
    html[data-theme="light"] .bg-zinc-800, html[data-theme="light"] .bg-zinc-800\/30, html[data-theme="light"] .bg-zinc-800\/40, html[data-theme="light"] .bg-zinc-800\/50, html[data-theme="light"] .bg-zinc-800\/60, html[data-theme="light"] .bg-zinc-700, html[data-theme="light"] .bg-zinc-700\/40 { background-color: var(--surface2) !important; }
    html[data-theme="light"] .hover\:bg-zinc-900:hover, html[data-theme="light"] .hover\:bg-zinc-900\/40:hover, html[data-theme="light"] .hover\:bg-zinc-800:hover, html[data-theme="light"] .hover\:bg-zinc-800\/60:hover, html[data-theme="light"] .hover\:bg-zinc-700:hover { background-color: var(--hover) !important; }
    html[data-theme="light"] .border-zinc-600, html[data-theme="light"] .border-zinc-600\/40, html[data-theme="light"] .border-zinc-700, html[data-theme="light"] .border-zinc-700\/60, html[data-theme="light"] .border-zinc-800, html[data-theme="light"] .border-zinc-800\/40, html[data-theme="light"] .border-zinc-800\/60 { border-color: var(--border) !important; }
    html[data-theme="light"] .hover\:border-zinc-700:hover { border-color: var(--border2) !important; }
    html[data-theme="light"] .bg-black\/70 { background-color: rgba(20,24,46,0.45) !important; }
    html[data-theme="light"] .placeholder-zinc-600::placeholder { color: var(--text-muted) !important; }
    html[data-theme="light"] .from-zinc-900, html[data-theme="light"] .to-zinc-900, html[data-theme="light"] .to-zinc-900\/40, html[data-theme="light"] .to-zinc-900\/60, html[data-theme="light"] .via-zinc-900\/80 { background-image: none !important; background-color: var(--surface2) !important; }
    /* theme-toggle button */
    .theme-toggle {
      width:32px; height:32px; border-radius:8px; border:1px solid var(--border2);
      background:var(--surface2); cursor:pointer; font-size:16px;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.15s; flex-shrink:0;
    }
    .theme-toggle:hover { background:var(--hover); border-color:var(--accent); transform:scale(1.08); }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    textarea { resize: vertical; }
    /* Smooth collapse animation - overflow visible so portaled dropdowns work; collapsed state is hidden via display */
    .swimlane-body { transition: opacity .2s ease; }
    .swimlane-body.collapsed { display:none; }
    /* Urgency pulses */
    @keyframes pulseRed   { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.55), inset 3px 0 0 #ef4444} 50%{box-shadow:0 0 0 6px rgba(239,68,68,0), inset 3px 0 0 #ef4444} }
    @keyframes pulseAmber { 0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,0.45), inset 3px 0 0 #f97316} 50%{box-shadow:0 0 0 5px rgba(249,115,22,0), inset 3px 0 0 #f97316} }
    /* Subtle urgency: tiny left rail, no animation, no full-row tint */
    .urg-critical { box-shadow: inset 3px 0 0 #ef4444; }
    .urg-warning  { box-shadow: inset 3px 0 0 #f59e0b; }
    /* MyWork — refined design system */
    .mywork-row { transition: background .12s, transform .12s; }
    .mywork-row:hover { background:var(--hover) !important; transform: translateY(-1px); }
    .mywork-row:hover .mywork-actions { opacity: 1 !important; }
    .mywork-bucket { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; position:relative; transition: border-color .15s, box-shadow .15s; box-shadow: var(--card-shadow); }
    .mywork-bucket::before { content:''; position:absolute; top:0; right:0; width:3px; height:100%; }
    .mywork-bucket.b-overdue::before { background:#ef4444; }
    .mywork-bucket.b-today::before   { background:#f59e0b; }
    .mywork-bucket.b-week::before    { background:#60a5fa; }
    .mywork-bucket.b-later::before   { background:var(--text-sub); }
    .mywork-bucket.b-done::before    { background:#22c55e; }
    .mywork-bucket-head { display:flex; align-items:center; gap:8px; padding:10px 18px 10px 14px; cursor:pointer; user-select:none; transition: background .15s; }
    .mywork-bucket-head:hover { background:var(--hover); }
    .mywork-count { font-size:11px; font-weight:600; padding:2px 8px; border-radius:99px; background:var(--border2); color:var(--text-sub); }
    .b-overdue .mywork-count { background:rgba(239,68,68,0.12); color:#ef4444; }
    .b-today .mywork-count   { background:rgba(245,158,11,0.12); color:#f59e0b; }
    .b-week .mywork-count    { background:rgba(96,165,250,0.10); color:#60a5fa; }
    .b-done .mywork-count    { background:rgba(34,197,94,0.10); color:#22c55e; }
    .mywork-task-list { border-top:1px solid var(--border); }
    .mywork-task-list .mywork-row { padding:10px 18px 10px 14px; border-bottom:1px solid var(--border); }
    .mywork-task-list .mywork-row:last-child { border-bottom:none; }
    .mywork-check { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--border2); flex-shrink:0; cursor:pointer; transition: border-color .15s, background .15s; display:flex; align-items:center; justify-content:center; font-size:10px; color:#22c55e; background:transparent; }
    .mywork-check:hover { border-color:var(--accent); }
    .mywork-check.checked { background:rgba(34,197,94,0.10); border-color:#22c55e; }
    .mywork-client-chip { font-size:11px; color:var(--text-sub); background:var(--border2); padding:2px 8px; border-radius:4px; white-space:nowrap; }
    .mywork-stage-pill { font-size:10.5px; font-weight:500; padding:2px 8px; border-radius:4px; white-space:nowrap; }
    .mywork-due { font-size:11px; color:var(--text-sub); white-space:nowrap; min-width:56px; text-align:center; }
    .mywork-due.overdue { color:#ef4444; font-weight:500; }
    .mywork-due.today { color:#f59e0b; font-weight:500; }
    .mywork-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:20px; overflow:hidden; box-shadow: var(--card-shadow); }
    .mywork-panel-head { display:flex; align-items:center; justify-content:space-between; padding:13px 18px; border-bottom:1px solid var(--border); background: var(--surface2); }
    .workload-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(210px, 1fr)); gap:1px; background:var(--border); }
    .workload-card { background:var(--surface); padding:16px 18px; transition: background .15s, transform .15s, box-shadow .15s; border-radius: 0; border-right: 3px solid transparent; }
    .workload-card:hover { background:var(--hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.15); border-right-color: var(--accent); }
    .workload-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; flex-shrink:0; }
    .wa-am { background:rgba(96,165,250,0.15); color:#60a5fa; border:1.5px solid rgba(96,165,250,0.25); }
    .wa-editor { background:rgba(167,139,250,0.15); color:#a78bfa; border:1.5px solid rgba(167,139,250,0.25); }
    .mywork-quick-add:focus-within { border-color:var(--accent) !important; box-shadow:0 0 0 3px var(--accent-dim); }
    /* Responsive task panel — drawer on narrow screens, side panel on wide */
    .task-panel-wrap {
      width: clamp(440px, 36vw, 640px);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100%;
      overflow: hidden;
      border-right: 1px solid var(--border);
      animation: slideInRight .18s ease-out;
      background: var(--bg);
    }
    .task-panel-backdrop { display: none; }
    @media (max-width: 1099px) {
      .task-panel-wrap {
        position: fixed;
        top: 0; right: 0; bottom: 0; left: 0;
        width: 100vw !important;
        height: 100vh;
        z-index: 9000;
        border-right: 0;
      }
      .task-panel-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 8999;
      }
    }
    .urg-dot-critical { background:#ef4444; }
    .urg-dot-warning  { background:#f97316; }
    /* Fires banner */
    .fire-icon { filter:drop-shadow(0 0 4px rgba(239,68,68,0.55)); }
    /* Drag visuals */
    .kanban-card[draggable="true"] { cursor:grab; }
    .kanban-card.dragging { opacity:.4; cursor:grabbing; }
    .kanban-col.drag-over { background: var(--accent-dim); outline:1px dashed var(--accent-glow); }
    /* Kanban theme-aware overrides */
    .kanban-card { background:var(--surface) !important; border-color:var(--border) !important; color:var(--text); }
    .kanban-card:hover { background:var(--hover) !important; border-color:var(--border2) !important; }
    .kanban-card .kanban-emoji-box { background:var(--surface2) !important; }
    .kanban-card .kanban-title { color:var(--text) !important; }
    .kanban-card .kanban-client { color:var(--text-muted) !important; }
    .kanban-card .kanban-footer { color:var(--text-muted) !important; border-top-color:var(--border) !important; }
    .kanban-card .kanban-date { color:var(--text-sub) !important; }
    .kanban-col-inner { background:var(--surface2); border-radius:10px; padding:8px; }
    .kanban-col-head-title { color:var(--text) !important; }
    .kanban-col-head-count { color:var(--text-muted) !important; }
    .kanban-col-add-btn { color:var(--text-muted) !important; border-color:var(--border2) !important; background:transparent; }
    .kanban-col-add-btn:hover { color:var(--text) !important; border-color:var(--border) !important; }
    /* Stage dot */
    .stage-dot { width:8px; height:8px; border-radius:9999px; flex-shrink:0; display:inline-block; }
    /* Native select arrow remove */
    select.bare { -webkit-appearance:none; appearance:none; }
    /* Task panel slide-in */
    .task-panel { border-left:1px solid var(--border); background:var(--surface); height:100%; overflow-y:auto; }
    @keyframes slideInRight { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
    .task-panel { animation: slideInRight .18s ease-out; }
    /* Monday-style task row */
    .monday-row { display:grid; align-items:center; border-bottom:1px solid var(--border); min-height:40px; cursor:pointer; transition:background .1s; }
    .monday-row:hover { background:var(--hover); }
    .monday-row.selected { background:var(--accent-dim); border-bottom-color:var(--accent-glow); }
    .monday-row.urg-critical { border-right:3px solid var(--red) !important; background:rgba(244,63,94,0.05); }
    .monday-row.urg-warning  { border-right:3px solid #f59e0b !important; background:rgba(245,158,11,0.04); }
    .monday-row.urg-critical:hover { background:rgba(244,63,94,0.09) !important; }
    .monday-row.urg-warning:hover  { background:rgba(245,158,11,0.08) !important; }
    .monday-row .prio-bar { width:4px; align-self:stretch; flex-shrink:0; border-radius:0; }
    /* Stage group header */
    .stage-group-hdr { display:flex; align-items:center; gap:8px; padding:6px 12px; cursor:pointer; user-select:none; position:sticky; top:0; z-index:2; }
    .stage-group-hdr:hover { filter:brightness(1.1); }
    /* Inline editable field */
    .field-chip { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:6px; border:1px solid transparent; cursor:pointer; transition:all .15s; font-size:12px; }
    .field-chip:hover { border-color:var(--border2); background:var(--hover); }
    .field-chip.editing { border-color:var(--accent); background:var(--accent-dim); }
    /* Attachment hover */
    .attach-item:hover .attach-remove { opacity:1; }
    .attach-remove { opacity:0; transition:opacity .15s; }
    /* Drive spinner */
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DESIGN SYSTEM: Layout ── */
    .layout { display:flex; min-height:100vh; background:var(--bg); color:var(--text); }

    /* ── DESIGN SYSTEM: Sidebar ── */
    .sidebar {
      width:232px; flex-shrink:0; background:var(--surface2);
      border-left:1px solid var(--border); display:flex; flex-direction:column;
      position:sticky; top:0; height:100vh; overflow-y:auto; z-index:10;
    }
    @media (max-width: 1024px) {
      .sidebar { width:60px; }
      .sidebar-nav { padding:6px 4px; }
      .nav-item { padding:8px 6px; font-size:0; justify-content:center; }
      .nav-item span:first-child { font-size:18px; }
      .nav-section-label { display:none; }
      .sidebar-logo .logo-text, .sidebar-logo .logo-sub { display:none; }
    }
    .sidebar-logo {
      padding:16px 14px 12px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:10px;
    }
    .logo-mark {
      width:34px; height:34px; background:var(--accent); border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:11px; color:#fff; flex-shrink:0;
      letter-spacing:0.05em;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1) inset, 0 2px 8px var(--accent-glow);
    }
    .logo-text { font-weight:800; font-size:13px; letter-spacing:0.1em; color:var(--text); text-transform:uppercase; }
    .logo-sub { font-size:9.5px; color:var(--text-muted); letter-spacing:0.05em; margin-top:1px; }
    .sidebar-nav { padding:8px 6px; flex:1; overflow-y:auto; }
    .nav-section-label {
      font-size:9px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase;
      color:var(--text-muted); padding:14px 10px 4px; pointer-events:none;
    }
    .nav-section-label:first-child { padding-top:8px; }
    .nav-item {
      display:flex; align-items:center; gap:9px; padding:8px 10px;
      border-radius:7px; font-size:13.5px; color:var(--text-sub);
      cursor:pointer; transition:background 0.1s, color 0.1s;
      user-select:none; border:none; background:transparent; width:100%;
      text-align:right; font-family:'Heebo',sans-serif; margin-bottom:2px;
      line-height:1.3;
    }
    .nav-item:hover { background:var(--hover); color:var(--text); }
    .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 700;
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .nav-item-icon { width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; opacity:0.7; color:var(--text-sub); transition:opacity 0.15s, color 0.15s; }
    .nav-item-icon svg { width:16px; height:16px; stroke:currentColor; }
    .nav-item:hover .nav-item-icon { opacity:0.9; color:var(--text); }
    .nav-item.active .nav-item-icon { opacity:1; color:var(--accent); }

  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    /* ── FIREBASE ── */
    const firebaseConfig = {

    /* ── EMAIL NOTIFICATIONS (EmailJS) ──
       Set credentials in Settings → הגדרות → התראות מייל
       Or paste here directly:
       1. Go to emailjs.com → create free account → connect Gmail
       2. Create template with vars: {{to_email}}, {{to_name}}, {{task_title}}, {{client_name}}, {{assigner_name}}, {{task_link}}, {{notification_type}}, {{extra_info}}
       3. Paste Public Key, Service ID and template IDs in Settings                */
    const _ejsKeys = () => {
      try { return JSON.parse(localStorage.getItem('tingmedia.emailjs')||'{}'); } catch{ return {}; }
    };
    const EMAILJS_ENABLED = () => { const k=_ejsKeys(); return !!(k.publicKey && k.serviceId && k.templateId && typeof emailjs!=='undefined'); };
    // Init on load if keys stored
    try { const k=_ejsKeys(); if(k.publicKey&&typeof emailjs!=='undefined') emailjs.init(k.publicKey); } catch(e){}

    // Generic email sender — all notification types go through this
    async function sendEmail({ toEmail, toName, taskTitle='', clientName='', assignerName='TING MEDIA CRM', taskId='', notificationType='משימה חדשה', extraInfo='' }) {
      if (!EMAILJS_ENABLED() || !toEmail) return;
      const k = _ejsKeys();
      try {
        await emailjs.send(k.serviceId, k.templateId, {
          to_email:          toEmail,
          to_name:           toName || toEmail,
          task_title:        taskTitle || '(ללא שם)',
          client_name:       clientName || '',
          assigner_name:     assignerName,
          task_link:         window.location.origin + window.location.pathname + (taskId ? `?task=${taskId}` : ''),
          notification_type: notificationType,
          extra_info:        extraInfo,
          app_name:          'TING MEDIA CRM',
        });
        console.log(`📧 Email [${notificationType}] → ${toEmail}`);
      } catch(e) { console.warn('EmailJS failed:', e); }
    }

    // Shorthand helpers for specific notification types
    const sendTaskAssignedEmail   = p => sendEmail({ ...p, notificationType:'🆕 משימה חדשה שויכה אליך' });
    const sendTaskReminderEmail   = p => sendEmail({ ...p, notificationType:'⏰ תזכורת — משימה קרובה' });
    const sendStageChangedEmail   = p => sendEmail({ ...p, notificationType:'📍 שלב משימה עודכן' });
    const sendSubTaskAssignedEmail= p => sendEmail({ ...p, notificationType:'📤 הופצה אליך משימת צוות' });
    const sendMonthlyTasksCreated = p => sendEmail({ ...p, notificationType:'🗓 משימות חודשיות נוצרו' });

    // ── Check for shoot-date reminders on login (runs once per session)
    async function checkShootReminders(userEmail, tasks=[], employees=[]) {
      if (!EMAILJS_ENABLED()) return;
      const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
      const tomorrowStr = tomorrow.toISOString().split('T')[0];
      const sentKey = `tingmedia.reminderSent.${tomorrowStr}`;
      if (localStorage.getItem(sentKey)) return; // already sent today
      const dueTomorrow = tasks.filter(t => t.shootDate===tomorrowStr && (t.stage||1)<9);
      for (const t of dueTomorrow) {
        const emp = employees.find(e=>e.id===t.accountManagerId);
        if (emp?.email) {
          await sendTaskReminderEmail({ toEmail:emp.email, toName:emp.name||emp.fullName, taskTitle:t.title, clientName:t.client, extraInfo:`צילום מחר — ${tomorrowStr}`, taskId:t.id });
        }
      }
      if (dueTomorrow.length) localStorage.setItem(sentKey,'1');
    }

    /* ── GLOBAL TOAST SYSTEM ── */
    (function initToast(){
      const CONTAINER_ID = 'ting-toast-container';
      function getContainer(){
        let c = document.getElementById(CONTAINER_ID);
        if (!c){
          c = document.createElement('div');
          c.id = CONTAINER_ID;
          Object.assign(c.style,{
            position:'fixed', bottom:'24px', left:'50%', transform:'translateX(-50%)',
            display:'flex', flexDirection:'column', alignItems:'center', gap:'8px',
            zIndex:'99999', pointerEvents:'none'
          });
          document.body.appendChild(c);
        }
        return c;
      }
      window.showToast = function(msg, type='info', duration=3500){
        const colors = { success:'#22c55e', error:'#ef4444', info:'#60a5fa', warning:'#f59e0b' };
        const icons  = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
        const el = document.createElement('div');
        Object.assign(el.style,{
          background:'#1e293b', color:'#f1f5f9', padding:'12px 20px',
          borderRadius:'10px', fontSize:'14px', lineHeight:'1.4',
          borderLeft:`4px solid ${colors[type]||colors.info}`,
          boxShadow:'0 4px 20px rgba(0,0,0,0.4)',
          pointerEvents:'auto', cursor:'pointer',
          opacity:'0', transition:'opacity 0.2s ease',
          maxWidth:'420px', textAlign:'center',
          direction:'rtl', fontFamily:'inherit'
        });
        el.textContent = (icons[type]||'') + ' ' + msg;
        el.onclick = ()=>remove(el);
        getContainer().appendChild(el);
        requestAnimationFrame(()=>{ el.style.opacity='1'; });
        const t = setTimeout(()=>remove(el), duration);
        function remove(e){
          clearTimeout(t);
          e.style.opacity='0';
          setTimeout(()=>e.remove(), 220);
        }
      };
    })();

    /* ── GOOGLE CALENDAR ── */
    // Uses Google Identity Services (GSI) TokenClient — consent once, then 100% silent forever.
    // Requires Google OAuth Client ID (Web Client ID from Firebase Auth settings).
    const CAL_SCOPE = 'https://www.googleapis.com/auth/calendar.events';
    const CAL_TOKEN_KEY   = 'tingmedia.calToken';
    const CAL_CLIENTID_KEY = 'tingmedia.calClientId';
    const CAL_CONSENT_KEY  = 'tingmedia.calConsented'; // tracks if user has ever consented

    const calToken = {
      get(){ try { const v = JSON.parse(localStorage.getItem(CAL_TOKEN_KEY)||'null'); if (!v) return null; if (v.exp && v.exp < Date.now()+60000) return null; return v; } catch{return null;} },
      set(token, expiresInSec=3500){ localStorage.setItem(CAL_TOKEN_KEY, JSON.stringify({token, exp: Date.now()+expiresInSec*1000})); },
      clear(){ localStorage.removeItem(CAL_TOKEN_KEY); }
    };
    const calClientId = {
      get(){ return localStorage.getItem(CAL_CLIENTID_KEY)||''; },
      set(id){ localStorage.setItem(CAL_CLIENTID_KEY, id.trim()); },
    };
    const calConsented = {
      get(){ return localStorage.getItem(CAL_CONSENT_KEY)==='1'; },
      set(){ localStorage.setItem(CAL_CONSENT_KEY,'1'); },
      clear(){ localStorage.removeItem(CAL_CONSENT_KEY); localStorage.removeItem(CAL_CLIENTID_KEY); },
    };

    let _gsiTokenClient = null;
    function gsiTokenClient() {
      if (_gsiTokenClient) return _gsiTokenClient;
      const cid = calClientId.get();
      if (!cid || typeof google === 'undefined' || !google?.accounts?.oauth2) return null;
      _gsiTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: cid,
        scope: CAL_SCOPE,
        callback: '', // set per-call below
      });
      return _gsiTokenClient;
    }

    // Request a new token. forceConsent=true shows popup; false = fully silent.
    function calRequestToken(forceConsent) {
      return new Promise((resolve, reject) => {
        const tc = gsiTokenClient();
        if (!tc) return reject(new Error('GSI לא נטען — רענן את הדף'));
        tc.callback = (resp) => {
          if (resp.error) return reject(new Error(resp.error_description || resp.error));
          calToken.set(resp.access_token, resp.expires_in || 3500);
          if (forceConsent) calConsented.set();
          resolve(resp.access_token);
        };
        tc.requestAccessToken({ prompt: forceConsent ? 'consent' : '' });
      });
    }

    // First-time connect — shows popup to get consent
    async function calConnect() {
      _gsiTokenClient = null; // reset so client re-reads new clientId
      return calRequestToken(true);
    }

    // Silently refresh token — no popup, works because user already consented
    async function calSilentRefresh() {
      if (!calConsented.get()) return null;
      try { return await calRequestToken(false); }
      catch(e){ console.warn('silent refresh failed:', e); return null; }
    }

    async function calApi(path, method='GET', body=null) {
      let t = calToken.get();
      // If no valid token but user has consented before → silent refresh
      if (!t && calConsented.get()) {
        const newToken = await calSilentRefresh();
        t = newToken ? calToken.get() : null;
      }
      if (!t) throw new Error('יומן לא מחובר — חבר ב-הגדרות');
      const res = await fetch('https://www.googleapis.com/calendar/v3'+path, {
        method,
        headers: { 'Authorization':'Bearer '+t.token, 'Content-Type':'application/json' },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (res.status===401) {
        // Token revoked — try silent refresh once
        calToken.clear();
        if (calConsented.get()) {
          try {
            await calSilentRefresh();
            t = calToken.get();
            if (t) {
              const retry = await fetch('https://www.googleapis.com/calendar/v3'+path, {
                method,
                headers: { 'Authorization':'Bearer '+t.token, 'Content-Type':'application/json' },
                body: body ? JSON.stringify(body) : undefined,
              });
              if (retry.ok || retry.status===204) return retry.status===204 ? null : retry.json();
            }
          } catch(e){ console.warn('retry after 401 failed:', e); }
        }
        throw new Error('חיבור יומן פג — עבור להגדרות ולחץ "בדוק חיבור"');
      }
      if (!res.ok) throw new Error('Calendar API '+res.status+': '+(await res.text()));
      return res.status===204 ? null : res.json();
    }

    // Auto silent-refresh on page load (if user has previously consented)
    // Runs after GSI loads — gives us a fresh token proactively
    window.addEventListener('load', ()=>{
      setTimeout(()=>{
        if (calConsented.get() && !calToken.get()) {
          calSilentRefresh().then(ok => ok && console.log('📅 Calendar token refreshed silently')).catch(()=>{});
        }
        if (driveConsented.get() && !driveToken.get()) {
          driveSilentRefresh().then(ok => ok && console.log('📁 Drive token refreshed silently')).catch(()=>{});
        }
      }, 2000);
    });

    /* ── GOOGLE DRIVE OAUTH ── */
    // Full drive scope — needed to PATCH file permissions (make public for clients)
    const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive';
    const DRIVE_TOKEN_KEY    = 'tingmedia.driveToken';
    const DRIVE_CONSENT_KEY  = 'tingmedia.driveConsented';

    const driveToken = {
      get(){ try { const v = JSON.parse(localStorage.getItem(DRIVE_TOKEN_KEY)||'null'); if (!v) return null; if (v.exp && v.exp < Date.now()+60000) return null; return v; } catch{return null;} },
      set(token, expiresInSec=3500){ localStorage.setItem(DRIVE_TOKEN_KEY, JSON.stringify({token, exp: Date.now()+expiresInSec*1000})); },
      clear(){ localStorage.removeItem(DRIVE_TOKEN_KEY); }
    };
    const driveConsented = {
      get(){ return localStorage.getItem(DRIVE_CONSENT_KEY)==='1'; },
      set(){ localStorage.setItem(DRIVE_CONSENT_KEY,'1'); },
      clear(){ localStorage.removeItem(DRIVE_CONSENT_KEY); },
    };

    let _gsiDriveTokenClient = null;
    function gsiDriveTokenClient() {
      if (_gsiDriveTokenClient) return _gsiDriveTokenClient;
      const cid = calClientId.get(); // reuse the same OAuth Client ID
      if (!cid || typeof google === 'undefined' || !google?.accounts?.oauth2) return null;
      _gsiDriveTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: cid,
        scope: DRIVE_SCOPE,
        callback: '',
      });
      return _gsiDriveTokenClient;
    }

    function driveRequestToken(forceConsent) {
      return new Promise((resolve, reject) => {
        const tc = gsiDriveTokenClient();
        if (!tc) return reject(new Error('GSI לא נטען או Client ID לא הוגדר. עבור להגדרות → יומן Google.'));
        tc.callback = (resp) => {
          if (resp.error) return reject(new Error(resp.error_description || resp.error));
          driveToken.set(resp.access_token, resp.expires_in || 3500);
          if (forceConsent) driveConsented.set();
          resolve(resp.access_token);
        };
        tc.requestAccessToken({ prompt: forceConsent ? 'consent' : '' });
      });
    }

    async function driveConnect() {
      _gsiDriveTokenClient = null;
      return driveRequestToken(true);
    }

    async function driveSilentRefresh() {
      if (!driveConsented.get()) return null;
      try { return await driveRequestToken(false); }
      catch(e){ console.warn('drive silent refresh failed:', e); return null; }
    }

    // Fetch a Drive file as a Blob, with auto silent-refresh on 401
    async function driveFetchBlob(fileId) {
      let t = driveToken.get();
      if (!t && driveConsented.get()) {
        await driveSilentRefresh();
        t = driveToken.get();
      }
      if (!t) throw new Error('NEED_DRIVE_AUTH');
      const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
      let res = await fetch(url, { headers: { Authorization: 'Bearer '+t.token } });
      if (res.status === 401) {
        driveToken.clear();
        await driveSilentRefresh();
        t = driveToken.get();
        if (!t) throw new Error('NEED_DRIVE_AUTH');
        res = await fetch(url, { headers: { Authorization: 'Bearer '+t.token } });
      }
      if (!res.ok) {
        const txt = await res.text().catch(()=>'');
        if (res.status === 403) throw new Error('אין הרשאה לקובץ הזה ב-Drive (403). ודא שהקובץ שייך לחשבון שלך או שותף איתך');
        if (res.status === 404) throw new Error('הקובץ לא נמצא ב-Drive (404)');
        throw new Error(`Drive API ${res.status}: ${txt.slice(0,120)}`);
      }
      return res.blob();
    }

    // Make a Drive file readable by anyone with the link — so clients can view without auth
    async function driveMakePublic(fileId) {
      let t = driveToken.get();
      if (!t && driveConsented.get()) { await driveSilentRefresh(); t = driveToken.get(); }
      if (!t) throw new Error('NEED_DRIVE_AUTH');
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/permissions?supportsAllDrives=true`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer '+t.token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ role: 'reader', type: 'anyone' }),
      });
      if (!res.ok) {
        const txt = await res.text().catch(()=>'');
        // 400 with "alreadyExists" or similar means it's already public — that's fine
        if (txt.includes('alreadyExists') || txt.includes('cannotShareTeamDrive')) return true;
        throw new Error(`Drive permissions ${res.status}: ${txt.slice(0,160)}`);
      }
      return true;
    }

    // Get file metadata (name, mimeType, size, etc.)
    async function driveFetchMeta(fileId) {
      let t = driveToken.get();
      if (!t && driveConsented.get()) { await driveSilentRefresh(); t = driveToken.get(); }
      if (!t) throw new Error('NEED_DRIVE_AUTH');
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?fields=id,name,mimeType,size,thumbnailLink`, {
        headers: { Authorization: 'Bearer '+t.token }
      });
      if (!res.ok) throw new Error('Drive meta '+res.status);
      return res.json();
    }
    function calBuildEvent(task, clientName) {
      const date = task.shootDate;
      const time = task.shootTime || '09:00';
      const startISO = `${date}T${time}:00`;
      const endHour = String(Math.min(23, parseInt(time.split(':')[0],10)+2)).padStart(2,'0');
      const endISO = `${date}T${endHour}:${time.split(':')[1]||'00'}:00`;
      return {
        summary: `🎬 ${task.title}${clientName?` · ${clientName}`:''}`,
        description: `שלב: ${task.stage||1}/9${task.notes?'\n\n'+task.notes:''}\n\n[Ting Media admin]`,
        start: { dateTime: startISO, timeZone: 'Asia/Jerusalem' },
        end:   { dateTime: endISO,   timeZone: 'Asia/Jerusalem' },
      };
    }
    async function calUpsert(task, clientName) {
      const ev = calBuildEvent(task, clientName);
      if (task.calendarEventId) {
        try { return await calApi(`/calendars/primary/events/${task.calendarEventId}`, 'PATCH', ev); }
        catch(e){ if (String(e).includes('404')) return calApi('/calendars/primary/events', 'POST', ev); throw e; }
      }
      return calApi('/calendars/primary/events', 'POST', ev);
    }

    /* ── URGENCY ENGINE (time-aware alerts) ──
       The most critical date for video production is shoot day.
       Stages 1-3 (brief/script/approval) MUST be done before shoot.
       Stage 4 (scheduling) MUST be done at least a few days before.
       Returns null if everything is fine, or {level, reason, days, label}. */
    function urgencyOf(t) {
      if (!t || (t.stage||1) >= FINAL_STAGE) return null;
      const today = new Date(); today.setHours(0,0,0,0);
      const dateStr = t.shootDate || t.dueDate;
      if (!dateStr) return null;
      const target = new Date(dateStr); target.setHours(0,0,0,0);
      const days = Math.round((target - today) / 86400000);
      const stage = t.stage || 1;

      // Already overdue (target date passed, task not closed)
      if (days < 0) {
        return { level:'critical', reason:`באיחור של ${-days} ימים`, days, label:'באיחור' };
      }
      // Today / tomorrow with stage < 5 (not at shoot yet)
      if (days <= 1 && stage < 5) {
        const when = days === 0 ? 'היום' : 'מחר';
        return { level:'critical', reason:`צילום ${when} — שלבים חסרים!`, days, label:`צילום ${when}` };
      }
      // ≤3 days, script not approved
      if (days <= 3 && stage < 3) {
        return { level:'critical', reason:`צילום בעוד ${days} ימים — תסריט לא אושר`, days, label:`עוד ${days} ימים` };
      }
      // ≤3 days, shoot not scheduled
      if (days <= 3 && stage < 4) {
        return { level:'warning', reason:`צילום בעוד ${days} ימים — צילומים לא נקבעו`, days, label:`עוד ${days} ימים` };
      }
      // ≤7 days, still on brief only
      if (days <= 7 && stage < 2) {
        return { level:'warning', reason:`צילום בעוד ${days} ימים — רק בריף נעשה`, days, label:`עוד ${days} ימים` };
      }
      return null;
    }

    /* ── FINANCIAL ENGINE ── */
    // Single source of truth for all money calculations.
    // Inputs: clients[], expenses[], employees[], (optional) monthKey 'YYYY-MM'
    // Output: full financial snapshot for CFO views.
    const EMPLOYER_LOAD = 0.25; // 25% employer add-on for שכיר (סוציאליות, ביטוח לאומי, מעסיק)

    function calcFinance({ clients=[], expenses=[], employees=[], projects=[], monthKey=null }) {
      const today = new Date();
      const thisMonth = monthKey || today.toISOString().slice(0,7);

      // ── Recurring revenue (monthly from active retainers)
      const activeClients = clients.filter(c=>c.status==='פעיל');
      const recurringRevenue = activeClients.reduce((s,c)=>s+(Number(c.retainerAmount)||0),0);

      // ── Project revenue
      // Recognized this month: projects with endDate (or completedAt) in this month, status='הושלם'
      // Pipeline: active project budgets not yet completed
      const completedThisMonth = projects.filter(p=>{
        if (p.status!=='הושלם') return false;
        const d = (p.completedAt||p.endDate||'').slice(0,7);
        return d===thisMonth;
      });
      const projectRevenueThisMonth = completedThisMonth.reduce((s,p)=>s+(Number(p.budget)||0),0);

      // Active project pipeline (budgets of projects in progress)
      const activeProjects = projects.filter(p=>p.status==='פעיל');
      const projectPipeline = activeProjects.reduce((s,p)=>s+(Number(p.budget)||0),0);

      // Total recognized monthly revenue = retainers + completed projects this month
      const monthlyRevenue = recurringRevenue + projectRevenueThisMonth;

      // ── Variable expenses for the selected month
      const variableExpenses = expenses.filter(e=>(e.kind||'variable')!=='fixed');
      const monthVarItems = variableExpenses.filter(e=>(e.date||'').slice(0,7)===thisMonth);
      const monthVariable = monthVarItems.reduce((s,e)=>s+(Number(e.amount)||0),0);

      // Split variable: freelance suppliers vs other (so we can show as separate bucket)
      const monthFreelance     = monthVarItems.filter(e=>e.supplierId).reduce((s,e)=>s+(Number(e.amount)||0),0);
      const monthOtherVariable = monthVarItems.filter(e=>!e.supplierId).reduce((s,e)=>s+(Number(e.amount)||0),0);

      // ── Recurring (fixed) expenses normalized to monthly
      const fixedExpenses = expenses.filter(e=>e.kind==='fixed');
      const monthlyFixed = fixedExpenses.reduce((s,e)=>{
        const a = Number(e.amount)||0;
        if (e.recurrence==='yearly') return s + a/12;
        if (e.recurrence==='weekly') return s + a*4.33;
        return s + a; // monthly default
      },0);

      // ── Payroll (full employer cost, monthly)
      const activeEmployees = employees.filter(e=>e.status==='פעיל');
      const payrollDetails = activeEmployees.map(e=>{
        const base = Number(e.salary)||0;
        const load = e.salaryType==='שכיר' ? base * EMPLOYER_LOAD : 0;
        return { ...e, base, load, total: base + load };
      });
      const monthlyPayroll = payrollDetails.reduce((s,p)=>s+p.total,0);

      // ── Editor / supplier costs — paid via expenses with supplierId, this month
      const supplierSpend = variableExpenses
        .filter(e=>(e.date||'').slice(0,7)===thisMonth && e.supplierId)
        .reduce((s,e)=>s+(Number(e.amount)||0),0);

      // ── Totals
      const totalMonthlyCosts = monthlyFixed + monthVariable + monthlyPayroll;
      const grossProfit = monthlyRevenue - totalMonthlyCosts;
      const margin = monthlyRevenue>0 ? (grossProfit/monthlyRevenue)*100 : 0;

      // ── Trend (last 6 months: revenue includes project completions per month)
      const trend = [];
      for (let i=5; i>=0; i--) {
        const d = new Date(today.getFullYear(), today.getMonth()-i, 1);
        const k = d.toISOString().slice(0,7);
        const monthVar = variableExpenses.filter(e=>(e.date||'').slice(0,7)===k).reduce((s,e)=>s+(Number(e.amount)||0),0);
        const monthProj = projects.filter(p=>p.status==='הושלם' && (p.completedAt||p.endDate||'').slice(0,7)===k)
                                  .reduce((s,p)=>s+(Number(p.budget)||0),0);
        const monthRev = recurringRevenue + monthProj;
        const costs = monthlyFixed + monthVar + monthlyPayroll;
        trend.push({
          month: k,
          label: d.toLocaleDateString('he-IL', {month:'short'}),
          revenue: monthRev,
          recurring: recurringRevenue,
          projects: monthProj,
          variable: monthVar,
          fixed: monthlyFixed,
          payroll: monthlyPayroll,
          costs,
          profit: monthRev - costs,
        });
      }

      // ── By category (this month, all expenses)
      const byCategory = {};
      [...variableExpenses.filter(e=>(e.date||'').slice(0,7)===thisMonth), ...fixedExpenses].forEach(e=>{

      // Add payroll as virtual category
      if (monthlyPayroll>0) byCategory['שכר עובדים'] = (byCategory['שכר עובדים']||0) + monthlyPayroll;

      return {
        monthKey: thisMonth,
        monthlyRevenue,           // ריטיינרים + פרויקטים שהושלמו החודש
        recurringRevenue,         // 🆕 רק ריטיינרים

        grossProfit,

        activeEmployeeCount: activeEmployees.length,

      };

    /* ── LOGIN ── */
    function Login() {
      const [email, setEmail]       = useState('');
      const [pass, setPass]         = useState('');
      const [mode, setMode]         = useState('login');
      const [err, setErr]           = useState('');
      const [info, setInfo]         = useState('');
      const [busy, setBusy]         = useState(false);

      async function sendReset() {
        if (!email.trim()) { setErr('הזן כתובת אימייל קודם'); return; }
        setBusy(true); setErr(''); setInfo('');
        try {
          await auth.sendPasswordResetEmail(email.trim());
          setInfo(`📧 שלחנו לינק לאיפוס סיסמה ל-${email}. בדוק את תיבת הדואר.`);
        } catch(ex) {
          setErr(ERRS[ex.code] || ex.message);
        } finally { setBusy(false); }
      }

      const ERRS = {
        'auth/user-not-found':      'המשתמש לא קיים',
        'auth/wrong-password':      'סיסמא שגויה',
        'auth/invalid-email':       'אימייל לא תקין',
        'auth/email-already-in-use':'האימייל כבר רשום',
        'auth/weak-password':       'סיסמא חלשה (מינימום 6 תווים)',
        'auth/invalid-credential':  'פרטי התחברות שגויים',
      };

      const submit = async e => {
        e.preventDefault();
        setErr(''); setBusy(true);
        try {
          // Signup disabled — accounts are created by an admin only
          await auth.signInWithEmailAndPassword(email, pass);
        } catch(ex) {
          setErr(ERRS[ex.code] || ex.message);
        } finally { setBusy(false); }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4" style={{background:`radial-gradient(circle at top, var(--surface2) 0%, var(--bg) 100%)`}}>
          <div style={{background:'var(--surface)',backdropFilter:'blur(8px)',borderRadius:'16px',border:'1px solid var(--accent-glow)',padding:'32px',width:'100%',maxWidth:'380px',boxShadow:'0 25px 50px rgba(0,0,0,0.25)'}}>
            <div className="text-center mb-8">
              <div className="logo-mark" style={{width:'64px',height:'64px',borderRadius:'16px',fontSize:'20px',margin:'0 auto 16px'}}>TM</div>
              <h1 style={{fontSize:'24px',fontWeight:900,color:'var(--text)'}}>TING MEDIA</h1>
              <p style={{color:'var(--accent)',fontSize:'12px',marginTop:'4px'}}>מערכת ניהול עסקי</p>
            </div>
            <form onSubmit={submit} className="space-y-4">
              <div>
                <label className={CL.label}>אימייל</label>
                <input type="email" className={CL.input} placeholder="הכנס אימייל" value={email} onChange={e=>setEmail(e.target.value)} required />
              </div>
              <div>
                <label className={CL.label}>סיסמא</label>
                <input type="password" className={CL.input} placeholder="הכנס סיסמא" value={pass} onChange={e=>setPass(e.target.value)} required />
              </div>
              {err && <div className="text-red-400 text-xs bg-red-900/20 border border-red-700/30 rounded-lg px-3 py-2">{err}</div>}
              {info && <div className="text-emerald-300 text-xs bg-emerald-900/20 border border-emerald-700/30 rounded-lg px-3 py-2">{info}</div>}
              <button type="submit" className={`${CL.btn} w-full py-2.5 mt-2`} disabled={busy}>
                {busy ? '...' : mode === 'signup' ? 'הרשמה' : 'כניסה למערכת'}
              </button>
            </form>
            <div className="text-center mt-4">
              <button type="button" onClick={sendReset} disabled={busy}
                style={{color:'var(--accent)',fontSize:'12px',background:'transparent',border:'none',cursor:'pointer',fontFamily:'Heebo,sans-serif'}}>
                שכחת סיסמה?
              </button>
              <div style={{color:'var(--text-muted)',fontSize:'11px',lineHeight:'1.6',marginTop:'12px'}}>

                פנה למנהל המערכת לקבלת חשבון.
              </div>
            </div>
          </div>
        </div>
      );

    /* ── SIDEBAR ── */
    /* ── Inbox / Notifications bell ──
       Derives events client-side from tasks + videoReviews: who handed me
       something, what was just completed, new client comments. Persists
       "last seen" timestamp per user in localStorage. */
    function NotificationsBell({ user, role, employees=[], onNav }) {
      const [tasks, setTasks]     = useState([]);
      const [reviews, setReviews] = useState([]);
      const [comments, setComments] = useState([]);
      const [open, setOpen]       = useState(false);
      const lastSeenKey = `tingmedia.inboxSeen.${user.uid}`;
      const [lastSeen, setLastSeen] = useState(() => {
        const v = localStorage.getItem(lastSeenKey);
        return v ? parseInt(v,10) : (Date.now() - 7*86400000);
      });
      const myEmpId = useMemo(() => (employees.find(e => e.userId === user.uid))?.id || null, [employees, user.uid]);

      useEffect(() => {
        if (!db) return;
        const u1 = db.collection('tasks').onSnapshot(s => setTasks(s.docs.map(d => ({ id:d.id, ...d.data() })).filter(t => !t.archived)), e => {});
        const u2 = db.collection('videoReviews').onSnapshot(s => setReviews(s.docs.map(d => ({ id:d.id, ...d.data() }))), e => {});
        const u3 = db.collection('videoComments').where('guest','==',true).limit(50).onSnapshot(s => setComments(s.docs.map(d => ({ id:d.id, ...d.data() }))), e => {});
        return () => { u1(); u2(); u3(); };
      }, []);

      const events = useMemo(() => {
        const list = [];
        // Reviews where ball was handed to me recently
        for (const r of reviews) {
          if (r.assignedTo !== 'am') continue;
          const ts = r.lastSentToEditorAt?.toMillis?.() || r.lastSentToClientAt?.toMillis?.() || r.lastRevisionAt?.toMillis?.() || r.createdAt?.toMillis?.() || 0;
          if (!ts) continue;
          let icon = '🎬', text = '';
          if (r.status === 'awaiting_am_review')   { icon='👀'; text=`ממתין לבדיקה: "${r.title}"`; }
          else if (r.status === 'am_reviewing_client') { icon='⚠️'; text=`קיבלת תיקוני לקוח: "${r.title}"`; }
          else continue;
          list.push({ id:'rev-'+r.id, icon, text, ts, action: () => onNav('videoreview') });
        }
        // Tasks just stage-changed by someone else (last 7 days)
        for (const t of tasks) {
          const ts = t.updatedAt?.toMillis?.() || 0;
          if (!ts || ts < Date.now() - 7*86400000) continue;
          if (t.userId === user.uid) continue; // skip my own
          if (t.accountManagerId === myEmpId || t.editorId === myEmpId) {
            list.push({ id:'tsk-'+t.id, icon:'📋', text:`עודכן עבורך: "${t.title || 'משימה'}"`, ts, action: () => onNav('tasks') });
          }
        }
        // Recent guest comments
        for (const c of comments) {
          const ts = c.createdAt?.toMillis?.() || 0;
          if (!ts || ts < Date.now() - 7*86400000) continue;
          list.push({ id:'cmt-'+c.id, icon:'💬', text:`${c.authorName || 'לקוח'}: "${(c.text||'').slice(0,60)}"`, ts, action: () => onNav('videoreview') });
        }
        list.sort((a,b) => b.ts - a.ts);
        return list.slice(0,30);
      }, [tasks, reviews, comments, myEmpId, user.uid, onNav]);

      const unread = events.filter(e => e.ts > lastSeen).length;

      function markAllSeen() {
        const now = Date.now();
        localStorage.setItem(lastSeenKey, String(now));
        setLastSeen(now);
      }

      function relTimeShort(ts) {
        const diff = (Date.now() - ts) / 1000;
        if (diff < 60) return 'עכשיו';
        if (diff < 3600) return `${Math.floor(diff/60)} דק'`;
        if (diff < 86400) return `${Math.floor(diff/3600)} ש'`;
        return `${Math.floor(diff/86400)} י'`;
      }

      return (
        <div className="relative mx-3 mb-1">
          <button
            onClick={() => { setOpen(o => !o); if (!open) markAllSeen(); }}
            className="w-full flex items-center justify-between gap-2 px-3 py-2 rounded-lg bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-zinc-400 hover:text-white text-xs cursor-pointer transition-all">
            <span className="flex items-center gap-2">
              <span>🔔</span>
              <span>תיבת נכנס</span>
            </span>
            {unread > 0 && (
              <span style={{background:'#ef4444', color:'#fff', fontSize:10, padding:'1px 6px', borderRadius:99, fontWeight:700}}>{unread}</span>
            )}
          </button>
          {open && (<>
            <div onClick={() => setOpen(false)} style={{position:'fixed', inset:0, zIndex:9998}} />
            <div style={{position:'absolute', top:'100%', right:0, left:0, marginTop:6, background:'var(--surface)', border:'1px solid var(--border2)', borderRadius:10, boxShadow:'0 12px 48px rgba(0,0,0,0.35)', zIndex:9999, maxHeight:'70vh', overflowY:'auto', minWidth:280}}>
              <div style={{padding:'10px 12px', borderBottom:'1px solid var(--surface2)', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
                <span style={{color:'var(--text)', fontSize:12, fontWeight:600}}>תיבת נכנס</span>
                {events.length > 0 && (
                  <button onClick={markAllSeen} style={{background:'transparent', border:0, color:'var(--text-sub)', fontSize:10, cursor:'pointer'}}>סמן הכל כנקרא</button>
                )}
              </div>
              {events.length === 0 ? (
                <div style={{padding:'24px 12px', textAlign:'center', color:'var(--text-muted)', fontSize:12}}>
                  ✨ אין התראות חדשות
                </div>
              ) : events.map(e => {
                const isUnread = e.ts > lastSeen;
                return (
                  <div key={e.id}
                    onClick={() => { e.action(); setOpen(false); }}
                    style={{padding:'9px 12px', borderBottom:'1px solid var(--surface2)', cursor:'pointer', display:'flex', gap:8, alignItems:'flex-start', background: isUnread ? 'rgba(59,130,246,0.04)' : 'transparent'}}
                    onMouseEnter={ev => ev.currentTarget.style.background='var(--surface2)'}
                    onMouseLeave={ev => ev.currentTarget.style.background = isUnread ? 'rgba(59,130,246,0.04)' : 'transparent'}
                  >
                    {isUnread && <span style={{width:5, height:5, borderRadius:'50%', background:'#3b82f6', marginTop:6, flexShrink:0}} />}
                    {!isUnread && <span style={{width:5, height:5, marginTop:6, flexShrink:0}} />}
                    <span style={{fontSize:13}}>{e.icon}</span>
                    <div style={{flex:1, minWidth:0}}>
                      <div style={{fontSize:12, color:'var(--text-sub)', lineHeight:1.4}}>{e.text}</div>
                      <div style={{fontSize:10, color:'var(--text-muted)', marginTop:2}}>{relTimeShort(e.ts)}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </>)}
        </div>
      );
    }

                </button>
                <button onClick={onLogout} title="התנתקות"
                  style={{width:32,height:32,color:'var(--text-muted)',fontSize:15,background:'transparent',border:'1px solid var(--border)',borderRadius:8,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>↩</button>
              </div>

            {!collapsed && (<>

                {(user.email||'?')[0].toUpperCase()}

            {/* Theme + accent row */}

            >

              <span>התנתקות</span>
            </button>
            </>)}
          </div>
        </aside>
      );
    }

    /* ── STAGE TIMELINE — visual progress through 9 stages ── */
    function StageTimeline({ currentStage, history=[], onJump }) {
      const cur = currentStage || 1;
      const fmt = ts => {
        if (!ts) return '';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        return d.toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'});
      };
      // Map of last entry timestamp per stage, for tooltip
      const lastAt = {};
      history.forEach(h => { if (h.stage!=null) lastAt[h.stage] = h.at; });
      return (
        <div className="bg-zinc-900/60 border border-zinc-800 rounded-lg p-3">
          <div className="flex items-center justify-between mb-2">
            <span className="text-zinc-400 text-xs font-semibold">📍 התקדמות בפייפליין</span>
            <span className="text-zinc-500 text-[11px]">שלב {cur} מתוך {STAGES.length}</span>
          </div>
          <div className="flex items-center gap-1">
            {STAGES.map((s,idx)=>{
              const past = s.id < cur;
              const isCur = s.id === cur;
              const at = lastAt[s.id];
              const cls = isCur ? 'ring-2 ring-amber-400 scale-110' : past ? 'opacity-90' : 'opacity-30';
              return (
                <React.Fragment key={s.id}>
                  <button
                    onClick={()=>onJump && onJump(s.id)}
                    title={`${s.name}${at?` · ${fmt(at)}`:''}`}
                    className={`w-7 h-7 rounded-full flex items-center justify-center text-xs cursor-pointer border-0 transition-all ${cls}`}
                    style={{background: past||isCur ? s.dot : 'var(--border2)'}}
                  >
                    {past ? '✓' : s.emoji}
                  </button>
                  {idx<STAGES.length-1 && <div className={`flex-1 h-0.5 ${past?'bg-emerald-600':'bg-zinc-700'}`}></div>}
                </React.Fragment>
              );
            })}
          </div>
          <div className="flex justify-between mt-1.5 px-0.5">
            {STAGES.map(s=>(
              <span key={s.id} className={`text-[9px] truncate w-7 text-center ${s.id===cur?'text-amber-400 font-bold':'text-zinc-600'}`}>{s.name.slice(0,4)}</span>
            ))}
          </div>
          {history.length>0 && (
            <details className="mt-3 group">
              <summary className="text-zinc-500 text-[11px] cursor-pointer hover:text-zinc-300">📜 היסטוריית שינויים ({history.length})</summary>
              <div className="mt-2 max-h-32 overflow-y-auto space-y-1">
                {[...history].reverse().slice(0,15).map((h,i)=>{
                  const st = stageById(h.stage);
                  return (
                    <div key={i} className="flex items-center justify-between text-[11px] text-zinc-400 bg-zinc-900/80 rounded px-2 py-1">
                      <span><span style={{color:st.dot}}>{st.emoji}</span> {st.name}</span>
                      <span className="text-zinc-500">{fmt(h.at)}{h.by?` · ${h.by.split('@')[0]}`:''}</span>
                    </div>
                  );
                })}
              </div>
            </details>
          )}
        </div>
      );
    }

    /* ── TOAST SYSTEM — global success/undo notifications ── */
    const ToastCtx = React.createContext({ push: ()=>{} });
    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const push = (t) => {
        const id = Math.random().toString(36).slice(2);
        setToasts(p=>[...p, {id, ...t}]);
        setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)), t.duration||5000);
      };
      const dismiss = id => setToasts(p=>p.filter(x=>x.id!==id));
      return (
        <ToastCtx.Provider value={{push}}>
          {children}
          <div className="fixed bottom-5 left-5 z-[10000] flex flex-col gap-2" dir="rtl">
            {toasts.map(t=>(
              <div key={t.id} className="bg-zinc-900 border border-zinc-700 rounded-lg shadow-2xl px-4 py-3 flex items-center gap-3 min-w-[280px] animate-in">
                <span>{t.icon||'✓'}</span>
                <span className="text-white text-sm flex-1">{t.msg}</span>
                {t.action && <button onClick={()=>{t.action.onClick();dismiss(t.id);}} className="text-amber-400 text-xs font-bold bg-transparent border-0 cursor-pointer">{t.action.label}</button>}
                <button onClick={()=>dismiss(t.id)} className="text-zinc-500 hover:text-white text-xs bg-transparent border-0 cursor-pointer">✕</button>
              </div>
            ))}
          </div>
        </ToastCtx.Provider>
      );
    }
    const useToast = () => React.useContext(ToastCtx);

    /* ── COMMAND PALETTE — Cmd/Ctrl+K global search ── */
    function CommandPalette({ open, onClose, tasks, clients, projects, suppliers, employees=[], user, onNavTo, onOpenTask }) {
      const [q, setQ] = useState('');
      const inputRef = useRef(null);
      useEffect(()=>{
        if (open) { setQ(''); setTimeout(()=>inputRef.current?.focus(), 50); }
      },[open]);
      if (!open) return null;

      // Natural-language quick-task parser
      // Triggered by leading "+" or "/" — anything after is parsed
      // Recognizes: client name (matches existing), "מחר","היום","שלישי" etc, "דחוף"=high, dd.mm
      function parseQuick(raw) {
        let s = raw.replace(/^[+\/]\s*/, '').trim();
        if (!s) return null;
        const today = new Date(); today.setHours(0,0,0,0);
        let dueDate = null, priority = 'medium', client = '';
        // Hebrew-friendly tokenization: pad with spaces to use simple " word " checks
        let pad = ' ' + s + ' ';
        const strip = (re) => { pad = pad.replace(re, ' '); };

        // Priority
        if (/[ ֐-׿](דחוף|בוער|חירום)[ ֐-׿]/.test(pad)) { priority = 'high'; strip(/(דחוף|בוער|חירום)/g); }
        else if (/[ ֐-׿](נמוך|רגוע)[ ֐-׿]/.test(pad)) { priority = 'low'; strip(/(נמוך|רגוע)/g); }

        // Date keywords (simple presence within padded string)
        const dayMap = { 'ראשון':0,'שני':1,'שלישי':2,'רביעי':3,'חמישי':4,'שישי':5,'שבת':6 };
        if (/[ ֐-׿]מחרתיים[ ֐-׿]/.test(pad)) { dueDate = new Date(today.getTime()+2*86400000); strip(/מחרתיים/); }
        else if (/[ ֐-׿]מחר[ ֐-׿]/.test(pad)) { dueDate = new Date(today.getTime()+86400000); strip(/מחר/); }
        else if (/[ ֐-׿]היום[ ֐-׿]/.test(pad)) { dueDate = today; strip(/היום/); }
        else {
          for (const [name, idx] of Object.entries(dayMap)) {
            if (new RegExp(`[ ֐-׿](יום )?${name}[ ֐-׿]`).test(pad)) {
              const cur = today.getDay();
              let diff = idx - cur; if (diff <= 0) diff += 7;
              dueDate = new Date(today.getTime() + diff*86400000);
              strip(new RegExp(`(יום )?${name}`,'g'));
              break;
            }
          }
        }
        const m5 = pad.match(/\b(\d{1,2})[.\/](\d{1,2})(?:[.\/](\d{2,4}))?\b/);
        if (m5 && !dueDate) {
          const dd = parseInt(m5[1],10), mm = parseInt(m5[2],10)-1;
          let yy = m5[3] ? parseInt(m5[3],10) : today.getFullYear();
          if (yy < 100) yy += 2000;
          dueDate = new Date(yy, mm, dd);
          pad = pad.replace(m5[0],' ');
        }

        // Client — match against existing clients (substring)
        for (const c of clients) {
          if (!c.name) continue;
          const safe = c.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
          const re = new RegExp(safe);
          if (re.test(pad)) { client = c.name; pad = pad.replace(re,' '); break; }
        }
        // "ל<name>" hint: ל followed by Hebrew word
        if (!client) {
          const m6 = pad.match(/ ל[א-ת][א-ת]+(?:\s+[א-ת]+)?/);
          if (m6) {
            const cand = m6[0].trim().replace(/^ל/,'').trim();
            if (cand) { client = cand; pad = pad.replace(m6[0],' '); }
          }
        }

        const title = pad.replace(/\s+/g,' ').trim();
        if (!title) return null;
        return { title, client, dueDate, priority };
      }

      const isCreateMode = q.startsWith('+') || q.startsWith('/');
      const parsed = isCreateMode ? parseQuick(q) : null;

      async function createTaskNow() {
        if (!parsed) return;
        const myEmpId = (employees.find(e => e.userId === user?.uid))?.id || null;
        await db.collection('tasks').add({
          title: parsed.title,
          client: parsed.client || '',
          stage: 1, priority: parsed.priority,
          dueDate: parsed.dueDate ? `${parsed.dueDate.getFullYear()}-${String(parsed.dueDate.getMonth()+1).padStart(2,'0')}-${String(parsed.dueDate.getDate()).padStart(2,'0')}` : null,
          accountManagerId: myEmpId,
          userId: user.uid,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        onClose();
      }

      const lq = q.trim().toLowerCase();
      const navItems = NAV.map(n=>({type:'nav', id:n.id, label:n.label, emoji:n.emoji, action:()=>onNavTo(n.id)}));
      const taskItems = tasks.map(t=>({type:'task', id:t.id, label:t.title||'(ללא שם)', sub:`${t.client||'—'} · ${stageById(t.stage||1).name}`, emoji:'📋', action:()=>onOpenTask(t.id)}));
      const clientItems = clients.map(c=>({type:'client', id:c.id, label:c.name, sub:c.type, emoji:'🤝', action:()=>onNavTo('clients')}));
      const projectItems = projects.map(p=>({type:'project', id:p.id, label:p.name, sub:`${p.client||'—'} · ${p.status}`, emoji:'📦', action:()=>onNavTo('projects')}));
      const supplierItems = (suppliers||[]).map(s=>({type:'supplier', id:s.id, label:s.name, sub:s.supplierRole, emoji:'🎬', action:()=>onNavTo('suppliers')}));
      const all = [...navItems, ...taskItems, ...clientItems, ...projectItems, ...supplierItems];
      const filtered = isCreateMode ? [] : (lq ? all.filter(x=>(x.label+' '+(x.sub||'')).toLowerCase().includes(lq)).slice(0,25) : navItems.slice(0,9));
      return (
        <div className="fixed inset-0 z-[9999] bg-black/70 flex items-start justify-center pt-[15vh] p-4" onClick={onClose} dir="rtl">
          <div className="bg-zinc-900 rounded-2xl border border-zinc-700 shadow-2xl w-full max-w-xl overflow-hidden" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center gap-2 px-4 py-3 border-b border-zinc-800">
              <span className="text-zinc-500">🔍</span>
              <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="חפש (או הקלד + ליצירת משימה)..."
                onKeyDown={e=>{ if(e.key==='Escape')onClose(); if(e.key==='Enter'){ if(isCreateMode && parsed) createTaskNow(); else if(filtered[0]){filtered[0].action();onClose();} } }}
                className="flex-1 bg-transparent text-white text-sm outline-none border-0" />
              <kbd className="text-zinc-500 text-[10px] bg-zinc-800 px-1.5 py-0.5 rounded">ESC</kbd>
            </div>

            {/* Quick-create preview */}
            {isCreateMode && (
              <div className="px-4 py-3 border-b border-zinc-800 bg-amber-500/5">
                {!parsed ? (
                  <div className="text-zinc-400 text-xs">
                    הקלד כותרת. לדוגמה: <span className="text-amber-400">+ עיצוב כרזה ל-מאור שוויצר מחר דחוף</span>
                  </div>
                ) : (
                  <div onClick={createTaskNow} className="cursor-pointer hover:bg-amber-500/10 rounded-lg p-2 -m-2 transition">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-base">➕</span>
                      <span className="text-amber-400 text-xs font-bold">צור משימה (Enter)</span>
                    </div>
                    <div className="text-white text-sm font-semibold mb-1">{parsed.title || '(ללא כותרת)'}</div>
                    <div className="flex flex-wrap gap-2 text-[11px]">
                      {parsed.client && <span className="bg-zinc-800 text-zinc-300 px-2 py-0.5 rounded">👤 {parsed.client}</span>}
                      {parsed.dueDate && <span className="bg-zinc-800 text-zinc-300 px-2 py-0.5 rounded">📅 {parsed.dueDate.toLocaleDateString('he-IL',{day:'numeric',month:'numeric'})}</span>}
                      {parsed.priority === 'high' && <span className="bg-red-900/40 text-red-300 px-2 py-0.5 rounded">🔴 דחוף</span>}
                      {parsed.priority === 'low' && <span className="bg-blue-900/40 text-blue-300 px-2 py-0.5 rounded">🔵 נמוך</span>}
                    </div>
                  </div>
                )}
              </div>
            )}

            <div className="max-h-[50vh] overflow-y-auto">
              {!isCreateMode && filtered.length===0 && <div className="text-zinc-500 text-sm text-center py-8">אין תוצאות</div>}
              {filtered.map((it,i)=>(
                <button key={it.type+'-'+it.id+'-'+i} onClick={()=>{it.action();onClose();}}
                  className="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-zinc-800 cursor-pointer text-right border-0 bg-transparent">
                  <span className="text-base">{it.emoji}</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-white text-sm font-medium truncate">{it.label}</div>
                    {it.sub && <div className="text-zinc-500 text-[11px] truncate">{it.sub}</div>}
                  </div>
                  <span className="text-zinc-600 text-[10px] bg-zinc-800/60 px-1.5 py-0.5 rounded">{it.type}</span>
                </button>
              ))}
            </div>
            <div className="px-4 py-2 border-t border-zinc-800 text-zinc-500 text-[10px] flex justify-between">
              <span>↵ פתיחה · ESC סגירה</span>
              <span>{filtered.length} תוצאות</span>
            </div>
          </div>
        </div>
      );
    }

    /* ── DASHBOARD ── */
    function Dashboard({ role, tasks, clients, expenses, employees=[], projects=[], onNav }) {
      const activeClients  = clients.filter(c => c.status === 'פעיל').length;
      const openTasks      = tasks.filter(t => (t.stage||1) < FINAL_STAGE).length;
      const doneTasks      = tasks.filter(t => (t.stage||1) === FINAL_STAGE).length;

      // Full financial snapshot (single source of truth)
      const fin = useMemo(()=>calcFinance({clients, expenses, employees, projects}), [clients, expenses, employees, projects]);
      const revenue = fin.monthlyRevenue;
      const totalExp = fin.totalMonthlyCosts;
      const profit  = fin.grossProfit;

      // Time greeting
      const hour = new Date().getHours();
      const greeting = hour < 5 ? 'לילה טוב' : hour < 12 ? 'בוקר טוב' : hour < 17 ? 'צהריים טובים' : hour < 21 ? 'ערב טוב' : 'לילה טוב';
      const today = new Date().toLocaleDateString('he-IL', {weekday:'long', day:'numeric', month:'long'});

      // 🔥 Active fires
      const fires = useMemo(() => tasks.map(t => ({t, u: urgencyOf(t)})).filter(x => x.u).sort((a,b)=>{
        if (a.u.level!==b.u.level) return a.u.level==='critical'?-1:1;
        return (a.u.days||0)-(b.u.days||0);
      }), [tasks]);

      // 📥 Inbox — actionable items grouped by what's needed
      const inbox = useMemo(()=>{
        const today = new Date().toISOString().slice(0,10);
        const groups = [];
        // Tasks awaiting client approval (stage 8)
        const awaitingClient = tasks.filter(t=>(t.stage||1)===8);
        if (awaitingClient.length) groups.push({key:'client', icon:'⏳', label:'ממתין לאישור לקוח', count:awaitingClient.length, color:'amber', tasks:awaitingClient});
        // Tasks awaiting supervisor approval (stage 7)
        const awaitingSup = tasks.filter(t=>(t.stage||1)===7);
        if (awaitingSup.length) groups.push({key:'sup', icon:'👁️', label:'ממתין לאישור סופרוויזר', count:awaitingSup.length, color:'yellow', tasks:awaitingSup});
        // Need scheduling (stage<4 with shoot date in next 14 days)
        const needSched = tasks.filter(t=>{
          if ((t.stage||1)>=4) return false;
          if (!t.shootDate) return false;
          const days = Math.round((new Date(t.shootDate)-new Date(today))/86400000);
          return days>=0 && days<=14;
        });
        if (needSched.length) groups.push({key:'sched', icon:'📅', label:'דרוש תיאום צילום', count:needSched.length, color:'violet', tasks:needSched});
        // Active projects with no recent updates (>14 days since updatedAt)
        const stale = projects.filter(p=>p.status==='פעיל' && p.updatedAt && (Date.now()-(p.updatedAt.toMillis?.()||0)) > 14*86400000);
        if (stale.length) groups.push({key:'stale', icon:'💤', label:'פרויקטים בלי עדכון', count:stale.length, color:'zinc', tasks:[]});
        return groups;
      },[tasks, projects]);

      // Stage distribution for stacked progress
      const stageCounts = STAGES.map(s => ({s, n: tasks.filter(t=>(t.stage||1)===s.id).length}));
      const totalForBar = tasks.length || 1;

      // Upcoming (next 7 days) — by shoot date or due date
      const upcoming = useMemo(() => {
        const today = new Date(); today.setHours(0,0,0,0);
        const horizon = new Date(today.getTime() + 14*86400000);
        return tasks.filter(t => {
          if ((t.stage||1) >= FINAL_STAGE) return false;
          const d = t.shootDate || t.dueDate;
          if (!d) return false;
          const dt = new Date(d);
          return dt >= today && dt <= horizon;
        }).sort((a,b) => (a.shootDate||a.dueDate).localeCompare(b.shootDate||b.dueDate)).slice(0, 8);
      }, [tasks]);

      // 👥 Team productivity (admin only) — per-employee stats from stageHistory
      const productivity = useMemo(()=>{
        if (role!=='admin') return null;
        const byEmail = {};
        const ensure = email => byEmail[email] || (byEmail[email] = { email, created:0, stageChanges:0, completed:0, lastMinute:0, late:0, totalLeadHours:0, leadCount:0 });
        tasks.forEach(t=>{
          const history = t.stageHistory || [];
          // Created by = first history entry's by, or fallback
          if (history[0]?.by) ensure(history[0].by).created++;
          // Stage changes
          history.slice(1).forEach(h=>{ if (h.by) ensure(h.by).stageChanges++; });
          // Completed (stage 9)
          if ((t.stage||1)===FINAL_STAGE) {
            const completion = history.find(h=>h.stage===FINAL_STAGE);
            const closer = completion?.by;
            if (closer) {
              const rec = ensure(closer);
              rec.completed++;
              if (t.dueDate && completion?.at) {
                const due = new Date(t.dueDate);
                const done = new Date(completion.at);
                const diffH = (due - done)/3600000;
                if (diffH < 0) rec.late++;
                else if (diffH < 24) rec.lastMinute++;
              }
              if (history[0]?.at && completion?.at) {
                rec.totalLeadHours += Math.max(0, (new Date(completion.at) - new Date(history[0].at))/3600000);
                rec.leadCount++;
              }
            }
          }
        });
        return Object.values(byEmail).sort((a,b)=> (b.completed+b.created+b.stageChanges) - (a.completed+a.created+a.stageChanges));
      },[tasks, role]);

      const KPI = ({icon, label, val, sub, valColor, onClick}) => (
        <div onClick={onClick}
          style={{
            background:'var(--surface)', border:'1px solid var(--border)', borderRadius:12,
            padding:'16px 18px', cursor:onClick?'pointer':'default',
            transition:'border-color .18s, box-shadow .18s', boxShadow:'var(--card-shadow)',
            display:'flex', flexDirection:'column', gap:0,
          }}
          onMouseEnter={onClick?e=>{e.currentTarget.style.borderColor='var(--accent)';e.currentTarget.style.boxShadow='var(--card-shadow-hover)';}:undefined}
          onMouseLeave={onClick?e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.boxShadow='var(--card-shadow)';}:undefined}>
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10}}>
            <span style={{fontSize:10, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.1em', color:'var(--text-muted)'}}>{label}</span>
            {icon && <span style={{width:28, height:28, borderRadius:8, background:'var(--surface2)', border:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-sub)', flexShrink:0}}>{icon}</span>}
          </div>
          <div style={{fontSize:30, fontWeight:900, lineHeight:1, color: valColor || 'var(--text)', letterSpacing:'-0.02em'}}>{val}</div>
          {sub && <div style={{color:'var(--text-muted)', fontSize:11, marginTop:5, fontWeight:500}}>{sub}</div>}
        </div>
      );

      return (
        <div className="-m-6 p-6 min-h-screen" style={{background:'var(--bg)'}}>
          {/* Hero greeting */}
          <div className="mb-6">
            <h1 className="text-2xl font-black text-white">{greeting}, {role==='admin'?'בוס':role==='office'?'מנהלת המשרד':'צוות'} 👋</h1>
            <p className="text-zinc-500 text-sm mt-1">{today} · {openTasks} משימות פתוחות · {fires.length>0?`${fires.length} שריפות פעילות 🔥`:'הכל בשליטה ✅'}</p>
          </div>

          {/* 🔥 Fires preview */}
          {fires.length > 0 && (
            <div className="mb-6 rounded-xl border border-red-900/40 bg-gradient-to-l from-red-950/40 via-orange-950/30 to-zinc-900/40 p-4">
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-2">
                  <span className="fire-icon text-2xl">🔥</span>
                  <h3 className="text-white font-bold">דורש תשומת לב מיידית</h3>
                  <span className="text-zinc-400 text-xs">— {fires.length} משימות</span>
                </div>
                <button onClick={()=>onNav&&onNav('tasks')} className="text-amber-400 hover:text-amber-300 text-xs bg-transparent border-0 cursor-pointer">לכל המשימות ←</button>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                {fires.slice(0, 6).map(({t, u}) => (
                  <div key={t.id} onClick={()=>onNav&&onNav('tasks')} className={`flex items-center gap-3 p-2.5 rounded-lg border cursor-pointer transition-all ${u.level==='critical'?'bg-red-500/10 border-red-500/30 hover:bg-red-500/20':'bg-orange-500/10 border-orange-500/30 hover:bg-orange-500/20'}`}>
                    <span className={`stage-dot urg-dot-${u.level}`}></span>
                    <div className="min-w-0 flex-1">
                      <div className="text-white text-sm font-semibold truncate">{t.title || 'ללא שם'}</div>
                      <div className={`text-[11px] truncate ${u.level==='critical'?'text-red-300':'text-orange-300'}`}>{u.reason}</div>
                    </div>
                    <span className="text-zinc-500 text-xs">{t.client||''}</span>
                  </div>
                ))}
              </div>
