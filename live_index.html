                style={{ background:'var(--border)', border:'1px solid var(--border2)', color:'var(--text-sub)', borderRadius:8, padding:'6px 10px', cursor:'pointer', fontSize:12 }}
                title="ביטול שיתוף"
              >
                בטל שיתוף
              </button>
            )}
          </div>

          {/* ── Task video tabs — shown when a task has multiple videos ── */}
          {(() => {
            const taskVids = taskFilter ? reviews.filter(r => r.taskId === taskFilter) : [];
            if (taskVids.length < 2) return null;
            return (
              <div style={{ display:'flex', alignItems:'center', gap:0, background:'var(--bg)', borderBottom:'1px solid var(--border)', padding:'0 12px', overflowX:'auto', flexShrink:0 }}>
                <span style={{ fontSize:10, color:'var(--text-muted)', fontWeight:600, marginLeft:10, whiteSpace:'nowrap', flexShrink:0 }}>סרטוני המשימה:</span>
                {taskVids.map((r, idx) => {
                  const st = REVIEW_STATUS[r.status] || REVIEW_STATUS.awaiting_am_review;
                  const isActive = activeReview?.id === r.id;
                  return (
                    <button
                      key={r.id}
                      onClick={() => setActiveReview(r)}
                      style={{
                        flexShrink:0, whiteSpace:'nowrap',
                        padding:'9px 14px', fontSize:11, fontWeight: isActive ? 700 : 500,
                        color: isActive ? 'var(--text)' : 'var(--text-sub)',
                        background: 'transparent', border: 'none',
                        borderBottom: isActive ? '2px solid #a5b4fc' : '2px solid transparent',
                        cursor:'pointer', display:'flex', alignItems:'center', gap:5,
                        transition:'color .15s',
                      }}
                    >
                      <span>{st.icon}</span>
                      <span>{r.title || `סרטון ${idx+1}`}</span>
                      {(r.commentCount||0) > 0 && (
                        <span style={{ background:'rgba(99,102,241,0.2)', color:'#a5b4fc', borderRadius:99, padding:'1px 6px', fontSize:9, fontWeight:700 }}>
                          {r.commentCount}
                        </span>
                      )}
                    </button>
                  );
                })}
                <button
                  onClick={() => setTaskFilter(null)}
                  style={{ marginRight:'auto', fontSize:10, color:'var(--text-muted)', background:'transparent', border:0, cursor:'pointer', padding:'0 8px', whiteSpace:'nowrap' }}
                  title="הצג את כל הסקירות"
                >✕ הצג הכל</button>
              </div>
            );
          })()}

          {/* ── Body: player + comments ── */}
          <div style={{ display:'flex', flex:1, overflow:'hidden' }}>

            {/* ── Player column ── */}
            <div style={{ flex:1, display:'flex', flexDirection:'column', background:'var(--bg)', minWidth:0 }}>

              {/* Video / iframe */}
              <div style={{ flex:1, position:'relative', background:'#000', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
                {driveLoading && (
                  <div style={{ color:'var(--text-sub)', fontSize:14, display:'flex', flexDirection:'column', alignItems:'center', gap:12 }}>
                    <div style={{ width:32, height:32, border:'3px solid var(--border2)', borderTopColor:'#f59e0b', borderRadius:'50%', animation:'spin 0.8s linear infinite' }} />
                    טוען קובץ Drive...
                  </div>
                )}
                {/* Google Drive iframe (fallback while OAuth not connected) */}
                {driveEmbedId && !driveLoading && !videoSrc && (
                  <>
                    <iframe
                      src={`https://drive.google.com/file/d/${driveEmbedId}/preview`}
                      style={{ width:'100%', height:'100%', border:'none' }}
                      allow="autoplay; fullscreen"
                      allowFullScreen
                    />
                    {/* Drive-connect overlay — shown when oauth not yet linked */}
                    {needsDriveAuth && (
                      <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.82)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:14, padding:20, textAlign:'center' }}>
                        <div style={{ fontSize:44 }}>📁</div>
                        <div style={{ color:'var(--text)', fontSize:17, fontWeight:700 }}>חבר את Google Drive</div>
                        <div style={{ color:'var(--text-sub)', fontSize:12, maxWidth:340, lineHeight:1.7 }}>
                          לאפשר הערות עם חותמת זמן וסימון על הוידאו, יש לחבר Drive פעם אחת.<br/>
                          <span style={{color:'#6b7280'}}>הסרטון גלוי כבר כ-iframe בינתיים.</span>
                        </div>
                        <button onClick={handleConnectDrive} className={CL.btn} style={{ padding:'9px 22px', fontSize:13 }}>
                          📁 חבר Google Drive — אפשר הערות
                        </button>
                        <button onClick={()=>setNeedsDriveAuth(false)} style={{ background:'transparent', border:0, color:'var(--text-sub)', fontSize:11, cursor:'pointer', textDecoration:'underline' }}>
                          המשך ב-iframe (ללא הערות מתוזמנות)
                        </button>
                      </div>
                    )}
                    {/* Subtle reminder banner when iframe mode is active */}
                    {!needsDriveAuth && (
                      <div style={{ position:'absolute', bottom:8, left:8, background:'rgba(0,0,0,0.72)', color:'#fbbf24', fontSize:10, borderRadius:6, padding:'3px 8px', display:'flex', alignItems:'center', gap:6 }}>
                        ⚠️ iframe — חבר Drive לציר זמן מלא
                        <button onClick={handleConnectDrive} style={{background:'rgba(245,158,11,0.2)',border:'1px solid rgba(245,158,11,0.4)',color:'#fcd34d',borderRadius:4,padding:'2px 7px',fontSize:10,cursor:'pointer'}}>חבר</button>
                      </div>
                    )}
                  </>
                )}
                {videoSrc && (
                  <div ref={overlayRef} style={{ position:'relative', maxWidth:'100%', maxHeight:'100%', width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <video
                      ref={videoRef}
                      src={videoSrc}
                      style={{ maxWidth:'100%', maxHeight:'100%', objectFit:'contain' }}
                      onClick={drawing ? null : togglePlay}
                    />
                    {/* Drawing canvas overlay */}
                    <DrawCanvas
                      videoRef={videoRef}
                      drawing={drawing}
                      tool={drawTool}
                      color={drawColor}
                      shapes={drawShapes}
                      onShapesChange={setDrawShapes}
                      readOnly={!drawing}
                      annotation={showAnnotationFor ? comments.find(c=>c.id===showAnnotationFor)?.annotation : null}
                    />
                  </div>
                )}
                {!videoSrc && !driveEmbedId && !embedUrl && !driveLoading && (
                  <div style={{ color:'var(--text-muted)', fontSize:13 }}>אין וידאו</div>
                )}
              </div>

              {/* Custom controls — only for native video */}
              {videoSrc && !driveEmbedId && (
                <div style={{ background:'var(--surface)', borderTop:'1px solid var(--border)', padding:'8px 14px', flexShrink:0 }}>

                  {/* Progress bar */}
                  <div
                    ref={progressRef}
                    onClick={onProgressClick}
                    onMouseMove={onProgressHover}
                    onMouseLeave={() => setHoverTime(null)}
                    style={{ position:'relative', height:6, background:'var(--border)', borderRadius:3, cursor:'crosshair', marginBottom:8 }}
                  >
                    {/* Played fill */}
                    <div style={{ position:'absolute', left:0, top:0, height:'100%', width:`${pct}%`, background:'#fbbf24', borderRadius:3, transition:'width 0.1s linear' }} />

                    {/* Comment marker dots (and range bars) */}
                    {duration > 0 && comments.map(c => (
                      c.timeStart != null && c.timeEnd != null ? (
                        /* Range bar */
                        <div
                          key={c.id}
                          title={`${fmtTime(c.timeStart)}–${fmtTime(c.timeEnd)}: ${c.text}`}
                          onClick={e => { e.stopPropagation(); seek(c.timeStart); setActiveCommentId(c.id); }}
                          style={{
                            position:'absolute',
                            left:`${(c.timeStart / duration) * 100}%`,
                            width:`${((c.timeEnd - c.timeStart) / duration) * 100}%`,
                            top:1,
                            height:4,
                            background: c.resolved ? 'rgba(34,197,94,0.55)' : 'rgba(139,92,246,0.55)',
                            borderLeft: `2px solid ${c.resolved ? '#22c55e' : '#a78bfa'}`,
                            borderRight: `2px solid ${c.resolved ? '#22c55e' : '#a78bfa'}`,
                            borderRadius:2,
                            cursor:'pointer',
                            zIndex:2,
                          }}
                        />
                      ) : (
                        /* Point dot */
                        <div
                          key={c.id}
                          title={`${fmtTime(c.time)}: ${c.text}`}
                          onClick={e => { e.stopPropagation(); seek(c.time); setActiveCommentId(c.id); }}
                          style={{
                            position:'absolute',
                            left:`${(c.time / duration) * 100}%`,
                            top:-3,
                            transform:'translateX(-50%)',
                            width:12,
                            height:12,
                            borderRadius:'50%',
                            background: c.resolved ? '#22c55e' : '#3b82f6',
                            border:'2px solid var(--bg)',
                            cursor:'pointer',
                            zIndex:2,
                          }}
                        />
                      )
                    ))}

                    {/* Range marker highlight on the progress bar */}
                    {rangeMode && rangeStart !== null && duration > 0 && (
                      <div style={{
                        position:'absolute',
                        left:`${(rangeStart / duration) * 100}%`,
                        width: pendingTimeEnd !== null ? `${((pendingTimeEnd - rangeStart) / duration) * 100}%` : '2px',
                        top:0,
                        height:'100%',
                        background:'rgba(139,92,246,0.45)',
                        borderLeft:'2px solid #a78bfa',
                        borderRight: pendingTimeEnd !== null ? '2px solid #a78bfa' : 'none',
                        borderRadius:2,
                        pointerEvents:'none',
                        zIndex:1,
                      }} />
                    )}

                    {/* Hover tooltip */}
                    {hoverTime !== null && (
                      <div style={{ position:'absolute', left:hoverX, bottom:12, transform:'translateX(-50%)', background:'var(--surface)', color:'var(--text)', fontSize:11, padding:'2px 7px', borderRadius:5, pointerEvents:'none', whiteSpace:'nowrap', border:'1px solid var(--border)' }}>
                        {fmtTime(hoverTime)}
                      </div>
                    )}
                  </div>

                  {/* Controls row */}
                  <div style={{ display:'flex', alignItems:'center', gap:10, color:'var(--text-sub)', fontSize:13 }}>
                    <button onClick={togglePlay} style={{ background:'none', border:'none', color:'var(--text)', fontSize:20, cursor:'pointer', lineHeight:1, padding:'0 2px' }}>
                      {playing ? '⏸' : '▶'}
                    </button>
                    <span style={{ color:'var(--text-sub)', fontSize:12, minWidth:80 }}>{fmtTime(currentTime)} / {fmtTime(duration)}</span>
                    <div style={{ flex:1 }} />
                    <button onClick={() => { const v = videoRef.current; if(v){ v.muted=!v.muted; setMuted(v.muted); } }} style={{ background:'none', border:'none', color:'var(--text-sub)', cursor:'pointer', fontSize:16 }}>
                      {muted ? '🔇' : '🔊'}
                    </button>
                    <input
                      type="range" min="0" max="1" step="0.05" value={muted ? 0 : volume}
                      onChange={e => { const val=parseFloat(e.target.value); setVolume(val); const v=videoRef.current; if(v){v.volume=val; if(val>0) setMuted(false);} }}
                      style={{ width:70, accentColor:'#f59e0b', cursor:'pointer' }}
                    />
                    <button
                      onClick={() => { setRangeMode(m => { const next=!m; if(!m){setRangeStart(null);setPendingTimeEnd(null);} return next; }); }}
                      title={rangeMode ? 'מצב נקודה (לחץ להחלפה)' : 'מצב טווח זמן (לחץ להחלפה)'}
                      style={{ background: rangeMode ? 'rgba(139,92,246,0.2)' : 'rgba(39,39,42,0.8)', border:`1px solid ${rangeMode ? '#a78bfa' : 'var(--border2)'}`, color: rangeMode ? '#a78bfa' : 'var(--text-sub)', borderRadius:6, padding:'2px 8px', fontSize:11, cursor:'pointer', whiteSpace:'nowrap' }}
                    >{rangeMode ? '⟷ טווח' : '• נקודה'}</button>
                    <button
                      onClick={() => { const v = videoRef.current; if(v && document.fullscreenEnabled) v.requestFullscreen(); }}
                      style={{ background:'none', border:'none', color:'var(--text-sub)', cursor:'pointer', fontSize:14 }}
                    >⛶</button>
                  </div>
                </div>
              )}

              {/* Pending comment input */}
              {pendingTime !== null && (
                <div style={{ background:'var(--surface)', borderTop:'1px solid #3b82f6', padding:'10px 14px', flexShrink:0 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8, flexWrap:'wrap' }}>
                    {rangeMode && pendingTimeEnd !== null ? (
                      <span style={{ color:'#c4b5fd', fontSize:12 }}>🎯 הערה לטווח: {fmtTime(pendingTime)} → {fmtTime(pendingTimeEnd)}</span>
                    ) : rangeMode && rangeStart !== null ? (
                      <span style={{ color:'#c4b5fd', fontSize:12 }}>🎯 לחץ על הטיימליין לסיום הטווח (מ-{fmtTime(rangeStart)})</span>
                    ) : (
                      <span style={{ color:'#93c5fd', fontSize:12 }}>💬 הוסף הערה ב-{fmtTime(pendingTime)}</span>
                    )}
                    <div style={{ flex:1 }} />
                    <button
                      onClick={() => setDrawing(d => !d)}
                      style={{ background: drawing ? 'rgba(245,158,11,0.2)' : 'rgba(39,39,42,0.8)', border:`1px solid ${drawing ? '#f59e0b' : 'var(--border2)'}`, color: drawing ? '#fbbf24' : 'var(--text-sub)', borderRadius:6, padding:'3px 9px', fontSize:11, cursor:'pointer' }}
                      title="סמן על הוידאו"
                    >
                      ✏️ {drawing ? 'מסמן...' : 'סמן על הוידאו'}
                    </button>
                  </div>
                  {drawing && (
                    <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:8, padding:'6px 8px', background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:6, flexWrap:'wrap' }}>
                      {[['arrow','↗','חץ'],['rect','▭','מלבן'],['free','✎','חופשי']].map(([t, ic, lbl]) => (
                        <button
                          key={t}
                          onClick={() => setDrawTool(t)}
                          title={lbl}
                          style={{ background: drawTool===t ? 'rgba(245,158,11,0.2)' : 'transparent', border:`1px solid ${drawTool===t ? '#f59e0b' : 'var(--border2)'}`, color: drawTool===t ? '#fbbf24' : 'var(--text-sub)', borderRadius:5, padding:'2px 8px', fontSize:13, cursor:'pointer', minWidth:30 }}
                        >{ic}</button>
                      ))}
                      <div style={{ width:1, height:18, background:'var(--border2)' }} />
                      {['#fbbf24','#ef4444','#22c55e','#3b82f6','#fafafa'].map(c => (
                        <button
                          key={c}
                          onClick={() => setDrawColor(c)}
                          title={c}
                          style={{ width:18, height:18, borderRadius:'50%', background:c, border: drawColor===c ? '2px solid #fff' : '1px solid var(--border2)', cursor:'pointer', padding:0 }}
                        />
                      ))}
                      <div style={{ flex:1 }} />
                      {drawShapes.length > 0 && (
                        <>
                          <button onClick={() => setDrawShapes(s => s.slice(0,-1))} style={{ background:'transparent', border:'1px solid var(--border2)', color:'var(--text-sub)', borderRadius:5, padding:'2px 8px', fontSize:11, cursor:'pointer' }}>↶ בטל</button>
                          <button onClick={() => setDrawShapes([])} style={{ background:'transparent', border:'1px solid var(--border2)', color:'var(--text-sub)', borderRadius:5, padding:'2px 8px', fontSize:11, cursor:'pointer' }}>נקה</button>
                        </>
                      )}
                    </div>
                  )}
                  <textarea
                    ref={newTextRef}
                    rows={2}
                    className={CL.input}
                    placeholder="כתוב הערה..."
                    value={newText}
                    onChange={e => setNewText(e.target.value)}
                    onKeyDown={e => { if (e.key === 'Escape') { setPendingTime(null); setNewText(''); setDrawShapes([]); setDrawing(false); } if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addComment(); }}
                    style={{ marginBottom:8, resize:'none' }}
                  />
                  <div style={{ display:'flex', gap:8, alignItems:'center' }}>
                    <button className={CL.btn} onClick={addComment} disabled={!newText.trim()}>הוסף</button>
                    <button className={CL.btn2} onClick={() => { setPendingTime(null); setNewText(''); setDrawShapes([]); setDrawing(false); }}>ביטול</button>
                    {drawShapes.length > 0 && <span style={{ fontSize:11, color:'var(--text-sub)' }}>{drawShapes.length} סימונים</span>}
                  </div>
                </div>
              )}

              {/* Keyboard hints */}
              {videoSrc && !driveEmbedId && (
                <div style={{ background:'var(--bg)', borderTop:'1px solid var(--surface2)', padding:'4px 14px', flexShrink:0, textAlign:'center' }}>
                  <span style={{ fontSize:10, color:'var(--border2)' }}>SPACE · ← → ±5 שניות · C הוסף הערה</span>
                </div>
              )}
            </div>

            {/* ── Comments panel ── */}
            <div style={{ width:350, flexShrink:0, background:'var(--surface)', borderRight:'1px solid var(--border)', display:'flex', flexDirection:'column', overflow:'hidden' }}>

              {/* Filter tabs */}
              <div style={{ display:'flex', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
                {[['open',`פתוחות (${openCount})`],['resolved',`מוסכמות (${resolvedCount})`],['all',`הכל (${comments.length})`]].map(([val,lbl]) => (
                  <button
                    key={val}
                    onClick={() => setFilter(val)}
                    style={{ flex:1, background:'none', border:'none', borderBottom: filter===val ? '2px solid #f59e0b' : '2px solid transparent', color: filter===val ? '#f59e0b' : 'var(--text-sub)', padding:'10px 4px', fontSize:11, cursor:'pointer', fontFamily:'inherit', fontWeight: filter===val ? 700 : 400, transition:'all .15s' }}
                  >
                    {lbl}
                  </button>
                ))}
              </div>

              {/* Export bar */}
              {comments.length > 0 && (
                <div style={{ display:'flex', gap:6, padding:'6px 8px', borderBottom:'1px solid var(--border)', background:'var(--surface2)', flexShrink:0 }}>
                  <button
                    onClick={async () => {
                      const list = [...comments].sort((a,b)=>(a.time||0)-(b.time||0));
                      const lines = [`📋 רשימת תיקונים — ${activeReview.title}`, `סה"כ: ${list.length} הערות (${list.filter(c=>!c.resolved).length} פתוחות)`, ''];
                      list.forEach((c,i) => {
                        const status = c.resolved ? '✅' : '🔸';
                        lines.push(`${status} ${i+1}. [${fmtTime(c.time)}] ${c.authorName}${c.guest?' (לקוח)':''}`);
                        lines.push(`   ${c.text}`);
                        if (c.annotation?.shapes?.length) lines.push(`   ✏️ כולל סימון על הוידאו (${c.annotation.shapes.length} צורות)`);
                        if (c.replies?.length) c.replies.forEach(r => lines.push(`   ↳ ${r.authorName}: ${r.text}`));
                        lines.push('');
                      });
                      const txt = lines.join('\n');
                      try { await navigator.clipboard.writeText(txt); showToast('רשימת התיקונים הועתקה ללוח','success'); }
                      catch { prompt('העתק את הטקסט:', txt); }
                    }}
                    style={{ flex:1, background:'rgba(34,197,94,0.12)', border:'1px solid rgba(34,197,94,0.3)', color:'#4ade80', borderRadius:6, padding:'5px 8px', fontSize:11, cursor:'pointer', fontWeight:600 }}
                    title="העתק רשימה מסודרת ללוח"
                  >
                    📋 העתק לעורך
                  </button>
                  <button
                    onClick={() => {
                      const list = [...comments].sort((a,b)=>(a.time||0)-(b.time||0));
                      const rows = list.map(c => [
                        fmtTime(c.time),
                        c.resolved ? 'מוסכם' : 'פתוח',
                        c.authorName + (c.guest?' (לקוח)':''),
                        (c.text||'').replace(/"/g,'""'),
                        c.annotation?.shapes?.length ? 'כן' : '',
                      ]);
                      const csv = '\uFEFF' + ['זמן,סטטוס,מאת,הערה,סימון', ...rows.map(r => r.map(x=>`"${x}"`).join(','))].join('\n');
                      const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
                      const a = document.createElement('a');
                      a.href = URL.createObjectURL(blob);
                      a.download = `תיקונים-${(activeReview.title||'review').replace(/[^\w\u0590-\u05FF -]/g,'')}.csv`;
                      a.click();
                    }}
                    style={{ background:'rgba(59,130,246,0.12)', border:'1px solid rgba(59,130,246,0.3)', color:'#60a5fa', borderRadius:6, padding:'5px 10px', fontSize:11, cursor:'pointer', fontWeight:600 }}
                    title="הורד CSV"
                  >
                    ⬇ CSV
                  </button>
                </div>
              )}

              {/* Comment list */}
              <div style={{ flex:1, overflowY:'auto', padding:10 }}>
                {filteredComments.length === 0 ? (
                  <div style={{ color:'var(--text-muted)', fontSize:12, textAlign:'center', paddingTop:32 }}>אין הערות</div>
                ) : filteredComments.map(c => (
                  <div
                    key={c.id}
                    onClick={() => { seek(c.time); setActiveCommentId(c.id); setShowAnnotationFor(c.annotation ? c.id : null); }}
                    style={{
                      background: activeCommentId===c.id ? 'var(--surface2)' : 'var(--surface)',
                      border:`1px solid ${activeCommentId===c.id ? 'var(--border2)' : 'var(--border)'}`,
                      borderLeft: activeCommentId===c.id ? '3px solid #fbbf24' : '3px solid transparent',
                      borderRadius:10,
                      padding:'10px 10px',
                      marginBottom:8,
                      cursor:'pointer',
                      transition:'all .12s',
                    }}
                  >
                    {/* Header row */}
                    <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
                      {c.timeStart != null && c.timeEnd != null ? (
                        <span
                          onClick={e => { e.stopPropagation(); seek(c.timeStart); }}
                          style={{ background:'rgba(139,92,246,0.15)', color:'#a78bfa', fontSize:10, padding:'2px 7px', borderRadius:99, border:'1px solid rgba(139,92,246,0.3)', cursor:'pointer', whiteSpace:'nowrap' }}
                          title="לחץ לקפוץ לתחילת הטווח"
                        >
                          ⟷ {fmtTime(c.timeStart)} – {fmtTime(c.timeEnd)}
                        </span>
                      ) : (
                        <span
                          onClick={e => { e.stopPropagation(); seek(c.time); }}
                          style={{ background:'rgba(59,130,246,0.15)', color:'#60a5fa', fontSize:10, padding:'2px 7px', borderRadius:99, border:'1px solid rgba(59,130,246,0.25)', cursor:'pointer', whiteSpace:'nowrap' }}
                        >
                          ⏱ {fmtTime(c.time)}
                        </span>
                      )}
                      <span style={{ fontSize:11, color:'var(--text-sub)', fontWeight:600, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{c.authorName}{c.guest ? ' (לקוח)' : ''}</span>
                      {c.round && (
                        <span title={`סבב ${c.round}`} style={{ fontSize:9, color:'#a78bfa', background:'rgba(167,139,250,0.12)', border:'1px solid rgba(167,139,250,0.25)', padding:'1px 5px', borderRadius:4, fontWeight:700 }}>
                          ס{c.round}
                        </span>
                      )}
                      {c.version && (activeReview.currentVersion || 1) > c.version && (
                        <span title={`הערה מגרסה v${c.version}`} style={{ fontSize:9, color:'#fbbf24', background:'rgba(245,158,11,0.12)', border:'1px solid rgba(245,158,11,0.25)', padding:'1px 5px', borderRadius:4, fontWeight:700 }}>
                          מ-v{c.version}
                        </span>
                      )}
                      {c.annotation?.shapes?.length > 0 && (
                        <span title="כולל סימון על הוידאו" style={{ fontSize:10, color: showAnnotationFor===c.id ? '#fbbf24' : '#a78bfa', background: showAnnotationFor===c.id ? 'rgba(245,158,11,0.15)' : 'rgba(167,139,250,0.12)', border:`1px solid ${showAnnotationFor===c.id ? 'rgba(245,158,11,0.3)' : 'rgba(167,139,250,0.25)'}`, padding:'1px 5px', borderRadius:4 }}>✏️</span>
                      )}
                      <span style={{ fontSize:10, color:'var(--text-muted)' }}>{relTime(c.createdAt)}</span>
                    </div>

                    {/* Text */}
                    <div style={{ fontSize:13, color:'var(--text)', lineHeight:1.5, marginBottom:8 }}>{c.text}</div>

                    {/* Replies */}
                    {c.replies?.length > 0 && (
                      <div style={{ borderTop:'1px solid var(--border)', marginBottom:8, paddingTop:6 }}>
                        {c.replies.map((r,i) => (
                          <div key={i} style={{ fontSize:11, color:'var(--text-sub)', paddingRight:8, borderRight:'2px solid var(--border2)', marginBottom:4 }}>
                            <span style={{ color:'var(--text-sub)', fontWeight:600 }}>{r.authorName}: </span>{r.text}
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Inline reply input */}
                    {replyTo === c.id && (
                      <div onClick={e => e.stopPropagation()} style={{ marginBottom:8 }}>
                        <input
                          className={CL.input}
                          placeholder="כתוב תגובה..."
                          value={replyText}
                          onChange={e => setReplyText(e.target.value)}
                          onKeyDown={e => { if(e.key==='Enter') addReply(c); if(e.key==='Escape'){setReplyTo(null);setReplyText('');} }}
                          style={{ marginBottom:6, fontSize:12 }}
                          autoFocus
                        />
                        <div style={{ display:'flex', gap:6 }}>
                          <button className={CL.btn} style={{ fontSize:11, padding:'4px 10px' }} onClick={() => addReply(c)}>שלח</button>
                          <button className={CL.btn2} style={{ fontSize:11, padding:'4px 10px' }} onClick={() => { setReplyTo(null); setReplyText(''); }}>ביטול</button>
                        </div>
                      </div>
                    )}

                    {/* Action buttons */}
                    <div onClick={e => e.stopPropagation()} style={{ display:'flex', gap:4 }}>
                      <button
                        onClick={() => toggleResolve(c)}
                        title={c.resolved ? 'בטל אישור' : 'סמן כמוסכם'}
                        style={{ background: c.resolved ? 'rgba(34,197,94,0.15)' : 'rgba(39,39,42,0.8)', border:`1px solid ${c.resolved ? 'rgba(34,197,94,0.3)' : 'var(--border2)'}`, color: c.resolved ? '#4ade80' : 'var(--text-sub)', borderRadius:6, padding:'3px 8px', fontSize:11, cursor:'pointer' }}
                      >
                        ✓
                      </button>
                      <button
                        onClick={() => { setReplyTo(replyTo===c.id ? null : c.id); setReplyText(''); }}
                        style={{ background:'rgba(39,39,42,0.8)', border:'1px solid var(--border2)', color:'var(--text-sub)', borderRadius:6, padding:'3px 8px', fontSize:11, cursor:'pointer' }}
                      >
                        ↩ השב
                      </button>
                      <button
                        onClick={() => deleteComment(c)}
                        style={{ background:'rgba(127,29,29,0.2)', border:'1px solid rgba(239,68,68,0.2)', color:'#f87171', borderRadius:6, padding:'3px 8px', fontSize:11, cursor:'pointer', marginRight:'auto' }}
                      >
                        🗑
                      </button>
                    </div>
                  </div>
                ))}
              </div>

              {/* Add comment hint */}
              {!driveEmbedId && (
                <div style={{ padding:'8px 10px', borderTop:'1px solid var(--border)', flexShrink:0 }}>
                  <button
                    onClick={() => { const v = videoRef.current; if(v){ v.pause(); setPendingTime(v.currentTime); setShowAnnotationFor(null); setDrawShapes([]); } }}
                    style={{ width:'100%', background:'rgba(245,158,11,0.08)', border:'1px dashed rgba(245,158,11,0.3)', color:'#f59e0b', borderRadius:8, padding:'7px', fontSize:12, cursor:'pointer' }}
                  >
                    + הוסף הערה בנקודה הנוכחית
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ── AGENT ── */
    function Agent({ user, role, clients=[], tasks=[] }) {
      const [logs,        setLogs]        = useState([]);
      const [suggestions, setSuggestions] = useState([]);
      const [loading,     setLoading]     = useState(true);
      const [configForm,  setConfigForm]  = useState({ webhookToken:'', phoneNumber:'', wapiToken:'', claudeKey:'' });
      const [showConfig,  setShowConfig]  = useState(false);
      const [savedConfig, setSavedConfig] = useState(null);
      const CF = f => setConfigForm(p=>({...p,...f}));

      useEffect(()=>{
        if (!db||!user) return;
        const unsub = db.collection('agentConfig').doc(user.uid).onSnapshot(snap=>{
          if (snap.exists) { const d=snap.data(); setSavedConfig(d); setConfigForm({webhookToken:d.webhookToken||'',phoneNumber:d.phoneNumber||'',wapiToken:d.wapiToken||'',claudeKey:d.claudeKey||''}); }
        });
        return unsub;
      },[user]);

      useEffect(()=>{
        if (!db||!user) return;
        const unsub = db.collection('agentLogs').where('userId','==',user.uid)
          .orderBy('createdAt','desc').limit(60)
          .onSnapshot(snap=>{ setLogs(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false); }, ()=>setLoading(false));
        return unsub;
      },[user]);

      useEffect(()=>{
        if (!db||!user) return;
        const unsub = db.collection('agentSuggestions').where('userId','==',user.uid).where('status','==','pending')
          .orderBy('createdAt','desc').limit(20)
          .onSnapshot(snap=>setSuggestions(snap.docs.map(d=>({id:d.id,...d.data()}))), ()=>{});
        return unsub;
      },[user]);

      const saveConfig = async () => {
        await db.collection('agentConfig').doc(user.uid).set({ ...configForm, userId:user.uid, updatedAt:firebase.firestore.FieldValue.serverTimestamp() }, { merge:true });
        setShowConfig(false);
      };

      const acceptSuggestion = async sug => {
        await db.collection('tasks').add({ title:sug.taskTitle, client:sug.clientName||'', stage:1, priority:'medium',
          notes:`🤖 נוצר מהסוכן:\n${sug.messageSnippet||''}`, userId:user.uid, createdAt:firebase.firestore.FieldValue.serverTimestamp() });
        await db.collection('agentSuggestions').doc(sug.id).update({ status:'accepted' });
        await db.collection('agentLogs').doc(sug.logId||'_').update({ status:'task_created' }).catch(()=>{});
      };

      const rejectSuggestion = async sug => {
        await db.collection('agentSuggestions').doc(sug.id).update({ status:'rejected' });
      };

      // Phone → client+contact lookup map
      const phoneMap = {};
      clients.forEach(c=>{
        (c.contacts||[]).forEach(ct=>{
          const clean = (ct.phone||'').replace(/\D/g,'');
          if (clean) phoneMap[clean] = { clientName:c.name, contactName:ct.name, contactRole:ct.role };
        });
        // Also legacy
        if (c.contactPhone && !phoneMap[(c.contactPhone||'').replace(/\D/g,'')]) {
          phoneMap[(c.contactPhone||'').replace(/\D/g,'')] = { clientName:c.name, contactName:c.contactName||'', contactRole:'' };
        }
      });

      const webhookUrl = 'https://crm.tingil.co/agent/webhook';
      const isConfigured = !!savedConfig?.phoneNumber;

      const sourceIcon  = t => t==='whatsapp'?'📱':t==='email'?'📧':'💬';
      const statusBadge = s => s==='task_created'?{bg:'bg-emerald-500/20',text:'text-emerald-400',label:'✓ משימה נוצרה'}:
                               s==='suggested'?{bg:'bg-amber-500/20',text:'text-amber-400',label:'💡 הוצע'}:
                               s==='no_action'?{bg:'bg-zinc-800',text:'text-zinc-500',label:'—'}:
                               {bg:'bg-zinc-800',text:'text-zinc-500',label:s||''};

      return (
        <div>
          <SectionTitle title="🤖 סוכן CRM" sub="מעקב WhatsApp ומייל — הצעות משימות אוטומטיות" onAdd={()=>setShowConfig(true)} addLabel="⚙️ הגדרות" />

          {/* Stats row */}
          <div className="grid grid-cols-4 gap-3 mb-6">
            {[
              { v:suggestions.length,                            label:'ממתין לאישור',      color:'text-amber-400' },
              { v:logs.filter(l=>l.type==='whatsapp').length,   label:'WhatsApp',           color:'text-green-400' },
              { v:logs.filter(l=>l.type==='email').length,       label:'מיילים',             color:'text-blue-400' },
              { v:logs.filter(l=>l.status==='task_created').length, label:'משימות נוצרו',   color:'text-emerald-400' },
            ].map((s,i)=>(
              <div key={i} className="bg-zinc-900/60 rounded-xl border border-zinc-800 p-4">
                <div className={`text-2xl font-bold ${s.color}`}>{s.v}</div>
                <div className="text-xs text-zinc-400 mt-1">{s.label}</div>
              </div>
            ))}
          </div>

          {/* Setup warning */}
          {!isConfigured && (
            <div className="mb-6 p-4 rounded-xl bg-amber-400/10 border border-amber-400/30">
              <div className="font-semibold text-amber-400 mb-1">🔧 נדרשת הגדרה ראשונית</div>
              <div className="text-sm text-zinc-300 mb-3">חבר את WhatsApp Business API (Meta) כדי שהסוכן יוכל לקלוט הודעות ולהציע משימות.</div>
              <div className="text-xs text-zinc-400 mb-3">כתובת Webhook: <code className="text-amber-400 bg-zinc-800 px-2 py-0.5 rounded">{webhookUrl}</code></div>
              <button onClick={()=>setShowConfig(true)} className={CL.btn}>פתח הגדרות</button>
            </div>
          )}

          {/* Pending suggestions */}
          {suggestions.length>0 && (
            <div className="mb-6">
              <div className="text-sm font-semibold text-white mb-3">💡 הצעות למשימות — ממתינות לאישור</div>
              <div className="space-y-2">
                {suggestions.map(sug=>{
                  const sender = phoneMap[(sug.from||'').replace(/\D/g,'')] || { clientName:sug.clientName||sug.from, contactName:null };
                  return (
                    <div key={sug.id} className="bg-zinc-900/60 rounded-xl border border-amber-400/25 p-4">
                      <div className="flex items-start gap-3">
                        <span className="text-xl mt-0.5">{sourceIcon(sug.source)}</span>
                        <div className="flex-1 min-w-0">
                          <div className="text-white font-semibold text-sm">{sug.taskTitle}</div>
                          <div className="text-xs text-zinc-400 mt-0.5">
                            {sender.clientName && <span className="text-amber-400">{sender.clientName}</span>}
                            {sender.contactName && <span className="text-zinc-400"> · {sender.contactName}</span>}
                          </div>
                          <div className="text-xs text-zinc-500 mt-1 italic line-clamp-2">"{(sug.messageSnippet||'').slice(0,120)}"</div>
                          <div className="flex gap-3 mt-1">
                            {sug.topics?.map((t,i)=><span key={i} className="text-xs px-1.5 py-0.5 bg-zinc-800 text-zinc-400 rounded">{t}</span>)}
                            <span className="text-xs text-zinc-600">ביטחון: {sug.confidence}%</span>
                          </div>
                        </div>
                        <div className="flex flex-col gap-1.5 flex-shrink-0">
                          <button onClick={()=>acceptSuggestion(sug)} className="text-xs px-3 py-1.5 bg-emerald-500/20 text-emerald-400 border border-emerald-500/40 rounded-lg cursor-pointer hover:bg-emerald-500/30 whitespace-nowrap">✓ צור משימה</button>
                          <button onClick={()=>rejectSuggestion(sug)} className="text-xs px-3 py-1.5 bg-zinc-800 text-zinc-400 border border-zinc-700 rounded-lg cursor-pointer hover:bg-zinc-700">✕ דחה</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Activity log */}
          <div>
            <div className="text-sm font-semibold text-white mb-3">📋 לוג פעילות</div>
            {loading && <div className="text-center py-8 text-zinc-400 text-sm">טוען...</div>}
            {!loading && logs.length===0 && (
              <div className="text-center py-12 text-zinc-500 text-sm">
                <div className="text-4xl mb-3">🤖</div>
                <div className="font-medium">הסוכן מוכן — ממתין להודעות</div>
                <div className="text-xs mt-1 text-zinc-600">כאשר יגיעו הודעות WhatsApp או מיילים הן יופיעו כאן</div>
              </div>
            )}
            <div className="space-y-1.5">
              {logs.map(log=>{
                const sender = phoneMap[(log.from||'').replace(/\D/g,'')] || { clientName:log.from, contactName:null };
                const sb = statusBadge(log.status);
                const ts = log.createdAt?.toDate?.();
                return (
                  <div key={log.id} className="flex gap-3 p-3 rounded-lg border border-zinc-800/60 hover:bg-zinc-900/40">
                    <span className="text-xl flex-shrink-0">{sourceIcon(log.type)}</span>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="text-sm font-semibold text-white">{sender.clientName||log.from||'?'}</span>
                        {sender.contactName && <span className="text-xs text-zinc-400">· {sender.contactName}</span>}
                        {log.topics?.length>0 && log.topics.map((t,i)=><span key={i} className="text-xs px-1.5 py-0.5 bg-zinc-800 text-zinc-500 rounded">{t}</span>)}
                        <span className="text-xs text-zinc-600 mr-auto">{ts?ts.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}):''}</span>
                      </div>
                      <div className="text-xs text-zinc-400 mt-0.5 truncate">{(log.message||'').slice(0,120)}</div>
                    </div>
                    <span className={`text-xs px-2 py-0.5 rounded-full self-start flex-shrink-0 ${sb.bg} ${sb.text}`}>{sb.label}</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Config modal */}
          {showConfig && (
            <Modal title="⚙️ הגדרות סוכן CRM" onClose={()=>setShowConfig(false)} wide>
              <div className="space-y-4">
                <div className="p-3 bg-zinc-800/60 rounded-lg">
                  <div className="text-xs font-semibold text-zinc-300 mb-1">כתובת Webhook (Meta WhatsApp):</div>
                  <code className="text-amber-400 text-xs">{webhookUrl}</code>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className={CL.label}>מספר WhatsApp Business</label>
                    <input className={CL.input} placeholder="972501234567" value={configForm.phoneNumber} onChange={e=>CF({phoneNumber:e.target.value})} />
                  </div>
                  <div>
                    <label className={CL.label}>Webhook Verify Token</label>
                    <input className={CL.input} placeholder="סיסמה סודית לאימות" value={configForm.webhookToken} onChange={e=>CF({webhookToken:e.target.value})} />
                  </div>
                  <div>
                    <label className={CL.label}>WhatsApp API Token (Meta)</label>
                    <input className={CL.input} placeholder="EAA..." value={configForm.wapiToken} onChange={e=>CF({wapiToken:e.target.value})} />
                  </div>
                  <div>
                    <label className={CL.label}>Claude API Key (לניתוח AI)</label>
                    <input className={CL.input} type="password" placeholder="sk-ant-..." value={configForm.claudeKey} onChange={e=>CF({claudeKey:e.target.value})} />
                  </div>
                </div>
                <div className="p-3 bg-zinc-800/40 rounded-lg">
                  <div className="text-xs font-semibold text-zinc-300 mb-2">📋 הוראות הגדרה (Meta WhatsApp Cloud API — חינמי):</div>
                  <ol className="text-xs text-zinc-400 space-y-1 list-decimal list-inside">
                    <li>נכנס ל-developers.facebook.com → צור App → WhatsApp</li>
                    <li>הוסף מספר טלפון → קבל API Token</li>
                    <li>ב-Webhooks הכנס את כתובת ה-Webhook למעלה + Verify Token</li>
                    <li>בחר לנטר: messages</li>
                    <li>הדבק את ה-API Token ו-Claude Key למעלה ולחץ שמור</li>
                  </ol>
                </div>
                <div className="flex gap-2 justify-end pt-2">
                  <button onClick={()=>setShowConfig(false)} className={CL.btn2}>ביטול</button>
                  <button onClick={saveConfig} className={CL.btn}>שמור הגדרות</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* ── ROOT ── */
    function App() {
      const [user,    setUser]    = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(()=>{
        if (!auth) { setLoading(false); return; }
        return auth.onAuthStateChanged(u=>{
          setUser(u); setLoading(false);
          // Eagerly refresh Drive token so the AM doesn't get popups mid-session
          if (u && driveConsented.get() && !driveToken.get()) {
            driveSilentRefresh().catch(()=>{});
          }
        });
      },[]);

      if (loading) {
        return (
          <div style={{minHeight:'100vh',background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{textAlign:'center'}}>
              <div className="logo-mark" style={{width:'48px',height:'48px',fontSize:'16px',margin:'0 auto 12px',borderRadius:'12px'}}>TM</div>
              <p style={{color:'var(--text-muted)',fontSize:'14px'}}>טוען...</p>
            </div>
          </div>
        );
      }

      return user ? <MainApp user={user} /> : <Login />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
