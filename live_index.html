      const [mappings, setMappings] = useState([]);
      const [unmapped, setUnmapped] = useState([]);
      // timeline
      const [tlClient, setTlClient] = useState('');
      const [tlMsgs, setTlMsgs] = useState([]);
      const [tlLoading, setTlLoading] = useState(false);
      // brains
      const [brains, setBrains] = useState([]);
      const [brainBusy, setBrainBusy] = useState({});   // client_id -> true while learning

      const loadInbox = async () => {
        try {
          setSuggestions(await csFetch('/suggestions?status=pending'));
          setStats(await csFetch('/stats'));
        } catch(e){ console.warn('cs inbox:', e.message); }
        finally { setLoadingSug(false); }
      };

      const loadConnections = async () => {
        try {
          const st = await csFetch('/wa/status'); setWaStatus(st);
          if (st.status === 'qr') { const q = await csFetch('/wa/qr'); setWaQr(q.qr); }
          else setWaQr(null);
          if (st.status === 'connected') setWaChats(await csFetch('/wa/chats?limit=500'));
          setMappings(await csFetch('/mappings'));
          setUnmapped(await csFetch('/threads/unmapped'));
        } catch(e){ console.warn('cs conn:', e.message); }
      };

      const loadBrains = async () => {
        try { setBrains(await csFetch('/brains')); } catch(e){ console.warn('brains:', e.message); }
      };
      const learnBrain = async (clientId, clientName) => {
        setBrainBusy(p=>({...p, [clientId]:true}));
        try {
          await csFetch('/brain/'+encodeURIComponent(clientId)+'/learn', { method:'POST', body: JSON.stringify({ client_name: clientName }) });
          showToast('🧠 הסוכן לומד את '+clientName+' — סורק את כל השיח...', 'success');
          // poll until status idle
          for (let i=0;i<30;i++){
            await new Promise(r=>setTimeout(r,3000));
            const list = await csFetch('/brains');
            setBrains(list);
            const b = list.find(x=>x.client_id===clientId);
            if (b && b.status!=='learning') break;
          }
        } catch(e){ showToast(e.message,'error'); }
        finally { setBrainBusy(p=>({...p, [clientId]:false})); }
      };

      useEffect(()=>{ loadInbox(); },[]);
      useEffect(()=>{ if (tab==='connections') loadConnections(); if (tab==='brains') loadBrains(); },[tab]);
      // poll QR while pairing
      useEffect(()=>{
        if (tab!=='connections' || !waStatus || !['qr','starting','connecting'].includes(waStatus.status)) return;
        const t = setInterval(loadConnections, 4000);
        return ()=>clearInterval(t);
      },[tab, waStatus && waStatus.status]);

      const loadTimeline = async (cid) => {
        setTlClient(cid);
        if (!cid) { setTlMsgs([]); return; }
        setTlLoading(true);
        try { setTlMsgs(await csFetch('/timeline?client_id='+encodeURIComponent(cid))); }
        catch(e){ showToast(e.message,'error'); }
        finally { setTlLoading(false); }
      };

      const approve = async (s) => {
        try {
          // Update suggestion → append the finding to the existing task
          if (s.kind === 'update' && s.target_task_id) {
            const ref = db.collection('tasks').doc(s.target_task_id);
            const snap = await ref.get();
            if (!snap.exists) {
              showToast('המשימה המקורית כבר לא קיימת — דוחה את ההצעה', 'warning');
              await csFetch('/suggestions/'+s.id+'/dismiss', { method:'POST' });
              loadInbox();
              return;
            }
            const stamp = new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit'});
            const addition =
              `\n\n🎧 [עדכון מהשיחה · ${stamp}] ${s.title}` +
              (s.details ? `\n${s.details}` : '') +
              ((s.evidence||[]).length ? '\n💬 ' + s.evidence.map(q=>'"'+q+'"').join(' · ') : '');
            const upd = {
              notes: ((snap.data().notes||'') + addition).trim(),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            };
            if (s.urgency === 'high') upd.priority = 'high';
            await ref.update(upd);
            await csFetch('/suggestions/'+s.id+'/approve', { method:'POST', body: JSON.stringify({ task_id: s.target_task_id }) });
            showToast('🔄 המשימה "'+ (s.target_task_title||'') +'" עודכנה', 'success');
            loadInbox();
            return;
          }
          const notes =
            (s.details||'') +
            (s.evidence && s.evidence.length ? '\n\n💬 מתוך השיחה:\n' + s.evidence.map(q=>'• "'+q+'"').join('\n') : '') +
            '\n\n🎧 נוצר ע״י סוכן שירות הלקוחות';
          const ref = await db.collection('tasks').add({
            title: s.title,
            client: s.client_name || '',
            stage: 1,
            priority: s.urgency === 'high' ? 'high' : 'medium',
            dueDate: '', shootDate: '', shootTime: '',
            notes,
            stageData: {}, stageOwners: {}, subTasks: [], videosCount: 1,
            source: 'cs-agent',
            userId: user.uid,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          await csFetch('/suggestions/'+s.id+'/approve', { method:'POST', body: JSON.stringify({ task_id: ref.id }) });
          showToast('✅ משימה נוצרה: '+s.title, 'success');
          loadInbox();
        } catch(e){ showToast(e.message,'error'); }
      };

      const dismiss = async (s) => {
        await csFetch('/suggestions/'+s.id+'/dismiss', { method:'POST' });
        loadInbox();
      };

      const mapThread = async (threadId, channel, threadName, clientId) => {
        if (clientId === '__internal__') {
          await csFetch('/mappings', { method:'POST', body: JSON.stringify({
            thread_id: threadId, channel, thread_name: threadName,
            client_id: 'internal', client_name: 'צ׳אט פנימי', thread_type: 'internal' }) });
          showToast('סומן כצ׳אט פנימי — הסוכן יזהה לכל בקשה את הלקוח לפי התוכן', 'success');
          loadConnections();
          return;
        }
        const c = clients.find(x=>x.id===clientId);
        if (!c) return;
        await csFetch('/mappings', { method:'POST', body: JSON.stringify({
          thread_id: threadId, channel, thread_name: threadName,
          client_id: c.id, client_name: c.name, thread_type: 'client' }) });
        showToast('השיחה קושרה ל-'+c.name, 'success');
        loadConnections();
      };

      const unmap = async (threadId) => {
        await csFetch('/mappings/'+encodeURIComponent(threadId), { method:'DELETE' });
        loadConnections();
      };

      const analyzeNow = async (threadId) => {
        try {
          await csFetch('/threads/'+encodeURIComponent(threadId)+'/analyze', { method:'POST' });
          showToast('🧠 הסוכן בודק את השיחה — הצעות יופיעו בלשונית ההצעות תוך כדקה', 'success');
        } catch(e){ showToast(e.message,'error'); }
      };

      const fmtTime = iso => { try { return new Date(iso).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); } catch(e){ return ''; } };
      const mapByThread = Object.fromEntries(mappings.map(m=>[m.thread_id, m]));
      const visibleChats = waChats.filter(c=>{
        if (chatFilter==='group' && !c.isGroup) return false;
        if (chatFilter==='dm' && c.isGroup) return false;
        if (chatSearch.trim()) {
          const q = chatSearch.trim().toLowerCase();
          return (c.name||'').toLowerCase().includes(q) || (c.id||'').toLowerCase().includes(q);
        }
        return true;
      });

      const ClientSelect = ({ onPick, value }) => (
        <select className={CL.input} style={{maxWidth:200, padding:'4px 8px'}} value={value||''}
          onChange={e=>onPick(e.target.value)}>
          <option value="">שייך ללקוח...</option>
          <option value="__internal__">🏢 צ׳אט פנימי / רב-לקוחי</option>
          <optgroup label="לקוחות">
            {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </optgroup>
        </select>
      );

      return (
        <div>
          <SectionTitle title="🎧 שירות לקוחות AI" sub="כל השיח עם הלקוחות במקום אחד — וואטסאפ, מייל ושיחות — עם הצעות משימות לאישורך" />

          {/* Stats strip */}
          {stats && (
            <div className="flex gap-3 mb-5 flex-wrap">
              {[
                ['הצעות ממתינות', stats.pending_suggestions, '#f59e0b'],
                ['הודעות היום', stats.today_messages, '#3b82f6'],
                ['שיחות מקושרות', stats.mapped_threads, '#22c55e'],
                ['שיחות לא משויכות', stats.unmapped_threads, '#ef4444'],
              ].map(([l,v,c])=>(
                <div key={l} className={CL.card} style={{padding:'10px 18px', minWidth:130}}>
                  <div className="text-2xl font-black" style={{color:c}}>{v}</div>
                  <div className="text-zinc-400 text-xs">{l}</div>
                </div>
              ))}
            </div>
          )}

          <div className="flex gap-2 mb-5">
            <button onClick={()=>{setTab('inbox'); loadInbox();}} className={tab==='inbox'?CL.btn:CL.btn2}>📥 הצעות לאישור {suggestions.length>0 && `(${suggestions.length})`}</button>
            <button onClick={()=>setTab('brains')} className={tab==='brains'?CL.btn:CL.btn2}>🧠 מוחות לקוחות</button>
            <button onClick={()=>setTab('timeline')} className={tab==='timeline'?CL.btn:CL.btn2}>🗂 תיק לקוח</button>
            <button onClick={()=>setTab('connections')} className={tab==='connections'?CL.btn:CL.btn2}>🔌 חיבורים</button>
          </div>

          {/* ── Inbox ── */}
          {tab==='inbox' && (
            <div>
              {loadingSug && <div className="text-center py-8 text-zinc-400 text-sm">טוען...</div>}
              {!loadingSug && suggestions.length===0 && (
                <Empty msg="אין הצעות ממתינות — כשהסוכן יזהה בקשה של לקוח היא תופיע כאן" />
              )}
              {suggestions.map(s=>{
                const urg = CS_URGENCY[s.urgency] || CS_URGENCY.medium;
                return (
                  <div key={s.id} className={CL.card+' mb-4'} style={{borderRight:'3px solid '+urg.color}}>
                    <div className="flex items-center gap-2 mb-1 flex-wrap">
                      <span>{CS_CHANNEL_ICON[s.channel]||'💬'}</span>
                      <span className="text-white font-bold text-sm">{s.title}</span>
                      <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={

                          ? {background:'rgba(59,130,246,0.12)', color:'#3b82f6'}

                      <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:urg.color+'22', color:urg.color}}>{urg.label}</span>

                                  <div className="flex-1 min-w-0">
                                    <span className="text-white text-sm font-semibold">{ct.name}</span>
                                    {ct.role && <span className="mywork-client-chip" style={{marginRight:6}}>{ct.role}</span>}
                                    {ct.notes && <div className="text-zinc-400 text-xs">{ct.notes}</div>}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* ── Timeline ── */}
          {tab==='timeline' && (
            <div>
              <div className="mb-4" style={{maxWidth:280}}>
                <label className={CL.label}>בחר לקוח</label>
                <select className={CL.input} value={tlClient} onChange={e=>loadTimeline(e.target.value)}>
                  <option value="">—</option>
                  {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              {tlLoading && <div className="text-center py-8 text-zinc-400 text-sm">טוען...</div>}
              {!tlLoading && tlClient && tlMsgs.length===0 && <Empty msg="עוד אין הודעות מקושרות ללקוח הזה" />}
              {tlMsgs.map(m=>(
                <div key={m.id} className="flex gap-3 px-4 py-3 border-b" style={{borderColor:'var(--border)', background: m.direction==='out' ? 'var(--surface2)' : 'transparent'}}>
                  <span style={{flexShrink:0}}>{CS_CHANNEL_ICON[m.channel]||'💬'}</span>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span className="text-white text-xs font-bold">{m.direction==='out' ? 'אנחנו' : (m.sender_name||'לקוח')}</span>
                      {m.thread_name && <span className="text-zinc-500 text-xs">· {m.thread_name}</span>}
                      <span className="text-zinc-500 text-xs mr-auto">{fmtTime(m.sent_at)}</span>
                    </div>
                    <div className="text-zinc-300 text-sm whitespace-pre-wrap mt-0.5">{m.text.slice(0,600)}</div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* ── Connections ── */}
          {tab==='connections' && (
            <div>
              {/* WhatsApp */}
              <div className={CL.card+' mb-5'}>
                <div className="flex items-center gap-2 mb-2">
                  <span style={{fontSize:18}}>💬</span>
                  <span className="text-white font-bold">וואטסאפ</span>
                  <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={
                    waStatus?.status==='connected' ? {background:'rgba(34,197,94,0.12)', color:'#22c55e'} :
                    waStatus?.status==='qr' ? {background:'rgba(245,158,11,0.12)', color:'#f59e0b'} :
                    {background:'rgba(239,68,68,0.12)', color:'#ef4444'}
                  }>
                    {waStatus?.status==='connected' ? 'מחובר ✓' : waStatus?.status==='qr' ? 'ממתין לסריקה' : waStatus?.status==='offline' ? 'הגשר כבוי' : (waStatus?.status||'בודק...')}
                  </span>
                  <button className={CL.btn2} style={{marginRight:'auto', padding:'4px 12px'}} onClick={loadConnections}>רענן</button>
                </div>
                {waQr && (
                  <div className="text-center py-4">
                    <div className="text-zinc-300 text-sm mb-3">פתח וואטסאפ בטלפון → הגדרות → מכשירים מקושרים → קשר מכשיר, וסרוק:</div>
                    <img src={waQr} alt="QR" style={{width:260, height:260, borderRadius:12, background:'#fff', padding:8, margin:'0 auto'}} />
                  </div>
                )}
                {waStatus?.status==='connected' && (
                  <div>
                    <div className="text-zinc-400 text-xs mb-2 mt-2">שייך כל שיחה ללקוח — רק שיחות מקושרות נקראות ע״י הסוכן. השאר נשארות פרטיות לחלוטין.</div>
                    {/* Search + filter */}
                    <div className="flex gap-2 mb-2 flex-wrap items-center">
                      <div style={{position:'relative', flex:1, minWidth:180}}>
                        <input className={CL.input} style={{paddingRight:30}} value={chatSearch}
                          onChange={e=>setChatSearch(e.target.value)} placeholder="🔍 חפש שיחה לפי שם או מספר..." />
                      </div>
                      <div className="flex gap-1">
                        {[['group','קבוצות'],['dm','פרטי'],['all','הכל']].map(([v,l])=>(
                          <button key={v} onClick={()=>setChatFilter(v)}
                            className="text-xs font-bold px-3 py-2 rounded-lg cursor-pointer border"
                            style={chatFilter===v
                              ? {background:'var(--accent-dim)', color:'var(--accent)', borderColor:'var(--accent)'}
                              : {background:'transparent', color:'var(--text-sub)', borderColor:'var(--border)'}}>{l}</button>
                        ))}
                      </div>
                    </div>
                    <div className="text-zinc-500 text-xs mb-1">{visibleChats.length} שיחות{chatFilter==='group'?' · קבוצות':chatFilter==='dm'?' · פרטי':''}</div>
                    <div style={{maxHeight:360, overflowY:'auto'}}>
                      {visibleChats.map(g=>{
                        const m = mapByThread[g.id];
                        return (
                          <div key={g.id} className="flex items-center gap-3 px-3 py-2 border-t" style={{borderColor:'var(--border)'}}>
                            <span style={{flexShrink:0, opacity:0.7}}>{g.isGroup?'👥':'👤'}</span>
                            <div className="flex-1 min-w-0">
                              <div className="text-white text-sm truncate">{g.name || g.id.split('@')[0]}</div>
                              {m
                                ? <div className="text-xs" style={{color:'#22c55e'}}>
                                    👂 מקשיב · {m.msg_count>0 ? `${m.msg_count} הודעות נקלטו` : 'ממתין להודעה ראשונה'}
                                  </div>
                                : <div className="text-zinc-500 text-xs">{g.isGroup?'קבוצה':'שיחה פרטית'}</div>}
                            </div>
                            {m
                              ? <div className="flex items-center gap-2 flex-shrink-0">
                                  {m.thread_type==='internal'
                                    ? <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:'rgba(59,130,246,0.12)', color:'#3b82f6'}}>🏢 פנימי</span>
                                    : <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:'rgba(34,197,94,0.12)', color:'#22c55e'}}>✓ {m.client_name}</span>}
                                  {m.msg_count>0 && <button className="bg-transparent border-0 cursor-pointer text-xs" style={{color:'var(--accent)'}} onClick={()=>analyzeNow(g.id)} title="הרץ ניתוח על השיחה עכשיו">נתח עכשיו</button>}
                                  <button className="bg-transparent border-0 cursor-pointer text-xs" style={{color:'var(--text-muted)'}} onClick={()=>unmap(g.id)} title="הסר קישור">נתק</button>
                                </div>
                              : <ClientSelect onPick={cid=>cid && mapThread(g.id,'whatsapp',g.name,cid)} />}
                          </div>
                        );
                      })}
                      {visibleChats.length===0 && <div className="text-zinc-500 text-xs py-3 text-center">{chatSearch?'לא נמצאו שיחות תואמות':'אין שיחות להצגה עדיין — שיחות פרטיות יופיעו כאן ברגע שתיכנס מהן הודעה'}</div>}
                    </div>
                  </div>
                )}
              </div>

              {/* Unmapped threads (DMs etc.) */}
              {unmapped.filter(t=>!mapByThread[t.thread_id]).length>0 && (
                <div className={CL.card+' mb-5'}>
                  <div className="text-white font-bold mb-2">שיחות פעילות שעוד לא שויכו ללקוח</div>

                    <div key={t.thread_id} className="flex items-center gap-3 px-3 py-2 border-t" style={{borderColor:'var(--border)'}}>
                      <span>{CS_CHANNEL_ICON[t.channel]||'💬'}</span>
                      <div className="flex-1 min-w-0">
                        <div className="text-white text-sm truncate">{t.thread_name || t.thread_id}</div>
                        <div className="text-zinc-500 text-xs truncate">{t.msg_count} הודעות · {(t.snippet||'').slice(0,60)}</div>
                      </div>
                      <ClientSelect onPick={cid=>cid && mapThread(t.thread_id, t.channel, t.thread_name, cid)} />

                  ))}
                </div>

              {/* Email */}
              <div className={CL.card+' mb-5'} style={{opacity:0.85}}>
                <div className="flex items-center gap-2 mb-1">
                  <span style={{fontSize:18}}>📧</span>
                  <span className="text-white font-bold">מייל</span>
                  <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:'rgba(113,113,122,0.15)', color:'var(--text-sub)'}}>בהקמה</span>
                </div>
                <div className="text-zinc-400 text-xs leading-relaxed">
                  נדרש חיבור חד-פעמי לתיבות (amit@ + info@). בקש מעמית בצ'אט של קלוד להשלים את חיבור המייל — נדרשת הרשאת Google מצדך.
                </div>
              </div>

              {/* TIME OS */}
              <div className={CL.card} style={{opacity:0.85}}>
                <div className="flex items-center gap-2 mb-1">
                  <span style={{fontSize:18}}>🎥</span>
                  <span className="text-white font-bold">TIME OS — תמלולי שיחות</span>
                  <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:'rgba(113,113,122,0.15)', color:'var(--text-sub)'}}>בהקמה</span>
                </div>
                <div className="text-zinc-400 text-xs leading-relaxed">
                  כתובת ה-Webhook מוכנה: <code className="px-1.5 py-0.5 rounded bg-zinc-800 text-amber-400" dir="ltr" style={{fontSize:11}}>https://crm.tingil.co/api/cs/webhooks/timeos?token=···</code>

                </div>
              </div>
            </div>
          )}
        </div>
      );

    function CopywriterDept({ user, role }) {
      const [tab, setTab]       = useState('jobs');   // jobs | style
      const [jobs, setJobs]     = useState([]);
      const [selJob, setSelJob] = useState(null);     // full job with result
      const [loadingJobs, setLoadingJobs] = useState(true);
      const [submitting, setSubmitting]   = useState(false);
      const [err, setErr]       = useState('');
      // new job form
      const [brief, setBrief]       = useState('');
      const [link, setLink]         = useState('');
      const [count, setCount]       = useState(2);
      const [videoType, setVideoType] = useState('סרטון שיווקי לסושיאל');
      const [duration, setDuration]   = useState('30-60 שניות');
      // style state
      const [styleDocs, setStyleDocs] = useState([]);
      const [profile, setProfile]     = useState(null);
      const [folderId, setFolderId]   = useState('');
      const [syncing, setSyncing]     = useState(false);
      const [syncMsg, setSyncMsg]     = useState('');
      const [manualTitle, setManualTitle] = useState('');
      const [manualText, setManualText]   = useState('');

      const loadJobs = async () => {
        try { setJobs(await agentsFetch('/copywriter/jobs')); }
        catch(e){ setErr(e.message); }
        finally { setLoadingJobs(false); }
      };
      const loadStyle = async () => {
        try {
          setStyleDocs(await agentsFetch('/style/docs'));
          setProfile(await agentsFetch('/style/profile'));
        } catch(e){ setErr(e.message); }
      };

      useEffect(()=>{ loadJobs(); loadStyle(); },[]);

      // poll while a job is running
      const hasActive = jobs.some(j=>!['done','error'].includes(j.status));
      useEffect(()=>{
        if (!hasActive) return;
        const t = setInterval(loadJobs, 4000);
        return ()=>clearInterval(t);
      },[hasActive]);

      const submit = async () => {
        if (brief.trim().length < 5) { showToast('כתוב בריף קצת יותר מפורט','warning'); return; }
        setSubmitting(true); setErr('');
        try {
          await agentsFetch('/copywriter/jobs', { method:'POST', body: JSON.stringify({
            brief: brief.trim(), link: link.trim()||null, count, video_type: videoType, duration }) });
          setBrief(''); setLink('');
          showToast('המשימה נשלחה לצוות הסוכנים ✍️','success');
          loadJobs();
        } catch(e){ setErr(e.message); }
        finally { setSubmitting(false); }
      };

      const openJob = async (id) => {
        try { setSelJob(await agentsFetch('/copywriter/jobs/'+id)); }
        catch(e){ showToast(e.message,'error'); }
      };

    function MainApp({ user }) {
      const [section,  setSection]  = useState('mywork');
      const [role,     setRole]     = useState('client');
      const [clients,  setClients]  = useState([]);
      const [expenses, setExpenses] = useState([]);
      const [tasks,    setTasks]    = useState([]);
      const [suppliers,setSuppliers]= useState([]);
      const [employees,setEmployees]= useState([]);
      const [projects, setProjects] = useState([]);
      const [paletteOpen, setPaletteOpen] = useState(false);

      // Cmd/Ctrl+K opens command palette
      useEffect(()=>{
        const onKey = e => {
          if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase()==='k') {
            e.preventDefault(); setPaletteOpen(o=>!o);
          }
          if (e.key==='Escape') setPaletteOpen(false);
        };
        window.addEventListener('keydown', onKey);
        return ()=>window.removeEventListener('keydown', onKey);
      },[]);

      // ting-nav: allows child components (e.g. TaskPanel) to navigate without prop-drilling
      // Supports both string shorthand: dispatchEvent(new CustomEvent('ting-nav',{detail:'videoreview'}))
      // and object form: dispatchEvent(new CustomEvent('ting-nav',{detail:{section:'videoreview',taskId:'abc'}}))
      const [reviewTaskId, setReviewTaskId] = useState(null);
      useEffect(()=>{
        const handler = e => {
          const d = e.detail;
          if (typeof d === 'string') { setSection(d); }
          else if (d && d.section) {
            if (d.taskId !== undefined) setReviewTaskId(d.taskId);
            setSection(d.section);
          }
        };
        window.addEventListener('ting-nav', handler);
        return ()=>window.removeEventListener('ting-nav', handler);
      },[]);

      // Open task by URL — used by Cmd+K's "open task" action
      const openTaskById = (id) => {
        const url = new URL(window.location.href);
        url.searchParams.set('task', id);
        window.history.replaceState({},'',url);
        setSection('tasks');
      };

      /* Role detection — owner of the data is admin by default.
         Each user sees only their own userId-filtered data, so the logged-in user
         is implicitly admin of their workspace unless explicitly demoted. */
      useEffect(()=>{
        if (!db||!user) return;
        const ADMIN_EMAILS = ['amit@tingil.co'];
        db.collection('users').doc(user.uid).get().then(doc=>{
          if (doc.exists && doc.data().role) {
            const r = doc.data().role;
            setRole(r === 'client_manager' ? 'client' : r); // normalize alias
          }
          else if (ADMIN_EMAILS.includes(user.email)) setRole('admin');
          else if (user.email?.includes('office')||user.email?.includes('mishrad')) setRole('office');
          else setRole('admin'); // default to admin for the logged-in workspace owner
        }).catch(()=>{
          setRole('admin');
        });
      },[user]);

      /* Global listeners */
      useEffect(()=>{
        if (!db||!user) return;
        const u1 = db.collection('clients').where('userId','==',user.uid).onSnapshot(s=>setClients(s.docs.map(d=>({id:d.id,...d.data()}))));
        const u2 = db.collection('expenses').where('userId','==',user.uid).onSnapshot(s=>setExpenses(s.docs.map(d=>({id:d.id,...d.data()}))));
        const u3 = db.collection('tasks').where('userId','==',user.uid).onSnapshot(s=>setTasks(s.docs.map(d=>({id:d.id,...d.data()})).filter(t => !t.archived)));
        const u4 = db.collection('suppliers').where('userId','==',user.uid).onSnapshot(s=>setSuppliers(s.docs.map(d=>({id:d.id,...d.data()}))));
        const u5 = db.collection('employees').where('userId','==',user.uid).onSnapshot(s=>{ const list=s.docs.map(d=>({id:d.id,...d.data()})); setEmployees(list); window._tingEmployees=list; });
        const u6 = db.collection('projects').where('userId','==',user.uid).onSnapshot(s=>setProjects(s.docs.map(d=>({id:d.id,...d.data()}))));
        return ()=>{ u1(); u2(); u3(); u4(); u5(); u6(); };
      },[user]);

      // ── CS agent: push open-tasks + clients snapshot so it can attribute chats correctly
      useEffect(()=>{
        if (role!=='admin') return;
        const t = setTimeout(()=>{
          if (tasks.length) csFetch('/tasks-snapshot', { method:'POST', body: JSON.stringify({
            tasks: tasks.filter(x=>(x.stage||1)<9).map(x=>({
              id:x.id, title:x.title||'', client:x.client||'', stage:x.stage||1, dueDate:x.dueDate||'' }))
          }) }).catch(()=>{});
          if (clients.length) csFetch('/clients-snapshot', { method:'POST', body: JSON.stringify({
            clients: clients.map(c=>({ id:c.id, name:c.name||'' }))

        }, 4000);
        return ()=>clearTimeout(t);
      },[tasks, clients, role]);

      // ── Shoot-date reminders — fire once after tasks+employees load
      const [remindersFired, setRemindersFired] = useState(false);
      useEffect(()=>{
        if (!remindersFired && tasks.length>0 && employees.length>0 && user?.email) {

          checkShootReminders(user.email, tasks, employees);
        }
      },[tasks, employees, user, remindersFired]);

      const renderSection = () => {
        switch(section) {
          case 'mywork':    return <MyWork user={user} role={role} tasks={tasks} clients={clients} employees={employees} suppliers={suppliers} onNav={setSection} />;
          case 'dashboard': return <Dashboard role={role} tasks={tasks} clients={clients} expenses={expenses} employees={employees} projects={projects} onNav={setSection} />;
          case 'tasks':     return <Tasks user={user} role={role} clients={clients} employees={employees} suppliers={suppliers} />;
          case 'clients':   return <Clients user={user} role={role} projects={projects} expenses={expenses} tasks={tasks} employees={employees} suppliers={suppliers} />;
          case 'suppliers': return <Suppliers user={user} role={role} expenses={expenses} />;
          case 'projects':  return <Projects user={user} role={role} clients={clients} expenses={expenses} />;
          case 'employees': return <Employees user={user} role={role} />;
          case 'processes': return <Processes user={user} role={role} tasks={tasks} employees={employees} suppliers={suppliers} />;
          case 'expenses':  return <Expenses user={user} role={role} suppliers={suppliers} tasks={tasks} employees={employees} clients={clients} projects={projects} />;
          case 'reports':   return <Reports role={role} clients={clients} expenses={expenses} tasks={tasks} employees={employees} suppliers={suppliers} projects={projects} />;
          case 'settings':    return <Settings user={user} role={role} />;
          case 'videoreview':   return <VideoReview user={user} role={role} tasks={tasks} clients={clients} activeTaskId={reviewTaskId} />;
          case 'editingtrack':   return <EditorTracking user={user} role={role} tasks={tasks} suppliers={suppliers} clients={clients} />;
          case 'profitability':  return <ClientProfitability role={role} clients={clients} tasks={tasks} suppliers={suppliers} expenses={expenses} projects={projects} />;
          case 'team':           return <TeamStatus user={user} role={role} tasks={tasks} employees={employees} suppliers={suppliers} onNav={setSection} />;
          case 'archive':     return <Archive user={user} role={role} employees={employees} suppliers={suppliers} />;
          case 'agent':       return <Agent user={user} role={role} clients={clients} tasks={tasks} />;
          case 'copywriter':  return <CopywriterDept user={user} role={role} />;
          case 'cs':          return <CustomerSuccess user={user} role={role} clients={clients} />;
          default:            return null;
        }
      };

      return (
        <ToastProvider>
          <div className="layout" dir="rtl" style={{height:'100vh',overflow:'hidden'}}>
            <Sidebar
              user={user}
              role={role}
              active={section}
              onNav={setSection}
              onLogout={() => auth.signOut()}
              onOpenPalette={()=>setPaletteOpen(true)}
              employees={employees}
            />
            <main id="main" style={{flex:1,overflow:section==='tasks'||section==='videoreview'?'hidden':'auto',background:'var(--bg)',minWidth:0}}>
              <div className={section==='tasks' ? 'h-full flex flex-col p-6' : section==='videoreview' ? 'h-full flex flex-col p-4' : 'max-w-5xl mx-auto p-6 pb-16'}>
                {renderSection()}
              </div>
            </main>
            <CommandPalette
              open={paletteOpen}
              onClose={()=>setPaletteOpen(false)}
              tasks={tasks}
              clients={clients}
              projects={projects}
              suppliers={suppliers}
              employees={employees}
              user={user}
              onNavTo={(id)=>setSection(id)}
              onOpenTask={openTaskById}
            />
          </div>
        </ToastProvider>
      );
    }

    /* ── DRAW CANVAS (SVG overlay for video annotations) ──
       Coordinates are normalized 0-1 so shapes scale with the video.
       Shape types:
         arrow: { type:'arrow', x1,y1,x2,y2, color }
         rect:  { type:'rect',  x,y,w,h, color }
         free:  { type:'free',  points:[[x,y],...], color }
    */
    function DrawCanvas({ videoRef, drawing, tool, color, shapes, onShapesChange, readOnly, annotation }) {
      const svgRef = useRef(null);
      const [drag, setDrag] = useState(null); // { startX, startY, current }

      // Decide which shapes to render
      const displayShapes = annotation?.shapes?.length ? annotation.shapes : (shapes || []);

      function getPoint(e) {
        const svg = svgRef.current;
        if (!svg) return null;
        const r = svg.getBoundingClientRect();
        return {
          x: Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)),
          y: Math.max(0, Math.min(1, (e.clientY - r.top) / r.height)),
        };
      }

      function onDown(e) {
        if (readOnly || !drawing) return;
        e.preventDefault();
        e.stopPropagation();
        const p = getPoint(e);
        if (!p) return;
        if (tool === 'free') {
          setDrag({ type:'free', points:[[p.x,p.y]] });
        } else if (tool === 'rect') {
          setDrag({ type:'rect', x:p.x, y:p.y, w:0, h:0, sx:p.x, sy:p.y });
        } else {
          setDrag({ type:'arrow', x1:p.x, y1:p.y, x2:p.x, y2:p.y });
        }
      }
      function onMove(e) {
        if (!drag) return;
        const p = getPoint(e);
        if (!p) return;
        if (drag.type === 'free') {
          setDrag({ ...drag, points:[...drag.points, [p.x,p.y]] });
        } else if (drag.type === 'rect') {
          setDrag({ ...drag, x:Math.min(drag.sx,p.x), y:Math.min(drag.sy,p.y), w:Math.abs(p.x-drag.sx), h:Math.abs(p.y-drag.sy) });
        } else {
          setDrag({ ...drag, x2:p.x, y2:p.y });
        }
      }
      function onUp() {
        if (!drag) return;
        const shape = { ...drag, color };
        delete shape.sx; delete shape.sy;
        onShapesChange([...(shapes||[]), shape]);
        setDrag(null);
      }

      function renderShape(s, key) {
        const stroke = s.color || '#fbbf24';
        if (s.type === 'arrow') {
          const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
          const len = Math.sqrt(dx*dx + dy*dy) || 0.001;
          const ah = 0.025; // arrow head size
          const ax = s.x2 - (dx/len)*ah;
          const ay = s.y2 - (dy/len)*ah;
          const px = -dy/len * ah * 0.5;
          const py =  dx/len * ah * 0.5;
          return (
            <g key={key}>
              <line x1={s.x1*100} y1={s.y1*100} x2={s.x2*100} y2={s.y2*100} stroke={stroke} strokeWidth="0.5" strokeLinecap="round" vectorEffect="non-scaling-stroke" style={{ strokeWidth:3 }} />
              <polygon points={`${s.x2*100},${s.y2*100} ${(ax+px)*100},${(ay+py)*100} ${(ax-px)*100},${(ay-py)*100}`} fill={stroke} />
            </g>
          );
        }
        if (s.type === 'rect') {
          return <rect key={key} x={s.x*100} y={s.y*100} width={s.w*100} height={s.h*100} fill="none" stroke={stroke} style={{ strokeWidth:3 }} vectorEffect="non-scaling-stroke" />;
        }
        if (s.type === 'free') {
          const d = s.points.map((p,i) => `${i?'L':'M'}${p[0]*100},${p[1]*100}`).join(' ');
          return <path key={key} d={d} fill="none" stroke={stroke} strokeLinecap="round" strokeLinejoin="round" style={{ strokeWidth:3 }} vectorEffect="non-scaling-stroke" />;
        }
        return null;
      }

      const allShapes = drag ? [...displayShapes, drag] : displayShapes;
      const interactive = drawing && !readOnly;

      return (
        <svg
          ref={svgRef}
          viewBox="0 0 100 100"
          preserveAspectRatio="none"
          style={{
            position:'absolute', inset:0, width:'100%', height:'100%',
            pointerEvents: interactive ? 'auto' : 'none',
            cursor: interactive ? 'crosshair' : 'default',
            zIndex: 5,
          }}
          onMouseDown={onDown}
          onMouseMove={onMove}
          onMouseUp={onUp}
          onMouseLeave={onUp}
        >
          {allShapes.map((s,i) => renderShape(s, i))}
        </svg>
      );
    }

    /* ── Pipeline statuses ── */
    const REVIEW_STATUS = {
      editor_working:       { label: 'אצל העורך',         color: '#f59e0b', bg: 'rgba(245,158,11,0.15)', ball: 'editor', icon: '🎬' },
      awaiting_am_review:   { label: 'אצלך לבדיקה',       color: '#ef4444', bg: 'rgba(239,68,68,0.15)',  ball: 'am',     icon: '👀' },
      am_revising:          { label: 'את כותבת תיקונים',   color: '#a78bfa', bg: 'rgba(167,139,250,0.15)',ball: 'am',     icon: '✏️' },
      client_review:        { label: 'אצל הלקוח',          color: '#3b82f6', bg: 'rgba(59,130,246,0.15)', ball: 'client', icon: '📤' },
      am_reviewing_client:  { label: 'תיקוני לקוח אצלך',   color: '#ef4444', bg: 'rgba(239,68,68,0.15)',  ball: 'am',     icon: '⚠️' },
      approved:             { label: 'אושר ✅',             color: '#22c55e', bg: 'rgba(34,197,94,0.15)',  ball: null,     icon: '✅' },
    };
    const BALL_LABEL = { am: 'אצלך', editor: 'אצל העורך', client: 'אצל הלקוח' };

    /* Allowed transitions per current status */
    function nextActions(status) {
      switch (status) {
        case 'editor_working':       return [{ to:'awaiting_am_review', label:'⤴ סמן: העלית גרסה' }];
        case 'awaiting_am_review':   return [
          { to:'am_revising',     label:'✏️ יש לי תיקונים', primary:false },
          { to:'client_review',   label:'➤ אשר ושלח ללקוח', primary:true },
        ];
        case 'am_revising':          return [{ to:'editor_working', label:'➤ שלח לעורך', primary:true }];
        case 'client_review':        return [{ to:'am_reviewing_client', label:'⬇ קיבלתי תיקונים מהלקוח' }];
        case 'am_reviewing_client':  return [
          { to:'editor_working', label:'➤ העבר לעורך', primary:true },
          { to:'approved',       label:'✅ אישור סופי' },
        ];
        case 'approved':             return [];
        default:                     return [{ to:'awaiting_am_review', label:'התחל פיפליין' }];
      }
    }

    /* ── VIDEO REVIEW ── */
    function VideoReview({ user, role, tasks = [], clients = [], activeTaskId = null }) {
      const [editors, setEditors]           = useState([]);
      const [reviews, setReviews]           = useState([]);
      const [taskFilter, setTaskFilter]     = useState(activeTaskId); // null = show all
      const [loading, setLoading]           = useState(true);
      const [activeReview, setActiveReview] = useState(null);
      const [comments, setComments]         = useState([]);
      const [videoSrc, setVideoSrc]         = useState(null);
      const [driveEmbedId, setDriveEmbedId] = useState(null);
      const [driveLoading, setDriveLoading] = useState(false);
      const [playing, setPlaying]           = useState(false);
      const [currentTime, setCurrentTime]   = useState(0);
      const [duration, setDuration]         = useState(0);
      const [volume, setVolume]             = useState(1);
      const [muted, setMuted]               = useState(false);
      const [hoverTime, setHoverTime]       = useState(null);
      const [hoverX, setHoverX]             = useState(0);
      const [pendingTime, setPendingTime]   = useState(null);
      const [newText, setNewText]           = useState('');
      const [filter, setFilter]             = useState('open');
      const [replyTo, setReplyTo]           = useState(null);
      const [replyText, setReplyText]       = useState('');
      const [activeCommentId, setActiveCommentId] = useState(null);
      const [showNewModal, setShowNewModal] = useState(false);
      const [newForm, setNewForm]           = useState({ title:'', taskId:'', editorId:'', source:'upload', fileObj:null, driveUrl:'', directUrl:'' });
      const [saving, setSaving]             = useState(false);
      const [needsDriveAuth, setNeedsDriveAuth] = useState(false);
      const [driveError, setDriveError]     = useState('');
      const [embedUrl, setEmbedUrl]         = useState(null);    // YouTube / Vimeo / any iframe embed

      // Annotation state
      const [drawing, setDrawing]           = useState(false);  // currently drawing
      const [drawTool, setDrawTool]         = useState('arrow'); // 'arrow' | 'rect' | 'free'
      const [drawColor, setDrawColor]       = useState('#fbbf24');
      const [drawShapes, setDrawShapes]     = useState([]); // current annotation paths being drawn
      const [drawStart, setDrawStart]       = useState(null);
      const [tempShape, setTempShape]       = useState(null);
      const [showAnnotationFor, setShowAnnotationFor] = useState(null); // commentId whose annotation is showing

      // Time-range marker state
      const [rangeMode, setRangeMode]       = useState(false);  // toggle: point vs range comment
      const [rangeStart, setRangeStart]     = useState(null);   // first click time
      const [pendingTimeEnd, setPendingTimeEnd] = useState(null); // second click time

      const videoRef    = useRef(null);
      const progressRef = useRef(null);
      const newTextRef  = useRef(null);
      const canvasRef   = useRef(null);
      const overlayRef  = useRef(null);

      /* ── helpers ── */
      function fmtTime(s) {
        if (!isFinite(s) || s < 0) return '0:00';
        const m = Math.floor(s / 60);
        const ss = Math.floor(s % 60).toString().padStart(2, '0');
        return `${m}:${ss}`;
      }

      function extractDriveId(url) {
        if (!url) return null;
        let m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (m) return m[1];
        m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
        if (m) return m[1];
        m = url.match(/open\?id=([a-zA-Z0-9_-]+)/);
        if (m) return m[1];
        return null;
      }

      // Proxy base URL — server streams Drive files without exposing OAuth to users.
      // Falls back to direct Drive iframe if proxy is not yet deployed.
      const PROXY_BASE = (() => {
        const host = window.location.hostname;
        if (host === 'crm.tingil.co') return 'https://crm.tingil.co';
        if (host.includes('tingil') || host.includes('ting-media')) return window.location.origin;
        return null;  // null = proxy not available (dev/preview), fall back to iframe
      })();

      function proxyVideoUrl(fileId) {
        return PROXY_BASE ? `${PROXY_BASE}/api/video/${fileId}` : null;
      }

      // Opens a Drive video.
      // If proxy is deployed → native <video> via proxy (no OAuth, timestamps work for everyone).
      // If proxy not yet deployed → iframe embed + Drive OAuth option for internal users.
      function openDriveVideo(fileId) {
        setDriveLoading(false);
        setDriveEmbedId(null);
        setVideoSrc(null);
        setEmbedUrl(null);
        setNeedsDriveAuth(false);
        setDriveError('');
        if (!fileId) return;

        const proxyUrl = proxyVideoUrl(fileId);
        if (proxyUrl) {
          // ✅ Proxy available — serve natively, no OAuth needed
          setVideoSrc(proxyUrl);
        } else {
          // ⚠️ Proxy not deployed yet — use iframe + OAuth fallback
          setDriveEmbedId(fileId);
          // Try OAuth blob fetch for timeline comments
          (async () => {
            try {
              setDriveLoading(true);
              const blob = await driveFetchBlob(fileId);
              setDriveEmbedId(null);
              setVideoSrc(URL.createObjectURL(blob));
            } catch(e) {
              if (e.message === 'NEED_DRIVE_AUTH') setNeedsDriveAuth(true);
              else setDriveError(e.message);
            } finally { setDriveLoading(false); }
          })();
        }
      }

      // Opens any URL: extracts Drive ID if Drive URL, otherwise treats as direct src
      function openVideoByUrl(url) {
        if (!url) return;
        const driveId = extractDriveId(url);
        if (driveId) { openDriveVideo(driveId); return; }
        setVideoSrc(url);
        setDriveEmbedId(null);
        setEmbedUrl(null);
        setNeedsDriveAuth(false);
        setDriveError('');
        setDriveLoading(false);
      }

      async function handleConnectDrive() {
        try {
          if (!calClientId.get()) {
            showToast('לא הוגדר OAuth Client ID — עבור להגדרות → יומן Google','warning');
            return;
          }
          if (typeof google === 'undefined' || !google?.accounts?.oauth2) {
            showToast('Google Identity Services עדיין לא נטען — רענן את הדף','warning');
            return;
          }
          await driveConnect();
          setNeedsDriveAuth(false);
          setDriveError('');
          if (activeReview?.driveFileId) openDriveVideo(activeReview.driveFileId);
        } catch(e) {
          console.error('Drive connect error:', e);
          const msg = e.message || String(e);
          let hint = '';
          if (/popup|blocked/i.test(msg)) hint = '\n\nנראה שחלון ה-popup נחסם — אפשר אותו בדפדפן ונסה שוב.';
          else if (/access_denied|denied/i.test(msg)) hint = '\n\nההרשאה נדחתה. נסה שוב ואשר את ההרשאה ל-Drive.';
          else if (/invalid_client|unauthorized_client|origin/i.test(msg)) hint = '\n\nה-OAuth Client ID לא מורשה לדומיין הזה. ב-Google Cloud Console → APIs & Services → Credentials, ערוך את ה-Client ID והוסף ל-"Authorized JavaScript origins":\nhttps://ting-media-finance.web.app';
          else if (/disabled|not.*enabled|API/i.test(msg)) hint = '\n\nכנראה ש-Google Drive API לא מופעל בפרויקט. עבור ל:\nhttps://console.cloud.google.com/apis/library/drive.googleapis.com\nולחץ ENABLE.';
          else hint = '\n\nשלבי בדיקה:\n1. Google Drive API מופעל? https://console.cloud.google.com/apis/library/drive.googleapis.com\n2. הדומיין https://ting-media-finance.web.app נמצא ב-"Authorized JavaScript origins" של ה-OAuth Client ID?\n3. חלונות popup לא חסומים?';
          alert('חיבור Drive נכשל:\n' + msg + hint);
        }
      }

      /* ── Load editors list (users with role='editor') ── */
      useEffect(() => {
        if (!db) return;
        return db.collection('users').where('role','==','editor').onSnapshot(s => {
          setEditors(s.docs.map(d => ({ id:d.id, ...d.data() })));
        }, err => console.warn('editors load:', err));
      }, []);

      /* ── Firestore: load reviews list ── */
      useEffect(() => {
        if (!db || !user) return;
        // Admin/office see all team reviews; others only see their own
        const isTeam = role === 'admin' || role === 'office' || role === 'finance';
        const q = isTeam
          ? db.collection('videoReviews')
          : db.collection('videoReviews').where('userId', '==', user.uid);
        const unsub = q
          .onSnapshot(snap => {
            const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            list.sort((a,b) => {
              const ta = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
              const tb = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
              return tb - ta;
            });
            setReviews(list);
            setLoading(false);
          }, err => { console.error('videoReviews load error:', err); setLoading(false); });
        return unsub;
      }, [user]);

      /* ── Auto-open task videos when navigating from TaskPanel ── */
      useEffect(() => {
        if (!activeTaskId || reviews.length === 0) return;
        setTaskFilter(activeTaskId);
        // Auto-select first video for this task if none active
        const taskReviews = reviews.filter(r => r.taskId === activeTaskId);
        if (taskReviews.length > 0 && (!activeReview || activeReview.taskId !== activeTaskId)) {
          setActiveReview(taskReviews[0]);
        }
      }, [activeTaskId, reviews.length]);

      /* ── Firestore: load comments for active review ── */
      useEffect(() => {
        if (!db || !activeReview) { setComments([]); return; }
        const unsub = db.collection('videoComments')
          .where('reviewId', '==', activeReview.id)
          .onSnapshot(snap => {
            const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            list.sort((a,b) => (a.time||0) - (b.time||0));
            setComments(list);
          }, err => {
            console.error('videoComments load error:', err);
            showToast('שגיאה בטעינת הערות: ' + err.message,'error');
          });
        return unsub;
      }, [activeReview]);

      /* ── Load video when activeReview changes ── */
      useEffect(() => {
        if (!activeReview) return;
        setVideoSrc(null);
        setEmbedUrl(null);
        setDriveEmbedId(null);
        setCurrentTime(0);
        setDuration(0);
        setPlaying(false);
        // Resolve current version (fallback to legacy fields)
        const versions = activeReview.versions || [];
        const curV = versions.find(v => v.v === (activeReview.currentVersion || versions.length)) || versions[versions.length - 1];
        const videoUrl = curV?.videoSrc || activeReview.videoSrc;
        const driveId  = curV?.driveFileId || activeReview.driveFileId;
        // Prefer full URL (handles YouTube / Vimeo / Drive / direct) — fall back to raw driveId
        if (videoUrl) {
          openVideoByUrl(videoUrl);
        } else if (driveId) {
          openDriveVideo(driveId);
        }
      }, [activeReview?.id, activeReview?.currentVersion]);

      /* ── Sync video element state ── */
      useEffect(() => {
        const v = videoRef.current;
        if (!v) return;
        const onTime  = () => setCurrentTime(v.currentTime);
        const onDur   = () => setDuration(v.duration);
        const onPlay  = () => setPlaying(true);
        const onPause = () => { setPlaying(false); setPendingTime(prev => prev !== null ? prev : (videoRef.current?.currentTime ?? null)); };
        const onEnd   = () => setPlaying(false);
        v.addEventListener('timeupdate', onTime);
        v.addEventListener('loadedmetadata', onDur);
        v.addEventListener('play', onPlay);
        v.addEventListener('pause', onPause);
        v.addEventListener('ended', onEnd);
        return () => {
          v.removeEventListener('timeupdate', onTime);
          v.removeEventListener('loadedmetadata', onDur);
          v.removeEventListener('play', onPlay);
          v.removeEventListener('pause', onPause);
          v.removeEventListener('ended', onEnd);
        };
      }, [videoSrc]);

      /* ── Highlight active comment based on currentTime ── */
      useEffect(() => {
        if (!comments.length || !duration) return;
        const sorted = [...comments].sort((a,b) => a.time - b.time);
        let best = null;
        for (const c of sorted) {
          if (c.time <= currentTime + 1) best = c.id;
        }
        setActiveCommentId(best);
      }, [currentTime, comments]);

      /* ── Keyboard shortcuts ── */
      useEffect(() => {
        if (!activeReview) return;
        const onKey = e => {
          if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
          if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
          if (e.code === 'ArrowRight') { const v = videoRef.current; if (v) v.currentTime = Math.max(0, v.currentTime - 5); }
          if (e.code === 'ArrowLeft')  { const v = videoRef.current; if (v) v.currentTime = Math.min(v.duration, v.currentTime + 5); }
          if (e.key === 'c' || e.key === 'C') { const v = videoRef.current; if (v) { v.pause(); setPendingTime(v.currentTime); } }
          if (e.code === 'Escape') { setPendingTime(null); setNewText(''); }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [activeReview]);

      /* ── Autofocus pending comment textarea ── */
      useEffect(() => {
        if (pendingTime !== null && newTextRef.current) newTextRef.current.focus();
      }, [pendingTime]);

      function togglePlay() {
        const v = videoRef.current;
        if (!v) return;
        if (v.paused) v.play(); else v.pause();
      }

      function seek(t) {
        const v = videoRef.current;
        if (!v) return;
        v.currentTime = Math.max(0, Math.min(t, v.duration || 0));
      }

      function onProgressClick(e) {
        const bar = progressRef.current;
        if (!bar || !duration) return;
        const rect = bar.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        const t = ratio * duration;
        const v = videoRef.current;
        if (v) { v.pause(); }
        seek(t);
        setShowAnnotationFor(null);
        if (rangeMode) {
          if (rangeStart === null) {
            // First click: set range start, show comment box
            setRangeStart(t);
            setPendingTimeEnd(null);
            setPendingTime(t);
          } else {
            // Second click: set range end (ensure start < end)
            const s = Math.min(rangeStart, t);
            const end = Math.max(rangeStart, t);
            setRangeStart(s);
            setPendingTimeEnd(end);
            setPendingTime(s);
          }
        } else {
          setPendingTime(t);
          setRangeStart(null);
          setPendingTimeEnd(null);
        }
      }

      function onProgressHover(e) {
        const bar = progressRef.current;
        if (!bar || !duration) return;
        const rect = bar.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        setHoverTime(ratio * duration);
        setHoverX(e.clientX - rect.left);
      }

      /* ── Create review ── */
      async function createReview(e) {
        e.preventDefault();
        if (!newForm.title.trim()) return;
        setSaving(true);
        try {
          let driveFileId = null;
          let videoSrcVal = null;
          let fileName    = null;
          if (newForm.source === 'upload' && newForm.fileObj) {
            videoSrcVal = URL.createObjectURL(newForm.fileObj);
            fileName    = newForm.fileObj.name;
          } else if (newForm.source === 'drive') {
            driveFileId = extractDriveId(newForm.driveUrl);
            if (driveFileId) {
              try { await driveMakePublic(driveFileId); }
              catch(err) { console.warn('make-public failed (continuing):', err.message); }
            }
          } else if (newForm.source === 'direct') {
            videoSrcVal = newForm.directUrl.trim();
          }
          const initialVersion = (driveFileId || videoSrcVal) ? [{
            v: 1,
            driveFileId: driveFileId || null,
            videoSrc: videoSrcVal || null,
            fileName: fileName || null,
            uploadedBy: user.uid,
            uploadedByName: user.displayName || user.email,
            uploadedAt: new Date().toISOString(),
            note: 'גרסה ראשונית',
          }] : [];
          const doc = await db.collection('videoReviews').add({
            title: newForm.title.trim(),
            taskId: newForm.taskId || null,
            editorId: newForm.editorId || null,
            driveFileId: driveFileId || null,           // legacy field
            videoSrc: videoSrcVal || null,              // legacy field
            fileName: fileName || null,                 // legacy field
            versions: initialVersion,
            currentVersion: initialVersion.length ? 1 : 0,
            status: 'awaiting_am_review',
            assignedTo: 'am',
            currentRound: 1,
            revisionRounds: 0,
            roundsAmEditor: 0,
            roundsClientAm: 0,
            userId: user.uid,
            commentCount: 0,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          const snap = await doc.get();
          const rev = { id: snap.id, ...snap.data(), videoSrc: videoSrcVal };
          setShowNewModal(false);
          setNewForm({ title:'', taskId:'', editorId:'', source:'upload', fileObj:null, driveUrl:'', directUrl:'' });
          setActiveReview(rev);
        } catch(err) {
          showToast('שגיאה ביצירת סקירה: ' + err.message,'error');
        } finally { setSaving(false); }
      }

      /* ── Add comment ── */
      async function addComment() {
        if (!newText.trim() || pendingTime === null) return;
        const annotation = drawShapes.length ? { shapes: drawShapes } : null;
        const curVer = activeReview.currentVersion || activeReview.versions?.length || 1;
        const isRange = rangeMode && pendingTimeEnd !== null && pendingTimeEnd > pendingTime;
        await db.collection('videoComments').add({
          reviewId: activeReview.id,
          userId: user.uid,
          authorName: user.displayName || user.email || 'משתמש',
          source: 'am',
          version: curVer,
          time: pendingTime,
          timeStart: isRange ? pendingTime : null,
          timeEnd: isRange ? pendingTimeEnd : null,
          text: newText.trim(),
          resolved: false,
          replies: [],
          annotation: annotation,
          round: activeReview.currentRound || 1,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        await db.collection('videoReviews').doc(activeReview.id).update({
          commentCount: firebase.firestore.FieldValue.increment(1)
        });
        setPendingTime(null);
        setPendingTimeEnd(null);
        setRangeStart(null);
        setNewText('');
        setDrawShapes([]);
        setDrawing(false);
      }

      /* ── Resolve / unresolve ── */
      async function toggleResolve(c) {
        await db.collection('videoComments').doc(c.id).update({ resolved: !c.resolved });
      }

      /* ── Delete comment ── */
      async function deleteComment(c) {
        if (!confirm('למחוק הערה זו?')) return;
        await db.collection('videoComments').doc(c.id).delete();
        await db.collection('videoReviews').doc(activeReview.id).update({
          commentCount: firebase.firestore.FieldValue.increment(-1)
        });
      }

      /* ── Add reply ── */
      async function addReply(c) {
        if (!replyText.trim()) return;
        const reply = { text: replyText.trim(), authorName: user.displayName || user.email || 'משתמש', createdAt: new Date().toISOString() };
        await db.collection('videoComments').doc(c.id).update({
          replies: firebase.firestore.FieldValue.arrayUnion(reply)
        });
        setReplyTo(null);
        setReplyText('');
      }

      function relTime(ts) {
        if (!ts) return '';
        const d = ts.toDate ? ts.toDate() : new Date(ts);
        const diff = Math.floor((Date.now() - d) / 1000);
        if (diff < 60)   return 'עכשיו';
        if (diff < 3600) return `לפני ${Math.floor(diff/60)} דק'`;
        if (diff < 86400) return `לפני ${Math.floor(diff/3600)} שע'`;
        return `לפני ${Math.floor(diff/86400)} ימים`;
      }

      const openCount     = comments.filter(c => !c.resolved).length;
      const resolvedCount = comments.filter(c => c.resolved).length;
      const filteredComments = comments.filter(c => {
        if (filter === 'open')     return !c.resolved;
        if (filter === 'resolved') return c.resolved;
        return true;
      });

      /* ════════════════════════════════════
         LIST VIEW
      ════════════════════════════════════ */
      if (!activeReview) {
        return (
          <div>
            <SectionTitle
              title="סקירת וידאו"
              sub="Frame.io-style — הוסף הערות על ציר הזמן"
              onAdd={() => setShowNewModal(true)}
              addLabel="+ סקירה חדשה"
            />

            {/* Task filter pill */}
            {taskFilter && (() => {
              const t = tasks.find(x => x.id === taskFilter);
              return (
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:10, padding:'5px 10px', background:'rgba(99,102,241,0.1)', border:'1px solid rgba(99,102,241,0.25)', borderRadius:8, fontSize:11 }}>
                  <span style={{ color:'#a5b4fc', fontWeight:700, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    📋 {t?.title || taskFilter}
                  </span>
                  <button onClick={() => setTaskFilter(null)} style={{ background:'transparent', border:0, color:'var(--text-muted)', cursor:'pointer', fontSize:12, flexShrink:0 }}>✕ הצג הכל</button>
                </div>
              );
            })()}

            {loading ? (
              <div className="text-zinc-500 text-sm py-8 text-center">טוען...</div>
            ) : reviews.length === 0 ? (
              <Empty msg="אין סקירות עדיין — צור סקירה חדשה" />
            ) : (
              <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
                {(taskFilter ? reviews.filter(r => r.taskId === taskFilter) : reviews).map(r => {
                  const task = tasks.find(t => t.id === r.taskId);
                  const d = r.createdAt?.toDate ? r.createdAt.toDate() : null;
                  const st = REVIEW_STATUS[r.status] || REVIEW_STATUS.awaiting_am_review;
                  const isMyTurn = st.ball === 'am';
                  return (
                    <div
                      key={r.id}
                      className={CL.cardHover + ' cursor-pointer'}
                      onClick={() => setActiveReview(r)}
                      style={{ borderRight: isMyTurn ? '3px solid #ef4444' : undefined }}
                    >
                      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                        <span style={{ fontSize:24 }}>{st.icon}</span>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontWeight:700, color:'var(--text)', fontSize:14, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.title}</div>
                          {task && <div style={{ fontSize:11, color:'var(--text-sub)', marginTop:2 }}>{task.title}</div>}
                        </div>
                      </div>
                      <div style={{ marginBottom:6 }}>
                        <span style={{ background: st.bg, color: st.color, fontSize:11, padding:'3px 9px', borderRadius:99, border:`1px solid ${st.color}33`, fontWeight:700 }}>
                          {st.label}
                        </span>
                        {(r.versions?.length || 0) > 1 && (
                          <span style={{ marginRight:6, fontSize:10, color:'var(--text-sub)' }}>· גרסה v{r.currentVersion || r.versions.length}</span>
                        )}
                      </div>
                      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:8, gap:6, flexWrap:'wrap' }}>
                        <span style={{ fontSize:11, color:'var(--text-muted)' }}>{d ? d.toLocaleDateString('he-IL') : ''}</span>
                        <div style={{ display:'flex', gap:4, alignItems:'center', flexWrap:'wrap' }}>
                          {(r.revisionRounds || 0) > 0 && (
                            <span style={{ background:'rgba(167,139,250,0.15)', color:'#a78bfa', fontSize:10, padding:'2px 7px', borderRadius:99, border:'1px solid rgba(167,139,250,0.25)', fontWeight:600 }}>
                              🔄 {r.revisionRounds} {r.revisionRounds === 1 ? 'סבב' : 'סבבים'}
                            </span>
                          )}
                          {r.pendingRevision && (
                            <span style={{ background:'rgba(239,68,68,0.15)', color:'#f87171', fontSize:10, padding:'2px 7px', borderRadius:99, border:'1px solid rgba(239,68,68,0.3)', fontWeight:700 }}>
                              ⚠️ ממתין למענה
                            </span>
                          )}
                          {(r.commentCount || 0) > 0 && (
                            <Badge label={`${r.commentCount} הערות`} color="blue" />
                          )}
                        </div>
                      </div>
                      {r.fileName && <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>📎 {r.fileName}</div>}
                    </div>
                  );
                })}
              </div>
            )}

            {showNewModal && (
              <Modal title="סקירה חדשה" onClose={() => setShowNewModal(false)}>
                <form onSubmit={createReview}>
                  <label className={CL.label}>כותרת *</label>
                  <input className={CL.input} value={newForm.title} onChange={e => setNewForm(f => ({...f, title: e.target.value}))} placeholder="שם הסקירה" required />

                  <label className={CL.label}>משימה מקושרת</label>
                  <select className={CL.input + ' bare'} value={newForm.taskId} onChange={e => setNewForm(f => ({...f, taskId: e.target.value}))}>
                    <option value="">— ללא —</option>
                    {tasks.map(t => <option key={t.id} value={t.id}>{t.title}</option>)}
                  </select>

                  <label className={CL.label}>עורך וידאו משויך</label>
                  <select className={CL.input + ' bare'} value={newForm.editorId} onChange={e => setNewForm(f => ({...f, editorId: e.target.value}))}>
                    <option value="">— ללא עורך משויך —</option>
                    {editors.map(ed => <option key={ed.id} value={ed.id}>{ed.displayName || ed.email}</option>)}
                  </select>
                  {editors.length === 0 && (
                    <div style={{ fontSize:11, color:'var(--text-sub)', marginBottom:8, marginTop:-4 }}>
                      אין עורכים מוגדרים. הוסף עורכים בהגדרות → ניהול משתמשים (תפקיד "עורך / צלם").
                    </div>
                  )}

                  <label className={CL.label}>מקור הוידאו</label>
                  <div style={{ display:'flex', gap:16, marginBottom:8 }}>
                    {[['upload','העלה קובץ'],['drive','קישור Drive'],['direct','קישור ישיר']].map(([val,lbl]) => (
                      <label key={val} style={{ display:'flex', alignItems:'center', gap:6, cursor:'pointer', fontSize:13, color: newForm.source===val ? '#f59e0b' : 'var(--text-sub)' }}>
                        <input type="radio" name="src" value={val} checked={newForm.source===val} onChange={() => setNewForm(f=>({...f, source:val}))} style={{ accentColor:'#f59e0b' }} />
                        {lbl}
                      </label>
                    ))}
                  </div>

                  {newForm.source === 'upload' && (
                    <>
                      <label className={CL.label}>קובץ וידאו</label>
                      <input type="file" accept="video/*" className={CL.input} onChange={e => setNewForm(f => ({...f, fileObj: e.target.files[0] || null}))} />
                    </>
                  )}
                  {newForm.source === 'drive' && (
                    <>
                      <label className={CL.label}>קישור Google Drive</label>
                      <input className={CL.input} placeholder="https://drive.google.com/file/d/..." value={newForm.driveUrl} onChange={e => setNewForm(f=>({...f, driveUrl:e.target.value}))} />
                    </>
                  )}
                  {newForm.source === 'direct' && (
                    <>
                      <label className={CL.label}>כתובת ישירה לוידאו</label>
                      <input className={CL.input} placeholder="https://example.com/video.mp4" value={newForm.directUrl} onChange={e => setNewForm(f=>({...f, directUrl:e.target.value}))} />
                    </>
                  )}

                  <div style={{ display:'flex', gap:8, marginTop:20, justifyContent:'flex-end' }}>
                    <button type="button" className={CL.btn2} onClick={() => setShowNewModal(false)}>ביטול</button>
                    <button type="submit" className={CL.btn} disabled={saving}>{saving ? 'יוצר...' : 'צור סקירה'}</button>
                  </div>
                </form>
              </Modal>
            )}
          </div>
        );
      }

      /* ════════════════════════════════════
         DETAIL VIEW
      ════════════════════════════════════ */
      const task = tasks.find(t => t.id === activeReview.taskId);
      const pct  = duration > 0 ? (currentTime / duration) * 100 : 0;

      return (
        <div style={{ display:'flex', flexDirection:'column', height:'calc(100vh - 48px)', background:'var(--bg)', borderRadius:12, overflow:'hidden', border:'1px solid var(--border)' }}>

          {/* ── Top bar ── */}
          <div style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 16px', borderBottom:'1px solid var(--border)', background:'var(--surface)', flexShrink:0 }}>
            <button
              onClick={() => { setActiveReview(null); setVideoSrc(null); setDriveEmbedId(null); setPendingTime(null); }}
              style={{ background:'var(--border)', border:'none', color:'var(--text-sub)', borderRadius:8, padding:'6px 12px', cursor:'pointer', fontSize:13, display:'flex', alignItems:'center', gap:6 }}
            >
              ← חזרה
            </button>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ color:'var(--text)', fontWeight:700, fontSize:15, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{activeReview.title}</div>
              {task && <div style={{ fontSize:11, color:'var(--text-sub)', marginTop:1 }}>משימה: {task.title}</div>}
            </div>
            {(() => {
              const st = REVIEW_STATUS[activeReview.status] || REVIEW_STATUS.awaiting_am_review;
              return (
                <span style={{ background: st.bg, color: st.color, fontSize:12, padding:'5px 12px', borderRadius:99, border:`1px solid ${st.color}55`, fontWeight:700 }}>
                  {st.icon} {st.label}
                </span>
              );
            })()}
            <button
              onClick={async () => {
                const url = prompt('הדבק קישור Drive של הגרסה החדשה (https://drive.google.com/file/d/...)');
                if (!url) return;
                const newId = extractDriveId(url);
                if (!newId) { showToast('קישור לא תקין','warning'); return; }
                try { await driveMakePublic(newId); }
                catch(err) { console.warn('make-public failed (continuing):', err.message); }
                const note = prompt('הערה קצרה על הגרסה (אופציונלי, למשל "תוקן צבע ומוזיקה"):') || '';
                const versions = activeReview.versions || [];
                // backfill v1 from legacy fields if missing
                if (!versions.length && (activeReview.driveFileId || activeReview.videoSrc)) {
                  versions.push({ v:1, driveFileId: activeReview.driveFileId || null, videoSrc: activeReview.videoSrc || null, fileName: activeReview.fileName || null, uploadedBy: activeReview.userId, uploadedAt: activeReview.createdAt?.toDate?.()?.toISOString?.() || new Date().toISOString(), note: 'גרסה ראשונית' });
                }
                const nextV = (versions[versions.length-1]?.v || 0) + 1;
                const newVersion = { v: nextV, driveFileId: newId, videoSrc: null, fileName: null, uploadedBy: user.uid, uploadedByName: user.displayName || user.email, uploadedAt: new Date().toISOString(), note: note.trim() };
                const updates = {
                  versions: [...versions, newVersion],
                  currentVersion: nextV,
                  driveFileId: newId,  // legacy mirror
                  status: 'awaiting_am_review',
                  assignedTo: 'am',
                };
                await db.collection('videoReviews').doc(activeReview.id).update(updates);
                setActiveReview({ ...activeReview, ...updates });
                alert(`✅ גרסה v${nextV} הועלתה. כל ההערות הפתוחות יוצגו גם על הגרסה החדשה.`);
              }}
              style={{ background:'#3b82f6', border:'none', color:'#fff', borderRadius:8, padding:'6px 12px', cursor:'pointer', fontSize:12, fontWeight:600 }}
              title="העלה גרסה חדשה מ-Drive"
            >
              ⬆ גרסה חדשה
            </button>
            {(activeReview.versions?.length || 0) > 1 && (
              <select
                value={activeReview.currentVersion || activeReview.versions.length}
                onChange={async (e) => {
                  const v = parseInt(e.target.value, 10);
                  await db.collection('videoReviews').doc(activeReview.id).update({ currentVersion: v });
                  setActiveReview({ ...activeReview, currentVersion: v });
                }}
                style={{ background:'var(--border)', border:'1px solid var(--border2)', color:'var(--text)', borderRadius:7, padding:'4px 8px', fontSize:12, cursor:'pointer' }}
                title="בחר גרסה לצפייה"
              >
                {activeReview.versions.map(v => (
                  <option key={v.v} value={v.v}>גרסה v{v.v}{v.note ? ' · ' + v.note.slice(0,20) : ''}</option>
                ))}
              </select>
            )}
            {nextActions(activeReview.status).map((act, i) => (
              <button
                key={act.to}
                onClick={async () => {
                  const goingToEditor = act.to === 'editor_working';
                  const goingToClient = act.to === 'client_review';
                  const updates = { status: act.to, assignedTo: REVIEW_STATUS[act.to]?.ball || null };
                  if (goingToEditor) {
                    updates.roundsAmEditor = firebase.firestore.FieldValue.increment(1);
                    updates.lastSentToEditorAt = firebase.firestore.FieldValue.serverTimestamp();
                  }
                  if (goingToClient) {
                    updates.publicShare = true;
                    if (!activeReview.shareToken) {
                      updates.shareToken = Math.random().toString(36).slice(2,12) + Date.now().toString(36);
                    }
                    updates.lastSentToClientAt = firebase.firestore.FieldValue.serverTimestamp();
                  }
                  if (act.to === 'approved') updates.approvedAt = firebase.firestore.FieldValue.serverTimestamp();
                  await db.collection('videoReviews').doc(activeReview.id).update(updates);
                  const newState = { ...activeReview, ...updates, status: act.to, assignedTo: REVIEW_STATUS[act.to]?.ball || null };
                  if (goingToClient && updates.shareToken) newState.shareToken = updates.shareToken;
                  setActiveReview(newState);
                  if (goingToClient) {
                    const link = `${location.origin}/review.html?id=${activeReview.id}&t=${newState.shareToken}`;
                    try { await navigator.clipboard.writeText(link); } catch {}
                    alert(`✅ הוצב במצב "אצל הלקוח". הלינק הועתק:\n${link}`);
                  }
                }}
                style={{
                  background: act.primary ? '#22c55e' : 'var(--border)',
                  border: act.primary ? 'none' : '1px solid var(--border2)',
                  color: act.primary ? '#052e16' : 'var(--text)',
                  borderRadius:8, padding:'6px 12px', cursor:'pointer', fontSize:12, fontWeight:700,
                }}
              >
                {act.label}
              </button>
            ))}
            {(activeReview.revisionRounds || 0) > 0 && (
              <span style={{ background:'rgba(167,139,250,0.15)', color:'#a78bfa', fontSize:11, padding:'4px 10px', borderRadius:99, border:'1px solid rgba(167,139,250,0.25)', fontWeight:600 }} title="סבבי תיקונים מהלקוח">
                🔄 לקוח: {activeReview.revisionRounds}
              </span>
            )}
            {(activeReview.roundsAmEditor || 0) > 0 && (
              <span style={{ background:'rgba(245,158,11,0.15)', color:'#fbbf24', fontSize:11, padding:'4px 10px', borderRadius:99, border:'1px solid rgba(245,158,11,0.25)', fontWeight:600 }} title="סבבי תיקונים לעורך">
                🎬 עורך: {activeReview.roundsAmEditor}
              </span>
            )}
            {activeReview.pendingRevision && (
              <button
                onClick={async () => {
                  if (!confirm('לסיים את הסבב הנוכחי? הלקוח יוכל להוסיף הערות חדשות.')) return;
                  await db.collection('videoReviews').doc(activeReview.id).update({ pendingRevision: false });
                  setActiveReview({ ...activeReview, pendingRevision: false });
                }}
                style={{ background:'#22c55e', border:'none', color:'#052e16', borderRadius:8, padding:'6px 12px', cursor:'pointer', fontSize:12, fontWeight:700 }}
              >
                ✅ סיים סבב
              </button>
            )}
            {openCount > 0 && <Badge label={`${openCount} הערות פתוחות`} color="blue" />}
            <button
              onClick={async () => {
                if (!activeReview) return;
                try {
                  let token = activeReview.shareToken;
                  if (!activeReview.publicShare || !token) {
                    token = Math.random().toString(36).slice(2,12) + Date.now().toString(36);
                    const init = { publicShare: true, shareToken: token };
                    if (!activeReview.currentRound) init.currentRound = 1;
                    if (activeReview.revisionRounds == null) init.revisionRounds = 0;
                    await db.collection('videoReviews').doc(activeReview.id).update(init);
                    setActiveReview({ ...activeReview, ...init });
                  }
                  const link = `${location.origin}/review.html?id=${activeReview.id}&t=${token}`;
                  try { await navigator.clipboard.writeText(link); } catch {}
                  prompt('הקישור הועתק. שלח ללקוח:', link);
                } catch (e) {
                  showToast('שגיאה ביצירת לינק: ' + (e.message || e),'error');
                }
              }}
              style={{ background:'#3b82f6', border:'none', color:'#fff', borderRadius:8, padding:'6px 12px', cursor:'pointer', fontSize:13, fontWeight:600 }}
            >
              🔗 שתף עם לקוח
            </button>
            {activeReview.publicShare && (
              <button
                onClick={async () => {
                  if (!confirm('לבטל את השיתוף הציבורי? הלינק יפסיק לעבוד.')) return;
                  await db.collection('videoReviews').doc(activeReview.id).update({ publicShare: false });
                  setActiveReview({ ...activeReview, publicShare: false });
                }}
