    /* ── TASKS (Timeliner-inspired) ── */

    // Toolbar button — unified style
    function TBBtn({ onClick, active, icon, children, primary }) {
      const base = "flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border-0 cursor-pointer transition-all";
      if (primary) return (
        <button onClick={onClick} className={`${base} bg-amber-500 hover:bg-amber-400 text-zinc-950 font-bold`}>
          {icon}<span>{children}</span>
        </button>
      );
      return (
        <button onClick={onClick} className={`${base} ${active ? 'bg-zinc-800 text-white' : 'text-zinc-400 hover:text-white hover:bg-zinc-900'}`}>
          {icon}<span>{children}</span>
        </button>
      );
    }

    // Status pill — uses React Portal so dropdown escapes overflow:hidden parents
    function StatusPill({ stage, onChange }) {
      const [open, setOpen] = useState(false);
      const [pos, setPos]   = useState({top:0, right:0});
      const btnRef = useRef(null);
      const s = stageById(stage);
      const clickable = !!onChange;

      const toggle = e => {
        e.stopPropagation();
        if (!clickable) return;
        if (!open && btnRef.current) {
          const r = btnRef.current.getBoundingClientRect();
          setPos({ top: r.bottom + 6, right: window.innerWidth - r.right });
        }
        setOpen(o => !o);
      };

      useEffect(() => {
        if (!open) return;
        const close = () => setOpen(false);
        window.addEventListener('scroll', close, true);
        window.addEventListener('resize', close);
        return () => {
          window.removeEventListener('scroll', close, true);
          window.removeEventListener('resize', close);
        };
      }, [open]);

      const dropdown = open ? (
        <>
          <div onClick={e => { e.stopPropagation(); setOpen(false); }}
            style={{position:'fixed', inset:0, zIndex:9998}} />
          <div onClick={e => e.stopPropagation()}
            style={{
              position:'fixed', top:pos.top, right:pos.right, zIndex:9999,
              background:'var(--surface)', border:'1px solid var(--border)',
              borderRadius:14, boxShadow:'0 24px 64px rgba(0,0,0,0.45), 0 6px 24px rgba(0,0,0,0.25)',
              padding:'6px 6px 8px', minWidth:240,
            }}>
            <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 12px 10px', borderBottom:'1px solid var(--border)', marginBottom:6}}>
              <span style={{fontSize:11, fontWeight:700, color:'var(--text-muted)', letterSpacing:'0.1em', textTransform:'uppercase'}}>שלב בפייפליין</span>
              <span style={{fontSize:10, color:'var(--text-muted)', background:'var(--surface2)', padding:'2px 7px', borderRadius:99, border:'1px solid var(--border)'}}>{stage}/9</span>
            </div>
            {STAGES.map(st => {
              const active = st.id === stage;
              const isPast = st.id < stage;
              return (
                <button key={st.id}
                  onClick={e => { e.stopPropagation(); setOpen(false); onChange(st.id); }}
                  style={{
                    width:'100%', display:'flex', alignItems:'center', gap:10,
                    padding:'9px 12px', borderRadius:9, cursor:'pointer',
                    border: active ? `1px solid ${st.dot}30` : '1px solid transparent',
                    outline:'none', textAlign:'right', fontFamily:'Heebo,sans-serif',
                    background: active ? `${st.dot}14` : 'transparent',
                    color: active ? st.dot : 'var(--text-sub)',
                    fontSize:13.5, fontWeight: active ? 700 : 400,
                    marginBottom:2, transition:'all 0.1s',
                  }}
                  onMouseEnter={e => { if (!active) { e.currentTarget.style.background = 'var(--hover)'; e.currentTarget.style.color = 'var(--text)'; }}}
                  onMouseLeave={e => { if (!active) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text-sub)'; }}}
                >
                  <span style={{width:8, height:8, borderRadius:'50%', flexShrink:0, background: active ? st.dot : isPast ? st.dot+'70' : 'var(--border2)', boxShadow: active ? `0 0 7px ${st.dot}80` : 'none'}} />
                  <span style={{flex:1}}>{st.name}</span>
                  <span style={{fontSize:13, opacity:0.65}}>{st.emoji}</span>
                  {active && <span style={{color:st.dot, fontSize:12, fontWeight:800}}>✓</span>}
                </button>
              );
            })}
          </div>
        </>
      ) : null;

      return (
        <>
          <button ref={btnRef} onClick={toggle}
            title={clickable ? 'לחץ לשינוי שלב בפיפ׳ליין' : s.name}
            style={{
              display:'inline-flex', alignItems:'center', gap:7,
              padding:'5px 11px 5px 9px', borderRadius:8,
              cursor: clickable ? 'pointer' : 'default',
              border: `1px solid ${s.dot}40`,
              background: `${s.dot}13`,
              color: s.dot,
              fontSize:13, fontWeight:700,
              transition:'all 0.12s', whiteSpace:'nowrap', outline:'none',
              fontFamily:'Heebo,sans-serif',
              boxShadow: open ? `0 0 0 3px ${s.dot}22` : 'none',
            }}>
            <span style={{width:8, height:8, borderRadius:'50%', background:s.dot, flexShrink:0, boxShadow:`0 0 6px ${s.dot}90`}} />
            <span>{s.name}</span>
            {clickable && <span style={{fontSize:9, opacity:0.6, display:'inline-block', transform: open ? 'rotate(180deg)' : 'none', transition:'transform 0.12s', marginRight:1}}>▾</span>}
          </button>
          {dropdown && ReactDOM.createPortal(dropdown, document.body)}
        </>
      );
    }

    // Priority chip
    const PRIO = {
      high:   { label:'דחוף', color:'#ef4444', tint:'rgba(239,68,68,0.12)' },
      medium: { label:'רגיל', color:'#f59e0b', tint:'rgba(245,158,11,0.12)' },
      low:    { label:'נמוך', color:'#3b82f6', tint:'rgba(59,130,246,0.12)' },
    };
    function PrioChip({ p }) {
      const v = PRIO[p] || PRIO.medium;
      return <span className="text-[10px] px-1.5 py-0.5 rounded font-medium" style={{background:v.tint, color:v.color}}>{v.label}</span>;
    }

    // Monday-style task row
    function TaskRow({ t, onOpen, onChangeStage, selected, employees=[], suppliers=[] }) {
      const u = urgencyOf(t);
      const prio = PRIO[t.priority||'medium'];
      const dateLabel = t.shootDate || t.dueDate;
      const isOverdue = dateLabel && (t.stage||1) < FINAL_STAGE && new Date(dateLabel) < new Date();
      const empInitials = id => { const e = employees.find(x=>x.id===id); const n=e?.name||e?.fullName||''; return n.split(' ').map(w=>w[0]).join('').slice(0,2); };
      const supInitials = id => { const e = suppliers.find(x=>x.id===id); const n=e?.name||''; return n.split(' ').map(w=>w[0]).join('').slice(0,2); };
      return (
        <div
          id={`task-${t.id}`}
          onClick={onOpen}
          className={`monday-row ${selected?'selected':''} ${u?'urg-'+u.level:''}`}
          style={{gridTemplateColumns:'4px 1fr 140px 130px 80px 110px 50px', gap:0}}
        >
          {/* Priority left bar */}
          <div className="prio-bar" style={{background:prio.color, height:'100%'}}></div>

          {/* Task name */}
          <div className="flex items-center gap-2 px-3 py-2.5 min-w-0">
            <div className="min-w-0 flex-1">
              <div className="text-sm font-medium truncate flex items-center gap-1.5" style={{color:'var(--text)'}}>
                <span className="truncate">{t.title || 'ללא שם'}</span>
                {t.calendarEventId && <span title="ביומן Google" className="text-[10px]" style={{color:'#60a5fa'}}>📅</span>}
                {(t.links||[]).length>0 && <span title={`${(t.links||[]).length} קישורים`} className="text-[10px]" style={{color:'var(--text-muted)'}}>📎{(t.links||[]).length}</span>}
              </div>
              {u && <div className="text-[10px] mt-0.5" style={{color:u.level==='critical'?'rgba(248,113,113,0.85)':'rgba(251,146,60,0.85)'}}>{u.reason}</div>}
            </div>
          </div>

          {/* Client */}
          <div className="px-3 py-2.5 text-xs truncate" style={{color:'var(--text-sub)', borderRight:'1px solid var(--border)'}}>
            {t.client ? <span className="px-2 py-0.5 rounded-md" style={{background:'var(--surface2)', color:'var(--text)'}}>{t.client}</span> : <span style={{color:'var(--text-muted)'}}>—</span>}
          </div>

          {/* Stage pill — clickable */}
          <div className="px-2 py-2.5" style={{borderRight:'1px solid var(--border)'}} onClick={e=>e.stopPropagation()}>
            <StatusPill stage={t.stage||1} onChange={s=>onChangeStage(t,s)} />
          </div>

          {/* Assignees — neutral circles */}
          <div className="px-2 py-2.5 flex items-center gap-1" style={{borderRight:'1px solid var(--border)'}}>
            {t.accountManagerId && (
              <div title={'מנהל: '+(employees.find(x=>x.id===t.accountManagerId)?.name||'?')} className="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-bold flex-shrink-0" style={{background:'var(--surface2)', color:'var(--text-sub)', border:'1px solid var(--border2)'}}>{empInitials(t.accountManagerId)||'?'}</div>
            )}
            {t.assigneeEmployeeId && t.assigneeEmployeeId !== t.accountManagerId && (
              <div title={'משוייך: '+(employees.find(x=>x.id===t.assigneeEmployeeId)?.name||employees.find(x=>x.id===t.assigneeEmployeeId)?.fullName||'?')} className="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-bold flex-shrink-0" style={{background:'rgba(99,102,241,0.15)', color:'#818cf8', border:'1px solid rgba(99,102,241,0.35)'}}>{empInitials(t.assigneeEmployeeId)||'?'}</div>
            )}
            {t.editorId && (
              <div title={'עורך: '+(suppliers.find(x=>x.id===t.editorId)?.name||'?')} className="w-6 h-6 rounded-full flex items-center justify-center text-[9px] font-bold flex-shrink-0" style={{background:'rgba(251,191,36,0.12)', color:'#fbbf24', border:'1px solid rgba(251,191,36,0.3)'}}>{supInitials(t.editorId)||'?'}</div>
            )}
            {!t.accountManagerId && !t.editorId && <span className="text-xs" style={{color:'var(--text-muted)'}}>—</span>}
          </div>

          {/* Date */}
          <div className="px-2 py-2.5 text-xs" style={{borderRight:'1px solid var(--border)'}}>
            {dateLabel ? (
              <span style={{color:isOverdue?'var(--red)':u?'rgba(251,146,60,0.9)':'var(--text)', fontWeight:isOverdue?'600':'400'}}>
                {t.shootDate?'🎬 ':''}{new Date(dateLabel).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit'})}
              </span>
            ) : <span style={{color:'var(--text-muted)'}}>—</span>}
          </div>

          {/* Revisions + videos count */}
          <div className="px-2 py-2.5 flex items-center gap-1 justify-center text-[10px]" style={{color:'var(--text-muted)'}}>
            {(parseInt(t.videosCount)||1)>1 && <span title={`${parseInt(t.videosCount)} סרטונים`} className="text-amber-500 font-bold">×{parseInt(t.videosCount)}</span>}
            {(t.revisions?.scriptRounds||0)>0 && <span title="תסריט">📝{t.revisions.scriptRounds}</span>}
            {(t.revisions?.videoRounds||0)>0 && <span title="וידאו">🎬{t.revisions.videoRounds}</span>}
            {(t.revisions?.videoRounds||0)>2 && <span className="text-red-400">⚠</span>}
          </div>
        </div>
      );
    }

    // Monday-style swimlane group
    function Swimlane({ stage, tasks, onOpen, onChangeStage, selId, employees, suppliers, onAddTask, isFirstShown }) {
      const s = stageById(stage);
      const isEmpty = tasks.length === 0;
      const [collapsed, setCollapsed] = useState(isEmpty);
      // keep open when tasks added or one is selected
      useEffect(()=>{ if (tasks.some(t=>t.id===selId)) setCollapsed(false); }, [selId]);
      return (
        <div className="mb-1">
          {/* Group header — calm: thin colored dot, neutral bg */}
          <div className="stage-group-hdr" style={{background:'var(--bg)', borderTop:'1px solid var(--border)'}} onClick={()=>setCollapsed(c=>!c)}>
            <span className="text-zinc-600 text-[10px] w-3">{collapsed?'▸':'▾'}</span>
            <span style={{width:6, height:6, borderRadius:'50%', background:s.bar, opacity:0.7, flexShrink:0}}></span>
            <span className="text-sm" style={{color:'var(--text-sub)', fontWeight:500}}>{s.name}</span>
            <span className="text-xs" style={{color:'var(--text-sub)'}}>{tasks.length}</span>
            <span className="flex-1"></span>
            {!isEmpty && !collapsed && (
              <button onClick={e=>{e.stopPropagation(); onAddTask(stage);}} title="הוסף משימה בשלב זה"
                className="text-zinc-600 hover:text-zinc-300 text-xs bg-transparent border-0 cursor-pointer px-2 py-0.5">+</button>
            )}
          </div>

          {/* Column headers — only on first visible non-empty swimlane */}
          {!collapsed && tasks.length>0 && isFirstShown && (
            <div className="grid text-[10px] text-zinc-600 font-semibold uppercase tracking-wide border-b border-zinc-800/60 bg-zinc-950/60"
              style={{gridTemplateColumns:'4px 1fr 140px 130px 80px 110px 50px'}}>
              <div></div>
              <div className="px-3 py-1.5">משימה</div>
              <div className="px-3 py-1.5">לקוח</div>
              <div className="px-3 py-1.5">שלב</div>
              <div className="px-3 py-1.5">צוות</div>
              <div className="px-3 py-1.5">תאריך</div>
              <div className="px-3 py-1.5">סבב</div>
            </div>
          )}

          {!collapsed && (
            <>
              {tasks.length===0 ? (
                <div className="px-4 py-2.5 text-zinc-700 text-xs flex items-center gap-2">
                  <span>אין משימות בשלב זה</span>
                  <button onClick={e=>{e.stopPropagation(); onAddTask(stage);}} className="text-amber-500 hover:text-amber-400 text-xs bg-transparent border-0 cursor-pointer underline">+ הוסף</button>
                </div>
              ) : tasks.map(t=>(
                <TaskRow key={t.id} t={t} onOpen={()=>onOpen(t)} onChangeStage={onChangeStage} selected={t.id===selId} employees={employees} suppliers={suppliers} />
              ))}
            </>
          )}
        </div>
      );
    }

    // ─── Task Detail Panel (slide-in side panel) ────────────────────────────────
    /* ── Per-stage sub-panel field definitions ── */
    // field types: 'text','date','time','textarea','person','client-contact'
    const STAGE_FIELDS = {
      1: { label:'בריף', fields:[ {key:'receivedAt',label:'תאריך קבלה',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      2: { label:'כתיבה', fields:[ {key:'writer',label:'כותב/ת',type:'person'}, {key:'deadline',label:'דדליין',type:'date'} ] },
      3: { label:'אישור תסריט', fields:[ {key:'sentTo',label:'נשלח ל',type:'person'}, {key:'sentAt',label:'תאריך שליחה',type:'date'}, {key:'responseDeadline',label:'תאריך מענה נדרש',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      4: { label:'קביעת צילום', fields:[ {key:'shootDate',label:'תאריך צילום',type:'date'}, {key:'shootTime',label:'שעת צילום',type:'time'}, {key:'location',label:'מיקום',type:'text'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      5: { label:'צילום', fields:[ {key:'photographer',label:'צלם/ת',type:'person'}, {key:'location',label:'מיקום',type:'text'}, {key:'deliveredAt',label:'תאריך מסירה',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      6: { label:'עריכה', fields:[ {key:'editor',label:'עורך/ת',type:'person'}, {key:'editServiceType',label:'סוג עריכה',type:'service-type'}, {key:'editsSentCount',label:'שליחות לעריכה',type:'counter'}, {key:'revisionRoundsCount',label:'סבבי תיקונים',type:'counter'}, {key:'deadline',label:'דדליין',type:'date'}, {key:'deliveredAt',label:'תאריך מסירה',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      7: { label:'אישור סופרוויזר', fields:[ {key:'approvedBy',label:'אושר ע"י',type:'person'}, {key:'approvedAt',label:'תאריך אישור',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      8: { label:'אישור לקוח', fields:[ {key:'sentTo',label:'נשלח ל',type:'client-contact'}, {key:'sentAt',label:'תאריך שליחה',type:'date'}, {key:'responseDeadline',label:'תאריך מענה נדרש',type:'date'}, {key:'approvedAt',label:'תאריך אישור',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
      9: { label:'סגירה', fields:[ {key:'deliveredAt',label:'תאריך מסירה',type:'date'}, {key:'notes',label:'הערות',type:'textarea'} ] },
    };

    function TaskPanel({ sel, form, F, user, clients=[], employees=[], suppliers=[], saving, savedDraft, autoSaveStatus,
                         onSave, onClose, onDelete, onClearDraft, onAddAttachment, onRemoveAttachment, onAddRev, onBrief, onNotify }) {
      const isNew = !sel;
      const [editMode, setEditMode]         = useState(isNew);        // locked by default for existing tasks
      const [confirmDel, setConfirmDel]     = useState(false);        // 2-step delete
      const [openStage, setOpenStage]       = useState(null);         // which stage sub-panel is open
      const [subTaskAssignee, setSubTaskAssignee] = useState('');     // new sub-task: selected employee
      const [subTaskNote,     setSubTaskNote]     = useState('');     // new sub-task: note/instruction
      const [briefing,        setBriefing]        = useState(false);  // brief generation loading
      const [sending,         setSending]         = useState(false);  // team notification loading
      const [showVideoDialog, setShowVideoDialog] = useState(false);  // video add dialog
      const [videoInput,      setVideoInput]      = useState('');     // drive URL input
      const [videoLabel,      setVideoLabel]      = useState('');     // optional label
      const [addingVideo,     setAddingVideo]     = useState(false);  // saving state

      const handleBrief = async () => {
        if (!onBrief) return;
        setBriefing(true);
        try { await onBrief(); } finally { setBriefing(false); }
      };

      const handleNotify = async () => {
        if (!onNotify) return;
        setSending(true);
        try { await onNotify(); } finally { setSending(false); }
      };

      // Parse Google Drive file ID from any Drive URL
      const parseDriveId = url => {
        if (!url) return null;
        let m = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (m) return m[1];
        m = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
        if (m) return m[1];
        m = url.match(/open\?id=([a-zA-Z0-9_-]+)/);
        if (m) return m[1];
        return null;
      };

      // Add a finished video (creates videoReviews doc + stores in form.readyVideos)
      const addReadyVideo = async () => {
        const url = videoInput.trim();
        if (!url) return;
        setAddingVideo(true);
        try {
          const driveId = parseDriveId(url);
          const idx = (form.readyVideos||[]).length;
          const lbl = videoLabel.trim() || `סרטון ${idx + 1}`;
          const entry = {
            id: Date.now().toString(),
            url,
            driveFileId: driveId,
            label: lbl,
            addedBy: user.displayName || user.email || 'משתמש',
            addedByUid: user.uid,
            addedAt: new Date().toISOString(),
            reviewId: null,
          };
          // Create videoReviews Firestore document if task already exists
          if (sel && db) {
            try {
              const revDoc = await db.collection('videoReviews').add({
                title: lbl,
                taskId: sel.id,
                editorId: (form.stageData?.[6]?.editor) || form.editorId || null,
                driveFileId: driveId || null,
                videoSrc: url,          // store full URL so YouTube/Vimeo/direct links work
                fileName: lbl,
                versions: driveId ? [{
                  v: 1,
                  driveFileId: driveId,
                  videoSrc: null,
                  fileName: lbl,
                  uploadedBy: user.uid,
                  uploadedByName: user.displayName || user.email,
                  uploadedAt: new Date().toISOString(),
                  note: 'גרסה ראשונית',
                }] : [],
                currentVersion: driveId ? 1 : 0,
                status: 'awaiting_am_review',
                assignedTo: 'am',
                currentRound: 1,
                revisionRounds: 0,
                roundsAmEditor: 0,
                roundsClientAm: 0,
                userId: user.uid,
                commentCount: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              });
              entry.reviewId = revDoc.id;
            } catch(e) {
              console.warn('videoReview create failed:', e.message);
            }
          }
          F({ readyVideos: [...(form.readyVideos||[]), entry] });
          setVideoInput('');
          setVideoLabel('');
          setShowVideoDialog(false);
        } finally {
          setAddingVideo(false);
        }
      };

      // Sub-task helpers
      const addSubTask = () => {
        if (!subTaskAssignee) return;
        const newSub = { id: Date.now().toString(), assigneeEmployeeId: subTaskAssignee, note: subTaskNote.trim(), status: 'open', createdAt: new Date().toISOString() };
        F({ subTasks: [...(form.subTasks||[]), newSub] });
        setSubTaskAssignee(''); setSubTaskNote('');
      };
      const toggleSubTask = subId => F({ subTasks: (form.subTasks||[]).map(s => s.id===subId ? {...s, status: s.status==='done'?'open':'done'} : s) });
      const removeSubTask = subId => F({ subTasks: (form.subTasks||[]).filter(s => s.id!==subId) });

      // Auto-reset confirmDel when user clicks away
      const panelRef = React.useRef(null);
      React.useEffect(() => {
        if (!confirmDel) return;
        const handler = e => { if (panelRef.current && !panelRef.current.contains(e.target)) setConfirmDel(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [confirmDel]);

      // When a new task is opened, always start in edit mode; existing tasks start locked
      React.useEffect(() => { setEditMode(!sel); setConfirmDel(false); setOpenStage(null); }, [sel?.id]);

      const editors = suppliers||[];   // all suppliers available as editor/assignee
      const matchClient = clients.find(c=>c.name===form.client);
      const empName = id => { const e = employees.find(x=>x.id===id); return e?.name||e?.fullName||''; };
      const supName = id => suppliers.find(x=>x.id===id)?.name||'';
      const initials = name => (name||'').split(' ').map(w=>w[0]).join('').slice(0,2);
      const fmtDate = iso => { try { return new Date(iso).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}); } catch { return iso; } };
      const fmtShort = iso => { if(!iso) return '—'; try { return new Date(iso).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'}); } catch { return iso; } };
      const history = (sel?.stageHistory||[]).slice().reverse();
      const u = urgencyOf({stage:form.stage, shootDate:form.shootDate, dueDate:form.dueDate});

      const applyDefaults = () => {
        if (!matchClient) return;
        F({ accountManagerId: form.accountManagerId||matchClient.accountManagerId||'', editorId: form.editorId||matchClient.defaultEditorId||'' });
      };

      // Update stageData for a specific stage key
      const setSD = (stageId, key, val) => {
        F({ stageData: { ...(form.stageData||{}), [stageId]: { ...((form.stageData||{})[stageId]||{}), [key]: val } } });
      };
      const sd = stageId => (form.stageData||{})[stageId] || {};

      const prioMeta = { high:{label:'🔴 דחוף',bg:'rgba(239,68,68,0.13)',color:'#f87171',border:'rgba(239,68,68,0.3)'}, medium:{label:'🟡 רגיל',bg:'rgba(234,179,8,0.1)',color:'#fcd34d',border:'rgba(234,179,8,0.25)'}, low:{label:'🔵 נמוך',bg:'rgba(59,130,246,0.1)',color:'#60a5fa',border:'rgba(59,130,246,0.25)'} };
      const prio = prioMeta[form.priority] || prioMeta.medium;

      return (
        <div ref={panelRef} style={{display:'flex', flexDirection:'column', height:'100%', background:'var(--surface)'}}>

          {/* ── Header ── */}
          <div style={{padding:'16px 16px 12px', borderBottom:'1px solid var(--border)', flexShrink:0}}>
            <div style={{display:'flex', alignItems:'flex-start', gap:8}}>
              <div style={{flex:1, minWidth:0}}>
                {/* Title — always editable */}
                <input
                  className="w-full bg-transparent font-bold border-0 focus:outline-none placeholder-zinc-600" style={{color:'var(--text)', fontSize:15, lineHeight:'1.4'}}
                  placeholder="שם המשימה *"
                  value={form.title}
                  onChange={e=>F({title:e.target.value})}
                  autoFocus={isNew}
                />
                {sel && (
                  <div style={{display:'flex', alignItems:'center', gap:6, marginTop:6, flexWrap:'wrap'}}>
                    <StatusPill stage={form.stage} onChange={editMode ? s=>F({stage:s}) : null} />

                </div>

                  <div>
                    <label className={CL.label}>🕐 שעה</label>

                  <div>
                    <label className={CL.label}>📅 מסירה</label>

                      <select className={CL.input} value={form.accountManagerId} onChange={e=>F({accountManagerId:e.target.value})}>
                        <option value="">— ללא —</option>
                        {employees.map(e=><option key={e.id} value={e.id}>{e.name||e.fullName||'(ללא שם)'}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className={CL.label}>עורך וידאו{form.stage>=6&&<span style={{color:'#fbbf24'}}> *</span>}</label>

                        <option value="">— ללא —</option>
                        {editors.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{marginTop:8}}>
                    <label className={CL.label}>👤 משוייך לעובד (חלוקת עבודה)</label>
                    <select className={CL.input} value={form.assigneeEmployeeId} onChange={e=>F({assigneeEmployeeId:e.target.value})}>
                      <option value="">— ללא שיוך ספציפי —</option>
                      {employees.map(e=><option key={e.id} value={e.id}>{e.name||e.fullName||'(ללא שם)'}</option>)}
                    </select>
                  </div>

                  {/* ── הפצה לצוות (Sub-Task Assignments) ── */}
                  <div style={{marginTop:12, paddingTop:12, borderTop:'1px solid var(--border)'}}>
                    <label className={CL.label} style={{fontSize:11, fontWeight:700, color:'var(--text-sub)', marginBottom:8, display:'block'}}>📤 הפצה לצוות</label>

                    {/* Existing sub-tasks */}
                    {(form.subTasks||[]).length > 0 && (
                      <div style={{marginBottom:8, display:'flex', flexDirection:'column', gap:4}}>
                        {(form.subTasks||[]).map(st => (
                          <div key={st.id} style={{display:'flex', alignItems:'center', gap:8, padding:'6px 10px', background:'rgba(99,102,241,0.08)', border:'1px solid rgba(99,102,241,0.2)', borderRadius:8}}>
                            <button type="button" onClick={()=>toggleSubTask(st.id)} style={{background:'none', border:'none', cursor:'pointer', fontSize:14, padding:0, flexShrink:0, lineHeight:1}}>
                              {st.status==='done' ? '✅' : '⬜'}
                            </button>
                            <div style={{flex:1, minWidth:0}}>
                              <div style={{fontSize:11, color:'#a5b4fc', fontWeight:600}}>{empName(st.assigneeEmployeeId)||'?'}</div>

                      </div>

                      >
                        <option value="">בחר עובד...</option>
                        {employees.map(e=><option key={e.id} value={e.id}>{e.name||e.fullName||'?'}</option>)}
                      </select>
                      <input
                        value={subTaskNote} onChange={e=>setSubTaskNote(e.target.value)}
                        onKeyDown={e=>{ if(e.key==='Enter'){ e.preventDefault(); addSubTask(); } }}
                        placeholder="הוראות / הערה..."
                        style={{flex:1, background:'var(--bg)', color:'var(--text)', border:'1px solid var(--border2)', borderRadius:6, padding:'4px 8px', fontSize:11, outline:'none', minWidth:0}}
                      />
                      <button
                        type="button" onClick={addSubTask} disabled={!subTaskAssignee}
                        style={{background: subTaskAssignee ? '#4f46e5' : 'var(--border)', color: subTaskAssignee ? '#fff' : 'var(--text-muted)', border:'none', borderRadius:6, padding:'0 10px', fontSize:11, cursor: subTaskAssignee ? 'pointer' : 'default', flexShrink:0, fontWeight:600, transition:'background .15s'}}
                      >שלח ▶</button>
                    </div>
                    <div style={{marginTop:4, fontSize:10, color:'var(--text-muted)'}}>המשימה תופיע בלשונית "שלי" של העובד הנבחר</div>
                  </div>

                  {form.stage>=6&&!form.editorId&&<div style={{marginTop:6,fontSize:10,color:'#fcd34d'}}>⚠️ המשימה בשלב עריכה — נדרש לשייך עורך</div>}
                </div>
              </div>
            ) : (
              /* ── Read-only info card ── */
              <div style={{marginBottom:14}}>

                {/* Client + Priority row */}
                <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10}}>
                  <div style={{display:'flex', alignItems:'center', gap:10, minWidth:0}}>
                    <div style={{width:40, height:40, borderRadius:12, background:'rgba(37,99,235,0.15)', border:'1px solid rgba(37,99,235,0.25)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0}}>🏢</div>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:10, color:'var(--text-sub)', marginBottom:2}}>לקוח</div>
                      <div style={{fontSize:16, fontWeight:700, color: form.client ? 'var(--text)' : 'var(--text-muted)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {form.client || '— לא הוגדר —'}
                      </div>
                    </div>
                  </div>
                  <div style={{padding:'6px 14px', borderRadius:20, fontSize:12, fontWeight:700, flexShrink:0, marginRight:8, background:prio.bg, color:prio.color, border:`1px solid ${prio.border}`}}>
                    {prio.label}
                  </div>
                </div>

                {/* Videos count badge */}
                {(parseInt(form.videosCount)||1) > 1 && (
                  <div style={{display:'inline-flex', alignItems:'center', gap:6, padding:'4px 12px', borderRadius:20, background:'rgba(251,191,36,0.1)', border:'1px solid rgba(251,191,36,0.25)', marginBottom:10}}>
                    <span style={{fontSize:13}}>🎬</span>
                    <span style={{fontSize:12, fontWeight:700, color:'#fbbf24'}}>{parseInt(form.videosCount)||1} סרטונים</span>
                  </div>
                )}

                {/* Dates — two big blocks */}
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10}}>
                  <div style={{padding:'10px 14px', background:'rgba(16,185,129,0.06)', border:'1px solid rgba(16,185,129,0.15)', borderRadius:10}}>
                    <div style={{fontSize:10, color:'#6ee7b7', marginBottom:4, fontWeight:600}}>🎬 יום צילום</div>
                    <div style={{fontSize:15, fontWeight:700, color: form.shootDate ? 'var(--text)' : 'var(--text-muted)'}}>
                      {form.shootDate ? new Date(form.shootDate+'T12:00').toLocaleDateString('he-IL',{day:'numeric', month:'long'}) : '—'}
                    </div>
                    {form.shootTime && <div style={{fontSize:12, color:'var(--text-sub)', marginTop:2}}>⏰ {form.shootTime}</div>}
                    {!form.shootDate && !form.shootTime && <div style={{fontSize:11, color:'var(--border2)'}}>לא נקבע</div>}
                  </div>
                  <div style={{padding:'10px 14px', background:'rgba(59,130,246,0.06)', border:'1px solid rgba(59,130,246,0.15)', borderRadius:10}}>
                    <div style={{fontSize:10, color:'#93c5fd', marginBottom:4, fontWeight:600}}>📅 תאריך מסירה</div>
                    <div style={{fontSize:15, fontWeight:700, color: form.dueDate ? 'var(--text)' : 'var(--text-muted)'}}>
                      {form.dueDate ? new Date(form.dueDate+'T12:00').toLocaleDateString('he-IL',{day:'numeric', month:'long'}) : '—'}
                    </div>
                    {!form.dueDate && <div style={{fontSize:11, color:'var(--border2)', marginTop:2}}>לא נקבע</div>}
                  </div>
                </div>

                {/* Team avatars */}
                <div style={{display:'flex', alignItems:'center', gap:8, padding:'10px 14px', background:'var(--surface2)', border:'1px solid var(--border)', borderRadius:10}}>
                  {/* Account manager */}
                  <div style={{display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0}}>
                    <div style={{width:34, height:34, borderRadius:'50%', background: form.accountManagerId ? '#1d4ed8' : 'var(--border2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize: form.accountManagerId ? 12 : 16, color:'#fff', fontWeight:700, flexShrink:0}}>
                      {form.accountManagerId ? (initials(empName(form.accountManagerId))||'?') : '👤'}
                    </div>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:9, color:'var(--text-muted)', marginBottom:1}}>מנהל/ת תיק</div>
                      <div style={{fontSize:12, color:'var(--text)', fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {form.accountManagerId ? empName(form.accountManagerId) : <span style={{color:'var(--text-muted)'}}>לא שויך</span>}
                      </div>
                    </div>
                  </div>
                  <div style={{width:1, height:32, background:'var(--border2)', flexShrink:0}}></div>
                  {/* Editor */}
                  <div style={{display:'flex', alignItems:'center', gap:8, flex:1, minWidth:0}}>
                    <div style={{width:34, height:34, borderRadius:'50%', background: form.editorId ? '#c2410c' : 'var(--border2)', display:'flex', alignItems:'center', justifyContent:'center', fontSize: form.editorId ? 12 : 16, color:'#fff', fontWeight:700, flexShrink:0}}>
                      {form.editorId ? (initials(supName(form.editorId))||'?') : '🎬'}
                    </div>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:9, color:'var(--text-muted)', marginBottom:1}}>עורך/ת וידאו</div>
                      <div style={{fontSize:12, color:'var(--text)', fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {form.editorId ? supName(form.editorId) : <span style={{color:'var(--text-muted)'}}>לא שויך</span>}
                      </div>
                    </div>
                  </div>
                </div>
                {form.stage>=6&&!form.editorId&&<div style={{marginTop:6,fontSize:11,color:'#fcd34d',display:'flex',alignItems:'center',gap:5}}>⚠️ בשלב עריכה — נדרש לשייך עורך</div>}
              </div>
            )}

            {/* Calendar sync notice */}
            {form.shootDate && (
              <div style={{marginBottom:14, fontSize:11, display:'flex', alignItems:'center', gap:8}}>
                {calConsented.get()
                  ? <span style={{color:'#34d399'}}>📅 יסונכרן ביומן בעת שמירה</span>
                  : <span style={{color:'var(--text-sub)'}}>📅 <span style={{color:'#fbbf24'}}>הגדרות ← יומן Google</span> להפעלה</span>
                }
                {sel?.calendarHtmlLink && <a href={sel.calendarHtmlLink} target="_blank" rel="noreferrer" style={{color:'#60a5fa',textDecoration:'underline',marginRight:'auto'}}>פתח ביומן ↗</a>}
              </div>
            )}

                <span style={{fontSize:11, color:'var(--text-sub)', fontWeight:600}}>📍 שלב בפייפליין</span>
                <span style={{fontSize:10, color:'var(--text-sub)'}}>{form.stage}/9</span>
              </div>
              {/* Stage pills row — clickable to open sub-panel */}
              <div style={{display:'flex', gap:4, flexWrap:'wrap', marginBottom: openStage ? 10 : 0}}>

                  const past = s.id < form.stage;
                  const isCur = s.id === form.stage;
                  const hasData = Object.keys(sd(s.id)).some(k => sd(s.id)[k]);
                  const isOpen = openStage === s.id;
                  return (
                    <button
                      key={s.id}
                      onClick={() => { setOpenStage(isOpen ? null : s.id); if(editMode && isCur===false) F({stage:s.id}); }}

                        display:'flex', alignItems:'center', gap:3, padding:'4px 7px', borderRadius:6,
                        border: isOpen ? '1px solid #fbbf24' : isCur ? '1px solid rgba(251,191,36,0.5)' : '1px solid var(--border)',
                        background: isOpen ? 'rgba(251,191,36,0.15)' : isCur ? 'rgba(251,191,36,0.08)' : past ? 'rgba(16,185,129,0.06)' : 'rgba(39,39,42,0.4)',
                        color: isOpen ? '#fbbf24' : isCur ? '#fcd34d' : past ? '#6ee7b7' : 'var(--text-muted)',
                        cursor:'pointer', fontSize:11, fontWeight: isCur ? 700 : 500, position:'relative',
                        transition:'all .15s'
                      }}
                    >
                      <span>{past && !isCur ? '✓' : s.emoji}</span>

                                <optgroup label="🎬 ספקים">
                                  {suppliers.map(s=><option key={s.id} value={s.name}>{s.name}{s.supplierRole?' ('+s.supplierRole+')':''}</option>)}
                                </optgroup>
                              )}
                            </select>

                            <select className={CL.input} value={val} onChange={onChg}>
                              <option value="">— בחר —</option>

                                <optgroup label="👥 עובדים">

                  cursor: sending ? 'default' : 'pointer',
                  color:'#a5b4fc', fontSize:13, fontWeight:600,
                  display:'flex', alignItems:'center', gap:5,
                  transition:'all .15s', opacity: sending ? 0.6 : 1
                }}
              >{sending ? '⏳ שולח...' : '📤 שלח לצוות'}</button>
            )}
            <button onClick={onSave} className={CL.btn} style={{flex:1}} disabled={saving}>{saving?(isNew?'יוצר...':'שומר...'):(isNew?'✅ צור משימה':'💾 שמור')}</button>
          </div>
        </div>
      );
    }

    // Kanban card
    function KanbanCard({ t, onOpen, onDragStart, onDragEnd }) {
      const u = urgencyOf(t);
      const urgClass = u ? `urg-${u.level}` : '';
      const dateLabel = t.shootDate || t.dueDate;
      return (
        <div
          id={`task-${t.id}`}
          draggable
          onDragStart={e => { e.dataTransfer.setData('text/plain', t.id); e.currentTarget.classList.add('dragging'); onDragStart && onDragStart(t); }}
          onDragEnd={e => { e.currentTarget.classList.remove('dragging'); onDragEnd && onDragEnd(); }}
          onClick={onOpen}
          className={`kanban-card border rounded-lg p-2.5 mb-2 transition-all ${urgClass}`}
        >
          <div className="flex items-start gap-2 mb-1.5">
            <div className="kanban-emoji-box w-7 h-7 rounded-md flex-shrink-0 flex items-center justify-center text-sm">{stageById(t.stage||1).emoji}</div>
            <div className="min-w-0 flex-1">
              <div className="kanban-title text-sm font-semibold leading-tight truncate">{t.title || 'ללא שם'}</div>
              <div className="kanban-client text-[11px] truncate">{t.client || '—'}</div>
            </div>
            {t.priority && t.priority!=='medium' && <PrioChip p={t.priority} />}
          </div>
          {u && (
            <div className={`text-[11px] mb-1.5 px-1.5 py-1 rounded font-semibold ${u.level==='critical'?'bg-red-500/15 text-red-300':'bg-orange-500/15 text-orange-300'}`}>
              🔥 {u.reason}
            </div>
          )}
          <div className="kanban-footer flex items-center justify-between text-[11px] mt-1.5 pt-1.5 border-t">
            <div className="flex items-center gap-2">
              <span title="סבבי תסריט">📝{t.revisions?.scriptRounds||0}</span>
              <span title="סבבי וידאו">🎬{t.revisions?.videoRounds||0}</span>
            </div>
            {dateLabel && (
              <span className={`kanban-date ${u?.level==='critical' ? 'text-red-400 font-semibold' : u?.level==='warning' ? 'text-orange-400 font-semibold' : ''}`}>
                {t.shootDate ? '🎬 ' : ''}{new Date(dateLabel).toLocaleDateString('he-IL', {month:'short', day:'numeric'})}
              </span>
            )}
          </div>
        </div>
      );
    }

    // Kanban column
    function KanbanCol({ stage, tasks, onOpen, onDrop, onAdd }) {
      const s = stageById(stage);
      const [over, setOver] = useState(false);
      return (
        <div
          onDragOver={e => { e.preventDefault(); setOver(true); }}
          onDragLeave={() => setOver(false)}
          onDrop={e => { e.preventDefault(); setOver(false); const id = e.dataTransfer.getData('text/plain'); if (id) onDrop(id, stage); }}
          className={`kanban-col flex-shrink-0 w-64 flex flex-col rounded-lg p-2 ${over?'drag-over':''}`}
          style={{background:'var(--surface2)', borderTop:`2px solid ${s.bar}`}}
        >
          <div className="flex items-center gap-2 mb-2 px-1">
            <span className="stage-dot" style={{background:s.dot}}></span>
            <span className="kanban-col-head-title text-xs font-bold flex-1">{s.name}</span>
            <span className="kanban-col-head-count text-[11px]">{tasks.length}</span>
          </div>
          <button onClick={onAdd} className="kanban-col-add-btn text-xs py-1.5 mb-2 rounded-md border border-dashed cursor-pointer transition-colors">+ הוסף משימה</button>
          <div className="flex-1 overflow-y-auto" style={{minHeight:100, maxHeight:'calc(100vh - 280px)'}}>
            {tasks.map(t => <KanbanCard key={t.id} t={t} onOpen={()=>onOpen(t)} />)}
          </div>
        </div>
      );
    }

    const BLANK_TASK = { title:'', client:'', stage:1, priority:'medium', dueDate:'', shootDate:'', shootTime:'', notes:'', accountManagerId:'', editorId:'', assigneeEmployeeId:'', stageData:{}, stageOwners:{}, subTasks:[], videosCount:1, readyVideos:[] };
    const DRAFT_KEY  = id => `tingmedia.taskDraft.${id || 'new'}`;
    const isFormDirty = (form, sel) => {
      const base = sel ? { title:sel.title||'', client:sel.client||'', stage:sel.stage||1, priority:sel.priority||'medium', dueDate:sel.dueDate||'', shootDate:sel.shootDate||'', shootTime:sel.shootTime||'', notes:sel.notes||'', accountManagerId:sel.accountManagerId||'', editorId:sel.editorId||'', assigneeEmployeeId:sel.assigneeEmployeeId||'', stageData:sel.stageData||{}, stageOwners: sel.stageOwners||{}, subTasks: sel.subTasks||[], videosCount: sel.videosCount||1, readyVideos: sel.readyVideos||[] } : BLANK_TASK;
      return JSON.stringify(form) !== JSON.stringify(base);
    };

    function Tasks({ user, role, clients, employees=[], suppliers=[] }) {
      const [items,   setItems]   = useState([]);
      const [myEmployeeId, setMyEmployeeId] = useState('');
      const [lens, setLens] = useState('all'); // all | mine
      const [loading, setLoading] = useState(true);
      const [modal,   setModal]   = useState(false);
      const [sel,     setSel]     = useState(null);
      const [form,    setForm]    = useState(BLANK_TASK);
      const [saving,  setSaving]  = useState(false);
      const [savedDraft, setSavedDraft] = useState(false); // small "draft restored" toast
      const [autoSaveStatus, setAutoSaveStatus] = useState(null); // null | 'pending' | 'saving' | 'saved'
      const autoSaveTimer = React.useRef(null);

      // UI state
      const [view, setView]               = useState('list'); // list | kanban
      const [search, setSearch]           = useState('');
      const [clientFilter, setClientFilter]= useState('');
      const [prioFilter, setPrioFilter]   = useState('');
      const [sortBy, setSortBy]           = useState('updated'); // updated | due | title | priority
      const [showEmptyStages, setShowEmptyStages] = useState(false); // hide empty stages to reduce clutter

      useEffect(() => {
        if (!db||!user) return;
        return db.collection('tasks').where('userId','==',user.uid).onSnapshot(snap => {
          const d = snap.docs.map(x=>({id:x.id,...x.data()})).filter(t => !t.archived);
          setItems(d); setLoading(false);
        });
      }, [user]);

      // Load current user's linkedEmployeeId from /users (matched by email)
      useEffect(()=>{
        if (!db||!user?.email) return;
        return db.collection('users').where('email','==',user.email).onSnapshot(snap=>{
          const me = snap.docs[0]?.data();
          setMyEmployeeId(me?.linkedEmployeeId || '');
        });
      },[user]);

      // URL state for selected task
      useEffect(() => {
        const url = new URL(window.location.href);
        const id = url.searchParams.get('task');
        if (id && items.length && !modal) {
          const t = items.find(x=>x.id===id);
          if (t) openEdit(t);
        }
      }, [items]);

      // Auto-save draft to localStorage on every form change while modal is open
      useEffect(() => {
        if (!modal) return;
        if (!isFormDirty(form, sel)) return;
        // Always save to localStorage as backup
        try { localStorage.setItem(DRAFT_KEY(sel?.id), JSON.stringify(form)); } catch(e){}

        // Auto-save to Firestore for EXISTING tasks (debounced 2.5s)
        if (sel?.id) {
          if (autoSaveTimer.current) clearTimeout(autoSaveTimer.current);
          setAutoSaveStatus('pending');
          autoSaveTimer.current = setTimeout(async () => {
            setAutoSaveStatus('saving');
            try {
              const d = {
                title: form.title, client: form.client, stage: form.stage,
                priority: form.priority, dueDate: form.dueDate,
                shootDate: form.shootDate, shootTime: form.shootTime,
                notes: form.notes, accountManagerId: form.accountManagerId,
                editorId: form.editorId, assigneeEmployeeId: form.assigneeEmployeeId,
                stageData: form.stageData||{}, stageOwners: form.stageOwners||{},
                subTasks: form.subTasks||[], videosCount: parseInt(form.videosCount)||1,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              };
              await db.collection('tasks').doc(sel.id).update(d);
              try { localStorage.removeItem(DRAFT_KEY(sel.id)); } catch(e){}
              setSavedDraft(false);
              setAutoSaveStatus('saved');
              setTimeout(() => setAutoSaveStatus(null), 2500);
            } catch(e) {
              console.warn('Auto-save failed:', e);
              setAutoSaveStatus(null);
            }
          }, 2500);
        }
      }, [form, modal, sel]);

      const F = f => setForm(p=>({...p,...f}));

      const setUrlTask = id => {
        const url = new URL(window.location.href);
        if (id) url.searchParams.set('task', id); else url.searchParams.delete('task');
        window.history.replaceState({}, '', url);
      };

      const openNew = (preStage) => {
        setSel(null);
        // Try to restore unsaved draft for "new"
        let initial = { ...BLANK_TASK, stage: preStage || 1 };
        try {
          const draft = localStorage.getItem(DRAFT_KEY(null));
          if (draft) { initial = JSON.parse(draft); setSavedDraft(true); setTimeout(()=>setSavedDraft(false), 4000); }
        } catch(e){}
        setForm(initial);
        setModal(true);
      };
      const openEdit = t => {
        setSel(t);
        setUrlTask(t.id);
        let initial = { title:t.title||'', client:t.client||'', stage:t.stage||1, priority:t.priority||'medium', dueDate:t.dueDate||'', shootDate:t.shootDate||'', shootTime:t.shootTime||'', notes:t.notes||'', accountManagerId:t.accountManagerId||'', editorId:t.editorId||'', assigneeEmployeeId:t.assigneeEmployeeId||'', stageData:t.stageData||{}, subTasks:t.subTasks||[], videosCount:t.videosCount||1 };
        try {
          const draft = localStorage.getItem(DRAFT_KEY(t.id));
          if (draft) { initial = JSON.parse(draft); setSavedDraft(true); setTimeout(()=>setSavedDraft(false), 4000); }
        } catch(e){}
        setForm(initial);
        setModal(true);
      };

      // Safe close — confirms if dirty, else closes silently
      const closeModal = (forceDiscard) => {
        if (!forceDiscard && isFormDirty(form, sel)) {
          if (!window.confirm('יש שינויים שלא נשמרו. הטיוטה תישמר אוטומטית — האם לסגור?')) return;
        }
        // If user discards explicitly, clear draft. Otherwise keep it.
        if (forceDiscard) { try { localStorage.removeItem(DRAFT_KEY(sel?.id)); } catch(e){} }
        setModal(false);
        setUrlTask(null);
      };

      const save = async () => {
        if (!form.title.trim()) { showToast('שם המשימה חובה','warning'); return; }
        if (form.stage>=6 && !form.editorId) {
          if (!window.confirm('המשימה בשלב עריכה אך לא הוגדר עורך. האם להמשיך בכל זאת?')) return;
        }
        setSaving(true);
        try {
          let newId = null;
          let savedTaskRef = null;
          if (sel) {
            const updates = {...form, updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
            // Log history if stage changed via the form
            if (sel.stage !== form.stage) {
              updates.stageHistory = firebase.firestore.FieldValue.arrayUnion({
                stage: form.stage, at: new Date().toISOString(), by: user.email||'?'
              });
            }
            await db.collection('tasks').doc(sel.id).update(updates);
            savedTaskRef = db.collection('tasks').doc(sel.id);
          } else {
            // Auto-populate assignees from client defaults
            const matchingClient = clients.find(c=>c.name===form.client);
            const defaults = matchingClient ? {
              accountManagerId: matchingClient.accountManagerId||'',
              editorId: matchingClient.defaultEditorId||'',
            } : {};
            const ref = await db.collection('tasks').add({
              ...form, ...defaults, userId:user.uid,
              revisions:{scriptRounds:0,videoRounds:0},
              stageHistory: [{ stage: form.stage||1, at: new Date().toISOString(), by: user.email||'?' }],
              createdAt:firebase.firestore.FieldValue.serverTimestamp(),
              updatedAt:firebase.firestore.FieldValue.serverTimestamp()
            });
            newId = ref.id;
            savedTaskRef = ref;
          }
          // Saved successfully — drop the draft
          try { localStorage.removeItem(DRAFT_KEY(sel?.id)); } catch(e){}

          // 📅 Google Calendar sync — only if shootDate set and user has connected calendar
          if (form.shootDate && calToken.get() && savedTaskRef) {
            try {
              const taskForCal = { ...form, calendarEventId: sel?.calendarEventId };
              const ev = await calUpsert(taskForCal, form.client);
              if (ev?.id && ev.id !== sel?.calendarEventId) {
                await savedTaskRef.update({ calendarEventId: ev.id, calendarHtmlLink: ev.htmlLink||'' });
              }
            } catch(e){ console.warn('Calendar sync failed:', e); showToast('שמור — אך סנכרון ליומן נכשל: '+e.message,'warning'); }
          }

          // 📧 Email notification — send to assigned employee/editor when task created or assignee changed
          try {
            const prevAccountMgr = sel?.accountManagerId || '';
            const prevEditor     = sel?.editorId || '';
            const prevAssignee   = sel?.assigneeEmployeeId || '';
            const taskId = newId || sel?.id;
            const taskTitle = form.title || '(ללא שם)';
            const clientName = form.client || '';
            const assignerName = user.displayName || user.email || 'טינג מדיה';
            const allUsers = (await db.collection('users').get()).docs.map(d=>({id:d.id,...d.data()}));
            const allEmps  = employees;

            // Helper: find email for an employee ID
            const empEmail = (empId) => {
              if (!empId) return null;
              const emp = allEmps.find(e=>e.id===empId);
              if (!emp) return null;
              const u = allUsers.find(u=>u.linkedEmployeeId===empId || u.email===emp.email);
              return u?.email || emp.email || null;
            };
            const empName = (empId) => {
              const emp = allEmps.find(e=>e.id===empId);
              return emp?.name || emp?.fullName || '';
            };

            // Send to accountManager if newly assigned
            if (form.accountManagerId && form.accountManagerId !== prevAccountMgr) {
              const email = empEmail(form.accountManagerId);
              if (email) await sendTaskAssignedEmail({ toEmail:email, toName:empName(form.accountManagerId), taskTitle, clientName, assignerName, taskId });
            }
            // Send to general assignee if newly assigned
            if (form.assigneeEmployeeId && form.assigneeEmployeeId !== prevAssignee) {
              const email = empEmail(form.assigneeEmployeeId);
              if (email && email !== empEmail(form.accountManagerId)) {
                await sendTaskAssignedEmail({ toEmail:email, toName:empName(form.assigneeEmployeeId), taskTitle, clientName, assignerName, taskId });
              }
            }
          } catch(emailErr) { console.warn('Email notification error:', emailErr); }

          // For new tasks, navigate to detail page (keep modal open with the new task)
          if (newId) {
            setUrlTask(newId);
            // The items snapshot will fire shortly; openEdit will run via the URL effect
            setModal(false);
          } else {
            setModal(false); setUrlTask(null);
          }
        } catch(e){ showToast('שגיאה: '+e.message,'error'); } finally { setSaving(false); }
      };

      // 📤 Send task update notification to ALL currently-assigned team members
      const sendNotification = async () => {
        if (!sel) return;
        const taskTitle    = form.title || '(ללא שם)';
        const clientName   = form.client || '';
        const assignerName = user.displayName || user.email || 'טינג מדיה';
        const taskId       = sel.id;
        const notified     = [];

        try {
          const allUsers = (await db.collection('users').get()).docs.map(d=>({id:d.id,...d.data()}));

          // Helper: employee email
          const empEmail = empId => {
            if (!empId) return null;
            const emp = employees.find(e=>e.id===empId);
            if (!emp) return null;
            const u = allUsers.find(u=>u.linkedEmployeeId===empId || u.email===emp.email);
            return u?.email || emp?.email || null;
          };
          const empFullName = empId => { const e=employees.find(x=>x.id===empId); return e?.name||e?.fullName||''; };

          // Helper: supplier email (suppliers store email directly)
          const supEmail = supId => { if(!supId) return null; return suppliers.find(s=>s.id===supId)?.email||null; };
          const supName  = supId => { return suppliers.find(s=>s.id===supId)?.name||''; };

          const sent = new Set(); // avoid duplicates
          const notify = async (email, name) => {
            if (!email || sent.has(email)) return;
            sent.add(email);
            await sendStageChangedEmail({ toEmail:email, toName:name, taskTitle, clientName, assignerName, taskId,
              extraInfo:`שלב נוכחי: ${STAGES.find(s=>s.id===(form.stage||1))?.name||'לא ידוע'}` });
            notified.push(name||email);
          };

          // Account manager (employee)
          if (form.accountManagerId) await notify(empEmail(form.accountManagerId), empFullName(form.accountManagerId));
          // Editor (supplier)
          if (form.editorId) await notify(supEmail(form.editorId), supName(form.editorId));
          // General assignee (employee)
          if (form.assigneeEmployeeId) await notify(empEmail(form.assigneeEmployeeId), empFullName(form.assigneeEmployeeId));
          // Sub-task assignees (employees)
          for (const st of (form.subTasks||[])) {
            if (st.assigneeEmployeeId) await notify(empEmail(st.assigneeEmployeeId), empFullName(st.assigneeEmployeeId));
          }

          // Save lastNotifiedAt
          await db.collection('tasks').doc(taskId).update({ lastNotifiedAt: firebase.firestore.FieldValue.serverTimestamp() });

          if (notified.length > 0) {
            showToast(`📤 עדכון נשלח ל: ${notified.join(', ')}`, 'success');
          } else {
            showToast('📤 אין אנשים משויכים לשליחת עדכון (EmailJS פעיל?)', 'warning');
          }
        } catch(e) { showToast('שגיאה בשליחה: '+e.message, 'error'); }
      };

      const del  = async id => {
        if(!window.confirm('להעביר לארכיון? תוכל לשחזר מתפריט "ארכיון".')) return;
        const t = items.find(x=>x.id===id);
        // Soft delete — set archived flag, keep the record
        await db.collection('tasks').doc(id).update({
          archived: true,
          archivedAt: firebase.firestore.FieldValue.serverTimestamp(),
          archivedBy: user.uid,
        });
        try { localStorage.removeItem(DRAFT_KEY(id)); } catch(e){}
        setModal(false); setUrlTask(null);
      };

      // 📋 Generate task brief page and open in new tab + save brief flag to Firestore
      const generateBrief = async () => {
        const stageNames = {1:'בריף',2:'כתיבה',3:'אישור תסריט',4:'קביעת צילום',5:'צילום',6:'עריכה',7:'אישור סופרוויזר',8:'אישור לקוח',9:'סגירה'};
        const prioLabel  = {high:'🔴 דחוף', medium:'🟡 רגיל', low:'🔵 נמוך'};
        const empName    = id => employees.find(e=>e.id===id)?.name || '—';
        const t          = form;
        const today      = new Date().toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'});

        const html = `<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>דף בנייה — ${(t.title||'').replace(/</g,'&lt;')}</title>
<style>

<body>

</div>
