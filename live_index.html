        <div class="card"><div class="lbl">שעת צילום</div><div class="val">${t.shootTime||'—'}</div></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-label">צוות</div>
      <div class="grid3">
        <div class="card"><div class="lbl">מנהל/ת תיק</div><div class="val">${empName(t.accountManagerId).replace(/</g,'&lt;')}</div></div>
        <div class="card"><div class="lbl">אחראי/ת</div><div class="val">${empName(t.assigneeEmployeeId).replace(/</g,'&lt;')}</div></div>
        <div class="card"><div class="lbl">עורך/ת</div><div class="val">${(t.editorId?empName(t.editorId):'—').replace(/</g,'&lt;')}</div></div>
      </div>
    </div>

    <div class="sec">
      <div class="sec-label">הערות ובריף</div>
      <div class="notes">${(t.notes||'—').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    </div>

    <div class="footer">
      <span>TING MEDIA CRM</span>
      <span>${today} · ${(user.email||'').replace(/</g,'&lt;')}</span>
    </div>
  </div>
</div>
</body>
</html>`;

        // Open in new tab
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const url  = URL.createObjectURL(blob);
        window.open(url, '_blank');
        setTimeout(() => URL.revokeObjectURL(url), 120000);

        // Save brief timestamp to task in Firestore
        if (sel?.id) {
          try {
            await db.collection('tasks').doc(sel.id).update({
              briefGeneratedAt: firebase.firestore.FieldValue.serverTimestamp(),
              briefGeneratedBy: user.email || user.uid,
            });
          } catch(e) { /* non-critical */ }
        }
        showToast('📋 דף הבנייה נפתח בלשונית חדשה', 'success');
      };

      const promptEditorForStage6 = (currentEditorId) => {
        const editors = suppliers||[];   // all suppliers
        if (editors.length === 0) return { editorId: currentEditorId || '', cancelled: false };
        const cur = editors.find(e=>e.id===currentEditorId);
        const list = editors.map((e,i)=>`${i+1}. ${e.name}`).join('\n');
        const msg = `🎬 מעבר לשלב עריכה — איזה עורך מטפל?\n\n${list}\n\nהקלד מספר (או השאר ריק לביטול)${cur?` · נוכחי: ${cur.name}`:''}`;
        const choice = window.prompt(msg, currentEditorId? String(editors.findIndex(e=>e.id===currentEditorId)+1):'1');
        if (!choice) return { cancelled: true };
        const idx = parseInt(choice,10)-1;
        if (isNaN(idx) || idx<0 || idx>=editors.length) return { cancelled: true };
        return { editorId: editors[idx].id, editorName: editors[idx].name, cancelled:false };
      };

      const setStage = async (t, stage) => {
        if (t.stage === stage) return;
        const updates = {
          stage,
          stageHistory: firebase.firestore.FieldValue.arrayUnion({stage, at:new Date().toISOString(), by:user.email||'?'}),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        };
        // Stage 6 = עריכה — require editor assignment
        if (stage===6 && !t.editorId) {
          const r = promptEditorForStage6(t.editorId);
          if (r.cancelled) return;
          if (r.editorId) { updates.editorId = r.editorId; if (r.editorName) updates.editorName = r.editorName; }
        }
        await db.collection('tasks').doc(t.id).update(updates);
      };
      const setStageById = async (id, stage) => {
        const t = items.find(x=>x.id===id);
        if (t) return setStage(t, stage);
        await db.collection('tasks').doc(id).update({
          stage,
          stageHistory: firebase.firestore.FieldValue.arrayUnion({stage, at:new Date().toISOString(), by:user.email||'?'}),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        });
      };

      const addRev = async (t, type) => {
        const field = type==='script' ? 'revisions.scriptRounds' : 'revisions.videoRounds';
        const cur   = type==='script' ? (t.revisions?.scriptRounds||0) : (t.revisions?.videoRounds||0);
        await db.collection('tasks').doc(t.id).update({[field]:cur+1, updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
      };

      // 📎 Attachments — add a link/file ref to the task's links array
      const addAttachment = async (t, type) => {
        const labels = { drive:'קישור ל-Google Drive', script:'קישור לתסריט', link:'קישור', video:'קישור לסרטון', folder:'תיקייה' };
        const label = window.prompt('כותרת קצרה: (לדוגמה "תסריט גרסה 2")', labels[type]||'קישור');
        if (label===null) return;
        const url = window.prompt('הדבק כתובת URL:');
        if (!url) return;
        if (!/^https?:\/\//i.test(url)) { showToast('הכתובת חייבת להתחיל ב-http:// או https://','warning'); return; }
        const item = { id: 'l_'+Date.now().toString(36), type, label: label.trim()||(labels[type]||'קישור'), url, addedAt: new Date().toISOString(), addedBy: user.email||'?' };
        await db.collection('tasks').doc(t.id).update({
          links: firebase.firestore.FieldValue.arrayUnion(item),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      };
      const removeAttachment = async (t, item) => {
        if (!window.confirm('להסיר את הקישור?')) return;
        await db.collection('tasks').doc(t.id).update({
          links: firebase.firestore.FieldValue.arrayRemove(item),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      };

      // Build lookup of clients managed by current user
      const myClientNames = useMemo(()=>{
        if (!myEmployeeId) return null; // no link → see all
        return new Set(clients.filter(c=>c.accountManagerId===myEmployeeId).map(c=>c.name));
      },[clients, myEmployeeId]);

      // Filter + sort
      const filtered = items.filter(t => {
        if (search && !((t.title||'').toLowerCase().includes(search.toLowerCase()) || (t.client||'').toLowerCase().includes(search.toLowerCase()))) return false;
        if (clientFilter && t.client !== clientFilter) return false;
        if (prioFilter && t.priority !== prioFilter) return false;
        if (lens==='mine' && myClientNames && !myClientNames.has(t.client) && t.assigneeEmployeeId!==myEmployeeId && t.editorId!==myEmployeeId && !(t.subTasks||[]).some(st=>st.assigneeEmployeeId===myEmployeeId)) return false;
        return true;
      });
      const sorted = [...filtered].sort((a,b) => {
        if (sortBy==='due')      return (a.dueDate||'9999')>(b.dueDate||'9999')?1:-1;
        if (sortBy==='title')    return (a.title||'').localeCompare(b.title||'');
        if (sortBy==='priority') return ({high:0,medium:1,low:2}[a.priority||'medium']) - ({high:0,medium:1,low:2}[b.priority||'medium']);
        return (b.updatedAt?.toMillis()||0)-(a.updatedAt?.toMillis()||0);
      });
      const byStage = stage => sorted.filter(t => (t.stage||1)===stage);

      // Stats for header
      const totalOpen = items.filter(t=>(t.stage||1)<8).length;
      const overdueCnt = items.filter(t => t.dueDate && (t.stage||1)<8 && new Date(t.dueDate) < new Date(new Date().toDateString())).length;

      // 🔥 Fires — tasks with active urgency, sorted by severity then days
      const fires = useMemo(() => {
        const arr = items.map(t => ({t, u: urgencyOf(t)})).filter(x => x.u);
        arr.sort((a,b) => {
          if (a.u.level !== b.u.level) return a.u.level==='critical' ? -1 : 1;
          return (a.u.days||0) - (b.u.days||0);
        });
        return arr;
      }, [items]);

      const scrollToTask = id => {
        const el = document.getElementById(`task-${id}`);
        if (el) {
          el.scrollIntoView({behavior:'smooth', block:'center'});
          el.style.outline = '2px solid #fbbf24';
          setTimeout(()=>{ el.style.outline = ''; }, 2000);
        }
      };

      return (
        <div className="-m-6 flex flex-col" style={{background:'var(--bg)', height:'100%'}}>

          {/* ── Top section: header + toolbar + fires ── */}
          <div className="px-6 pt-6 pb-3 flex-shrink-0">
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="text-xl font-black text-white">משימות</h2>
                <div className="flex items-center gap-3 mt-1 text-xs text-zinc-500">
                  <span>{items.length} משימות</span>
                  <span>·</span>
                  <span className="text-zinc-300">{totalOpen} פתוחות</span>
                  {overdueCnt > 0 && (<><span>·</span><span className="text-red-400">⚠️ {overdueCnt} באיחור</span></>)}
                </div>
              </div>
            </div>

            {/* Toolbar */}
            <div className="flex items-center gap-1 mb-4 bg-zinc-900/50 border border-zinc-800 rounded-xl p-1.5">
              <TBBtn primary onClick={()=>openNew()} icon={<span>＋</span>}>משימה חדשה</TBBtn>
              <div className="w-px h-5 bg-zinc-800 mx-1"></div>
              <div className="relative flex items-center">
                <span className="absolute right-2.5 text-zinc-500 text-xs pointer-events-none">🔍</span>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="חיפוש..." className="bg-transparent text-white text-xs px-3 py-1.5 pr-7 w-36 border-0 focus:outline-none" />
              </div>
              <select value={clientFilter} onChange={e=>setClientFilter(e.target.value)} className="bare bg-transparent text-zinc-300 text-xs px-2 py-1.5 cursor-pointer hover:text-white border-0 focus:outline-none">
                <option value="">כל הלקוחות</option>
                {clients.map(c=><option key={c.id} value={c.name} className="bg-zinc-900">{c.name}</option>)}
              </select>
              <select value={prioFilter} onChange={e=>setPrioFilter(e.target.value)} className="bare bg-transparent text-zinc-300 text-xs px-2 py-1.5 cursor-pointer hover:text-white border-0 focus:outline-none">
                <option value="">כל העדיפויות</option>
                <option value="high" className="bg-zinc-900">דחוף</option>
                <option value="medium" className="bg-zinc-900">רגיל</option>
                <option value="low" className="bg-zinc-900">נמוך</option>
              </select>
              <select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="bare bg-transparent text-zinc-300 text-xs px-2 py-1.5 cursor-pointer hover:text-white border-0 focus:outline-none">
                <option value="updated" className="bg-zinc-900">⇅ עדכון אחרון</option>
                <option value="due" className="bg-zinc-900">⇅ תאריך יעד</option>
                <option value="title" className="bg-zinc-900">⇅ שם</option>
                <option value="priority" className="bg-zinc-900">⇅ עדיפות</option>
              </select>
              <div className="flex-1"></div>
              {myEmployeeId && (
                <div className="flex items-center bg-zinc-950 rounded-lg border border-zinc-800 p-0.5 ml-2">
                  <TBBtn active={lens==='all'}  onClick={()=>setLens('all')}  icon={<span>🌐</span>}>כל המשרד</TBBtn>
                  <TBBtn active={lens==='mine'} onClick={()=>setLens('mine')} icon={<span>👤</span>}>שלי</TBBtn>
                </div>
              )}
              <div className="flex items-center bg-zinc-950 rounded-lg border border-zinc-800 p-0.5">
                <TBBtn active={view==='list'}   onClick={()=>setView('list')}   icon={<span>☰</span>}>רשימה</TBBtn>
                <TBBtn active={view==='kanban'} onClick={()=>setView('kanban')} icon={<span>⊞</span>}>קנבן</TBBtn>
              </div>
            </div>

            {/* Urgency strip — calm, single line, expandable */}
            {!loading && fires.length > 0 && (() => {
              const [showAll, setShowAll] = [false, ()=>{}]; // simple non-state for now
              const display = fires.slice(0, 4);
              const more = fires.length - display.length;
              return (
                <div className="mb-3 flex items-center gap-3 px-3 py-1.5 rounded-lg" style={{background:'var(--surface)', border:'1px solid var(--border)', borderRight:'2px solid #ef4444'}}>
                  <span style={{fontSize:11, color:'var(--text-sub)'}}>דורש תשומת לב</span>
                  <span style={{fontSize:11, color:'var(--text-muted)'}}>·</span>
                  <div className="flex flex-wrap gap-x-3 gap-y-1 flex-1 min-w-0">
                    {display.map(({t,u})=>(
                      <button key={t.id} onClick={()=>scrollToTask(t.id)}
                        style={{background:'transparent', border:0, padding:0, cursor:'pointer', display:'flex', alignItems:'center', gap:6, fontSize:12}}>
                        <span style={{width:5, height:5, borderRadius:'50%', background: u.level==='critical' ? '#ef4444' : '#f59e0b'}} />
                        <span style={{color:'var(--text-sub)'}}>{t.title||'ללא שם'}</span>
                        <span style={{color:'var(--text-sub)', fontSize:11}}>{u.reason}</span>
                      </button>
                    ))}
                    {more > 0 && <span style={{fontSize:11, color:'var(--text-muted)'}}>+{more} נוספות</span>}
                  </div>
                </div>
              );
            })()}

            {/* Loading / Empty */}
            {loading && <div className="text-center py-10 text-zinc-500 text-sm">טוען...</div>}
            {!loading && items.length===0 && (
              <div className="text-center py-16 text-zinc-500 border border-dashed border-zinc-800 rounded-xl">
                <div className="text-5xl mb-3">📭</div>
                <p className="text-sm mb-3">אין משימות עדיין</p>
                <button onClick={()=>openNew()} className={CL.btn}>+ צור משימה ראשונה</button>
              </div>
            )}
          </div>{/* end top section */}

          {/* ── Board area: list / kanban + side panel ── */}
          {!loading && items.length>0 && (
            <div style={{display:'flex', flex:1, minHeight:0}} dir="ltr">

              {/* List / Kanban */}
              <div dir="rtl" style={{flex:1, overflowY:'auto', overflowX:'hidden'}}>
                {view==='list' && (
                  <div className="px-6 pb-8">
                    {(() => {
                      let firstNonEmptyShown = false;
                      const emptyCount = STAGES.filter(s => byStage(s.id).length === 0).length;
                      const visible = STAGES.filter(s => showEmptyStages || byStage(s.id).length > 0);
                      return (
                        <React.Fragment>
                          {visible.map(s => {
                            const tasks = byStage(s.id);
                            const isFirst = !firstNonEmptyShown && tasks.length > 0;
                            if (isFirst) firstNonEmptyShown = true;
                            return (
                              <Swimlane
                                key={s.id}
                                stage={s.id}
                                tasks={tasks}
                                onOpen={openEdit}
                                onChangeStage={setStage}
                                selId={modal ? sel?.id : null}
                                employees={employees}
                                suppliers={suppliers}
                                onAddTask={openNew}
                                isFirstShown={isFirst}
                              />
                            );
                          })}
                          {emptyCount > 0 && (
                            <button
                              onClick={()=>setShowEmptyStages(v=>!v)}
                              className="w-full text-center py-2.5 mt-2 rounded-lg border border-dashed bg-transparent cursor-pointer text-xs"
                              style={{borderColor:'var(--border2)', color:'var(--text-muted)'}}
                            >
                              {showEmptyStages ? '⌃ הסתר שלבים ריקים' : `⌄ הצג ${emptyCount} שלבים ריקים`}
                            </button>
                          )}
                        </React.Fragment>
                      );
                    })()}
                  </div>
                )}
                {view==='kanban' && (
                  <div style={{overflowX:'auto', padding:'0 24px 32px'}}>
                    <div className="flex gap-3" style={{minWidth:'max-content'}} dir="ltr">
                      {STAGES.map(s=>(
                        <div dir="rtl" key={s.id}>
                          <KanbanCol stage={s.id} tasks={byStage(s.id)} onOpen={openEdit}
                            onDrop={(id,stage)=>setStageById(id,stage)} onAdd={()=>openNew(s.id)} />
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* Task Panel — drawer on narrow, side panel on wide (CSS media query) */}
              {modal && (
                <>
                  <div className="task-panel-backdrop" onClick={()=>closeModal(false)} />
                  <div dir="rtl" className="task-panel-wrap">
                  <TaskPanel
                    sel={sel}
                    form={form}
                    F={F}
                    user={user}
                    clients={clients}
                    employees={employees}
                    suppliers={suppliers}
                    saving={saving}
                    savedDraft={savedDraft}
                    onSave={save}
                    onClose={()=>closeModal(false)}
                    onDelete={()=>del(sel.id)}
                    onClearDraft={()=>{
                      try{localStorage.removeItem(DRAFT_KEY(sel?.id));}catch(e){}
                      setForm(sel
                        ? {title:sel.title||'',client:sel.client||'',stage:sel.stage||1,priority:sel.priority||'medium',dueDate:sel.dueDate||'',shootDate:sel.shootDate||'',shootTime:sel.shootTime||'',notes:sel.notes||'',accountManagerId:sel.accountManagerId||'',editorId:sel.editorId||''}
                        : BLANK_TASK);
                      setSavedDraft(false);
                    }}
                    autoSaveStatus={autoSaveStatus}
                    onAddAttachment={addAttachment}
                    onRemoveAttachment={removeAttachment}
                    onAddRev={addRev}
                    onBrief={generateBrief}
                    onNotify={sendNotification}
                  />
                  </div>
                </>
              )}
            </div>
          )}

        </div>
      );
    }

    /* ── CLIENTS ── */
    function Clients({ user, role, projects=[], expenses=[], tasks=[], employees=[], suppliers=[] }) {
      const [items,   setItems]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [modal,   setModal]   = useState(false);
      const [sel,     setSel]     = useState(null);
      const blank = { name:'', type:'ריטיינר', status:'פעיל', retainerAmount:'', contacts:[], whatsappGroups:[], notes:'', accountManagerId:'', defaultEditorId:'', scopeOfWork:[], contractStart:'', contractEnd:'', invoiceDay:'15', monthlyTasks:[] };
      const [form, setForm] = useState(blank);
      const [saving, setSaving] = useState(false);
      const [modalTab, setModalTab] = useState('details');
      const F = f => setForm(p=>({...p,...f}));

      useEffect(()=>{
        if (!db||!user) return;
        return db.collection('clients').where('userId','==',user.uid).onSnapshot(snap=>{
          setItems(snap.docs.map(x=>({id:x.id,...x.data()})));
          setLoading(false);
        });
      },[user]);

      const migrateContacts = c => {
        let contacts = c.contacts || [];
        if (contacts.length === 0 && (c.contactName || c.contactPhone || c.contactEmail)) {
          contacts = [{ id:'legacy-'+Date.now(), name:c.contactName||'', role:'איש קשר ראשי', phone:c.contactPhone||'', email:c.contactEmail||'', hasWhatsapp:true, isPrimary:true }];
        }
        return contacts;
      };

      const openNew  = ()  => { setSel(null); setForm(blank); setModalTab('details'); setModal(true); };
      const openEdit = c   => {
        setSel(c);
        setForm({ name:c.name||'', type:c.type||'ריטיינר', status:c.status||'פעיל', retainerAmount:c.retainerAmount||'',
          contacts: migrateContacts(c), whatsappGroups:c.whatsappGroups||[],
          notes:c.notes||'', accountManagerId:c.accountManagerId||'', defaultEditorId:c.defaultEditorId||'',
          scopeOfWork:c.scopeOfWork||[], contractStart:c.contractStart||'', contractEnd:c.contractEnd||'',
          invoiceDay:c.invoiceDay||'15', monthlyTasks:c.monthlyTasks||[] });
        setModalTab('details'); setModal(true);
      };

      const newContactId = () => Math.random().toString(36).slice(2);
      const addContact    = () => F({ contacts: [...(form.contacts||[]), { id:newContactId(), name:'', role:'', phone:'', email:'', hasWhatsapp:true, isPrimary:(form.contacts||[]).length===0 }] });
      const removeContact = id => F({ contacts:(form.contacts||[]).filter(c=>c.id!==id) });
      const updateContact = (id,upd) => F({ contacts:(form.contacts||[]).map(c=>c.id===id?{...c,...upd}:c) });
      const addGroup      = () => F({ whatsappGroups:[...(form.whatsappGroups||[]), { id:newContactId(), name:'', type:'production', groupId:'' }] });
      const removeGroup   = id => F({ whatsappGroups:(form.whatsappGroups||[]).filter(g=>g.id!==id) });
      const updateGroup   = (id,upd) => F({ whatsappGroups:(form.whatsappGroups||[]).map(g=>g.id===id?{...g,...upd}:g) });

      const addScopeItem = () => F({ scopeOfWork: [...(form.scopeOfWork||[]), { id:Math.random().toString(36).slice(2), contentType:'סרטון YouTube', quantity:1, notes:'' }] });
      const removeScopeItem = id => F({ scopeOfWork: (form.scopeOfWork||[]).filter(i=>i.id!==id) });
      const updateScopeItem = (id, upd) => F({ scopeOfWork: (form.scopeOfWork||[]).map(i=>i.id===id?{...i,...upd}:i) });

      // ── Monthly recurring tasks
      const addMonthlyTask = () => F({ monthlyTasks: [...(form.monthlyTasks||[]), { id:Math.random().toString(36).slice(2), title:'', notes:'', assigneeEmployeeId:'', priority:'medium' }] });
      const removeMonthlyTask = id => F({ monthlyTasks: (form.monthlyTasks||[]).filter(t=>t.id!==id) });
      const updateMonthlyTask = (id,upd) => F({ monthlyTasks: (form.monthlyTasks||[]).map(t=>t.id===id?{...t,...upd}:t) });

      const createMonthlyTasks = async () => {
        if (!sel?.id) return;
        const tasks = form.monthlyTasks||[];
        if (!tasks.length) { showToast('אין משימות חוזרות מוגדרות. הוסף ברשימה למטה.','warning'); return; }
        const now = new Date();
        const monthLabel = now.toLocaleDateString('he-IL',{month:'long',year:'numeric'});
        if (!window.confirm(`ליצור ${tasks.length} משימות חדשות עבור ${monthLabel}?`)) return;
        try {
          let created = 0;
          for (const t of tasks) {
            if (!t.title.trim()) continue;
            await db.collection('tasks').add({
              title: t.title,
              client: form.name,
              notes: t.notes || '',
              priority: t.priority || 'medium',
              stage: 1,
              assigneeEmployeeId: t.assigneeEmployeeId || '',
              accountManagerId: form.accountManagerId || '',
              editorId: form.defaultEditorId || '',
              userId: user.uid,
              isRecurring: true,
              recurringClientId: sel.id,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            });
            created++;
            // Send email notification to assignee
            if (t.assigneeEmployeeId) {
              const emp = (window._tingEmployees||[]).find(e=>e.id===t.assigneeEmployeeId);
              if (emp?.email) {
                sendMonthlyTasksCreated({
                  toEmail: emp.email,
                  toName: emp.name||emp.email,
                  taskTitle: t.title,
                  clientName: form.name,
                  extraInfo: `חודש: ${monthLabel}`
                }).catch(()=>{});
              }
            }
          }
          showToast(`✅ נוצרו ${created} משימות לחודש ${monthLabel}`, 'success');
        } catch(e) { showToast('שגיאה: '+e.message, 'error'); }
      };

      const del      = async id => { if(!window.confirm('למחוק לקוח זה?')) return; await db.collection('clients').doc(id).delete(); };

      const save = async () => {
        if (!form.name.trim()) return;
        setSaving(true);
        try {
          const primary = (form.contacts||[]).find(c=>c.isPrimary) || (form.contacts||[])[0] || {};
          const d = { ...form, retainerAmount:Number(form.retainerAmount)||0,
            // Backward compat fields
            contactName: primary.name||'', contactPhone: primary.phone||'', contactEmail: primary.email||'',
            userId:user.uid, updatedAt:firebase.firestore.FieldValue.serverTimestamp() };
          if (sel) await db.collection('clients').doc(sel.id).update(d);
          else     await db.collection('clients').add({...d, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
          setModal(false);
        } catch(e){ showToast('שגיאה: '+e.message,'error'); } finally { setSaving(false); }
      };

      const sColor = {'פעיל':'green','שקע':'yellow','סגור':'red'};
      const showFin = isFinance(role);

      // Per-client aggregations
      const clientStats = id => {
        const client = items.find(c=>c.id===id);
        const name = client?.name||'';
        const cProjects = projects.filter(p=>p.client===name);
        const projectRevenue = cProjects.filter(p=>p.status==='הושלם').reduce((s,p)=>s+(Number(p.budget)||0),0);
        const projectIds = new Set(cProjects.map(p=>p.id));
        const projectCosts = expenses.filter(e=>projectIds.has(e.projectId)).reduce((s,e)=>s+(Number(e.amount)||0),0);
        const openTasks = tasks.filter(t=>t.client===name && (t.stage||1)<FINAL_STAGE).length;
        return { projectCount:cProjects.length, projectRevenue, projectCosts, openTasks };
      };

      return (
        <div>
          <SectionTitle title="לקוחות" sub="ניהול תיקי לקוחות" onAdd={openNew} addLabel="+ לקוח חדש" />

          {loading && <div className="text-center py-10 text-zinc-400 text-sm">טוען...</div>}
          {!loading && items.length===0 && <Empty msg="אין לקוחות עדיין" />}

                  {items.map(c=>{
                    const st = clientStats(c.id);
                    return (
                    <tr key={c.id} className="border-t border-zinc-800/60 hover:bg-zinc-900/40">

                      <td className="px-4 py-3 text-zinc-300 text-sm">{c.type}</td>

                      {showFin && <td className="px-4 py-3 text-amber-400 text-sm">{st.projectRevenue?`₪${st.projectRevenue.toLocaleString()}`:'-'}</td>}

                      <td className="px-4 py-3 text-zinc-300 text-sm">{(employees.find(e=>e.id===c.accountManagerId)?.name)||(employees.find(e=>e.id===c.accountManagerId)?.fullName)||'-'}</td>

                        <div className="flex gap-2">

                          <button onClick={()=>del(c.id)}   className="text-xs text-red-400 hover:text-red-300 bg-transparent border-0 cursor-pointer">מחק</button>
                        </div>
                      </td>
                    </tr>

            </div>

                  <button key={id} onClick={()=>setModalTab(id)}

                    {id==='monthly'&&(form.monthlyTasks||[]).length>0?` (${form.monthlyTasks.length})`:''}

              {modalTab==='details' && (

                    <input className={CL.input} placeholder="שם החברה" value={form.name} onChange={e=>F({name:e.target.value})} />
                  </div>
                  <div>
                    <label className={CL.label}>סוג</label>
                    <select className={CL.input} value={form.type} onChange={e=>F({type:e.target.value})}>

                    </select>
                  </div>
                  <div>
                    <label className={CL.label}>סטטוס</label>
                    <select className={CL.input} value={form.status} onChange={e=>F({status:e.target.value})}>

                  {showFin && <div>

                    <input type="number" className={CL.input} placeholder="13000" value={form.retainerAmount} onChange={e=>F({retainerAmount:e.target.value})} />
                  </div>}
                  <div>
                    <label className={CL.label}>איש קשר</label>
                    <input className={CL.input} placeholder="שם מלא" value={form.contactName} onChange={e=>F({contactName:e.target.value})} />

                  <div>
                    <label className={CL.label}>טלפון</label>
                    <input className={CL.input} placeholder="050-..." value={form.contactPhone} onChange={e=>F({contactPhone:e.target.value})} />
                  </div>
                  <div>
                    <label className={CL.label}>אימייל</label>
                    <input type="email" className={CL.input} value={form.contactEmail} onChange={e=>F({contactEmail:e.target.value})} />

                  <div className="col-span-2 mt-2 pt-3 border-t border-zinc-800">

                  <div>

                    return <div className="mt-3 p-3 rounded-lg bg-emerald-900/20 border border-emerald-800/40 text-emerald-300 text-sm">✅ החוזה פעיל — עוד {daysLeft} ימים</div>;

                  )}

              {/* Tab: משימות חוזרות */}
              {modalTab==='monthly' && (

                  <div className="flex justify-between items-center mb-4">

                      <div className="text-xs text-zinc-400 mt-0.5">הגדר את המשימות שחוזרות כל חודש עבור לקוח זה</div>
                    </div>
                    <button onClick={addMonthlyTask} className="text-sm text-amber-400 hover:text-amber-300 bg-transparent border-0 cursor-pointer font-medium">+ הוסף משימה</button>
                  </div>

                  {(form.monthlyTasks||[]).length===0 && (
                    <div className="text-center py-10 text-zinc-500 text-sm border border-dashed border-zinc-700 rounded-xl">
                      <div className="text-3xl mb-2">🗓</div>
                      <div>אין משימות חוזרות עדיין</div>
                      <div className="text-xs mt-1 text-zinc-600">לחץ "הוסף משימה" להגדיר תבנית חודשית</div>
                    </div>
                  )}

                  <div className="space-y-3">
                    {(form.monthlyTasks||[]).map((t,i)=>(
                      <div key={t.id} className="p-4 rounded-xl bg-zinc-800/60 border border-zinc-700">
                        <div className="flex items-center justify-between mb-2">
                          <span className="text-xs text-zinc-500 font-semibold">משימה {i+1}</span>
                          <button onClick={()=>removeMonthlyTask(t.id)} className="text-xs text-red-400 bg-transparent border-0 cursor-pointer hover:text-red-300">הסר</button>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                          <div className="col-span-2">
                            <label className={CL.label}>כותרת המשימה *</label>
                            <input className={CL.input} placeholder="למשל: צילום תוכן חודשי" value={t.title} onChange={e=>updateMonthlyTask(t.id,{title:e.target.value})} />
                          </div>
                          <div>
                            <label className={CL.label}>👤 שייך לעובד</label>
                            <select className={CL.input} value={t.assigneeEmployeeId||''} onChange={e=>updateMonthlyTask(t.id,{assigneeEmployeeId:e.target.value})}>
                              <option value="">— ברירת מחדל (מנהל תיק) —</option>
                              {employees.map(e=><option key={e.id} value={e.id}>{e.name||e.fullName||'(ללא שם)'}</option>)}
                            </select>
                          </div>
                          <div>
                            <label className={CL.label}>עדיפות</label>
                            <select className={CL.input} value={t.priority||'medium'} onChange={e=>updateMonthlyTask(t.id,{priority:e.target.value})}>
                              <option value="high">🔴 דחוף</option>
                              <option value="medium">🟡 רגיל</option>
                              <option value="low">🔵 נמוך</option>
                            </select>
                          </div>
                          <div className="col-span-2">
                            <label className={CL.label}>הערות / הוראות</label>
                            <input className={CL.input} placeholder="הוראות מפורטות..." value={t.notes||''} onChange={e=>updateMonthlyTask(t.id,{notes:e.target.value})} />
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>

                  {(form.monthlyTasks||[]).filter(t=>t.title?.trim()).length > 0 && sel && (
                    <div className="mt-5 p-4 rounded-xl bg-indigo-900/20 border border-indigo-700/40">
                      <div className="text-sm font-semibold text-indigo-200 mb-1">🚀 יצירת משימות חודשיות</div>
                      <div className="text-xs text-zinc-400 mb-3">
                        לחיצה תיצור {(form.monthlyTasks||[]).filter(t=>t.title?.trim()).length} משימות חדשות בלשונית המשימות ותשייך אותן לצוות.
                        כל עובד יראה את המשימה שלו ב"שלי".
                      </div>
                      <button onClick={createMonthlyTasks} className={CL.btn} style={{background:'#4f46e5',color:'#fff'}}>
                        🗓 צור משימות לחודש {new Date().toLocaleDateString('he-IL',{month:'long',year:'numeric'})}
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* Tab: אנשי קשר */}
              {modalTab==='contacts' && (
                <div>
                  <div className="flex justify-between items-center mb-3">
                    <div className="text-xs text-zinc-400">כל אנשי הקשר בחברה — הסוכן יזהה אותם לפי מספר/מייל</div>
                    <button onClick={addContact} className="text-sm text-amber-400 hover:text-amber-300 bg-transparent border-0 cursor-pointer font-medium">+ הוסף איש קשר</button>
                  </div>
                  {(form.contacts||[]).length===0 && (
                    <div className="text-center py-8 text-zinc-500 text-sm">אין אנשי קשר — לחץ ״+ הוסף איש קשר״</div>
                  )}
                  <div className="space-y-3">
                    {(form.contacts||[]).map(ct=>(
                      <div key={ct.id} className="p-3 rounded-lg bg-zinc-800/60 border border-zinc-700">
                        <div className="grid grid-cols-2 gap-2">
                          <div>
                            <label className={CL.label}>שם מלא</label>
                            <input className={CL.input} placeholder="ישראל ישראלי" value={ct.name} onChange={e=>updateContact(ct.id,{name:e.target.value})} />
                          </div>
                          <div>
                            <label className={CL.label}>תפקיד</label>
                            <input className={CL.input} placeholder="מנהל שיווק" value={ct.role} onChange={e=>updateContact(ct.id,{role:e.target.value})} />
                          </div>
                          <div>
                            <label className={CL.label}>טלפון (כולל קידומת: 972...)</label>
                            <input className={CL.input} placeholder="972501234567" value={ct.phone} onChange={e=>updateContact(ct.id,{phone:e.target.value})} />

                              <input type="checkbox" checked={!!ct.hasWhatsapp} onChange={e=>updateContact(ct.id,{hasWhatsapp:e.target.checked})} />

                            <label className="flex items-center gap-2 cursor-pointer">

                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                  status:'פעיל',

                  linkedSupplierId: supplierId,

                <tbody>

                      {showFin && <td className="px-4 py-3 text-amber-400 text-sm font-medium">{s.dailyRate?`₪${Number(s.dailyRate).toLocaleString()}`:'-'}</td>}
                      {showFin && <td className="px-4 py-3 text-amber-400 text-sm font-medium">{s.videoRate?`₪${Number(s.videoRate).toLocaleString()}`:'-'}</td>}
                      {showFin && <td className="px-4 py-3 text-cyan-400 text-sm">{(()=>{const v=supSpend(s.id,true);return v?`₪${Math.round(v).toLocaleString()}`:'-';})()}</td>}
                      {showFin && <td className="px-4 py-3 text-zinc-300 text-sm">{(()=>{const v=supSpend(s.id);return v?`₪${Math.round(v).toLocaleString()}`:'-';})()}</td>}
                      <td className="px-4 py-3">

                          <button onClick={()=>openEdit(s)} className="text-xs text-amber-400 hover:text-amber-300 bg-transparent border-0 cursor-pointer">עריכה</button>

          {modal && (

                  <label className={CL.label}>אימייל</label>

                    </div>

    function Projects({ user, role, clients, expenses=[] }) {
      const [items,   setItems]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [modal,   setModal]   = useState(false);
      const [sel,     setSel]     = useState(null);
      const [detailSel, setDetailSel] = useState(null); // project detail view
      const blank = { name:'', client:'', status:'פעיל', budget:'', startDate:'', endDate:'', completedAt:'', description:'' };
      const [form, setForm] = useState(blank);
      const [saving, setSaving] = useState(false);
      const F = f => setForm(p=>({...p,...f}));

      useEffect(()=>{
        if (!db||!user) return;
        return db.collection('projects').where('userId','==',user.uid).onSnapshot(snap=>{
          setItems(snap.docs.map(x=>({id:x.id,...x.data()})));
          setLoading(false);
        });
      },[user]);

      const openNew  = ()  => { setSel(null); setForm(blank); setModal(true); };
      const openEdit = p   => { setSel(p); setForm({name:p.name||'',client:p.client||'',status:p.status||'פעיל',budget:p.budget||'',startDate:p.startDate||'',endDate:p.endDate||'',completedAt:p.completedAt||'',description:p.description||''}); setModal(true); };
      const del      = async id => { if(!window.confirm('למחוק?')) return; await db.collection('projects').doc(id).delete(); };

      const save = async () => {
        if (!form.name.trim()) return;
        setSaving(true);
        try {
          // Auto-set completedAt when status flips to הושלם and no date set
          let completedAt = form.completedAt;
          if (form.status==='הושלם' && !completedAt) {
            completedAt = (sel?.completedAt) || new Date().toISOString().slice(0,10);
          }
          if (form.status!=='הושלם') completedAt = ''; // clear if reopened

          const d = {...form, completedAt, budget:Number(form.budget)||0, userId:user.uid, updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
          if (sel) await db.collection('projects').doc(sel.id).update(d);
          else     await db.collection('projects').add({...d, createdAt:firebase.firestore.FieldValue.serverTimestamp()});

      const completedThisMonthList = items.filter(p=>p.status==='הושלם' && (p.completedAt||p.endDate||'').slice(0,7)===thisMonth);
      const revenueThisMonth = completedThisMonthList.reduce((s,p)=>s+(Number(p.budget)||0),0);
      const totalCosts = items.reduce((s,p)=>s+projCosts(p.id),0);

            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
              <div className={CL.card+" border-blue-500/30 bg-blue-500/5"}>
                <div className="text-blue-300 text-xs">📦 פעילים</div>
                <div className="text-2xl font-black text-blue-400">{items.filter(p=>p.status==='פעיל').length}</div>
              </div>
              <div className={CL.card+" border-cyan-500/30 bg-cyan-500/5"}>
                <div className="text-cyan-300 text-xs">💼 פייפליין</div>
                <div className="text-xl font-black text-cyan-400">₪{totalPipeline.toLocaleString()}</div>
              </div>
              <div className={CL.card+" border-emerald-500/30 bg-emerald-500/5"}>
                <div className="text-emerald-300 text-xs">✅ הושלמו החודש</div>
                <div className="text-xl font-black text-emerald-400">₪{revenueThisMonth.toLocaleString()}</div>
                <div className="text-emerald-300/60 text-[10px]">{completedThisMonthList.length} פרויקטים</div>

              <div className={CL.card+" border-red-500/30 bg-red-500/5"}>
                <div className="text-red-300 text-xs">💸 עלויות מצטברות</div>
                <div className="text-xl font-black text-red-400">₪{Math.round(totalCosts).toLocaleString()}</div>
                <div className="text-red-300/60 text-[10px]">מהוצאות מקושרות</div>
              </div>
            </div>
          )}

          {loading && <div className="text-center py-10 text-zinc-400 text-sm">טוען...</div>}
          {!loading && items.length===0 && <Empty msg="אין פרויקטים עדיין — הוסף פרויקט כדי שתקציבו יופיע בתזרים" />}
          {!loading && items.length>0 && (
            <div className="bg-zinc-900/60 rounded-xl border border-zinc-800 overflow-hidden">
              <table className="w-full text-right">
                <THead cols={['שם פרויקט','לקוח','סטטוס',...(showFin?['תקציב','עלויות','רווח','מצב הכנסה']:[]),'תאריך סיום','פעולות']} />
                <tbody>
                  {items.map(p=>{
                    const cost = projCosts(p.id);
                    const budget = Number(p.budget)||0;
                    const profit = budget - cost;
                    const inThisMonth = (p.completedAt||p.endDate||'').slice(0,7)===thisMonth;

    /* ── EXPENSES ── */
    function Expenses({ user, role, suppliers = [], tasks = [], employees = [], clients = [], projects = [] }) {
      const [items,   setItems]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [modal,   setModal]   = useState(false);
      const [editing, setEditing] = useState(null);
      const [tab,     setTab]     = useState('variable'); // variable | fixed | byEditor
      const [search,  setSearch]  = useState('');
      const [filterMonth, setFilterMonth] = useState('all'); // all | YYYY-MM
      const today = new Date().toISOString().split('T')[0];
      const blank = { description:'', category:'תוכנה', amount:'', date:today, kind:'variable', supplierId:'', projectId:'', clientId:'', recurrence:'monthly', notes:'' };
      const [form, setForm] = useState(blank);
      const [saving, setSaving] = useState(false);
      const F = f => setForm(p=>({...p,...f}));

      useEffect(()=>{
        if (!db||!user) return;
        return db.collection('expenses').where('userId','==',user.uid).onSnapshot(snap=>{
          const d = snap.docs.map(x=>({id:x.id,...x.data()}));
          d.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
          setItems(d); setLoading(false);
        });
      },[user]);

      const openNew = (kind='variable') => { setEditing(null); setForm({...blank, kind}); setModal(true); };
      const openEdit = e => {
        setEditing(e);
        setForm({
          description:e.description||'', category:e.category||'תוכנה', amount:e.amount||'',
          date:e.date||today, kind:e.kind||'variable', supplierId:e.supplierId||'', projectId:e.projectId||'',
          clientId:e.clientId||'', recurrence:e.recurrence||'monthly', notes:e.notes||''
        });
        setModal(true);
      };

      const save = async () => {
        if (!form.description.trim()||!form.amount) return;
        setSaving(true);
        try {
          const data = {
            ...form,
            amount:Number(form.amount),
            userId:user.uid,
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
          };
          if (editing) await db.collection('expenses').doc(editing.id).update(data);
          else         await db.collection('expenses').add({...data, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
          setModal(false); setForm(blank); setEditing(null);
        } catch(e){ showToast('שגיאה: '+e.message,'error'); } finally { setSaving(false); }
      };

      const del = async id => { if(!window.confirm('למחוק הוצאה זו?')) return; await db.collection('expenses').doc(id).delete(); };

      // ── Computed metrics ──
      const monthKey = d => (d||'').slice(0,7);
      const thisMonth = today.slice(0,7);
      const lastMonth = (()=>{ const dt=new Date(); dt.setMonth(dt.getMonth()-1); return dt.toISOString().slice(0,7); })();

      const months = useMemo(()=>{
        const set = new Set(items.map(i=>monthKey(i.date)).filter(Boolean));
        return Array.from(set).sort().reverse();
      }, [items]);

      // Apply filters
      const filtered = items.filter(e => {
        if (tab==='fixed' && e.kind!=='fixed') return false;
        if (tab==='variable' && e.kind==='fixed') return false;
        if (filterMonth!=='all' && monthKey(e.date)!==filterMonth) return false;
        if (search) {
          const q = search.toLowerCase();
          const sup = suppliers.find(s=>s.id===e.supplierId);
          const hay = `${e.description||''} ${e.category||''} ${e.notes||''} ${sup?.name||''}`.toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      const totalThisMonth   = items.filter(e=>monthKey(e.date)===thisMonth).reduce((s,e)=>s+(Number(e.amount)||0),0);
      const totalLastMonth   = items.filter(e=>monthKey(e.date)===lastMonth).reduce((s,e)=>s+(Number(e.amount)||0),0);
      const totalFixedMonthly= items.filter(e=>e.kind==='fixed').reduce((s,e)=>s+(Number(e.amount)||0),0);
      const totalAll         = items.reduce((s,e)=>s+(Number(e.amount)||0),0);
      const monthDelta       = totalLastMonth ? Math.round(((totalThisMonth-totalLastMonth)/totalLastMonth)*100) : 0;

      // Full financial snapshot (includes payroll + revenue)
      const fin = useMemo(()=>calcFinance({clients, expenses:items, employees, monthKey:thisMonth}), [clients, items, employees, thisMonth]);
      const totalRealMonthly = fin.totalMonthlyCosts;

      // By supplier breakdown (variable expenses)
      const bySupplier = useMemo(()=>{
        const map = {};
        items.filter(e=>e.kind!=='fixed' && e.supplierId).forEach(e=>{
          const sup = suppliers.find(s=>s.id===e.supplierId);
          const name = sup?.name || 'ספק לא ידוע';
          const role = sup?.supplierRole || '';
          if (!map[e.supplierId]) map[e.supplierId] = { name, role, total:0, count:0, lastDate:'' };
          map[e.supplierId].total += Number(e.amount)||0;
          map[e.supplierId].count += 1;
          if ((e.date||'') > map[e.supplierId].lastDate) map[e.supplierId].lastDate = e.date||'';
        });
        return Object.values(map).sort((a,b)=>b.total-a.total);
      }, [items, suppliers]);

      // Editor cost tracking — only עורך וידאו suppliers
      const editorBreakdown = useMemo(()=>{
        const editors = suppliers.filter(s=>s.supplierRole==='עורך וידאו');
        return editors.map(ed=>{
          const exp = items.filter(e=>e.supplierId===ed.id);
          const total = exp.reduce((s,e)=>s+(Number(e.amount)||0),0);
          const monthTotal = exp.filter(e=>monthKey(e.date)===thisMonth).reduce((s,e)=>s+(Number(e.amount)||0),0);
          const taskCount = tasks.filter(t=>t.editorId===ed.id || t.editor===ed.name).length;
          return { ...ed, total, monthTotal, taskCount, expenseCount:exp.length };
        }).sort((a,b)=>b.monthTotal-a.monthTotal);
      }, [suppliers, items, tasks]);

      const showFin = isFinance(role);
      if (!showFin) {
        return <div className={CL.card+" text-center text-zinc-400"}>אין הרשאה לצפייה בהוצאות</div>;
      }

      return (
        <div>
          {/* Header */}
          <div className="flex justify-between items-start mb-6">
            <div>
              <h2 className="text-2xl font-black text-white">💸 הוצאות</h2>
              <p className="text-zinc-400 text-xs mt-1">מעקב הוצאות שוטפות, ספקים ועורכים</p>
            </div>
            <div className="flex gap-2">
              <button onClick={()=>openNew('fixed')} className={CL.btn2}>+ הוצאה קבועה</button>
              <button onClick={()=>openNew('variable')} className={CL.btn}>+ הוצאה חדשה</button>
            </div>
          </div>

          {/* KPI cards — total monthly cost picture */}
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
            <div className={CL.card+" md:col-span-1 bg-gradient-to-l from-red-500/10 to-zinc-900/60 border-red-500/30"}>
              <div className="text-red-300 text-xs mb-1 font-semibold">💸 סה״כ עלויות חודשיות</div>
              <div className="text-2xl font-black text-red-400">₪{Math.round(totalRealMonthly).toLocaleString()}</div>
              <div className="text-xs text-zinc-400 mt-1">סך הכל</div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">🧑‍💼 שכר עובדים</div>
              <div className="text-xl font-black text-violet-400">₪{Math.round(fin.monthlyPayroll).toLocaleString()}</div>
              <div className="text-xs text-zinc-500 mt-1">{fin.activeEmployeeCount} עובדים</div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">🎬 פרילאנסרים</div>
              <div className="text-xl font-black text-cyan-400">₪{Math.round(fin.monthFreelance).toLocaleString()}</div>
              <div className="text-xs text-zinc-500 mt-1">{bySupplier.length} ספקים</div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">🔁 קבועות</div>
              <div className="text-xl font-black text-amber-400">₪{Math.round(fin.monthlyFixed).toLocaleString()}</div>
              <div className="text-xs text-zinc-500 mt-1">{items.filter(e=>e.kind==='fixed').length} פריטים</div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">📋 שוטפות אחרות</div>
              <div className="text-xl font-black text-white">₪{Math.round(fin.monthOtherVariable).toLocaleString()}</div>
              {totalLastMonth>0 && (
                <div className={`text-xs mt-1 ${monthDelta>0?'text-red-400':'text-emerald-400'}`}>
                  {monthDelta>0?'▲':'▼'} {Math.abs(monthDelta)}% מהחודש שעבר
                </div>
              )}
            </div>
          </div>

          {/* Tabs */}
          <div className="flex gap-1 mb-4 bg-zinc-900/60 p-1 rounded-lg border border-zinc-800 w-fit">
            {[
              {id:'variable', label:'הוצאות שוטפות', emoji:'📋'},
              {id:'fixed',    label:'הוצאות קבועות', emoji:'🔁'},
              {id:'byEditor', label:'מעקב עורכים',   emoji:'✂️'},
            ].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors border-0 cursor-pointer ${
                  tab===t.id ? 'bg-amber-500 text-zinc-950' : 'bg-transparent text-zinc-400 hover:text-white'
                }`}>
                {t.emoji} {t.label}
              </button>
            ))}
          </div>

          {/* Toolbar */}
          {tab!=='byEditor' && (
            <div className="flex flex-wrap gap-2 mb-3">
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 חפש תיאור / ספק..." className={CL.input+" max-w-xs"} />
              <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} className={CL.input+" max-w-[180px]"}>
                <option value="all">כל החודשים</option>
                {months.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
            </div>
          )}

          {loading && <div className="text-center py-10 text-zinc-400 text-sm">טוען...</div>}

          {/* TABLE — variable / fixed */}
          {!loading && tab!=='byEditor' && (
            filtered.length===0
              ? <Empty msg={tab==='fixed' ? "אין הוצאות קבועות" : "אין הוצאות תואמות"} />
              : (
                <div className={CL.tableWrap}>
                  <table className="w-full text-right">
                    <THead cols={['תיאור','קטגוריה','ספק','פרויקט', tab==='fixed'?'תדירות':'תאריך', 'סכום','פעולות']} />
                    <tbody>
                      {filtered.map(e=>{
                        const sup = suppliers.find(s=>s.id===e.supplierId);
                        const prj = projects.find(p=>p.id===e.projectId);
                        return (
                          <tr key={e.id} className={CL.tableRow}>
                            <td className="px-4 py-3 text-white text-sm font-medium">{e.description}</td>
                            <td className="px-4 py-3 text-zinc-300 text-sm">{e.category}</td>
                            <td className="px-4 py-3 text-zinc-400 text-sm">{sup?.name || '-'}</td>
                            <td className="px-4 py-3 text-blue-300 text-sm">{prj?.name || '-'}</td>
                            <td className="px-4 py-3 text-zinc-400 text-sm">
                              {tab==='fixed' ? (e.recurrence==='yearly'?'שנתי':e.recurrence==='weekly'?'שבועי':'חודשי') : e.date}
                            </td>
                            <td className="px-4 py-3 text-red-400 font-bold text-sm">₪{Number(e.amount).toLocaleString()}</td>
                            <td className="px-4 py-3">
                              <div className="flex gap-2">
                                <button onClick={()=>openEdit(e)} className="text-xs text-amber-400 hover:text-amber-300 bg-transparent border-0 cursor-pointer">עריכה</button>
                                <button onClick={()=>del(e.id)} className="text-xs text-red-400 hover:text-red-300 bg-transparent border-0 cursor-pointer">מחק</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )
          )}

          {/* By Editor view */}
          {!loading && tab==='byEditor' && (
            editorBreakdown.length===0
              ? <Empty msg="אין עורכים מוגדרים — הוסף עורך בעמוד ספקים" />
              : (
                <div className="grid md:grid-cols-2 gap-3">
                  {editorBreakdown.map(ed=>(
                    <div key={ed.id} className={CL.card}>
                      <div className="flex justify-between items-start mb-3">
                        <div>
                          <div className="text-white font-bold">✂️ {ed.name}</div>
                          <div className="text-zinc-500 text-xs">{ed.specialties || 'עורך וידאו'}</div>
                        </div>
                        <div className={`px-2 py-0.5 rounded text-xs ${ed.status==='פעיל'?'bg-emerald-900/40 text-emerald-300':'bg-zinc-800 text-zinc-400'}`}>{ed.status}</div>
                      </div>
                      <div className="grid grid-cols-3 gap-2 text-center">
                        <div className="bg-zinc-900/60 rounded-lg p-2">
                          <div className="text-zinc-500 text-xs">החודש</div>
                          <div className="text-amber-400 font-bold text-sm">₪{ed.monthTotal.toLocaleString()}</div>
                        </div>
                        <div className="bg-zinc-900/60 rounded-lg p-2">
                          <div className="text-zinc-500 text-xs">סה״כ</div>
                          <div className="text-white font-bold text-sm">₪{ed.total.toLocaleString()}</div>
                        </div>
                        <div className="bg-zinc-900/60 rounded-lg p-2">
                          <div className="text-zinc-500 text-xs">תשלומים</div>
                          <div className="text-white font-bold text-sm">{ed.expenseCount}</div>
                        </div>
                      </div>
                      {ed.videoRate>0 && (
                        <div className="text-xs text-zinc-500 mt-2 pt-2 border-t border-zinc-800">
                          תעריף לסרטון: <span className="text-amber-400 font-medium">₪{Number(ed.videoRate).toLocaleString()}</span>
                          {ed.taskCount>0 && <span className="mr-2">• {ed.taskCount} משימות משויכות</span>}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )
          )}

          {/* Supplier breakdown panel (only on variable tab) */}
          {!loading && tab==='variable' && bySupplier.length>0 && (
            <div className="mt-6">
              <h3 className="text-white font-bold text-sm mb-3">📊 פירוט לפי ספק</h3>
              <div className={CL.tableWrap}>
                <table className="w-full text-right">
                  <THead cols={['ספק','תפקיד','מספר תשלומים','תשלום אחרון','סה״כ']} />
                  <tbody>
                    {bySupplier.map((s,i)=>(
                      <tr key={i} className={CL.tableRow}>
                        <td className="px-4 py-3 text-white text-sm font-medium">{s.name}</td>
                        <td className="px-4 py-3 text-zinc-400 text-sm">{s.role||'-'}</td>
                        <td className="px-4 py-3 text-zinc-300 text-sm">{s.count}</td>
                        <td className="px-4 py-3 text-zinc-400 text-sm">{s.lastDate||'-'}</td>
                        <td className="px-4 py-3 text-amber-400 font-bold text-sm">₪{s.total.toLocaleString()}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {modal && (
            <Modal title={editing ? 'עריכת הוצאה' : (form.kind==='fixed'?'הוצאה קבועה חדשה':'הוצאה חדשה')} onClose={()=>setModal(false)}>
              <div>
                <label className={CL.label}>תיאור *</label>
                <input className={CL.input} placeholder="Adobe Creative Cloud" value={form.description} onChange={e=>F({description:e.target.value})} />

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className={CL.label}>קטגוריה</label>
                    <select className={CL.input} value={form.category} onChange={e=>F({category:e.target.value})}>
                      <option>תוכנה</option><option>ספקים</option><option>עורכים</option><option>צלמים</option>
                      <option>משרד</option><option>שיווק</option><option>ציוד</option><option>שכר</option><option>אחר</option>
                    </select>
                  </div>
                  <div>
                    <label className={CL.label}>סכום (₪) *</label>
                    <input type="number" className={CL.input} placeholder="500" value={form.amount} onChange={e=>F({amount:e.target.value})} />
                  </div>
                </div>

                <label className={CL.label}>סוג הוצאה</label>
                <div className="flex gap-2">
                  <button onClick={()=>F({kind:'variable'})} className={`flex-1 px-3 py-2 rounded-lg text-sm border cursor-pointer transition-colors ${form.kind==='variable'?'bg-amber-500 text-zinc-950 border-amber-500 font-bold':'bg-zinc-900 text-zinc-400 border-zinc-800 hover:text-white'}`}>📋 חד-פעמית</button>
                  <button onClick={()=>F({kind:'fixed'})} className={`flex-1 px-3 py-2 rounded-lg text-sm border cursor-pointer transition-colors ${form.kind==='fixed'?'bg-amber-500 text-zinc-950 border-amber-500 font-bold':'bg-zinc-900 text-zinc-400 border-zinc-800 hover:text-white'}`}>🔁 קבועה</button>
                </div>

                {form.kind==='fixed' && (
                  <React.Fragment>
                    <label className={CL.label}>תדירות</label>
                    <select className={CL.input} value={form.recurrence} onChange={e=>F({recurrence:e.target.value})}>
                      <option value="weekly">שבועי</option>
                      <option value="monthly">חודשי</option>
                      <option value="yearly">שנתי</option>
                    </select>
                  </React.Fragment>
                )}

                <label className={CL.label}>ספק (אופציונלי)</label>
                <select className={CL.input} value={form.supplierId} onChange={e=>F({supplierId:e.target.value})}>
                  <option value="">— ללא ספק —</option>
                  {suppliers.map(s=><option key={s.id} value={s.id}>{s.name} {s.supplierRole?`(${s.supplierRole})`:''}</option>)}
                </select>

                <label className={CL.label}>📦 שייך לפרויקט (אופציונלי - לרווחיות פר׳ פרויקט)</label>
                <select className={CL.input} value={form.projectId} onChange={e=>F({projectId:e.target.value})}>
                  <option value="">— ללא פרויקט —</option>
                  {projects.map(p=><option key={p.id} value={p.id}>{p.name} {p.client?`(${p.client})`:''}</option>)}
                </select>

                <label className={CL.label}>🤝 שייך ללקוח (אופציונלי - לדוח רווחיות לקוח)</label>
                <select className={CL.input} value={form.clientId} onChange={e=>F({clientId:e.target.value})}>
                  <option value="">— ללא לקוח (הוצאה כללית) —</option>
                  {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>

                <label className={CL.label}>תאריך</label>
                <input type="date" className={CL.input} value={form.date} onChange={e=>F({date:e.target.value})} />

                <label className={CL.label}>הערות</label>
                <textarea className={CL.input} rows={2} placeholder="פרטים נוספים..." value={form.notes} onChange={e=>F({notes:e.target.value})} />

                <div className="flex gap-2 justify-end mt-5">
                  <button onClick={()=>setModal(false)} className={CL.btn2}>ביטול</button>
                  <button onClick={save} className={CL.btn} disabled={saving}>{saving?'שומר...':'שמור'}</button>
                </div>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    /* ── REPORTS ── */
    function Reports({ role, clients, expenses, tasks, employees=[], suppliers=[], projects=[] }) {
      const today = new Date();
      const [selMonth, setSelMonth] = useState(today.toISOString().slice(0,7));

      const fin = useMemo(()=>calcFinance({clients, expenses, employees, projects, monthKey:selMonth}), [clients, expenses, employees, projects, selMonth]);
      const prevMonth = (()=>{ const d=new Date(selMonth+'-01'); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); })();
      const finPrev = useMemo(()=>calcFinance({clients, expenses, employees, projects, monthKey:prevMonth}), [clients, expenses, employees, projects, prevMonth]);

      // 📈 Forecast — next 3 months of expected revenue
      // Each month = recurring + budgets of active projects with endDate in that month
      const forecast = useMemo(()=>{
        const months = [];
        for (let i=0; i<4; i++) {
          const d = new Date(today.getFullYear(), today.getMonth()+i, 1);
          const k = d.toISOString().slice(0,7);
          const planned = projects
            .filter(p=>(p.status==='פעיל'||p.status==='הושלם') && (p.completedAt||p.endDate||'').slice(0,7)===k)
            .reduce((s,p)=>s+(Number(p.budget)||0),0);
          const projectsInMonth = projects.filter(p=>(p.status==='פעיל'||p.status==='הושלם') && (p.completedAt||p.endDate||'').slice(0,7)===k);
          months.push({
            key: k,
            label: d.toLocaleDateString('he-IL',{month:'long', year:'2-digit'}),
            recurring: fin.recurringRevenue,
            planned,
            total: fin.recurringRevenue + planned,
            projects: projectsInMonth,
            isCurrent: i===0,
          });
        }
        return months;
      }, [projects, fin.recurringRevenue, today]);

      // Per-project P&L
      const projectPL = useMemo(()=>projects.map(p=>{
        const costs = expenses.filter(e=>e.projectId===p.id).reduce((s,e)=>s+(Number(e.amount)||0),0);
        const budget = Number(p.budget)||0;
        return { ...p, costs, budget, profit: budget - costs, margin: budget>0 ? ((budget-costs)/budget)*100 : 0 };
      }).sort((a,b)=>b.budget-a.budget), [projects, expenses]);

      const revenue  = fin.monthlyRevenue;
      const totalExp = fin.totalMonthlyCosts;
      const profit   = fin.grossProfit;
      const margin   = fin.margin.toFixed(1);

      const byCategory = fin.byCategory;
      const extraRevisions = tasks.filter(t=>(t.revisions?.videoRounds||0)>2);

      const months = useMemo(()=>{
        const set = new Set();
        for (let i=0;i<12;i++){ const d=new Date(today.getFullYear(),today.getMonth()-i,1); set.add(d.toISOString().slice(0,7)); }
        expenses.forEach(e=>{ if(e.date) set.add(e.date.slice(0,7)); });
        return Array.from(set).sort().reverse();
      }, [expenses]);

      const delta = (cur, prev) => {
        if (!prev) return null;
        const pct = Math.round(((cur-prev)/Math.abs(prev))*100);
        return { pct, up: pct>0 };
      };
      const dRev = delta(revenue, finPrev.monthlyRevenue);
      const dExp = delta(totalExp, finPrev.totalMonthlyCosts);
      const dProfit = delta(profit, finPrev.grossProfit);

      // Top supplier spend (this month)
      const topSuppliers = useMemo(()=>{
        const map = {};
        expenses.filter(e=>(e.date||'').slice(0,7)===selMonth && e.supplierId).forEach(e=>{
          const sup = suppliers.find(s=>s.id===e.supplierId);
          const name = sup?.name || 'ללא שיוך';
          map[name] = (map[name]||0) + (Number(e.amount)||0);
        });
        return Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,5);
      }, [expenses, suppliers, selMonth]);

      if (!isFinance(role)) {
        return <div className={CL.card+" text-center text-zinc-400"}>אין הרשאה לדוחות פיננסיים</div>;
      }

      const DeltaPill = ({d, invert}) => {
        if (!d) return null;
        const good = invert ? !d.up : d.up;
        const cls = good ? 'text-emerald-400' : 'text-red-400';
        return <span className={`text-[11px] ${cls}`}>{d.up?'▲':'▼'} {Math.abs(d.pct)}%</span>;
      };

      return (
        <div>
          <div className="flex justify-between items-start mb-6">
            <div>
              <h2 className="text-2xl font-black text-white">📊 דוחות פיננסיים</h2>
              <p className="text-zinc-400 text-xs mt-1">תזרים מזומנים, הכנסות, הוצאות ועלות צוות</p>
            </div>
            <select value={selMonth} onChange={e=>setSelMonth(e.target.value)} className={CL.input+" max-w-[180px]"}>
              {months.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>

          {/* Top KPI cards with deltas */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">💰 הכנסות</div>
              <div className="text-2xl font-black text-emerald-400">₪{Math.round(revenue).toLocaleString()}</div>
              <div className="flex items-center justify-between mt-1">
                <span className="text-zinc-500 text-[11px]">ריטיינרים ₪{Math.round(fin.recurringRevenue/1000)}K{fin.projectRevenueThisMonth>0?` + פר׳ ₪${Math.round(fin.projectRevenueThisMonth/1000)}K`:''}</span>
                <DeltaPill d={dRev}/>
              </div>
            </div>
            <div className={CL.card}>
              <div className="text-zinc-500 text-xs mb-1">💸 הוצאות</div>
              <div className="text-2xl font-black text-red-400">₪{Math.round(totalExp).toLocaleString()}</div>
