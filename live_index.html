                  <p className="text-zinc-400 mb-3">
                    כנס ל: <a href="https://console.firebase.google.com/project/ting-media-finance/authentication/providers" target="_blank" className="text-amber-400 underline">Firebase Console → Authentication → Sign-in method → Google</a>
                    {' '}→ לחץ על Google → העתק את "Web client ID"
                  </p>
                  <div className="flex gap-2">
                    <input
                      className={CL.input+" flex-1 font-mono text-[11px]"}
                      placeholder="123456789-xxxx.apps.googleusercontent.com"
                      value={clientId}
                      onChange={e=>{ setClientId(e.target.value); setMsg(''); }}
                    />
                    <button onClick={saveClientId} disabled={!clientId} className={CL.btn}>שמור</button>
                  </div>
                </div>

                {step==='connect' && (
                  <div className="p-3 rounded-lg border border-blue-500/40 bg-blue-500/5 text-xs">
                    <div className="font-semibold text-white mb-1">שלב 2 — אשר גישה ליומן (פעם אחת בלבד)</div>
                    <p className="text-zinc-400 mb-3">ייפתח חלון Google — אשר גישה ל-"Google Calendar". לאחר מכן הסנכרון יפעל אוטומטית ללא שאלות נוספות.</p>
                    <button onClick={connect} disabled={busy} className={CL.btn}>{busy?'מתחבר...':'🔗 אשר גישה ליומן →'}</button>
                  </div>
                )}
              </div>
            )}

            {/* Step done */}
            {step==='done' && (
              <div className="space-y-3">
                <div className="p-3 rounded-lg border border-emerald-500/30 bg-emerald-500/5 text-xs text-emerald-300">
                  🎉 מחובר! הסנכרון עובד אוטומטית — כל משימה עם תאריך צילום נוצרת/מתעדכנת ביומן.
                </div>
                <div className="flex gap-2">
                  <button onClick={test} disabled={busy} className={CL.btn2}>{busy?'בודק...':'🔍 בדוק חיבור'}</button>
                  <button onClick={disconnect} className="px-3 py-1.5 rounded-lg text-xs text-red-400 hover:text-red-300 bg-transparent border border-red-800/30 cursor-pointer">נתק</button>
                </div>
              </div>
            )}

            {msg && <div className={`mt-3 text-xs px-3 py-2 rounded-lg border ${msg.startsWith('❌')?'bg-red-500/10 border-red-500/30 text-red-300':'bg-emerald-500/10 border-emerald-500/30 text-emerald-300'}`}>{msg}</div>}
          </div>

          <div className={CL.card}>
            <div className="text-white font-semibold text-sm mb-3">📋 מה קורה אוטומטית</div>
            <ul className="space-y-2 text-xs text-zinc-400">
              <li className="flex gap-2"><span>🎬</span><span><strong className="text-white">יצירת משימה</strong> עם תאריך צילום → אירוע נוצר ביומן הראשי שלך</span></li>
              <li className="flex gap-2"><span>✏️</span><span><strong className="text-white">עדכון שם/תאריך</strong> → האירוע ביומן מתעדכן אוטומטית</span></li>
              <li className="flex gap-2"><span>🗑️</span><span><strong className="text-white">מחיקת משימה</strong> → האירוע ביומן נמחק</span></li>
              <li className="flex gap-2"><span>🔄</span><span><strong className="text-white">חידוש טוקן</strong> — קורה בשקט ברקע, ללא הפרעות, ללא popups</span></li>
              <li className="flex gap-2"><span>🕐</span><span><strong className="text-white">שעה</strong> — נקבעת לפי שדה "שעת צילום" (ברירת מחדל: 09:00, משך 2 שעות)</span></li>
            </ul>
          </div>
        </div>
      );
    }

    /* ── SETTINGS ── */
    const ROLES = [
      { id:'admin',  label:'מנהל ראשי',         desc:'גישה מלאה לכל המערכת + ניהול משתמשים', color:'amber' },
      { id:'finance',label:'מנהל כספים',        desc:'גישה מלאה כולל הוצאות, ספקים ודוחות',  color:'emerald' },
      { id:'office', label:'מנהלת תיקי לקוחות', desc:'משימות, לקוחות וצפייה בלבד בכספים',     color:'blue' },
      { id:'editor', label:'עורך / צלם',         desc:'משימות שמשויכות לו בלבד',               color:'violet' },
      { id:'client', label:'לקוח',                desc:'צפייה ואישור תוצרים בלבד',              color:'zinc' },
    ];

    const PERMISSIONS = [
      { id:'tasks.view',     label:'צפייה במשימות' },
      { id:'tasks.edit',     label:'עריכת משימות' },
      { id:'clients.view',   label:'צפייה בלקוחות' },
      { id:'clients.edit',   label:'עריכת לקוחות' },
      { id:'suppliers.view', label:'צפייה בספקים' },
      { id:'suppliers.edit', label:'עריכת ספקים' },
      { id:'expenses.view',  label:'צפייה בהוצאות' },
      { id:'expenses.edit',  label:'עריכת הוצאות' },
      { id:'reports.view',   label:'צפייה בדוחות' },
      { id:'users.manage',   label:'ניהול משתמשים' },
      { id:'supervisor.approve', label:'אישור סופרוויזר' },
    ];

    function Settings({ user, role }) {
      const [tab, setTab] = useState('profile');
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [modal, setModal] = useState(false);
      const [editing, setEditing] = useState(null);
      const [teamClients, setTeamClients] = useState([]);
      const [teamEmployees, setTeamEmployees] = useState([]);
      const blank = { email:'', displayName:'', password:'', role:'office', permissions:[], status:'פעיל', linkedEmployeeId:'' };
      const [form, setForm] = useState(blank);
      const [saving, setSaving] = useState(false);
      const F = f => setForm(p=>({...p,...f}));

      // Change password state
      const [pwForm, setPwForm] = useState({ current:'', next:'', confirm:'' });
      const [pwSaving, setPwSaving] = useState(false);
      const [pwMsg, setPwMsg] = useState(null); // {type:'ok'|'err', text}
      const PF = f => setPwForm(p=>({...p,...f}));

      const changePassword = async () => {
        if (!pwForm.next.trim()) return setPwMsg({type:'err', text:'נא להזין סיסמה חדשה'});
        if (pwForm.next !== pwForm.confirm) return setPwMsg({type:'err', text:'הסיסמאות אינן תואמות'});
        if (pwForm.next.length < 6) return setPwMsg({type:'err', text:'הסיסמה חייבת להכיל לפחות 6 תווים'});
        setPwSaving(true); setPwMsg(null);
        try {
          if (pwForm.current.trim()) {
            const cred = firebase.auth.EmailAuthProvider.credential(user.email, pwForm.current.trim());
            await user.reauthenticateWithCredential(cred);
          }
          await user.updatePassword(pwForm.next);
          setPwMsg({type:'ok', text:'✅ הסיסמה עודכנה בהצלחה!'});
          setPwForm({current:'', next:'', confirm:''});
        } catch(e) {
          if (e.code==='auth/wrong-password'||e.code==='auth/invalid-credential') {
            setPwMsg({type:'err', text:'הסיסמה הנוכחית שגויה'});
          } else if (e.code==='auth/requires-recent-login') {
            try {
              await firebase.auth().sendPasswordResetEmail(user.email);
              setPwMsg({type:'ok', text:'📧 נשלח אימייל לאיפוס סיסמה ל-'+user.email});
            } catch(e2) { setPwMsg({type:'err', text:'שגיאה: '+e2.message}); }
          } else {
            setPwMsg({type:'err', text:'שגיאה: '+e.message});
          }
        } finally { setPwSaving(false); }
      };

      // Home page content editor
      const [homeContent, setHomeContent] = useState(null);
      const [homeLoading, setHomeLoading] = useState(false);
      const [homeForm, setHomeForm] = useState({
        heroTitle: 'ברוכים הבאים לטינג מדיה',
        heroSubtitle: 'שירותי ייצור וידאו מקצועיים',
        heroVideoUrl: '',
        aboutText: 'אנחנו מייצרים תוכן וידאו באיכות קולנועית',
        servicesTitle: 'השירותים שלנו',
        testimonialText: 'לקוחותינו אוהבים אותנו',
      });

      const HF = f => setHomeForm(p=>({...p,...f}));

      const isAdmin = role==='admin' || role==='office'; // office has near-admin authority
      const isRealAdmin = role==='admin'; // true admin only — for user creation / system settings

      // Home screen prefs
      const [prefs, setPrefs] = useState(()=>{
        try { return JSON.parse(localStorage.getItem('tingmedia.homePrefs')||'{}'); }
        catch{ return {}; }
      });
      const savePrefs = p => { setPrefs(p); localStorage.setItem('tingmedia.homePrefs', JSON.stringify(p)); };

      useEffect(()=>{
        if (!db) return;
        return db.collection('users').onSnapshot(snap=>{
          setUsers(snap.docs.map(d=>({id:d.id,...d.data()})));
          setLoading(false);
        }, ()=>setLoading(false));
      },[]);

      useEffect(()=>{
        if (!db||!user) return;
        const u1 = db.collection('clients').where('userId','==',user.uid).onSnapshot(s=>setTeamClients(s.docs.map(d=>({id:d.id,...d.data()}))));
        const u2 = db.collection('employees').where('userId','==',user.uid).onSnapshot(s=>setTeamEmployees(s.docs.map(d=>({id:d.id,...d.data()}))));
        // Load home page content
        const u3 = db.collection('homePageContent').where('userId','==',user.uid).limit(1).onSnapshot(snap=>{
          if (snap.empty) {
            setHomeContent(null);
          } else {
            const doc = snap.docs[0];
            setHomeContent({id:doc.id,...doc.data()});
            setHomeForm({
              heroTitle: doc.data().heroTitle || 'ברוכים הבאים לטינג מדיה',
              heroSubtitle: doc.data().heroSubtitle || 'שירותי ייצור וידאו מקצועיים',
              heroVideoUrl: doc.data().heroVideoUrl || '',
              aboutText: doc.data().aboutText || 'אנחנו מייצרים תוכן וידאו באיכות קולנועית',
              servicesTitle: doc.data().servicesTitle || 'השירותים שלנו',
              testimonialText: doc.data().testimonialText || 'לקוחותינו אוהבים אותנו',
            });
          }
        });
        return ()=>{u1();u2();u3();};
      },[user]);

      const saveHomeContent = async () => {
        if (!user) return;
        setHomeLoading(true);
        try {
          if (homeContent?.id) {
            // Update existing
            await db.collection('homePageContent').doc(homeContent.id).update({
              ...homeForm,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          } else {
            // Create new
            await db.collection('homePageContent').add({
              ...homeForm,
              userId: user.uid,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          }
          showToast('✅ תוכן דף הבית שמור בהצלחה!','success');
        } catch(e) {
          showToast('שגיאה בשמירה: ' + e.message,'error');
        } finally {
          setHomeLoading(false);
        }
      };

      const updateClientManager = async (clientId, managerId) => {
        try { await db.collection('clients').doc(clientId).update({ accountManagerId:managerId, updatedAt:firebase.firestore.FieldValue.serverTimestamp() }); }
        catch(e){ showToast('שגיאה: '+e.message,'error'); }
      };

      const openNew = () => { setEditing(null); setForm(blank); setModal(true); };
      const openEdit = u => {
        setEditing(u);
        setForm({
          email:u.email||'', displayName:u.displayName||'',
          role:u.role||'office', permissions:u.permissions||[],
          status:u.status||'פעיל', linkedEmployeeId:u.linkedEmployeeId||''
        });
        setModal(true);
      };

      const togglePerm = pid => {
        F({ permissions: form.permissions.includes(pid)
              ? form.permissions.filter(p=>p!==pid)
              : [...form.permissions, pid] });
      };

      const saveUser = async () => {
        if (!form.email.trim()) return;
        setSaving(true);
        try {
          const { password, ...rest } = form;
          const data = { ...rest, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
          if (editing) {
            await db.collection('users').doc(editing.id).update(data);
            setModal(false);
          } else {
            // Create Firebase Auth account on secondary app so the admin stays signed in
            if (!password || password.length < 8) { showToast('סיסמה ראשונית חובה (8+ תווים)','warning'); setSaving(false); return; }
            const secondaryName = 'create-user-' + Date.now();
            const secondary = firebase.initializeApp(firebase.app().options, secondaryName);
            try {
              const cred = await secondary.auth().createUserWithEmailAndPassword(form.email.trim(), password);
              const uid = cred.user.uid;
              await secondary.auth().signOut();
              await db.collection('users').doc(uid).set({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
              await secondary.delete();
              alert(`✅ נוצר משתמש חדש\nמייל: ${form.email}\nסיסמה: ${password}\nתפקיד: ${form.role}\n\nשלח לו את הפרטים — הוא יוכל להתחבר ב-${form.role === 'editor' ? '/editor.html' : '/admin.html'}`);
              setModal(false);
            } catch(e) {
              try { await secondary.delete(); } catch{}
              if (e.code === 'auth/email-already-in-use') {
                const uid = prompt(`המייל כבר קיים ב-Firebase Auth.\nהדבק את ה-UID של המשתמש מ-Firebase Console כדי להוסיף לו תפקיד:`);
                if (uid) {
                  await db.collection('users').doc(uid.trim()).set({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                  showToast(`✅ הוקצה תפקיד "${form.role}" למשתמש קיים`,'success');
                  setModal(false);
                }
              } else { throw e; }
            }
          }
        } catch(e){ showToast('שגיאה: '+e.message,'error'); } finally { setSaving(false); }
      };

      const deleteUser = async id => {
        if (!window.confirm('להסיר את המשתמש מרשימת ההרשאות? (אינו מוחק את חשבון Firebase Auth)')) return;
        await db.collection('users').doc(id).delete();
      };

      const roleBadge = (r) => {
        const meta = ROLES.find(x=>x.id===r);
        if (!meta) return <span className="text-xs text-zinc-500">{r||'—'}</span>;
        const colorMap = {
          amber:'bg-amber-500/15 text-amber-300 border-amber-500/30',
          emerald:'bg-emerald-500/15 text-emerald-300 border-emerald-500/30',
          blue:'bg-blue-500/15 text-blue-300 border-blue-500/30',
          violet:'bg-violet-500/15 text-violet-300 border-violet-500/30',
          zinc:'bg-zinc-700/40 text-zinc-300 border-zinc-600/40',
        };
        return <span className={`text-xs px-2 py-0.5 rounded-full border ${colorMap[meta.color]}`}>{meta.label}</span>;
      };

      return (
        <div>
          <div className="flex justify-between items-start mb-6">
            <div>
              <h2 className="text-2xl font-black text-white">⚙️ הגדרות</h2>
              <p className="text-zinc-400 text-xs mt-1">ניהול מערכת, משתמשים והעדפות</p>
            </div>
          </div>

          {/* Tabs */}
          <div className="flex gap-1 mb-6 bg-zinc-900/60 p-1 rounded-lg border border-zinc-800 w-fit">
            {[
              {id:'profile',  label:'הפרופיל שלי', emoji:'👤'},
              {id:'calendar', label:'יומן Google',  emoji:'📅'},
              {id:'emails',   label:'התראות מייל', emoji:'📧'},
              {id:'home',     label:'מסך הבית',    emoji:'🏠'},
              ...(isAdmin ? [
                {id:'team',   label:'שיוך לקוחות לצוות', emoji:'🤝'},
                {id:'users',  label:'משתמשים', emoji:'👥'},
                {id:'roles',  label:'תפקידים',  emoji:'🛡️'},
              ] : []),
            ].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors border-0 cursor-pointer ${
                  tab===t.id ? 'bg-amber-500 text-zinc-950' : 'bg-transparent text-zinc-400 hover:text-white'
                }`}>
                {t.emoji} {t.label}
              </button>
            ))}
          </div>

          {/* PROFILE */}
          {tab==='profile' && (
            <div className="space-y-4 max-w-xl">
              {/* User info card */}
              <div className={CL.card}>
                <h3 className="text-white font-bold mb-4">פרטי משתמש</h3>
                <div className="space-y-3 text-sm">
                  <div className="flex justify-between border-b border-zinc-800 pb-2">
                    <span className="text-zinc-400">אימייל</span>
                    <span className="text-white">{user.email}</span>
                  </div>
                  <div className="flex justify-between border-b border-zinc-800 pb-2">
                    <span className="text-zinc-400">תפקיד</span>
                    <span>{roleBadge(role)}</span>
                  </div>
                  <div className="flex justify-between">
                    <span className="text-zinc-400">מזהה</span>
                    <span className="text-zinc-500 text-xs font-mono">{user.uid}</span>
                  </div>
                </div>
              </div>

              {/* Change password card */}
              <div className={CL.card}>
                <h3 className="text-white font-bold mb-1">🔑 שינוי סיסמה</h3>
                <p className="text-zinc-500 text-xs mb-4">אם הזנת את הסיסמה הנוכחית בטעות, לחץ "שלח קישור איפוס" ללא מילוי שדה זה</p>
                <div className="space-y-3">
                  <div>
                    <label className={CL.label}>סיסמה נוכחית</label>
                    <input type="password" className={CL.input} placeholder="הזן סיסמה נוכחית (להגנה)"
                      value={pwForm.current} onChange={e=>PF({current:e.target.value})} />
                  </div>
                  <div>
                    <label className={CL.label}>סיסמה חדשה *</label>
                    <input type="password" className={CL.input} placeholder="לפחות 6 תווים"
                      value={pwForm.next} onChange={e=>PF({next:e.target.value})} />
                  </div>
                  <div>
                    <label className={CL.label}>אישור סיסמה חדשה *</label>
                    <input type="password" className={CL.input} placeholder="חזור על הסיסמה"
                      value={pwForm.confirm} onChange={e=>PF({confirm:e.target.value})} />
                  </div>
                  {pwMsg && (
                    <div className={`text-sm px-3 py-2 rounded-lg ${pwMsg.type==='ok' ? 'bg-emerald-500/15 text-emerald-300 border border-emerald-500/30' : 'bg-red-500/15 text-red-300 border border-red-500/30'}`}>
                      {pwMsg.text}
                    </div>
                  )}
                  <div className="flex gap-2 pt-1">
                    <button onClick={changePassword} className={CL.btn} disabled={pwSaving}>
                      {pwSaving ? 'מעדכן...' : '🔑 עדכן סיסמה'}
                    </button>
                    <button
                      onClick={async()=>{ setPwSaving(true); try{ await firebase.auth().sendPasswordResetEmail(user.email); setPwMsg({type:'ok',text:'📧 נשלח אימייל לאיפוס סיסמה ל-'+user.email}); }catch(e){setPwMsg({type:'err',text:e.message});} finally{setPwSaving(false);} }}
                      className={CL.btn2} disabled={pwSaving}>
                      📧 שלח קישור איפוס
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* CALENDAR */}
          {tab==='calendar' && (
            <CalendarSettings />
          )}

          {/* EMAIL NOTIFICATIONS */}
          {tab==='emails' && (() => {
            const [keys, setKeys] = React.useState(()=>{ try{return JSON.parse(localStorage.getItem('tingmedia.emailjs')||'{}')}catch{return {}} });
            const [saved, setSaved] = React.useState(false);
            const [testing, setTesting] = React.useState(false);
            const update = k => v => setKeys(p=>({...p,[k]:v}));
            const save = () => {
              localStorage.setItem('tingmedia.emailjs', JSON.stringify(keys));
              if(keys.publicKey && typeof emailjs!=='undefined') emailjs.init(keys.publicKey);
              setSaved(true); setTimeout(()=>setSaved(false),3000);
            };
            const test = async () => {
              setTesting(true);
              await sendEmail({ toEmail:user.email, toName:'בדיקה', taskTitle:'משימת בדיקה', clientName:'לקוח לדוגמה', notificationType:'🧪 בדיקת מייל', extraInfo:'זוהי הודעת בדיקה מהמערכת' });
              setTesting(false); showToast('📧 נשלח! בדוק את תיבת הדואר שלך.','success');
            };
            return (
              <div className="max-w-2xl space-y-5">
                <div className={CL.card}>
                  <h3 className="text-white font-bold text-base mb-1">📧 התראות מייל לצוות</h3>
                  <p className="text-zinc-400 text-sm mb-5">חבר EmailJS כדי לשלוח התראות אוטומטיות לעוסקים במלאכה — משימה חדשה, תזכורות, הפצה לצוות.</p>

                  <div className="p-3 rounded-lg bg-blue-900/20 border border-blue-800/30 text-blue-200 text-sm mb-5">
                    <strong>הוראות הגדרה (שרות חינמי):</strong>
                    <ol className="list-decimal list-inside mt-2 space-y-1 text-xs text-blue-300">
                      <li>כנס ל-<a href="https://www.emailjs.com" target="_blank" rel="noreferrer" className="underline">emailjs.com</a> → הרשם חינם</li>
                      <li>Email Services → חבר Gmail / Outlook</li>
                      <li>Email Templates → צור תבנית חדשה עם המשתנים הבאים:<br/>
                        <code className="text-xs bg-zinc-800 px-1 rounded">{'{{to_name}}, {{task_title}}, {{client_name}}, {{notification_type}}, {{task_link}}, {{extra_info}}'}</code>
                      </li>
                      <li>Account → API Keys → העתק Public Key</li>
                    </ol>
                  </div>

                  <div className="space-y-3">

    /* ── MY WORK (home for office/admin) ──────────────────────────────────
       Personal landing inspired by Asana's "My Tasks":
       Drag tasks between buckets to reschedule. Quick-actions inline.
       Includes video reviews where the ball is in the user's court. */
    function MyWork({ user, role, tasks=[], clients=[], employees=[], suppliers=[], onNav }) {
      const toast = useToast();
      const [reviews, setReviews] = useState([]);
      const [savedFilter, setSavedFilter] = useState(() =>
        localStorage.getItem('tingmedia.myworkFilter') || 'mine'); // 'mine' | 'team'
      const [draggingId, setDraggingId] = useState(null);
      const [overBucket, setOverBucket] = useState(null);
      const [collapsed, setCollapsed] = useState(() => {
        try { return JSON.parse(localStorage.getItem('tingmedia.myworkCollapsed')||'{}'); } catch { return {}; }
      });
      const [quickTitle, setQuickTitle] = useState('');
      const [quickClient, setQuickClient] = useState('');
      const [quickAssignee, setQuickAssignee] = useState('');
      const [quickPriority, setQuickPriority] = useState('medium');
      const [quickDue, setQuickDue] = useState('today');
      const [quickAdding, setQuickAdding] = useState(false);

      useEffect(() => {
        if (!db) return;
        const unsub = db.collection('videoReviews').onSnapshot(s => {
          setReviews(s.docs.map(d => ({ id:d.id, ...d.data() })));
        }, e => console.warn('reviews:', e));
        return unsub;
      }, []);

      function toggleCollapsed(key) {
        const next = { ...collapsed, [key]: !collapsed[key] };
        setCollapsed(next);
        localStorage.setItem('tingmedia.myworkCollapsed', JSON.stringify(next));
      }

      // Date helpers
      const today = new Date(); today.setHours(0,0,0,0);
      const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
      const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate()+7);
      function asDate(s) { if (!s) return null; const d = new Date(s); d.setHours(0,0,0,0); return d; }
      function bucketOf(t) {
        if (t.stage === 9) return 'done';
        const d = asDate(t.dueDate || t.shootDate);
        if (!d) return 'later';
        if (d < today) return 'overdue';
        if (d.getTime() === today.getTime()) return 'today';
        if (d <= weekEnd) return 'week';
        return 'later';
      }

      // "Mine" filter — tasks where I'm AM/editor
      const myUid = user.uid;
      const myEmpId = useMemo(() => {
        const e = employees.find(x => x.userId === myUid);
        return e?.id || null;
      }, [employees, myUid]);

      const visibleTasks = useMemo(() => tasks.filter(t => {
        if (savedFilter === 'team') return true;
        const stageOwner = (t.stageOwners||{})[t.stage||1];
        const ownsCurrentStage = stageOwner === ('emp:'+myEmpId) || stageOwner === ('sup:'+myEmpId);
        return t.accountManagerId === myEmpId
            || t.editorId === myEmpId
            || t.assigneeUid === myUid
            || ownsCurrentStage;
      }), [tasks, savedFilter, myEmpId, myUid]);

      // "Ball in your court" — tasks where current stage owner = me
      const ballInMyCourt = useMemo(() => visibleTasks.filter(t => {
        if ((t.stage||1) >= 9) return false; // not done
        const owner = (t.stageOwners||{})[t.stage||1];
        if (!owner) return false;
        const [, oid] = owner.split(':');
        return oid === myEmpId;
      }), [visibleTasks, myEmpId]);

      // Group tasks
      const buckets = useMemo(() => {
        const b = { overdue:[], today:[], week:[], later:[], done:[] };
        for (const t of visibleTasks) b[bucketOf(t)].push(t);
        // Sort each by priority then due date
        const prioRank = { high:0, medium:1, low:2 };
        for (const k of Object.keys(b)) {
          b[k].sort((a,c) => (prioRank[a.priority]??9) - (prioRank[c.priority]??9)
            || ((asDate(a.dueDate)?.getTime()||9e15) - (asDate(c.dueDate)?.getTime()||9e15)));
        }
        return b;
      }, [visibleTasks]);

      // Video reviews where the ball is at me (or my team if filter='team')
      const myReviews = reviews.filter(r => {
        if (r.assignedTo !== 'am') return false;
        if (savedFilter === 'team') return true;
        return r.userId === myUid;
      });

      // Drag handlers — drop a task into a bucket changes its dueDate
      function localISO(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
      function bucketToDate(bucket) {
        if (bucket === 'today')   return localISO(today);
        if (bucket === 'week')    { const d = new Date(today); d.setDate(d.getDate()+3); return localISO(d); }
        if (bucket === 'later')   { const d = new Date(today); d.setDate(d.getDate()+14); return localISO(d); }
        if (bucket === 'overdue') { const d = new Date(today); d.setDate(d.getDate()-1); return localISO(d); }
        return null;
      }
      async function handleDrop(bucket) {
        if (!draggingId) return;
        const t = tasks.find(x => x.id === draggingId);
        setDraggingId(null); setOverBucket(null);
        if (!t) return;
        if (bucket === 'done') {
          await db.collection('tasks').doc(t.id).update({ stage: 9, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
          return;
        }
        const newDate = bucketToDate(bucket);
        await db.collection('tasks').doc(t.id).update({ dueDate: newDate, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      }

      async function quickComplete(t) {
        const prevStage = t.stage || 1;
        const isUndo = t.stage === 9;
        await db.collection('tasks').doc(t.id).update({
          stage: isUndo ? (prevStage === 9 ? 1 : prevStage) : 9,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        if (!isUndo) {
          toast.push({
            icon:'✓',
            msg:`"${(t.title||'משימה').slice(0,40)}" סומנה כבוצעה`,
            duration: 6000,
            action: { label:'בטל', onClick: async () => {
              await db.collection('tasks').doc(t.id).update({
                stage: prevStage,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
              });
            }}
          });
        }
      }
      async function snoozeTomorrow(t) {
        const d = new Date(today); d.setDate(d.getDate()+1);
        await db.collection('tasks').doc(t.id).update({ dueDate: localISO(d), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      }
      async function quickAdd() {
        if (!quickTitle.trim()) return;
        setQuickAdding(true);
        try {
          const due = quickDue === 'today' ? today
                      : quickDue === 'tomorrow' ? new Date(today.getTime()+86400000)
                      : quickDue === 'week' ? new Date(today.getTime()+7*86400000)
                      : null;
          // Parse assignee (format: "emp:id" or "sup:id")
          let accountManagerId = null, editorId = null;
          if (quickAssignee) {
            const [type, id] = quickAssignee.split(':');
            if (type === 'emp') accountManagerId = id;
            else if (type === 'sup') editorId = id;
          }
          const docRef = await db.collection('tasks').add({
            title: quickTitle.trim(),
            client: quickClient || '',
            stage: 1, priority: quickPriority || 'medium',
            dueDate: due ? localISO(due) : null,
            accountManagerId: accountManagerId || myEmpId || null,
            editorId: editorId || null,
            userId: myUid,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
          toast.push({ icon:'✓', msg:`משימה "${quickTitle.trim().slice(0,30)}" נוספה בהצלחה`, duration:4000 });
          setQuickTitle(''); setQuickClient(''); setQuickAssignee(''); setQuickPriority('medium'); setQuickDue('today');
        } catch(e) {
          console.error('quickAdd error:', e);
          toast.push({ icon:'✗', msg:'שגיאה בהוספת משימה: ' + (e.message||'נסה שוב'), duration:4000 });
        } finally {
          setQuickAdding(false);
        }
      }

      const greeting = (() => {
        const h = new Date().getHours();
        if (h < 12) return 'בוקר טוב';
        if (h < 17) return 'צהריים טובים';
        if (h < 21) return 'ערב טוב';
        return 'לילה טוב';
      })();
      const totalAction = buckets.overdue.length + buckets.today.length + myReviews.length;

      const STAGE_LABELS = ['','בריף','כתיבה','אישור תסריט','קביעת צילום','צילום','עריכה','אישור סופרוויזר','אישור לקוח','סגירה'];
      const STAGE_EMOJI  = ['','📋','✍️','📝','📅','🎬','✂️','👁️','✅','🏁'];

      // Calmer palette — color reserved for "what needs attention"
      // Bucket BG stays neutral; only the left rail + count chip carry the color.
      const buckMeta = {
        overdue: { title:'באיחור', emoji:'🔥', color:'#ef4444', dot:'#ef4444' },
        today:   { title:'היום',   emoji:'📅', color:'#f59e0b', dot:'#f59e0b' },
        week:    { title:'השבוע',  emoji:'📆', color:'#60a5fa', dot:'#60a5fa' },
        later:   { title:'אחר כך', emoji:'⏰', color:'var(--text-sub)', dot:'var(--text-muted)' },
        done:    { title:'בוצע',   emoji:'✅', color:'#22c55e', dot:'#22c55e' },
      };

      return (
        <div className="min-h-full overflow-y-auto" style={{ background:'var(--bg)', padding:'18px 22px', maxHeight:'calc(100vh - 0px)' }}>
          {/* Greeting */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ display:'flex', alignItems:'baseline', gap:12, flexWrap:'wrap' }}>
              <h1 style={{ fontSize:20, fontWeight:700, color:'var(--text)', letterSpacing:'-0.01em' }}>{greeting}, {user.displayName?.split(' ')[0] || 'בוס'}</h1>
              <span style={{ fontSize:12, color:'var(--text-muted)' }}>
                {new Date().toLocaleDateString('he-IL',{weekday:'long', day:'numeric', month:'long'})}
              </span>
              {totalAction > 0 && (
                <span style={{ color:'#f87171', fontSize:12, fontWeight:500 }}>
                  · {totalAction} דורש פעולה
                </span>
              )}
              <span style={{ flex:1 }} />
              <div style={{ display:'flex', background:'var(--bg)', border:'1px solid var(--surface2)', borderRadius:6, overflow:'hidden' }}>
                {[['mine','שלי'],['team','צוות']].map(([v,l]) => (
                  <button key={v}
                    onClick={() => { setSavedFilter(v); localStorage.setItem('tingmedia.myworkFilter', v); }}
                    style={{ padding:'5px 12px', fontSize:11, fontWeight:500, background: savedFilter===v ? 'var(--surface2)':'transparent', color: savedFilter===v ? 'var(--text)':'var(--text-sub)', border:'none', cursor:'pointer' }}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* ── KPI Strip ── */}
          {(() => {
            const activeClients = clients.filter(c => c.status === 'פעיל' || !c.status).length;
            const overdueCount  = buckets.overdue.length;
            const todayCount    = buckets.today.length;
            const doneThisWeek  = buckets.done.filter(t => {
              const upd = t.updatedAt?.toDate ? t.updatedAt.toDate() : new Date(t.updatedAt||0);
              return (Date.now() - upd.getTime()) < 7*24*3600*1000;
            }).length;

            const kpis = [
              { label:'משימות היום',   value: todayCount,    color:'var(--accent)',
                svg: <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" width="13" height="13"><rect x="2" y="3" width="12" height="11" rx="1.5"/><path d="M5 3V1M11 3V1M2 7h12"/><path d="M5 10.5h2M9 10.5h2"/></svg> },
              { label:'באיחור',        value: overdueCount,  color: overdueCount>0 ? 'var(--red)' : '#22c55e',
                svg: <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" width="13" height="13"><path d="M8 2v5l3 2"/><circle cx="8" cy="8" r="6.5"/></svg> },
              { label:'לקוחות פעילים',value: activeClients, color:'var(--accent)',
                svg: <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" width="13" height="13"><circle cx="6" cy="5" r="2.5"/><path d="M1 13c0-2.8 2.2-4.5 5-4.5s5 1.7 5 4.5"/><circle cx="12.5" cy="4.5" r="2"/><path d="M15 12c0-2-1.1-3.2-2.5-3.2"/></svg> },
              { label:'הושלמו השבוע',  value: doneThisWeek,  color:'#22c55e',
                svg: <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" width="13" height="13"><path d="M2.5 8.5l3.5 3.5 7.5-8"/></svg> },
            ];

            return (
              <div style={{ display:'flex', gap:10, marginBottom:18, flexWrap:'wrap' }}>
                {kpis.map(k => (
                  <div key={k.label} style={{
                    flex:'1 1 130px', minWidth:110, background:'var(--surface)',
                    border:'1px solid var(--border)', borderRadius:12, padding:'14px 16px',
                    display:'flex', flexDirection:'column', gap:0,
                    boxShadow:'var(--card-shadow)'
                  }}>
                    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
                      <span style={{ fontSize:9.5, color:'var(--text-muted)', fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase' }}>{k.label}</span>
                      <span style={{ width:24, height:24, borderRadius:6, background:'var(--surface2)', border:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center', color:'var(--text-sub)', flexShrink:0 }}>{k.svg}</span>
                    </div>
                    <div style={{ fontSize:30, fontWeight:900, color: k.color, lineHeight:1, letterSpacing:'-0.02em' }}>
                      {k.value}
                    </div>
                  </div>
                ))}
              </div>
            );
          })()}

          {/* Quick add — comprehensive form with all fields */}
          <div className="mywork-quick-add" style={{ display:'flex', gap:6, alignItems:'center', background:'var(--surface)', border:'1px solid var(--border)', borderRadius:10, padding:'8px 10px', marginBottom:24, transition:'border-color .2s, box-shadow .2s', flexWrap:'wrap' }}>
            <span style={{ fontSize:14, color:'var(--text-muted)', flexShrink:0 }}>➕</span>
            <input value={quickTitle} onChange={e=>setQuickTitle(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey) quickAdd();}}
              placeholder="הוסף משימה..."
              style={{ flex:'1 1 160px', background:'transparent', border:'none', color:'var(--text)', fontSize:13, outline:'none', minWidth:80 }} />

            {/* Client select */}
            <select value={quickClient} onChange={e=>setQuickClient(e.target.value)}
              style={{ background:'var(--surface)', border:'1px solid var(--border2)', color: quickClient ? 'var(--text)' : 'var(--text-muted)', fontSize:12, cursor:'pointer', padding:'3px 6px', borderRadius:5, flexShrink:1, minWidth:100 }}>
              <option value="" style={{background:'var(--surface)',color:'var(--text-muted)'}}>לקוח</option>
              {clients && clients.map(c => <option key={c.id} value={c.name} style={{background:'var(--surface)',color:'var(--text)'}}>{c.name}</option>)}
            </select>

            {/* Assignee select */}
            <select value={quickAssignee} onChange={e=>setQuickAssignee(e.target.value)}
              style={{ background:'var(--surface)', border:'1px solid var(--border2)', color: quickAssignee ? 'var(--text)' : 'var(--text-muted)', fontSize:12, cursor:'pointer', padding:'3px 6px', borderRadius:5, flexShrink:1, minWidth:90 }}>
              <option value="" style={{background:'var(--surface)',color:'var(--text-muted)'}}>מקצועי</option>
              {employees && employees.map(e => <option key={e.id} value={'emp:'+e.id} style={{background:'var(--surface)',color:'var(--text)'}}>{e.name||e.email}</option>)}
              {suppliers && suppliers.map(s => <option key={s.id} value={'sup:'+s.id} style={{background:'var(--surface)',color:'var(--text)'}}>{s.name||s.email} (עורך)</option>)}
            </select>

            {/* Priority select */}
            <select value={quickPriority} onChange={e=>setQuickPriority(e.target.value)}
              style={{ background:'var(--surface)', border:'1px solid var(--border2)', color:'var(--text)', fontSize:12, cursor:'pointer', padding:'3px 6px', borderRadius:5, flexShrink:1, minWidth:70 }}>
              <option value="low" style={{background:'var(--surface)',color:'var(--text)'}}>נמוך</option>
              <option value="medium" style={{background:'var(--surface)',color:'var(--text)'}}>בינוני</option>
              <option value="high" style={{background:'var(--surface)',color:'#ef4444'}}>גבוה</option>
            </select>

            {/* Due date select */}
            <select value={quickDue} onChange={e=>setQuickDue(e.target.value)}
              style={{ background:'var(--surface)', border:'1px solid var(--border2)', color:'var(--text-muted)', fontSize:12, cursor:'pointer', padding:'3px 6px', borderRadius:5, flexShrink:1, minWidth:70 }}>
              <option value="today" style={{background:'var(--surface)',color:'var(--text)'}}>היום</option>
              <option value="tomorrow" style={{background:'var(--surface)',color:'var(--text)'}}>מחר</option>
              <option value="week" style={{background:'var(--surface)',color:'var(--text)'}}>שבוע</option>
              <option value="none" style={{background:'var(--surface)',color:'var(--text)'}}>ללא</option>
            </select>

            {/* Submit button */}
            <button onClick={quickAdd} disabled={!quickTitle.trim() || quickAdding}
              style={{ padding:'5px 12px', background:'var(--accent)', color:'#000', fontSize:12, fontWeight:600, border:'none', borderRadius:6, cursor: quickTitle.trim() && !quickAdding ? 'pointer' : 'not-allowed', whiteSpace:'nowrap', flexShrink:0, opacity: quickTitle.trim() && !quickAdding ? 1:.5, transition:'opacity .15s' }}>
              {quickAdding ? 'שומר...' : 'הוסף'}
            </button>
            {/* Full form button — opens the Tasks section */}
            <button onClick={() => onNav && onNav('tasks')}
              title="פתח טופס יצירת משימה מלא"
              style={{ padding:'5px 10px', background:'transparent', color:'var(--text-muted)', fontSize:12, border:'1px solid var(--border2)', borderRadius:6, cursor:'pointer', whiteSpace:'nowrap', flexShrink:0, transition:'all .15s' }}
              onMouseEnter={e=>{e.currentTarget.style.color='var(--text)';e.currentTarget.style.borderColor='var(--text-muted)';}}
              onMouseLeave={e=>{e.currentTarget.style.color='var(--text-muted)';e.currentTarget.style.borderColor='var(--border2)';}}>
              📋 טופס מלא
            </button>
          </div>

          {/* Video reviews row — calm */}
          {myReviews.length > 0 && (
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:11, fontWeight:600, color:'var(--text-sub)', marginBottom:6, letterSpacing:'.02em', textTransform:'uppercase' }}>
                סקירות וידאו · {myReviews.length}
              </div>
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(260px, 1fr))', gap:6 }}>
                {myReviews.map(r => (
                  <div key={r.id} onClick={() => onNav('videoreview')}
                    style={{ background:'var(--bg)', border:'1px solid var(--surface2)', borderRadius:8, padding:'9px 11px', cursor:'pointer', position:'relative', overflow:'hidden' }}>
                    <div style={{ position:'absolute', right:0, top:0, bottom:0, width:2, background:'#ef4444', opacity:0.7 }} />
                    <div style={{ display:'flex', alignItems:'center', gap:8, paddingRight:6 }}>
                      <span style={{ fontSize:14, opacity:0.9 }}>{REVIEW_STATUS[r.status]?.icon || '🎬'}</span>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontWeight:500, fontSize:13, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.title}</div>
                        <div style={{ fontSize:11, color:'var(--text-sub)', marginTop:1 }}>{REVIEW_STATUS[r.status]?.label}</div>
                      </div>
                      {(r.versions?.length || 0) > 0 && <span style={{ color:'var(--text-sub)', fontSize:10 }}>v{r.currentVersion || r.versions.length}</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Workload — see who's slammed before promising a deadline */}
          {(() => {
            const people = [];
            for (const e of employees) people.push({ id:e.id, name:e.name || e.email || '—', kind:'AM', avatar:'👤' });
            for (const s of suppliers) people.push({ id:s.id, name:s.name || s.email || '—', kind:'עורך', avatar:'🎬' });
            // Compute load per person this week
            const weekStart = today;
            const weekEndDate = new Date(today.getTime() + 7*86400000);
            function loadFor(personId) {
              const arr = tasks.filter(t => (t.accountManagerId===personId || t.editorId===personId) && t.stage < 9);
              const thisWeek = arr.filter(t => {
                const d = asDate(t.dueDate || t.shootDate);
                return d && d >= weekStart && d <= weekEndDate;
              });
              const overdue = arr.filter(t => {
                const d = asDate(t.dueDate);
                return d && d < weekStart;
              });
              return { open: arr.length, week: thisWeek.length, overdue: overdue.length };
            }
            const withLoad = people.map(p => ({ ...p, load: loadFor(p.id) }))
              .filter(p => p.load.open > 0)
              .sort((a,b) => b.load.week - a.load.week);
            if (withLoad.length === 0) return null;
            const maxWeek = Math.max(...withLoad.map(p => p.load.week), 5);
            const weekRange = (() => {
              const end = new Date(today.getTime() + 6*86400000);
              return `${today.getDate()}.${today.getMonth()+1} – ${end.getDate()}.${end.getMonth()+1}`;
            })();
            return (
              <div className="mywork-panel">
                <div className="mywork-panel-head">
                  <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                    <span style={{ width:7, height:7, borderRadius:'50%', background:'#f59e0b' }} />
                    <span style={{ fontSize:13, fontWeight:600, color:'var(--text)' }}>עומס השבוע</span>
                  </div>
                  <span style={{ fontSize:12, color:'var(--text-muted)' }}>{weekRange}</span>
                </div>
                <div className="workload-grid">
                  {withLoad.map(p => {
                    const pct = Math.min(100, (p.load.week / maxWeek) * 100);
                    const heat = p.load.week >= 7 ? '#ef4444' : p.load.week >= 4 ? '#f59e0b' : '#22c55e';
                    const initials = (p.name || '').split(' ').map(w => w[0]).filter(Boolean).slice(0,2).join('');
                    const isAm = p.kind === 'AM';
                    return (
                      <div key={p.id} className="workload-card">
                        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
                          <div className={`workload-avatar ${isAm ? 'wa-am' : 'wa-editor'}`}>{initials}</div>
                          <div style={{ flex:1, minWidth:0 }}>
                            <div style={{ fontSize:13, fontWeight:600, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{p.name}</div>
                            <span style={{ fontSize:11, color:'var(--text-sub)', background:'var(--surface2)', display:'inline-block', padding:'1px 7px', borderRadius:4, marginTop:2, border:'1px solid var(--border)' }}>{p.kind}</span>
                          </div>
                        </div>
                        <div style={{ height:4, background:'var(--border2)', borderRadius:2, overflow:'hidden', marginBottom:10 }}>
                          <div style={{ height:'100%', width:`${pct}%`, background:heat, borderRadius:2, transition:'width .4s', float:'right' }} />
                        </div>
                        <div style={{ display:'flex', gap:12 }}>
                          <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
                            <span style={{ fontSize:15, fontWeight:700, color:'var(--text)' }}>{p.load.week}</span>
                            <span style={{ fontSize:10, color:'var(--text-muted)' }}>השבוע</span>
                          </div>
                          <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
                            <span style={{ fontSize:15, fontWeight:700, color:'var(--text)' }}>{p.load.open}</span>
                            <span style={{ fontSize:10, color:'var(--text-muted)' }}>פתוחות</span>
                          </div>
                          <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
                            <span style={{ fontSize:15, fontWeight:700, color: p.load.overdue > 0 ? '#ef4444' : 'var(--text)' }}>{p.load.overdue}</span>
                            <span style={{ fontSize:10, color:'var(--text-muted)' }}>באיחור</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* Ball in your court — stages assigned specifically to me */}
          {ballInMyCourt.length > 0 && (
            <div style={{ marginBottom: 16, background:'var(--accent-dim)', border:'1px solid rgba(245,158,11,0.25)', borderRadius:10, overflow:'hidden', position:'relative' }}>
              <div style={{ position:'absolute', right:0, top:0, bottom:0, width:3, background:'#f59e0b' }} />
              <div style={{ display:'flex', alignItems:'center', gap:8, padding:'10px 18px 10px 14px', borderBottom:'1px solid rgba(245,158,11,0.2)' }}>
                <span style={{ fontSize:14 }}>🎯</span>
                <span style={{ fontWeight:600, fontSize:13, color:'#fbbf24', flex:1 }}>הכדור אצלך — שלבים שאתה אחראי עליהם</span>
                <span style={{ background:'rgba(245,158,11,0.18)', color:'#fbbf24', fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:99 }}>{ballInMyCourt.length}</span>
              </div>
              <div>
                {ballInMyCourt.map(t => {
                  const stageLbl = STAGE_LABELS[t.stage] || '';
                  const stageIcon = STAGE_EMOJI[t.stage] || '';
                  const due = asDate(t.dueDate);
                  const dueDisp = due ? due.toLocaleDateString('he-IL',{day:'numeric', month:'numeric'}) : '';
                  const isOverdue = due && due < today;
                  return (
                    <div key={t.id} onClick={() => onNav('tasks')}
                      className="mywork-row"
                      style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 18px 10px 14px', borderBottom:'1px solid rgba(245,158,11,0.12)', cursor:'pointer' }}>
                      <span style={{ fontSize:14, opacity:0.85 }}>{stageIcon}</span>
                      <span style={{ flex:1, minWidth:0, fontSize:13.5, color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{t.title}</span>
                      <span style={{ background:'rgba(245,158,11,0.15)', color:'#f59e0b', fontSize:11, padding:'2px 8px', borderRadius:4 }}>{stageLbl}</span>
                      {t.client && <span className="mywork-client-chip">{t.client}</span>}
                      {dueDisp && <span style={{ fontSize:11, color: isOverdue ? '#ef4444' : 'var(--text-sub)', fontWeight: isOverdue ? 600 : 400 }}>{dueDisp}</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Buckets — refined: rail on right, square checkbox, client chip, hover lift */}
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {['overdue','today','week','later','done'].map(key => {
              const meta = buckMeta[key];
              const arr = buckets[key];
              if (key === 'done' && arr.length === 0) return null;
              const isCollapsed = collapsed[key];
              const isOver = overBucket === key;
              return (
                <div key={key}
                  className={`mywork-bucket b-${key}`}
                  onDragOver={e => { e.preventDefault(); setOverBucket(key); }}
                  onDragLeave={() => setOverBucket(null)}
                  onDrop={() => handleDrop(key)}
                  style={isOver ? { borderColor: meta.color } : undefined}
                >
                  <div className="mywork-bucket-head" onClick={() => toggleCollapsed(key)}>
                    <span style={{ fontSize:14, lineHeight:1 }}>{meta.emoji}</span>
                    <span style={{ fontWeight:600, fontSize:13, color: key==='overdue' ? '#ef4444' : 'var(--text)', flex:1 }}>{meta.title}</span>
                    <span className="mywork-count">{arr.length}</span>
                    <span style={{ fontSize:11, color:'var(--text-muted)', transform: isCollapsed ? 'rotate(-90deg)' : 'none', transition:'transform .2s' }}>▾</span>
                  </div>
                  {!isCollapsed && (
                    arr.length === 0 ? (
                      <div style={{ padding:'12px 18px', borderTop:'1px solid var(--border)', color:'var(--text-muted)', fontSize:12 }}>
                        {key === 'today' ? 'פנוי 🌿' : key === 'overdue' ? 'הכל בזמן ✓' : 'גרור לכאן משימות'}
                      </div>
                    ) : (
                      <div className="mywork-task-list">
                        {arr.map(t => {
                          const due = asDate(t.dueDate);
                          const dueDisp = due ? due.toLocaleDateString('he-IL',{day:'numeric', month:'numeric'}) : '';
                          const am = employees.find(e => e.id === t.accountManagerId);
                          const ed = suppliers.find(s => s.id === t.editorId);
                          const stageLbl = STAGE_LABELS[t.stage] || '';
                          const stage = t.stage || 1;
                          // Stage pill color per phase
                          let stageClass = 'var(--text-sub)', stageBg = 'rgba(113,113,122,0.12)';
                          if (stage >= 6 && stage <= 7) { stageClass = '#60a5fa'; stageBg = 'rgba(96,165,250,0.12)'; } // editing/review
                          else if (stage === 5) { stageClass = '#a78bfa'; stageBg = 'rgba(167,139,250,0.12)'; } // filming
                          else if (stage === 8) { stageClass = '#f59e0b'; stageBg = 'rgba(245,158,11,0.12)'; } // client review
                          else if (stage === 9) { stageClass = '#22c55e'; stageBg = 'rgba(34,197,94,0.12)'; } // done
                          return (
                            <div key={t.id}
                              draggable
                              onDragStart={() => setDraggingId(t.id)}
                              onDragEnd={() => { setDraggingId(null); setOverBucket(null); }}
                              onClick={() => onNav('tasks')}
                              className={`mywork-row${key==='done' ? ' done' : ''}`}
                              style={{
                                cursor: draggingId===t.id ? 'grabbing' : 'pointer',
                                opacity: draggingId===t.id ? .4 : 1,
                                display:'flex', alignItems:'center', gap:10,
                              }}>
                              {/* Square checkbox on right (start in RTL) — clicking marks done */}
                              <span
                                className={`mywork-check ${key==='done' ? 'checked' : ''}`}
                                title={key==='done' ? 'החזר לפעיל' : 'סמן כבוצע'}
                                onClick={e => { e.stopPropagation(); quickComplete(t); }}
                              >
                                {key==='done' ? '✓' : ''}
                              </span>
                              <span style={{ flex:1, minWidth:0, fontSize:13.5, color: key==='done' ? 'var(--text-muted)' : 'var(--text)', fontWeight:400, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', textDecoration: key==='done' ? 'line-through' : 'none' }}>
                                {t.title}
                              </span>
                              <div style={{ display:'flex', alignItems:'center', gap:6, flexShrink:0 }}>
                                {stageLbl && (
                                  <span className="mywork-stage-pill" style={{ background: stageBg, color: stageClass }}>{stageLbl}</span>
                                )}
                                {t.client && <span className="mywork-client-chip">{t.client}</span>}
                                {dueDisp && (
                                  <span className={`mywork-due ${key}`}>{dueDisp}</span>

                                  )}
                                </div>
                              </div>
                            </div>
                          );

                      </div>

                  )}
                </div>
              );

          {/* Footer hint — subtle */}
          <div style={{ marginTop:18, fontSize:10, color:'var(--border2)', display:'flex', gap:12, flexWrap:'wrap', justifyContent:'center' }}>

            <span>·</span>
            <span>עיגול = בוצע</span>
            <span>·</span>
            <span>⏰ דחיה</span>
            <span>·</span>
            <span>⌘K חיפוש</span>
          </div>
        </div>
      );
    }

    /* ── PROCESSES — תהליכים וזרימת עבודה ──

    function Processes({ user, role, tasks=[], employees=[], suppliers=[] }) {

      // Summary KPIs
      const totalOpen = tasks.filter(t => (t.stage||1) < 9).length;
      const totalDone = tasks.filter(t => t.stage === 9).length;
      const byPriority = { high:0, medium:0, low:0 };
      const byAssignee = {};
      const byStage = {};

      tasks.forEach(t => {
        if ((t.stage||1) < 9) {
          const p = t.priority || 'medium';
          byPriority[p] = (byPriority[p] || 0) + 1;
        }
        const am = t.accountManagerId;
        if (am) {
          byAssignee[am] = (byAssignee[am] || 0) + 1;
        }
        const s = t.stage || 1;
        byStage[s] = (byStage[s] || 0) + 1;
      });

      return (
        <div>
          <div className="mb-8">
            <h2 className="text-3xl font-black text-white mb-1">⚙️ תהליכים וזרימת עבודה</h2>
            <p className="text-zinc-400 text-sm">ניהול תהליכים, חלוקת משימות, וניהול צוות</p>
          </div>

          {/* KPI Cards */}
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-8">
            <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4">
              <div className="text-zinc-400 text-xs mb-1 font-semibold">📋 כל המשימות</div>
              <div className="text-3xl font-black text-white">{totalOpen + totalDone}</div>
              <div className="text-xs text-zinc-500 mt-1">{totalOpen} פתוחות</div>
            </div>
            <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4 bg-gradient-to-l from-red-500/10">
              <div className="text-red-400 text-xs mb-1 font-semibold">🔴 גבוהה עדיפות</div>
              <div className="text-2xl font-black text-red-400">{byPriority.high}</div>
              <div className="text-xs text-zinc-500 mt-1">דחוף</div>
            </div>
            <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4 bg-gradient-to-l from-amber-500/10">
              <div className="text-amber-400 text-xs mb-1 font-semibold">🟡 בינוני</div>
              <div className="text-2xl font-black text-amber-400">{byPriority.medium}</div>
              <div className="text-xs text-zinc-500 mt-1">קצב רגיל</div>
            </div>
            <div className="bg-zinc-900 border border-zinc-800 rounded-lg p-4 bg-gradient-to-l from-emerald-500/10">
              <div className="text-emerald-400 text-xs mb-1 font-semibold">🟢 נמוך</div>
              <div className="text-2xl font-black text-emerald-400">{byPriority.low}</div>
              <div className="text-xs text-zinc-500 mt-1">לא דחוף</div>

              <div className="text-2xl font-black text-green-400">{totalDone}</div>
              <div className="text-xs text-zinc-500 mt-1">{totalDone > 0 ? Math.round((totalDone/(totalDone+totalOpen))*100):'0'}%</div>

    /* ── TEAM STATUS — who's responsible for what ──
       Matrix: rows = people, columns = stages, cells = task counts.
       CEO can scan the team in 5 seconds: who's slammed, who's free, where bottlenecks are. */
    function TeamStatus({ user, role, tasks=[], employees=[], suppliers=[], onNav }) {
      const STAGES_LIST = [
        { id:1, label:'בריף', emoji:'📋' },
        { id:2, label:'כתיבה', emoji:'✍️' },
        { id:3, label:'אישור תסריט', emoji:'📝' },
        { id:4, label:'קביעת צילום', emoji:'📅' },
        { id:5, label:'צילום', emoji:'🎬' },
        { id:6, label:'עריכה', emoji:'✂️' },
        { id:7, label:'אישור סופרוויזר', emoji:'👁️' },
        { id:8, label:'אישור לקוח', emoji:'✅' },
      ];
      const people = useMemo(() => {
        const list = [];
        for (const e of employees) list.push({ kind:'emp', id:e.id, key:'emp:'+e.id, name:e.name||e.email||'—', role:'AM' });
        for (const s of suppliers) list.push({ kind:'sup', id:s.id, key:'sup:'+s.id, name:s.name||s.email||'—', role:s.specialty||'עורך' });
        return list;
      }, [employees, suppliers]);

      // Build matrix: { personKey: { stageId: count } }
      const matrix = useMemo(() => {
        const m = {};
        const totals = { perPerson:{}, perStage:{} };
        for (const t of tasks) {
          if ((t.stage||1) >= 9) continue; // skip done
          // 1) current stage owner
          const owner = (t.stageOwners||{})[t.stage||1];
          if (owner) {
            const key = owner;
            const stage = t.stage || 1;
            m[key] = m[key] || {};
            m[key][stage] = (m[key][stage] || 0) + 1;
            totals.perPerson[key] = (totals.perPerson[key]||0) + 1;
            totals.perStage[stage] = (totals.perStage[stage]||0) + 1;
          }
          // 2) general role bucket — accountManager and editor get the AM-stages and editing-stage
          if (t.accountManagerId) {
            const key = 'emp:'+t.accountManagerId;
            const stage = t.stage || 1;
            // Only count if they aren't already the explicit stageOwner
            if (owner !== key) {
              m[key] = m[key] || {};
              m[key]['_general'] = (m[key]['_general'] || 0) + 1;
              totals.perPerson[key] = (totals.perPerson[key]||0) + 1;
            }
          }
          if (t.editorId) {
            const key = 'sup:'+t.editorId;
            if (owner !== key) {
              m[key] = m[key] || {};
              m[key]['_general'] = (m[key]['_general'] || 0) + 1;
              totals.perPerson[key] = (totals.perPerson[key]||0) + 1;
            }
          }
        }
        return { m, totals };
      }, [tasks]);

      const sortedPeople = [...people].sort((a,b) => (matrix.totals.perPerson[b.key]||0) - (matrix.totals.perPerson[a.key]||0));
      const totalActive = tasks.filter(t => (t.stage||1) < 9).length;

      return (
        <div style={{ minHeight:'100%', padding:'18px 22px' }}>
          <div style={{ display:'flex', alignItems:'baseline', gap:12, marginBottom:6 }}>
            <h1 style={{ fontSize:20, fontWeight:700, color:'var(--text)' }}>👥 מצב הצוות</h1>
            <span style={{ fontSize:12, color:'var(--text-sub)' }}>מי אחראי על מה — מבט-על</span>
          </div>
          <div style={{ fontSize:11, color:'var(--text-muted)', marginBottom:16 }}>
            {totalActive} משימות פעילות · {people.length} אנשי צוות · עמודה אחרונה = משימה ללא שלב משויך

          {people.length === 0 ? (
            <div style={{ padding:40, background:'var(--bg)', border:'1px dashed var(--surface2)', borderRadius:10, textAlign:'center', color:'var(--text-muted)', fontSize:13 }}>
              אין עובדים או ספקים מוגדרים. הוסף בעמוד "עובדים" / "ספקים" כדי לראות מטריצת אחריות.
            </div>
          ) : (
            <div style={{ background:'var(--bg)', border:'1px solid var(--surface2)', borderRadius:10, overflow:'hidden' }}>
              <div style={{ overflowX:'auto' }}>
                <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
                  <thead>
                    <tr style={{ background:'var(--surface)', borderBottom:'1px solid var(--surface2)' }}>
                      <th style={{ textAlign:'right', padding:'10px 14px', color:'var(--text-sub)', fontWeight:600, fontSize:11, position:'sticky', right:0, background:'var(--surface)', minWidth:180 }}>איש צוות</th>
                      {STAGES_LIST.map(s => (
                        <th key={s.id} title={s.label} style={{ textAlign:'center', padding:'10px 8px', color:'var(--text-sub)', fontWeight:500, fontSize:11, minWidth:60 }}>
                          <div style={{ fontSize:14, marginBottom:2 }}>{s.emoji}</div>
                          <div style={{ fontSize:9, color:'var(--text-muted)' }}>{s.label}</div>
                        </th>
                      ))}
                      <th style={{ textAlign:'center', padding:'10px 8px', color:'var(--text-sub)', fontWeight:500, fontSize:11, minWidth:60 }}>
                        <div style={{ fontSize:14, marginBottom:2 }}>📦</div>
                        <div style={{ fontSize:9, color:'var(--text-muted)' }}>כללי</div>
                      </th>
                      <th style={{ textAlign:'center', padding:'10px 14px', color:'#fbbf24', fontWeight:600, fontSize:11, minWidth:60 }}>סה״כ</th>
                    </tr>
                  </thead>
                  <tbody>
                    {sortedPeople.map(p => {
                      const row = matrix.m[p.key] || {};
                      const total = matrix.totals.perPerson[p.key] || 0;
                      const heat = total >= 7 ? '#ef4444' : total >= 4 ? '#f59e0b' : total > 0 ? '#22c55e' : 'var(--border2)';
                      const initials = (p.name || '').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('');
                      const isAm = p.kind === 'emp';
                      return (
                        <tr key={p.key} style={{ borderBottom:'1px solid var(--surface2)' }}>
                          <td style={{ padding:'10px 14px', position:'sticky', right:0, background:'var(--bg)' }}>

                              <div className={`workload-avatar ${isAm ? 'wa-am' : 'wa-editor'}`} style={{ width:28, height:28, fontSize:10 }}>{initials}</div>
                              <div style={{ minWidth:0 }}>
                                <div style={{ fontSize:13, color:'var(--text)', fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{p.name}</div>
                                <div style={{ fontSize:10, color:'var(--text-muted)' }}>{p.role}</div>
                              </div>
                            </div>
                          </td>
                          {STAGES_LIST.map(s => {
                            const c = row[s.id] || 0;
                            return (
                              <td key={s.id} style={{ textAlign:'center', padding:'10px 4px', color: c > 0 ? 'var(--text)' : 'var(--border2)', fontWeight: c > 0 ? 600 : 400 }}>

                            );
                          })}
                          <td style={{ textAlign:'center', padding:'10px 4px', color: row['_general'] > 0 ? 'var(--text-sub)' : 'var(--border2)', fontWeight: row['_general'] > 0 ? 500 : 400 }}>
                            {row['_general'] || '·'}
                          </td>
                          <td style={{ textAlign:'center', padding:'10px 14px' }}>
                            <span style={{ display:'inline-flex', alignItems:'center', gap:5, background:`${heat}22`, color:heat, padding:'2px 9px', borderRadius:99, fontSize:11, fontWeight:700, border:`1px solid ${heat}44` }}>
                              {total}
                            </span>
                          </td>
                        </tr>
                      );
                    })}
                    {/* Totals row */}
                    <tr style={{ background:'var(--surface2)', borderTop:'2px solid var(--surface2)' }}>
                      <td style={{ padding:'10px 14px', position:'sticky', right:0, background:'var(--surface2)', color:'var(--text-sub)', fontWeight:600, fontSize:11 }}>סה״כ פעילות</td>
                      {STAGES_LIST.map(s => (
                        <td key={s.id} style={{ textAlign:'center', padding:'10px 4px', color:'var(--text-sub)', fontWeight:600 }}>{matrix.totals.perStage[s.id] || '·'}</td>
                      ))}
                      <td></td>
                      <td style={{ textAlign:'center', padding:'10px 14px', color:'#fbbf24', fontWeight:700 }}>{totalActive}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* Legend */}
          <div style={{ marginTop:14, display:'flex', gap:14, flexWrap:'wrap', fontSize:11, color:'var(--text-sub)' }}>
            <span>🟢 פנוי (≤3)</span>
            <span>🟡 עומס בינוני (4–6)</span>
            <span>🔴 שרוף (7+)</span>
            <span style={{ marginRight:'auto', color:'var(--text-muted)' }}>💡 השלם שיוך אחראי בכל שלב מתוך פאנל המשימה</span>
          </div>
        </div>
      );
    }

    /* ── ARCHIVE / TRASH ── */
    function Archive({ user, role, employees=[], suppliers=[] }) {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('tasks');
      useEffect(() => {
        if (!db || !user) return;
        const q = db.collection('tasks').where('userId','==',user.uid);
        const u = q.onSnapshot(s => {
          setItems(s.docs.map(d => ({ id:d.id, ...d.data() })).filter(t => t.archived));
          setLoading(false);
        }, () => setLoading(false));
        return u;
      }, [user]);

      async function restore(t) {
        await db.collection('tasks').doc(t.id).update({
          archived: firebase.firestore.FieldValue.delete(),
          archivedAt: firebase.firestore.FieldValue.delete(),
          archivedBy: firebase.firestore.FieldValue.delete(),

        await db.collection('tasks').doc(t.id).delete();
      }

      const STAGE_LABELS = ['','בריף','כתיבה','אישור תסריט','קביעת צילום','צילום','עריכה','אישור סופרוויזר','אישור לקוח','סגירה'];

      return (
        <div style={{ minHeight:'100%', padding:'18px 22px' }}>
          <div style={{ display:'flex', alignItems:'baseline', gap:12, marginBottom:16 }}>

    /* ── CLIENT PROFITABILITY ── */
    function ClientProfitability({ role, clients=[], tasks=[], suppliers=[], expenses=[], projects=[] }) {
      const today = new Date();
      const [selMonth, setSelMonth] = useState(today.toISOString().slice(0,7));
      const EDIT_TYPES = ['סרטון','ריל','פודקאסט','וידאו'];

      // Month picker options (last 6 months + next month)
      const monthOptions = [];
      for (let i = -5; i <= 1; i++) {
        const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
        const key = d.toISOString().slice(0, 7);
        const label = d.toLocaleDateString('he-IL', { month: 'long', year: 'numeric' });
        monthOptions.push({ key, label });
      }
      monthOptions.reverse();

      const editorRate = editorId => {
        if (!editorId) return 0;
        return Number(suppliers.find(s => s.id === editorId)?.videoRate) || 0;
      };

      const getStats = client => {
        const cName = client.name;
        const retainer = Number(client.retainerAmount) || 0;
        const scope = client.scopeOfWork || [];

        // Scope: estimated monthly editing cost
        const editScope = scope.filter(i => EDIT_TYPES.some(t => (i.contentType||'').includes(t)));
        const editScopeQty = editScope.reduce((s, i) => s + (Number(i.quantity) || 0), 0);
        const rate = editorRate(client.defaultEditorId);
        const estimatedEditCost = editScopeQty * rate;

        // Tasks in editing (stage ≥ 6) for this client
        const editingTasks = tasks.filter(t => t.client === cName && (t.stage||1) >= 6);
        const inEditingNow  = editingTasks.filter(t => (t.stage||1) < FINAL_STAGE).length;

        // Actual editing cost this month — tasks whose stage changed to ≥6 this month
        // Approximation: use task.updatedAt or createdAt
        const thisMonthEdit = editingTasks.filter(t => {
          const raw = t.updatedAt?.toDate?.() || t.createdAt?.toDate?.() || t.updatedAt || t.createdAt;
          if (!raw) return false;
          return (raw instanceof Date ? raw : new Date(raw)).toISOString().slice(0,7) === selMonth;
        });
        const actualEditCost = thisMonthEdit.reduce((s, t) => s + editorRate(t.editorId || client.defaultEditorId), 0);

        // Additional expenses linked to this client for selected month
        const linkedExpenses = expenses
          .filter(e => e.clientId === client.id && (e.date||'').slice(0,7) === selMonth)
          .reduce((s, e) => s + (Number(e.amount) || 0), 0);

        // Totals (use estimated edit cost if scope defined, else actual)
        const editCostForCalc = editScopeQty > 0 ? estimatedEditCost : actualEditCost;
        const totalCosts = editCostForCalc + linkedExpenses;

    function CustomerSuccess({ user, role, clients=[] }) {
      const [tab, setTab] = useState('inbox');     // inbox | timeline | connections
      const [stats, setStats] = useState(null);
      const [suggestions, setSuggestions] = useState([]);
      const [loadingSug, setLoadingSug] = useState(true);
      // connections
      const [waStatus, setWaStatus] = useState(null);
      const [waQr, setWaQr] = useState(null);
      const [waChats, setWaChats] = useState([]);
      const [chatSearch, setChatSearch] = useState('');
