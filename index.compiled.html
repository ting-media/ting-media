<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TING MEDIA - מערכת ניהול</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script crossorigin="anonymous" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            zinc: {
              950: 'var(--bg)',
              900: 'var(--surface)',
              800: 'var(--border)',
              700: 'var(--border2)',
              600: 'var(--text-muted)',
              500: 'var(--text-muted)',
              400: 'var(--text-sub)',
              300: 'var(--text-sub)',
              200: 'var(--text)',
              100: 'var(--text)',
              50: 'var(--text)',
            },
            amber: {
              500: 'var(--accent)',
              400: 'var(--accent)',
              300: 'var(--accent)',
            },
          }
        }
      }
    }
  </script>
  <script crossorigin="anonymous" integrity="sha384-BkEIW/B4JV9w6pRfBRgZtAcYDk5goH1nUI49rLo8s5PSHgTfgxWBczRVJx+fv5kP" src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script crossorigin="anonymous" integrity="sha384-96KlrabK9X4T/tq4duY+/4JE60jZAiSs4QVJFwmY30ETT24x2+89B7qmq7O4IETX" src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script crossorigin="anonymous" integrity="sha384-LF74FIj8PQKxRVken52qSHntBSVEC6b05H04maSVJibifVGmWz9Ajc23WjrRVSCX" src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    :root {
      --bg: #0B0C14; --surface: #13141F; --surface2: #0E0F1A;
      --border: #1E2035; --border2: #2A2D48; --hover: #191B2E;
      --text: #EDF0FF; --text-sub: #9BA3C0; --text-muted: #3D4265;
      --accent: #8B5CF6; --accent-glow: rgba(139,92,246,0.22); --accent-dim: rgba(139,92,246,0.12);
      --red: #F43F5E; --red-dim: rgba(244,63,94,0.12);
      --card-shadow: 0 1px 3px rgba(0,0,0,0.35), 0 1px 2px rgba(0,0,0,0.2);
      --card-shadow-hover: 0 4px 16px rgba(0,0,0,0.45), 0 2px 4px rgba(0,0,0,0.3);
    }
    html[data-theme="light"] {
      --bg: #F2F4FA; --surface: #FFFFFF; --surface2: #EAEDf7;
      --border: #D8DCEE; --border2: #BFC6DC; --hover: #EEF0FB;
      --text: #10152B; --text-sub: #3E4663; --text-muted: #6E7795;
      --card-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --card-shadow-hover: 0 4px 16px rgba(0,0,0,0.1), 0 2px 4px rgba(0,0,0,0.06);
    }
    *, *::before, *::after { font-family: 'Heebo', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    /* ── READABILITY: bump tiny font utilities app-wide ── */
    .text-xs { font-size: 12.5px !important; line-height: 1.5 !important; }
    .text-sm { font-size: 14.5px !important; line-height: 1.55 !important; }
    .text-\[9px\], .text-\[9\.5px\], .text-\[10px\], .text-\[10\.5px\] { font-size: 11.5px !important; line-height: 1.4 !important; }
    .text-\[11px\], .text-\[11\.5px\] { font-size: 12.5px !important; line-height: 1.45 !important; }
    body { background: var(--bg); color: var(--text); color-scheme: dark; background-image: radial-gradient(ellipse at 90% 0%, rgba(139,92,246,0.05) 0%, transparent 55%); }
    body, body * { transition: background-color 0.25s ease, border-color 0.25s ease, color 0.18s ease; }
    select, option, input, textarea { transition: none; }
    select { color-scheme: dark; }
    option { background: var(--surface); color: var(--text); }
    /* ── LIGHT MODE overrides (applied via data-theme="light" on <html>) ── */
    html[data-theme="light"] body { color-scheme: light; background-image: none; }
    html[data-theme="light"] select, html[data-theme="light"] option { color-scheme: light; }
    /* Fix hardcoded-dark inline-style elements in light mode */
    html[data-theme="light"] .stage-group-hdr { background: var(--bg) !important; border-top-color: var(--border) !important; }
    html[data-theme="light"] .monday-row { border-bottom-color: var(--border) !important; }
    html[data-theme="light"] .task-panel { background: var(--surface) !important; }
    html[data-theme="light"] .sidebar { box-shadow: 2px 0 12px rgba(0,0,0,0.08); }
    /* Light mode: fix text-white inline classes in panel */
    html[data-theme="light"] .task-panel-wrap .text-white { color: var(--text) !important; }
    html[data-theme="light"] .task-panel-wrap .text-zinc-200 { color: var(--text) !important; }
    html[data-theme="light"] .task-panel-wrap .text-zinc-300 { color: var(--text-sub) !important; }
    html[data-theme="light"] .topbar { background: var(--bg) !important; }
    html[data-theme="light"] .content-area h2, html[data-theme="light"] h2.text-white { color: var(--text) !important; }
    /* ── LIGHT MODE: remap hardcoded dark Tailwind utilities app-wide ── */
    html[data-theme="light"] .text-white, html[data-theme="light"] .text-zinc-100, html[data-theme="light"] .text-zinc-200 { color: var(--text) !important; }
    html[data-theme="light"] .text-zinc-300, html[data-theme="light"] .text-zinc-400 { color: var(--text-sub) !important; }
    html[data-theme="light"] .text-zinc-500 { color: #49506E !important; }
    /* Light mode: give cards subtle elevation for hierarchy */
    html[data-theme="light"] .bg-zinc-900\/60.rounded-xl, html[data-theme="light"] .bg-zinc-900\/40.rounded-xl { box-shadow: var(--card-shadow); }
    html[data-theme="light"] .text-zinc-600, html[data-theme="light"] .text-zinc-700 { color: var(--text-muted) !important; }
    html[data-theme="light"] .hover\:text-white:hover, html[data-theme="light"] .hover\:text-zinc-300:hover { color: var(--text) !important; }
    html[data-theme="light"] .bg-zinc-900, html[data-theme="light"] .bg-zinc-900\/40, html[data-theme="light"] .bg-zinc-900\/50, html[data-theme="light"] .bg-zinc-900\/60, html[data-theme="light"] .bg-zinc-900\/80, html[data-theme="light"] .bg-zinc-950, html[data-theme="light"] .bg-zinc-950\/60 { background-color: var(--surface) !important; }
    html[data-theme="light"] .bg-zinc-800, html[data-theme="light"] .bg-zinc-800\/30, html[data-theme="light"] .bg-zinc-800\/40, html[data-theme="light"] .bg-zinc-800\/50, html[data-theme="light"] .bg-zinc-800\/60, html[data-theme="light"] .bg-zinc-700, html[data-theme="light"] .bg-zinc-700\/40 { background-color: var(--surface2) !important; }
    html[data-theme="light"] .hover\:bg-zinc-900:hover, html[data-theme="light"] .hover\:bg-zinc-900\/40:hover, html[data-theme="light"] .hover\:bg-zinc-800:hover, html[data-theme="light"] .hover\:bg-zinc-800\/60:hover, html[data-theme="light"] .hover\:bg-zinc-700:hover { background-color: var(--hover) !important; }
    html[data-theme="light"] .border-zinc-600, html[data-theme="light"] .border-zinc-600\/40, html[data-theme="light"] .border-zinc-700, html[data-theme="light"] .border-zinc-700\/60, html[data-theme="light"] .border-zinc-800, html[data-theme="light"] .border-zinc-800\/40, html[data-theme="light"] .border-zinc-800\/60 { border-color: var(--border) !important; }
    html[data-theme="light"] .hover\:border-zinc-700:hover { border-color: var(--border2) !important; }
    html[data-theme="light"] .bg-black\/70 { background-color: rgba(20,24,46,0.45) !important; }
    html[data-theme="light"] .placeholder-zinc-600::placeholder { color: var(--text-muted) !important; }
    html[data-theme="light"] .from-zinc-900, html[data-theme="light"] .to-zinc-900, html[data-theme="light"] .to-zinc-900\/40, html[data-theme="light"] .to-zinc-900\/60, html[data-theme="light"] .via-zinc-900\/80 { background-image: none !important; background-color: var(--surface2) !important; }
    /* theme-toggle button */
    .theme-toggle {
      width:32px; height:32px; border-radius:8px; border:1px solid var(--border2);
      background:var(--surface2); cursor:pointer; font-size:16px;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.15s; flex-shrink:0;
    }
    .theme-toggle:hover { background:var(--hover); border-color:var(--accent); transform:scale(1.08); }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    textarea { resize: vertical; }
    /* Smooth collapse animation - overflow visible so portaled dropdowns work; collapsed state is hidden via display */
    .swimlane-body { transition: opacity .2s ease; }
    .swimlane-body.collapsed { display:none; }
    /* Urgency pulses */
    @keyframes pulseRed   { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.55), inset 3px 0 0 #ef4444} 50%{box-shadow:0 0 0 6px rgba(239,68,68,0), inset 3px 0 0 #ef4444} }
    @keyframes pulseAmber { 0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,0.45), inset 3px 0 0 #f97316} 50%{box-shadow:0 0 0 5px rgba(249,115,22,0), inset 3px 0 0 #f97316} }
    /* Subtle urgency: tiny left rail, no animation, no full-row tint */
    .urg-critical { box-shadow: inset 3px 0 0 #ef4444; }
    .urg-warning  { box-shadow: inset 3px 0 0 #f59e0b; }
    /* MyWork — refined design system */
    .mywork-row { transition: background .12s, transform .12s; }
    .mywork-row:hover { background:var(--hover) !important; transform: translateY(-1px); }
    .mywork-row:hover .mywork-actions { opacity: 1 !important; }
    .mywork-bucket { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; position:relative; transition: border-color .15s, box-shadow .15s; box-shadow: var(--card-shadow); }
    .mywork-bucket::before { content:''; position:absolute; top:0; right:0; width:3px; height:100%; }
    .mywork-bucket.b-overdue::before { background:#ef4444; }
    .mywork-bucket.b-today::before   { background:#f59e0b; }
    .mywork-bucket.b-week::before    { background:#60a5fa; }
    .mywork-bucket.b-later::before   { background:var(--text-sub); }
    .mywork-bucket.b-done::before    { background:#22c55e; }
    .mywork-bucket-head { display:flex; align-items:center; gap:8px; padding:10px 18px 10px 14px; cursor:pointer; user-select:none; transition: background .15s; }
    .mywork-bucket-head:hover { background:var(--hover); }
    .mywork-count { font-size:11px; font-weight:600; padding:2px 8px; border-radius:99px; background:var(--border2); color:var(--text-sub); }
    .b-overdue .mywork-count { background:rgba(239,68,68,0.12); color:#ef4444; }
    .b-today .mywork-count   { background:rgba(245,158,11,0.12); color:#f59e0b; }
    .b-week .mywork-count    { background:rgba(96,165,250,0.10); color:#60a5fa; }
    .b-done .mywork-count    { background:rgba(34,197,94,0.10); color:#22c55e; }
    .mywork-task-list { border-top:1px solid var(--border); }
    .mywork-task-list .mywork-row { padding:10px 18px 10px 14px; border-bottom:1px solid var(--border); }
    .mywork-task-list .mywork-row:last-child { border-bottom:none; }
    .mywork-check { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--border2); flex-shrink:0; cursor:pointer; transition: border-color .15s, background .15s; display:flex; align-items:center; justify-content:center; font-size:10px; color:#22c55e; background:transparent; }
    .mywork-check:hover { border-color:var(--accent); }
    .mywork-check.checked { background:rgba(34,197,94,0.10); border-color:#22c55e; }
    .mywork-client-chip { font-size:11px; color:var(--text-sub); background:var(--border2); padding:2px 8px; border-radius:4px; white-space:nowrap; }
    .mywork-stage-pill { font-size:10.5px; font-weight:500; padding:2px 8px; border-radius:4px; white-space:nowrap; }
    .mywork-due { font-size:11px; color:var(--text-sub); white-space:nowrap; min-width:56px; text-align:center; }
    .mywork-due.overdue { color:#ef4444; font-weight:500; }
    .mywork-due.today { color:#f59e0b; font-weight:500; }
    .mywork-panel { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:20px; overflow:hidden; box-shadow: var(--card-shadow); }
    .mywork-panel-head { display:flex; align-items:center; justify-content:space-between; padding:13px 18px; border-bottom:1px solid var(--border); background: var(--surface2); }
    .workload-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(210px, 1fr)); gap:1px; background:var(--border); }
    .workload-card { background:var(--surface); padding:16px 18px; transition: background .15s, transform .15s, box-shadow .15s; border-radius: 0; border-right: 3px solid transparent; }
    .workload-card:hover { background:var(--hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.15); border-right-color: var(--accent); }
    .workload-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; flex-shrink:0; }
    .wa-am { background:rgba(96,165,250,0.15); color:#60a5fa; border:1.5px solid rgba(96,165,250,0.25); }
    .wa-editor { background:rgba(167,139,250,0.15); color:#a78bfa; border:1.5px solid rgba(167,139,250,0.25); }
    .mywork-quick-add:focus-within { border-color:var(--accent) !important; box-shadow:0 0 0 3px var(--accent-dim); }
    /* Responsive task panel — drawer on narrow screens, side panel on wide */
    .task-panel-wrap {
      width: clamp(440px, 36vw, 640px);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100%;
      overflow: hidden;
      border-right: 1px solid var(--border);
      animation: slideInRight .18s ease-out;
      background: var(--bg);
    }
    .task-panel-backdrop { display: none; }
    @media (max-width: 1099px) {
      .task-panel-wrap {
        position: fixed;
        top: 0; right: 0; bottom: 0; left: 0;
        width: 100vw !important;
        height: 100vh;
        z-index: 9000;
        border-right: 0;
      }
      .task-panel-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.6);
        z-index: 8999;
      }
    }
    .urg-dot-critical { background:#ef4444; }
    .urg-dot-warning  { background:#f97316; }
    /* Fires banner */
    .fire-icon { filter:drop-shadow(0 0 4px rgba(239,68,68,0.55)); }
    /* Drag visuals */
    .kanban-card[draggable="true"] { cursor:grab; }
    .kanban-card.dragging { opacity:.4; cursor:grabbing; }
    .kanban-col.drag-over { background: var(--accent-dim); outline:1px dashed var(--accent-glow); }
    /* Kanban theme-aware overrides */
    .kanban-card { background:var(--surface) !important; border-color:var(--border) !important; color:var(--text); }
    .kanban-card:hover { background:var(--hover) !important; border-color:var(--border2) !important; }
    .kanban-card .kanban-emoji-box { background:var(--surface2) !important; }
    .kanban-card .kanban-title { color:var(--text) !important; }
    .kanban-card .kanban-client { color:var(--text-muted) !important; }
    .kanban-card .kanban-footer { color:var(--text-muted) !important; border-top-color:var(--border) !important; }
    .kanban-card .kanban-date { color:var(--text-sub) !important; }
    .kanban-col-inner { background:var(--surface2); border-radius:10px; padding:8px; }
    .kanban-col-head-title { color:var(--text) !important; }
    .kanban-col-head-count { color:var(--text-muted) !important; }
    .kanban-col-add-btn { color:var(--text-muted) !important; border-color:var(--border2) !important; background:transparent; }
    .kanban-col-add-btn:hover { color:var(--text) !important; border-color:var(--border) !important; }
    /* Stage dot */
    .stage-dot { width:8px; height:8px; border-radius:9999px; flex-shrink:0; display:inline-block; }
    /* Native select arrow remove */
    select.bare { -webkit-appearance:none; appearance:none; }
    /* Task panel slide-in */
    .task-panel { border-left:1px solid var(--border); background:var(--surface); height:100%; overflow-y:auto; }
    @keyframes slideInRight { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
    .task-panel { animation: slideInRight .18s ease-out; }
    /* Monday-style task row */
    .monday-row { display:grid; align-items:center; border-bottom:1px solid var(--border); min-height:40px; cursor:pointer; transition:background .1s; }
    .monday-row:hover { background:var(--hover); }
    .monday-row.selected { background:var(--accent-dim); border-bottom-color:var(--accent-glow); }
    .monday-row.urg-critical { border-right:3px solid var(--red) !important; background:rgba(244,63,94,0.05); }
    .monday-row.urg-warning  { border-right:3px solid #f59e0b !important; background:rgba(245,158,11,0.04); }
    .monday-row.urg-critical:hover { background:rgba(244,63,94,0.09) !important; }
    .monday-row.urg-warning:hover  { background:rgba(245,158,11,0.08) !important; }
    .monday-row .prio-bar { width:4px; align-self:stretch; flex-shrink:0; border-radius:0; }
    /* Stage group header */
    .stage-group-hdr { display:flex; align-items:center; gap:8px; padding:6px 12px; cursor:pointer; user-select:none; position:sticky; top:0; z-index:2; }
    .stage-group-hdr:hover { filter:brightness(1.1); }
    /* Inline editable field */
    .field-chip { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:6px; border:1px solid transparent; cursor:pointer; transition:all .15s; font-size:12px; }
    .field-chip:hover { border-color:var(--border2); background:var(--hover); }
    .field-chip.editing { border-color:var(--accent); background:var(--accent-dim); }
    /* Attachment hover */
    .attach-item:hover .attach-remove { opacity:1; }
    .attach-remove { opacity:0; transition:opacity .15s; }
    /* Drive spinner */
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DESIGN SYSTEM: Layout ── */
    .layout { display:flex; min-height:100vh; background:var(--bg); color:var(--text); }

    /* ── DESIGN SYSTEM: Sidebar ── */
    .sidebar {
      width:232px; flex-shrink:0; background:var(--surface2);
      border-left:1px solid var(--border); display:flex; flex-direction:column;
      position:sticky; top:0; height:100vh; overflow-y:auto; z-index:10;
    }
    @media (max-width: 1024px) {
      .sidebar { width:60px; }
      .sidebar-nav { padding:6px 4px; }
      .nav-item { padding:8px 6px; font-size:0; justify-content:center; }
      .nav-item span:first-child { font-size:18px; }
      .nav-section-label { display:none; }
      .sidebar-logo .logo-text, .sidebar-logo .logo-sub { display:none; }
    }
    .sidebar-logo {
      padding:16px 14px 12px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:10px;
    }
    .logo-mark {
      width:34px; height:34px; background:var(--accent); border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:11px; color:#fff; flex-shrink:0;
      letter-spacing:0.05em;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1) inset, 0 2px 8px var(--accent-glow);
    }
    .logo-text { font-weight:800; font-size:13px; letter-spacing:0.1em; color:var(--text); text-transform:uppercase; }
    .logo-sub { font-size:9.5px; color:var(--text-muted); letter-spacing:0.05em; margin-top:1px; }
    .sidebar-nav { padding:8px 6px; flex:1; overflow-y:auto; }
    .nav-section-label {
      font-size:9px; font-weight:700; letter-spacing:0.18em; text-transform:uppercase;
      color:var(--text-muted); padding:14px 10px 4px; pointer-events:none;
    }
    .nav-section-label:first-child { padding-top:8px; }
    .nav-item {
      display:flex; align-items:center; gap:9px; padding:8px 10px;
      border-radius:7px; font-size:13.5px; color:var(--text-sub);
      cursor:pointer; transition:background 0.1s, color 0.1s;
      user-select:none; border:none; background:transparent; width:100%;
      text-align:right; font-family:'Heebo',sans-serif; margin-bottom:2px;
      line-height:1.3;
    }
    .nav-item:hover { background:var(--hover); color:var(--text); }
    .nav-item.active {
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 700;
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .nav-item-icon { width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; opacity:0.7; color:var(--text-sub); transition:opacity 0.15s, color 0.15s; }
    .nav-item-icon svg { width:16px; height:16px; stroke:currentColor; }
    .nav-item:hover .nav-item-icon { opacity:0.9; color:var(--text); }
    .nav-item.active .nav-item-icon { opacity:1; color:var(--accent); }
    .sidebar-bottom { padding:12px 10px 14px; border-top:1px solid var(--border); }
